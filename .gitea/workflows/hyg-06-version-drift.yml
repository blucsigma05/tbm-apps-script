# .gitea/workflows/hyg-06-version-drift.yml
# Version Drift Check — compares deployed GAS versions against source constants.
# Catches "clasp push without clasp deploy" drift. Sends Pushover at priority=1.
# Called by: after Deploy and Notify completes + nightly cron + workflow_dispatch
# Env vars required: GAS_DEPLOY_URL, PUSHOVER_USER_KEY, PUSHOVER_APP_TOKEN
# Ported from .github/workflows 2026-04-20 (PORT wave Batch 4h, Refs #7).
#
# This workflow is platform-agnostic — no token env, no forge API calls.
# workflow_run matches by name ("Deploy and Notify"), which remains stable
# after Batch 5a moved that workflow to .gitea/workflows/. Port is a pure
# file-relocation + path-comment update.

name: HYG-06 Version Drift Check

on:
  workflow_run:
    workflows: ['Deploy and Notify']
    types: [completed]
  schedule:
    - cron: '0 2 * * *'   # Nightly 02:00 UTC (20:00 Central)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift-check:
    name: Version Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # On workflow_run trigger: only run if deploy succeeded
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run version drift check
        id: check
        env:
          GAS_DEPLOY_URL: ${{ secrets.GAS_DEPLOY_URL }}
          REPO_ROOT: .
        run: python3 .github/scripts/check_version_drift.py

      - name: Pushover — version drift found
        if: steps.check.outputs.has_findings == 'true'
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
        run: |
          if [ -z "$PUSHOVER_USER_KEY" ] || [ -z "$PUSHOVER_APP_TOKEN" ]; then
            echo "Pushover secrets not set — skipping notification."
            exit 0
          fi
          MSG=$(cat hyg06-message.txt 2>/dev/null || echo "Version drift detected — see Actions log.")
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sS \
            --form-string "token=${PUSHOVER_APP_TOKEN}" \
            --form-string "user=${PUSHOVER_USER_KEY}" \
            --form-string "title=HYG-06: Version Drift ⚠️" \
            --form-string "message=${MSG}" \
            --form-string "url=${RUN_URL}" \
            --form-string "url_title=View run" \
            --form-string "priority=1" \
            https://api.pushover.net/1/messages.json
