# .gitea/workflows/codex-finding-listener.yml
# Codex Finding Listener — detects finding markers in PR comments and applies labels.
# Extended (#384): auto-files Gitea Issues for severity:blocker (P1) findings.
# Logic lives in .github/scripts/parse_finding_comment.py (no heredocs in YAML).
#
# Supports ALL three comment surfaces:
#   issue_comment               — top-level PR conversation comments
#   pull_request_review_comment — inline diff comments
#   pull_request_review         — submitted review body (HOLD/APPROVE/etc.)
#
# Whitelisted authors: LT.  (Updated per LT 2026-04-20: old GitHub values
#   'blucsigma05' was an org namespace on Gitea not a user, and
#   'chatgpt-codex-connector' has no Gitea equivalent since the Codex CLI
#   posts via gitea-actions instead of an external connector account.)
# Loop prevention: skips gitea-actions + legacy github-actions[bot] comments.
# Kill switches: repo vars AUTOMATION_ENABLED, CODEX_BLOCKER_AUTOFILE_ENABLED.
# Ported from .github/workflows 2026-04-20 (PORT wave Batch 4e, Refs #7).

name: Codex Finding Listener

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  detect-finding:
    name: Detect finding marker
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'issue_comment' ||
      github.event_name == 'pull_request_review_comment' ||
      github.event_name == 'pull_request_review'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Parse finding comment
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_API_URL: ${{ github.server_url }}/api/v1
          REPO: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login || github.event.review.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body || github.event.review.body }}
          COMMENT_ID: ${{ github.event.comment.id || github.event.review.id || '0' }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTOMATION_ENABLED: ${{ vars.AUTOMATION_ENABLED || 'true' }}
          CODEX_BLOCKER_AUTOFILE_ENABLED: ${{ vars.CODEX_BLOCKER_AUTOFILE_ENABLED || 'true' }}
        run: python3 .github/scripts/parse_finding_comment.py
