# .gitea/workflows/ci.yml
# TBM Continuous Integration — runs smoke + regression tests on every PR.
# Result parsing lives in .github/scripts/parse_test_results.py.
# Ported from .github/workflows 2026-04-20 (PORT wave Batch 6a, Refs #7).
#
# Changes vs the GitHub version:
#   1. "Comment on PR" step: actions/github-script -> inline python3 stdlib
#      urllib. Marker-based find-or-create against Gitea issues API.
#   2. "Refresh pipeline review summary" step DELETED. It dispatched
#      review-watcher.yml, which was removed in PR #4 (DELETE category —
#      no Gitea equivalent exists). Confirmed in workflow-triage doc.
#   3. "Notify pipeline relay on failed tests" step unchanged — it posts
#      to PIPELINE_RELAY_URL (not a GitHub API), fully environment-agnostic.
#      GITHUB_SERVER_URL env var still resolves (Gitea Actions sets it to
#      the Gitea host) so the run URL in the relay payload is correct.

name: TBM Smoke + Regression

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches-ignore: [main]
  workflow_dispatch:

# GAS PropertiesService is shared across all executions — concurrent test runs
# stomp each other's freeze state. Serialize globally so only one suite runs at a time.
concurrency:
  group: tbm-gas-tests
  cancel-in-progress: false

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    name: Run TBM Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke + regression tests
        id: run_tests
        shell: bash
        env:
          GAS_DEPLOY_URL: ${{ secrets.GAS_DEPLOY_URL }}
        run: |
          if [ -z "$GAS_DEPLOY_URL" ]; then
            cat <<'ERRDOC' > test_summary.md
          ## TBM Test Results: CONFIG_ERROR

          **Missing secret:** GAS_DEPLOY_URL
          The CI workflow cannot hit the deployed Apps Script test endpoint until this repo secret is configured.
          ERRDOC
            echo "overall=CONFIG_ERROR" >> "$GITHUB_OUTPUT"
            cat test_summary.md
            exit 1
          fi

          echo "Hitting GAS test endpoint..."
          if ! response="$(curl -sS -L --max-time 120 "${GAS_DEPLOY_URL}?action=runTests")"; then
            cat <<'ERRDOC' > test_summary.md
          ## TBM Test Results: ENDPOINT_ERROR

          The CI workflow could not reach the deployed Apps Script test endpoint.
          Check GAS_DEPLOY_URL, deployment health, and workflow logs.
          ERRDOC
            echo "overall=ENDPOINT_ERROR" >> "$GITHUB_OUTPUT"
            cat test_summary.md
            exit 1
          fi
          printf '%s' "$response" > test_response.json
          echo "Raw response length: ${#response}"

          python3 .github/scripts/parse_test_results.py

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_API_URL: ${{ github.server_url }}/api/v1
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Inline python3 stdlib replaces actions/github-script. Finds any
          # existing comment whose body contains "TBM Test Results" and
          # PATCHes it; otherwise POSTs a new comment. Marker-match covers
          # both the CONFIG_ERROR / ENDPOINT_ERROR summaries and the normal
          # parse_test_results.py output.
          python3 - <<'PYEOF'
          import json, os, sys, urllib.error, urllib.request
          api = os.environ['GITEA_API_URL'].rstrip('/')
          token = os.environ['GITEA_TOKEN']
          repo = os.environ['REPO']
          pr = os.environ['PR_NUMBER']
          try:
              with open('test_summary.md', 'r', encoding='utf-8') as fh:
                  body = fh.read()
          except Exception as exc:
              body = 'Test results could not be parsed. Check workflow logs. (' + str(exc) + ')'

          def call(method, path, payload=None):
              url = api + path
              data = json.dumps(payload).encode('utf-8') if payload is not None else None
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header('Authorization', 'token ' + token)
              req.add_header('Accept', 'application/json')
              if payload is not None:
                  req.add_header('Content-Type', 'application/json')
              with urllib.request.urlopen(req, timeout=30) as resp:
                  text = resp.read().decode('utf-8')
                  return json.loads(text) if text else None

          comments = call('GET', '/repos/' + repo + '/issues/' + pr + '/comments') or []
          existing = None
          for c in comments:
              if 'TBM Test Results' in (c.get('body') or ''):
                  existing = c.get('id')
                  break
          if existing:
              call('PATCH', '/repos/' + repo + '/issues/comments/' + str(existing),
                   payload={'body': body})
              print('Updated comment ' + str(existing))
          else:
              call('POST', '/repos/' + repo + '/issues/' + pr + '/comments',
                   payload={'body': body})
              print('Created new comment on PR #' + pr)
          PYEOF

      - name: Notify pipeline relay on failed tests
        if: always() && github.event_name == 'pull_request'
        shell: bash
        env:
          RELAY_URL: ${{ secrets.PIPELINE_RELAY_URL }}
          RELAY_SECRET: ${{ secrets.PIPELINE_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ -z "$RELAY_URL" ] || [ -z "$RELAY_SECRET" ]; then
            echo "Pipeline relay secrets not configured; skipping."
            exit 0
          fi

          if [ "${{ steps.run_tests.outputs.overall }}" = "PASS" ]; then
            echo "Tests passed; review watcher will notify later."
            exit 0
          fi

          python3 -c "
          import json, os
          with open('test_summary.md', 'r', encoding='utf-8') as fh:
              summary = fh.read().strip()
          payload = {
              'fn': 'pipelineRelaySafe',
              'args': [{
                  'secret': os.environ['RELAY_SECRET'],
                  'repo': os.environ['GITHUB_REPOSITORY'],
                  'type': 'tests_failed',
                  'summary': summary[:500],
                  'prNumber': os.environ.get('PR_NUMBER'),
                  'prUrl': os.environ.get('PR_URL'),
                  'sha': os.environ.get('GITHUB_SHA'),
                  'runUrl': os.environ['GITHUB_SERVER_URL'] + '/' + os.environ['GITHUB_REPOSITORY'] + '/actions/runs/' + os.environ['GITHUB_RUN_ID'],
                  'cycle': 0
              }]
          }
          print(json.dumps(payload))
          " > relay_payload.json

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            --data @relay_payload.json \
            "$RELAY_URL"

      # REMOVED 2026-04-20: "Refresh pipeline review summary after CI completes"
      # step dispatched review-watcher.yml, which was DELETED in PR #4 (GitHub-only
      # auto-fix loop, no Gitea equivalent). Its scheduling role is not replicated
      # on Gitea — the live Codex review workflow posts its own PR comment on
      # every pull_request event, so no downstream refresh is needed.
