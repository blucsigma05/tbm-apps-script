# .gitea/workflows/hyg-11-trust-backlog-age.yml
# Trust Backlog Age Sweep — runs every Sunday at 8am Central (14:00 UTC).
# Flags active sprint items with last_verified > 7 days.
# Called by: cron Sunday 14:00 UTC + workflow_dispatch
# Env vars required: NOTION_API_KEY, NOTION_TRUST_BACKLOG_DB, PUSHOVER_USER_KEY, PUSHOVER_APP_TOKEN

name: HYG-11 Trust Backlog Age Sweep

on:
  schedule:
    - cron: '0 14 * * 0'   # Sunday 08:00 Central (14:00 UTC)
  workflow_dispatch:
    inputs:
      stale_days:
        description: 'Days since last_verified before flagged (default: 7)'
        required: false
        default: '7'

permissions:
  contents: read

jobs:
  trust-backlog-sweep:
    name: Trust Backlog Age Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run trust backlog age check
        id: check
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TRUST_BACKLOG_DB: ${{ secrets.NOTION_TRUST_BACKLOG_DB }}
          STALE_DAYS: ${{ inputs.stale_days || '7' }}
        run: python3 .github/scripts/check_trust_backlog_age.py

      - name: Pushover — stale items found
        if: steps.check.outputs.has_findings == 'true'
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
        run: |
          if [ -z "$PUSHOVER_USER_KEY" ] || [ -z "$PUSHOVER_APP_TOKEN" ]; then
            echo "Pushover secrets not set — skipping notification."
            exit 0
          fi
          MSG=$(cat hyg11-message.txt 2>/dev/null || echo "Stale trust backlog items found — see Actions log.")
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sS \
            --form-string "token=${PUSHOVER_APP_TOKEN}" \
            --form-string "user=${PUSHOVER_USER_KEY}" \
            --form-string "title=HYG-11: Trust Backlog Stale" \
            --form-string "message=${MSG}" \
            --form-string "url=${RUN_URL}" \
            --form-string "url_title=View run" \
            --form-string "priority=0" \
            https://api.pushover.net/1/messages.json
