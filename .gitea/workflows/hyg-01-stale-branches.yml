# .gitea/workflows/hyg-01-stale-branches.yml
# Stale Branch Sweep — runs every Monday at 7am Central (13:00 UTC).
# Identifies branches older than STALE_DAYS with no open PR. Sends Pushover.
# Called by: cron Monday 13:00 UTC + workflow_dispatch
# Env vars required: GITEA_TOKEN (auto), PUSHOVER_USER_KEY, PUSHOVER_APP_TOKEN
# Ported from .github/workflows 2026-04-20 (PORT wave Batch 4b, Refs #7).

name: HYG-01 Stale Branch Sweep

on:
  schedule:
    - cron: '0 13 * * 1'   # Monday 07:00 Central (13:00 UTC)
  workflow_dispatch:
    inputs:
      stale_days:
        description: 'Days without commit before stale (default: 7)'
        required: false
        default: '7'

permissions:
  contents: read

jobs:
  stale-sweep:
    name: Stale Branch Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run stale branch check
        id: check
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_API_URL: ${{ github.server_url }}/api/v1
          GITHUB_REPOSITORY: ${{ github.repository }}
          STALE_DAYS: ${{ inputs.stale_days || '7' }}
        run: python3 .github/scripts/check_stale_branches.py

      - name: Pushover — stale branches found
        if: steps.check.outputs.has_findings == 'true'
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
        run: |
          if [ -z "$PUSHOVER_USER_KEY" ] || [ -z "$PUSHOVER_APP_TOKEN" ]; then
            echo "Pushover secrets not set — skipping notification."
            exit 0
          fi
          MSG=$(cat hyg01-message.txt 2>/dev/null || echo "Stale branches found — see Actions log.")
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sS \
            --form-string "token=${PUSHOVER_APP_TOKEN}" \
            --form-string "user=${PUSHOVER_USER_KEY}" \
            --form-string "title=HYG-01: Stale Branches" \
            --form-string "message=${MSG}" \
            --form-string "url=${RUN_URL}" \
            --form-string "url_title=View run" \
            --form-string "priority=-1" \
            https://api.pushover.net/1/messages.json
