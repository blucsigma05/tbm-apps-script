# .gitea/workflows/playwright-regression.yml
# Playwright E2E Regression — runs Chromium tests against thompsonfams.com.
# Result parsing lives in .github/scripts/parse_playwright_results.py.
#
# Path filter (#464): skip E2E on PRs that only touch docs / specs / Issue
# templates. Doc edits cannot affect live-site rendering, so running the full
# 30-min suite against thompsonfams.com on a CLAUDE.md-only PR is wasted time
# AND exposes the PR to pre-existing Homework flakes that have nothing to do
# with the change under review.
#
# paths-ignore behavior (both GitHub and Gitea): the workflow is skipped iff
# EVERY changed file matches at least one pattern. Mixed PRs (docs + code)
# still run the suite.
#
# Ported from .github/workflows 2026-04-20 (PORT wave Batch 6b, Refs #7).
# Runtime prereq: the tbm-runner-1 act_runner user has a scoped sudoers
# grant (`act_runner ALL=(ALL) NOPASSWD: /usr/bin/apt-get`) installed in
# Phase C so `npx playwright install --with-deps chromium` can install
# browser deps. LT confirmed on 2026-04-20 to keep the grant rather than
# pre-bake Playwright deps into the VPS image — lowest-risk path, grant
# is narrowly scoped to apt-get only.
#
# Changes vs the GitHub version:
#   - `Post results comment on PR`: actions/github-script -> inline python3
#     stdlib urllib, same marker-find-or-create pattern as Batch 6a ci.yml.
#   - actions/upload-artifact pinned to @v3.2.2 (Gitea #99). The act_runner does
#     not implement the GHES 3.13 APIs that @v4+ requires — every v4 step
#     emits GHESNotSupportedError and exits 1, killing the job even when the
#     test step was wrapped `|| true`. Pinned to the specific GHES-supported
#     patch (per actions/upload-artifact README — not the floating @v3 tag,
#     which could drift to an unsupported commit if upstream re-tags).
#     Do NOT bump to v4 until Gitea adds support; bump repo-wide at that
#     point, not per-workflow.
#   - paths-ignore unchanged (Gitea evaluates paths-ignore with the same
#     "every changed file must match at least one pattern" semantics).

name: Playwright Regression

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'ops/**'
      - 'specs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: playwright-regression-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E Regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history keeps origin/main...HEAD diffing valid on Gitea PR runners.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright + Chromium
        run: |
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Run E2E regression
        id: playwright
        env:
          TBM_BASE_URL: https://thompsonfams.com
          TBM_PIN: ${{ secrets.TBM_PIN }}
        run: |
          SPEC="tests/tbm/tbm-e2e-safe.spec.js"
          if [ ! -f "$SPEC" ]; then
            echo "::warning::Spec file $SPEC not found — skipping Playwright run."
            echo "## Playwright Regression: SKIPPED" > playwright-comment.md
            echo "" >> playwright-comment.md
            echo "Spec file \`$SPEC\` not found in repo." >> playwright-comment.md
            echo "verdict=SKIP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npx playwright test "$SPEC" \
            --project=tbm-workflows \
            --reporter=json \
            --output=test-results \
            2>&1 | tee playwright-output.txt || true
          PW_EXIT=${PIPESTATUS[0]}
          echo "pw_exit=$PW_EXIT" >> "$GITHUB_OUTPUT"
          export PW_EXIT

          python3 .github/scripts/parse_playwright_results.py

      - name: Run education workflow tests
        id: education
        env:
          TBM_BASE_URL: https://thompsonfams.com
        run: |
          EDU_SPEC="tests/tbm/education-workflows.spec.js"
          if [ ! -f "$EDU_SPEC" ]; then
            echo "::warning::Education spec not found — skipping."
            echo "edu_exit=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          npx playwright test "$EDU_SPEC" \
            --project=chromium \
            --reporter=json \
            --output=test-results/education \
            2>&1 | tee education-output.txt || true
          EDU_EXIT=${PIPESTATUS[0]}
          echo "edu_exit=$EDU_EXIT" >> "$GITHUB_OUTPUT"
          # Parse education results into a separate file (COMMENT_FILE prevents
          # overwriting the main playwright-comment.md — see Finding 1 on PR #176)
          PW_EXIT=$EDU_EXIT PW_OUTPUT_FILE=education-output.txt \
            COMMENT_FILE=education-comment.md \
            python3 .github/scripts/parse_playwright_results.py || true
          # Rename section header and append
          sed -i 's/## .* Playwright Regression:/## Education Workflow Tests:/' education-comment.md
          printf '\n\n---\n\n' >> playwright-comment.md
          cat education-comment.md >> playwright-comment.md

      # Upload education failure artifacts BEFORE the screenshot step. Screenshot run
      # uses --output=test-results/screenshots-artifacts (isolated dir) so it cannot
      # reset test-results/education/, but uploading first is an extra safety belt.
      - name: Upload education failure artifacts
        if: steps.education.outputs.edu_exit != '0'
        uses: actions/upload-artifact@v3.2.2
        with:
          name: education-traces-${{ github.run_id }}
          path: test-results/education/
          retention-days: 7
          if-no-files-found: ignore

      - name: Detect changed UI files
        id: changed
        run: |
          set -o pipefail
          if ! git fetch origin main --quiet; then
            echo "::warning::Could not fetch origin/main; capturing all screenshots."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! CHANGED=$(git diff origin/main...HEAD --name-only -- '*.html' '*.js' | tr '\n' ','); then
            echo "::warning::Could not diff origin/main...HEAD; capturing all screenshots."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$CHANGED" ]; then
            echo "files=none" >> "$GITHUB_OUTPUT"
            echo "No UI files changed — screenshots will be skipped."
          else
            echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "Changed files: $CHANGED"
          fi

      - name: Capture viewport screenshots
        id: screenshots
        if: always()
        env:
          TBM_BASE_URL: https://thompsonfams.com
          TBM_PIN: ${{ secrets.TBM_PIN }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          SCREENSHOT_SPEC="tests/tbm/screenshots.spec.js"
          if [ ! -f "$SCREENSHOT_SPEC" ]; then
            echo "::warning::Screenshot spec not found — skipping."
            exit 0
          fi
          npx playwright test "$SCREENSHOT_SPEC" \
            --project=tbm-screenshots \
            --reporter=list \
            --output=test-results/screenshots-artifacts \
            2>&1 | tee screenshot-output.txt || true
          echo "Screenshots captured to test-results/screenshots/"

      - name: Upload screenshots (every PR)
        if: always()
        uses: actions/upload-artifact@v3.2.2
        with:
          name: viewport-screenshots-${{ github.run_id }}
          path: test-results/screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload education screenshots
        if: always()
        uses: actions/upload-artifact@v3.2.2
        with:
          name: education-screenshots-${{ github.run_id }}
          path: test-results/screenshots/education/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload traces on failure
        if: steps.playwright.outputs.pw_exit != '0' || steps.education.outputs.edu_exit != '0'
        uses: actions/upload-artifact@v3.2.2
        with:
          name: playwright-traces-${{ github.run_id }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Post results comment on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_API_URL: ${{ github.server_url }}/api/v1
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Inline python3 stdlib replaces actions/github-script. Marker
          # match is "Playwright Regression" in the comment body.
          python3 - <<'PYEOF'
          import json, os, urllib.request
          api = os.environ['GITEA_API_URL'].rstrip('/')
          token = os.environ['GITEA_TOKEN']
          repo = os.environ['REPO']
          pr = os.environ['PR_NUMBER']
          try:
              with open('playwright-comment.md', 'r', encoding='utf-8') as fh:
                  body = fh.read()
          except Exception as exc:
              body = 'Playwright results could not be read. Check workflow logs. (' + str(exc) + ')'

          def call(method, path, payload=None):
              url = api + path
              data = json.dumps(payload).encode('utf-8') if payload is not None else None
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header('Authorization', 'token ' + token)
              req.add_header('Accept', 'application/json')
              if payload is not None:
                  req.add_header('Content-Type', 'application/json')
              with urllib.request.urlopen(req, timeout=30) as resp:
                  text = resp.read().decode('utf-8')
                  return json.loads(text) if text else None

          comments = call('GET', '/repos/' + repo + '/issues/' + pr + '/comments') or []
          existing = None
          for c in comments:
              if 'Playwright Regression' in (c.get('body') or ''):
                  existing = c.get('id')
                  break
          if existing:
              call('PATCH', '/repos/' + repo + '/issues/comments/' + str(existing),
                   payload={'body': body})
              print('Updated comment ' + str(existing))
          else:
              call('POST', '/repos/' + repo + '/issues/' + pr + '/comments',
                   payload={'body': body})
              print('Created new comment on PR #' + pr)
          PYEOF

      - name: Fail check on test failures
        if: steps.playwright.outputs.verdict == 'FAIL'
        run: |
          echo "Playwright found failures — merge blocked."
          exit 1

      - name: Fail check on education test failures
        if: steps.education.outputs.edu_exit != '0'
        run: |
          echo "Education workflow tests failed — merge blocked."
          exit 1

  # ── Perf trace job — MVSS v1 S5 instrumentation (Issue #360) ──
  # Baseline measurement: does NOT block merge. Traces uploaded as artifacts.
  perf-trace:
    name: Frame Budget Trace (S5 baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright + Chromium
        run: |
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Run Surface Pro 5 frame budget
        id: perf_surface
        env:
          TBM_BASE_URL: https://thompsonfams.com
          TBM_PIN: ${{ secrets.TBM_PIN }}
        run: |
          npx playwright test tests/tbm/perf-frame-budget.spec.js \
            --project=perf-surface-pro5 \
            --reporter=json \
            --output=test-results/perf-surface \
            2>&1 | tee perf-surface-output.txt || true
          echo "surface_exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run Samsung S10 FE frame budget
        id: perf_s10
        env:
          TBM_BASE_URL: https://thompsonfams.com
          TBM_PIN: ${{ secrets.TBM_PIN }}
        run: |
          npx playwright test tests/tbm/perf-frame-budget.spec.js \
            --project=perf-s10-fe \
            --reporter=json \
            --output=test-results/perf-s10 \
            2>&1 | tee perf-s10-output.txt || true
          echo "s10_exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload perf traces — Surface Pro 5
        if: always()
        uses: actions/upload-artifact@v3.2.2
        with:
          name: perf-traces-surface-pro5-${{ github.run_id }}
          path: test-results/perf-surface/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload perf traces — Samsung S10 FE
        if: always()
        uses: actions/upload-artifact@v3.2.2
        with:
          name: perf-traces-s10-fe-${{ github.run_id }}
          path: test-results/perf-s10/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload frame budget evidence JSON
        if: always()
        uses: actions/upload-artifact@v3.2.2
        with:
          name: frame-budget-evidence-${{ github.run_id }}
          path: ops/evidence/preview/
          retention-days: 30
          if-no-files-found: ignore
