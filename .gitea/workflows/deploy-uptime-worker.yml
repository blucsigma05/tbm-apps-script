# .gitea/workflows/deploy-uptime-worker.yml
# Ported from .github/workflows 2026-04-20 (PORT wave Batch 5c, Refs #7).
# Same pattern as Batch 5b: cloudflare/wrangler-action@v3 -> inline wrangler
# deploy. Also dropped `environment: production` — Gitea Actions handles
# environments differently than GitHub and there's no deployment-protection
# gate defined for this flow on Gitea.

name: Deploy Cloudflare Uptime Worker

on:
  push:
    branches: [main]
    paths:
      - 'uptime-worker.js'
      - 'wrangler-uptime.toml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-uptime-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy TBM Uptime Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy uptime worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --config wrangler-uptime.toml
