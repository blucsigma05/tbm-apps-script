# .gitea/workflows/deploy-and-notify.yml
# GAS Deploy + Smoke + Pushover — deploys on merge to main, verifies via HTTP, notifies.
# Pushover includes deployment proof: deploy ID, HTTP status, smoke status, version.
#
# Truthfulness contract (2026-04-12):
#   - WARN is advisory (e.g. TAB_MAP drift, row growth). Deploy succeeds, release created.
#   - FAIL is blocking. Deploy already happened but release is skipped, notification is honest.
#   - smoke_response.txt is always uploaded so category breakdowns are visible.
#
# Ported from .github/workflows 2026-04-20 (PORT wave Batch 5a, Refs #7).
# Only transport change: gh release create -> curl POST to Gitea releases API.
# paths-ignore updated to cover .gitea/ in addition to .github/.

name: Deploy and Notify

on:
  push:
    branches: [main]
    paths-ignore:
      - 'cloudflare-worker.js'
      - 'wrangler.toml'
      - '**.md'
      - '.github/**'
      - '.gitea/**'
      - 'ops/**'
  workflow_dispatch:

permissions:
  contents: write   # required for Gitea release creation

# Serialize all production-mutation lanes. Same group applies to deploy-worker.yml (F03/F04).
# cancel-in-progress: false ensures a queued deploy is never silently dropped.
concurrency:
  group: tbm-production-release
  cancel-in-progress: false

jobs:
  deploy:
    name: GAS Deploy + Smoke + Pushover
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          CLASP_CREDENTIALS_JSON: ${{ secrets.CLASP_CREDENTIALS_JSON }}
          GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
          GAS_DEPLOY_URL: ${{ secrets.GAS_DEPLOY_URL }}
        run: |
          MISSING=""
          [ -z "$CLASP_CREDENTIALS_JSON" ] && MISSING="$MISSING CLASP_CREDENTIALS_JSON"
          [ -z "$GAS_DEPLOYMENT_ID" ]      && MISSING="$MISSING GAS_DEPLOYMENT_ID"
          [ -z "$GAS_DEPLOY_URL" ]         && MISSING="$MISSING GAS_DEPLOY_URL"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi

      - name: Install clasp
        env:
          CLASP_CREDENTIALS_JSON: ${{ secrets.CLASP_CREDENTIALS_JSON }}
        run: |
          npm install -g @google/clasp
          printf '%s' "$CLASP_CREDENTIALS_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"

      - name: clasp push
        id: push
        run: clasp push --force

      - name: clasp deploy
        id: deploy
        env:
          GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
        run: |
          OUTPUT=$(clasp deploy -i "$GAS_DEPLOYMENT_ID" 2>&1)
          echo "$OUTPUT"
          DEPLOY_ID=$(echo "$OUTPUT" | grep -oP '(?<=- )\S+(?= @)' || echo "$GAS_DEPLOYMENT_ID")
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "deployed=true" >> "$GITHUB_OUTPUT"

      - name: Run smoke test
        id: smoke
        env:
          GAS_DEPLOY_URL: ${{ secrets.GAS_DEPLOY_URL }}
        run: |
          echo "Hitting smoke test endpoint..."
          HTTP_CODE=$(curl -sS -L -o smoke_response.txt -w '%{http_code}' \
            --max-time 120 "${GAS_DEPLOY_URL}?action=runTests")
          RESPONSE=$(cat smoke_response.txt)
          echo "HTTP status: $HTTP_CODE"
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Smoke test returned HTTP $HTTP_CODE (expected 200)"
            echo "overall=HTTP_FAIL" >> "$GITHUB_OUTPUT"
            echo "smoke_line=HTTP $HTTP_CODE — endpoint unreachable" >> "$GITHUB_OUTPUT"
            cat smoke_response.txt >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Structured JSON assertion — parse overall status + category breakdown
          PARSE_RESULT=$(python3 -c "
          import json, sys
          try:
              d = json.loads(sys.argv[1])
              overall = d.get('overall', 'MISSING')
              smoke_overall = d.get('smoke', {}).get('overall', 'MISSING')
              versions = d.get('versions', {})
              code_ver = str(versions.get('codeGs', '?'))
              # Category breakdown — compute before printing so any crash goes to except
              cats = d.get('smoke', {}).get('categories', {})
              cat_lines = []
              for k in sorted(cats.keys()):
                  cat = cats[k]
                  st = str(cat.get('status', '?'))
                  det = str(cat.get('details', ''))[:120]
                  cat_lines.append('| ' + k + ' | ' + st + ' | ' + det + ' |')
              # Print all fields only after all computation succeeds
              print('overall=' + overall)
              print('smoke_overall=' + smoke_overall)
              print('code_version=' + code_ver)
              if cat_lines:
                  print('CAT_TABLE_START')
                  print('| Category | Status | Details |')
                  print('|----------|--------|---------|')
                  for l in cat_lines:
                      print(l)
                  print('CAT_TABLE_END')
          except Exception as e:
              print('overall=PARSE_ERROR')
              print('smoke_overall=PARSE_ERROR')
              print('code_version=?')
              print('parse_error=' + str(e), file=sys.stderr)
          " "$RESPONSE" 2>parse_err.txt)

          # Extract fields — -m1 guards against duplicate lines if output is ever mixed
          OVERALL=$(echo "$PARSE_RESULT" | grep -m1 '^overall=' | cut -d= -f2)
          SMOKE_OVERALL=$(echo "$PARSE_RESULT" | grep -m1 '^smoke_overall=' | cut -d= -f2)
          CODE_VERSION=$(echo "$PARSE_RESULT" | grep -m1 '^code_version=' | cut -d= -f2)

          echo "Overall: $OVERALL | Smoke: $SMOKE_OVERALL | Version: $CODE_VERSION"
          echo "overall=$OVERALL" >> "$GITHUB_OUTPUT"
          echo "code_version=$CODE_VERSION" >> "$GITHUB_OUTPUT"

          # Write category table to step summary
          echo "$PARSE_RESULT" | sed -n '/CAT_TABLE_START/,/CAT_TABLE_END/p' | grep -v 'CAT_TABLE' >> "$GITHUB_STEP_SUMMARY" || true

          # PASS or WARN = success (WARN is advisory — TAB_MAP drift, row growth, etc.)
          # FAIL = blocking (wiring, environment, schema mismatch)
          if [ "$OVERALL" = "PASS" ] && [ "$SMOKE_OVERALL" = "PASS" ]; then
            echo "smoke_line=Smoke PASS (HTTP $HTTP_CODE)" >> "$GITHUB_OUTPUT"
            echo "smoke_status=PASS" >> "$GITHUB_OUTPUT"
          elif { [ "$OVERALL" = "PASS" ] || [ "$OVERALL" = "WARN" ]; } && \
               { [ "$SMOKE_OVERALL" = "PASS" ] || [ "$SMOKE_OVERALL" = "WARN" ]; }; then
            echo "smoke_line=Smoke WARN — advisory (HTTP $HTTP_CODE)" >> "$GITHUB_OUTPUT"
            echo "smoke_status=WARN" >> "$GITHUB_OUTPUT"
            echo "::warning::Smoke returned WARN (advisory). Deploy is live. Check category breakdown."
          elif [ "$OVERALL" = "PARSE_ERROR" ]; then
            echo "smoke_line=JSON parse failed (HTTP $HTTP_CODE)" >> "$GITHUB_OUTPUT"
            echo "smoke_status=PARSE_ERROR" >> "$GITHUB_OUTPUT"
            echo "::error::Could not parse runTests response as JSON"
            cat parse_err.txt
            echo "Response body:" && head -c 500 smoke_response.txt
            exit 1
          else
            echo "smoke_line=Smoke FAIL (HTTP $HTTP_CODE)" >> "$GITHUB_OUTPUT"
            echo "smoke_status=FAIL" >> "$GITHUB_OUTPUT"
            echo "::error::Structured assertion failed: overall=$OVERALL smoke.overall=$SMOKE_OVERALL"
            exit 1
          fi

      - name: Upload smoke response
        if: always()
        uses: actions/upload-artifact@v3.2.2
        with:
          name: smoke-response-${{ github.run_id }}
          path: smoke_response.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Create Gitea release
        if: success()
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_API_URL: ${{ github.server_url }}/api/v1
          REPO: ${{ github.repository }}
          CODE_VERSION: ${{ steps.smoke.outputs.code_version }}
          SMOKE_STATUS: ${{ steps.smoke.outputs.smoke_status }}
        run: |
          if [ -z "$CODE_VERSION" ] || [ "$CODE_VERSION" = "?" ]; then
            echo "Version unknown — skipping release creation."
            exit 0
          fi
          TAG="v${CODE_VERSION}"
          # Skip if release for this tag already exists (re-run protection).
          # Gitea: GET /repos/{repo}/releases/tags/{tag} -> 200 if exists, 404 otherwise.
          HTTP_GET=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Accept: application/json" \
            "${GITEA_API_URL}/repos/${REPO}/releases/tags/${TAG}")
          if [ "$HTTP_GET" = "200" ]; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          SHA_SHORT="${GITHUB_SHA:0:7}"
          if [ "$SMOKE_STATUS" = "WARN" ]; then
            SMOKE_NOTE="Smoke test: WARN (advisory — see run artifacts for category breakdown)."
          else
            SMOKE_NOTE="Smoke test: PASS."
          fi
          # JSON-encode payload safely via python3 (stdlib).
          PAYLOAD=$(python3 -c "
          import json, os
          print(json.dumps({
              'tag_name':          os.environ['TAG'],
              'target_commitish':  os.environ['GITHUB_SHA'],
              'name':              'TBM ' + os.environ['TAG'],
              'body':              'Deployed from commit ' + os.environ['SHA_SHORT'] + '. ' + os.environ['SMOKE_NOTE'],
              'draft':             False,
              'prerelease':        False,
          }))
          " TAG="$TAG" SHA_SHORT="$SHA_SHORT" SMOKE_NOTE="$SMOKE_NOTE")
          HTTP_POST=$(curl -sS -o release_response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "${GITEA_API_URL}/repos/${REPO}/releases" \
            -d "$PAYLOAD")
          if [ "$HTTP_POST" != "201" ]; then
            echo "::error::Gitea release POST returned HTTP $HTTP_POST"
            cat release_response.json
            exit 1
          fi
          echo "Release $TAG created at ${SHA_SHORT}."

      - name: Pushover — deploy success
        if: success()
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
          HTTP_CODE: ${{ steps.smoke.outputs.http_code }}
          SMOKE_LINE: ${{ steps.smoke.outputs.smoke_line }}
          CODE_VERSION: ${{ steps.smoke.outputs.code_version }}
        run: |
          if [ -z "$PUSHOVER_USER_KEY" ] || [ -z "$PUSHOVER_APP_TOKEN" ]; then
            echo "Pushover secrets not set — skipping success notification."
            exit 0
          fi
          SHA_SHORT="${GITHUB_SHA:0:7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          DEPLOY_SHORT="${DEPLOY_ID: -8}"
          TIMESTAMP=$(date -u +"%H:%M UTC")
          # Include version if available
          VER_PART=""
          if [ -n "$CODE_VERSION" ] && [ "$CODE_VERSION" != "?" ]; then
            VER_PART=" — ${CODE_VERSION}"
          fi
          curl -sS \
            --form-string "token=${PUSHOVER_APP_TOKEN}" \
            --form-string "user=${PUSHOVER_USER_KEY}" \
            --form-string "title=TBM Live ✅" \
            --form-string "message=Deploy ...${DEPLOY_SHORT}${VER_PART} — ${SMOKE_LINE} — Commit ${SHA_SHORT} — ${TIMESTAMP} — Go look" \
            --form-string "url=${RUN_URL}" \
            --form-string "url_title=View run" \
            --form-string "priority=-2" \
            https://api.pushover.net/1/messages.json

      - name: Pushover — deploy failed
        if: failure()
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
          DEPLOYED: ${{ steps.deploy.outputs.deployed }}
          HTTP_CODE: ${{ steps.smoke.outputs.http_code }}
          SMOKE_LINE: ${{ steps.smoke.outputs.smoke_line }}
        run: |
          if [ -z "$PUSHOVER_USER_KEY" ] || [ -z "$PUSHOVER_APP_TOKEN" ]; then
            echo "Pushover secrets not set — skipping failure notification."
            exit 0
          fi
          SHA_SHORT="${GITHUB_SHA:0:7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          DEPLOY_SHORT="${DEPLOY_ID: -8}"
          FAIL_MSG="Deploy ...${DEPLOY_SHORT}"
          if [ -n "$SMOKE_LINE" ]; then
            FAIL_MSG="$FAIL_MSG — $SMOKE_LINE"
          else
            FAIL_MSG="$FAIL_MSG — smoke did not run"
          fi
          # Honest state: if deploy completed, code is live regardless of smoke result
          if [ "$DEPLOYED" = "true" ]; then
            FAIL_MSG="$FAIL_MSG — Commit ${SHA_SHORT} — DEPLOYED but smoke FAILED — verify live state"
          else
            FAIL_MSG="$FAIL_MSG — Commit ${SHA_SHORT} — BLOCKED — deploy did not complete"
          fi
          curl -sS \
            --form-string "token=${PUSHOVER_APP_TOKEN}" \
            --form-string "user=${PUSHOVER_USER_KEY}" \
            --form-string "title=TBM Deploy: BLOCKED ❌" \
            --form-string "message=${FAIL_MSG}" \
            --form-string "url=${RUN_URL}" \
            --form-string "url_title=View failed run" \
            --form-string "priority=2" \
            https://api.pushover.net/1/messages.json
