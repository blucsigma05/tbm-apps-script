# ───────────────────────────────────────────────────────────────────────────
# Prereqs on the runner host (tbm-primary) — all already verified in Q9:
#   - /usr/bin/codex installed (npm @openai/codex, currently v0.122.0)
#   - bubblewrap installed
#   - CODEX_HOME=/var/lib/codex owned by act_runner, 0700
#   - `codex login --device-auth` completed by LT (ChatGPT Plus tier)
#   - `codex login status` reports the Plus account
#
# Required repo secrets:
#   ANTHROPIC_API_KEY — fallback provider, already set per handoff 2026-04-17
#   GITEA_TOKEN (auto-provided by Gitea) — for PR comment + label operations
#
# Required repo variables:
#   DEEP_AUDIT_PROVIDER = "codex" (default) | "anthropic"
#   DEEP_AUDIT_ENABLED = "true" | "false" (kill switch)
#
# ───────────────────────────────────────────────────────────────────────────
