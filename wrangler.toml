name = "tbm-smart-proxy"
main = "cloudflare-worker.js"
compatibility_date = "2024-09-01"

# Route: thompsonfams.com/* → this Worker
# Configure route in Cloudflare dashboard or uncomment below:
# routes = [
#   { pattern = "thompsonfams.com/*", zone_name = "thompsonfams.com" }
# ]

[triggers]
crons = ["0 12 * * *"]   # HYG-09: Tiller freshness check — daily 12:00 UTC

[[ratelimits]]
name = "PIN_RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 2
period = 10

# QA Route Isolation secrets (issue #219)
# Set via: wrangler secret put QA_HMAC_SECRET
# Must match GAS Script Property QA_HMAC_SECRET (same value, both sides)
# Prerequisite: TBM_QA_SSID Script Property set in GAS to QA workbook ID
