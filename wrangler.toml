name = "tbm-smart-proxy"
main = "cloudflare-worker.js"
compatibility_date = "2024-09-01"

# Route: thompsonfams.com/* → this Worker
# Configure route in Cloudflare dashboard or uncomment below:
# routes = [
#   { pattern = "thompsonfams.com/*", zone_name = "thompsonfams.com" }
# ]

[[ratelimits]]
name = "PIN_RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 2
period = 10
