<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LT Watch Vault · The Collection</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@200;300;400;500;600;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --gold:#C9A84C;--gold-dim:rgba(201,168,76,0.12);--gold-glow:rgba(201,168,76,0.06);
    --navy:#002366;--velvet:#0A1628;--velvet-deep:#060E1A;
    --bg:#0A0A0A;--surface:#0E0E0E;--card:#111114;--border:#1A1A1A;
    --cream:#E5D5B8;--white:#FFFFFF;--gray:#777;--dim:#444;
    --cognac:#8D5524;--cognac-dim:rgba(141,85,36,0.15);
    --green:#4ADE80;--amber:#F59E0B;--red:#DC2626;--purple:#9333EA;
    --blue-accent:#60A5FA;
  }

  body{
    font-family:'Outfit',sans-serif;
    background:var(--bg);
    color:var(--cream);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  body::after{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  }

  .serif{font-family:'Cormorant Garamond',Georgia,serif}

  /* ===== AMBIENT GLOW ===== */
  .glow-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px)}
  .glow-1{width:500px;height:500px;top:-150px;left:-100px;background:var(--gold-glow)}
  .glow-2{width:400px;height:400px;bottom:-100px;right:-80px;background:rgba(0,35,102,0.06)}

  .container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 24px 60px}

  /* ===== HEADER ===== */
  .vault-header{
    background:linear-gradient(180deg, var(--navy) 0%, var(--velvet-deep) 100%);
    border-bottom:2px solid var(--gold);
    padding:32px 0;
    position:relative;
    overflow:hidden;
  }
  .vault-header::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }
  .vault-header::after{
    content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:80px;height:2px;background:var(--gold);border-radius:1px;
  }
  .header-inner{
    max-width:1200px;margin:0 auto;padding:0 24px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .header-left{display:flex;align-items:center;gap:16px}
  .header-bezel{
    width:56px;height:56px;border-radius:50%;
    border:3px solid var(--gold);padding:3px;
    background:var(--bg);display:flex;align-items:center;justify-content:center;
    font-size:24px;
  }
  .header-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--white);letter-spacing:2px}
  .header-title em{color:var(--gold);font-style:italic}
  .header-sub{font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;margin-top:2px;font-weight:500}
  .header-right{display:flex;align-items:center;gap:10px}
  .header-pill{
    padding:8px 18px;font-size:10px;font-weight:600;letter-spacing:2px;
    text-transform:uppercase;border-radius:20px;cursor:pointer;
    transition:all 0.25s;border:1px solid var(--border);color:var(--gray);
    background:transparent;font-family:'Outfit',sans-serif;
  }
  .header-pill:hover{border-color:var(--gold);color:var(--cream)}
  .header-pill.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
  .bezel-btn{
    background:rgba(201,168,76,0.1);border:1px solid var(--gold);
    color:var(--gold);padding:8px 16px;border-radius:20px;
    font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;
    transition:all 0.25s;font-family:'Outfit',sans-serif;text-transform:uppercase;
    display:flex;align-items:center;gap:6px;
  }
  .bezel-btn:hover{background:var(--gold);color:var(--bg)}

  /* ===== KPI BAR ===== */
  .kpi-bar{
    display:grid;grid-template-columns:repeat(5,1fr);gap:10px;
    padding:24px 0;margin-bottom:12px;
  }
  .kpi{
    text-align:center;padding:16px 8px;
    background:var(--card);border:1px solid var(--border);border-radius:10px;
  }
  .kpi-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);font-weight:600;margin-bottom:6px}
  .kpi-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--white)}
  .kpi-val.gold{color:var(--gold)}
  .kpi-val.green{color:var(--green)}
  .kpi-sub{font-size:10px;color:var(--dim);margin-top:2px}

  /* ===== CROWN JEWEL HERO ===== */
  .crown-section{
    background:linear-gradient(135deg, var(--velvet-deep) 0%, var(--velvet) 50%, rgba(201,168,76,0.04) 100%);
    border:1px solid rgba(201,168,76,0.15);border-radius:16px;
    padding:40px;margin-bottom:36px;position:relative;overflow:hidden;
  }
  .crown-section::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }
  .crown-badge{
    display:inline-flex;align-items:center;gap:6px;
    font-size:9px;letter-spacing:4px;text-transform:uppercase;
    color:var(--gold);background:rgba(201,168,76,0.1);
    border:1px solid rgba(201,168,76,0.2);border-radius:4px;
    padding:4px 14px;font-weight:700;margin-bottom:20px;
  }
  .crown-layout{display:grid;grid-template-columns:200px 1fr;gap:40px;align-items:center}
  .crown-image{
    width:200px;height:200px;border-radius:50%;
    border:2px solid rgba(201,168,76,0.2);padding:6px;
    background:radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .crown-image::after{
    content:'';position:absolute;inset:12px;border-radius:50%;
    border:1px dashed rgba(201,168,76,0.08);
  }
  .crown-image img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .crown-placeholder{font-size:64px;opacity:0.3}
  .crown-name{font-family:'Cormorant Garamond',serif;font-size:36px;color:var(--white);font-weight:500;margin-bottom:4px}
  .crown-role{font-size:12px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-weight:500;margin-bottom:16px}
  .crown-specs{display:flex;gap:24px;margin-bottom:16px}
  .crown-spec{text-align:center}
  .crown-spec-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
  .crown-spec-val{font-size:16px;font-weight:600;color:var(--cream)}
  .crown-spec-val.gold{color:var(--gold)}
  .crown-story{font-size:12px;color:var(--gray);font-style:italic;line-height:1.6;margin-top:12px;max-width:500px}

  /* ===== TIER SECTIONS ===== */
  .tier-section{margin-bottom:36px}
  .tier-bar{
    display:flex;align-items:center;gap:12px;
    padding-bottom:10px;margin-bottom:16px;
    border-bottom:1px solid var(--border);
  }
  .tier-chip{
    font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
    padding:4px 14px;border-radius:4px;
  }
  .chip-mid{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.25)}
  .chip-entry{background:rgba(96,165,250,0.1);color:var(--blue-accent);border:1px solid rgba(96,165,250,0.2)}
  .chip-budget{background:rgba(107,114,128,0.1);color:#9CA3AF;border:1px solid rgba(107,114,128,0.2)}
  .tier-line{height:1px;flex:1;background:linear-gradient(90deg,var(--border),transparent)}
  .tier-meta{font-size:11px;color:var(--dim)}

  /* ===== WATCH CUSHION CARDS ===== */
  .cushion-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;
  }
  .cushion{
    border-radius:12px;overflow:hidden;cursor:pointer;
    transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
    border:1px solid transparent;position:relative;
  }
  .cushion:hover{
    transform:translateY(-4px);
    border-color:rgba(201,168,76,0.25);
    box-shadow:0 16px 48px rgba(201,168,76,0.08),0 4px 16px rgba(0,0,0,0.4);
  }
  .cushion-pad{
    height:160px;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center, var(--velvet) 0%, var(--velvet-deep) 100%);
    position:relative;overflow:hidden;
  }
  .cushion-pad::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse,rgba(201,168,76,0.03) 0%,transparent 70%);
  }
  .cushion-pad::after{
    content:'';position:absolute;inset:8px;
    border:1px dashed rgba(201,168,76,0.04);border-radius:8px;
  }
  .cushion-img-wrap{
    width:100px;height:100px;border-radius:50%;
    border:1px solid rgba(201,168,76,0.1);
    background:rgba(201,168,76,0.03);
    display:flex;align-items:center;justify-content:center;
    z-index:1;overflow:hidden;
  }
  .cushion-img-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .cushion-emoji{font-size:36px;opacity:0.25;filter:grayscale(1)}
  .cushion-info{
    padding:14px 16px;background:var(--card);
    border-top:1px solid rgba(201,168,76,0.06);
  }
  .cushion-name{
    font-family:'Cormorant Garamond',serif;font-size:15px;
    color:var(--white);font-weight:600;margin-bottom:6px;line-height:1.2;
  }
  .cushion-row{display:flex;justify-content:space-between;align-items:center}
  .cushion-movement{font-size:10px;color:var(--gray);letter-spacing:1px;text-transform:uppercase}
  .cushion-price{font-size:13px;color:var(--gold);font-weight:700}
  .cushion-role{font-size:10px;color:var(--dim);font-style:italic;margin-top:4px}

  /* ===== MODAL ===== */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.85);
    display:none;align-items:center;justify-content:center;
    z-index:100;
  }
  .modal-overlay.open{display:flex}
  .modal-box{
    background:var(--bg);max-width:640px;width:calc(100% - 40px);
    border-radius:16px;border:1px solid rgba(201,168,76,0.2);
    overflow:hidden;
    max-height:90vh;overflow-y:auto;
  }
  .modal-hero{
    height:200px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--velvet-deep),var(--velvet));
    position:relative;
  }
  .modal-hero::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:60px;
    background:linear-gradient(transparent,var(--bg));
  }
  .modal-hero-img{
    width:140px;height:140px;border-radius:50%;
    border:2px solid rgba(201,168,76,0.15);
    display:flex;align-items:center;justify-content:center;
    background:rgba(201,168,76,0.04);overflow:hidden;z-index:1;
  }
  .modal-hero-img img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .modal-hero-emoji{font-size:56px;opacity:0.3}
  .modal-body{padding:28px 32px}
  .modal-tier{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:4px}
  .modal-name{font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--white);font-weight:500;margin-bottom:4px}
  .modal-role{font-size:11px;color:var(--gray);font-style:italic;margin-bottom:20px}
  .modal-specs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
  .modal-spec{
    padding:12px;background:var(--card);border-radius:8px;
    border:1px solid var(--border);
  }
  .modal-spec-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
  .modal-spec-val{font-size:15px;font-weight:600;color:var(--cream)}
  .modal-spec-val.gold{color:var(--gold)}
  .modal-spec-val.green{color:var(--green)}
  .modal-story{font-size:12px;color:var(--gray);line-height:1.7;padding-top:16px;border-top:1px solid var(--border)}
  .modal-footer{
    padding:16px 32px;background:var(--card);
    border-top:1px solid var(--border);
    display:flex;justify-content:flex-end;
  }
  .modal-close{
    padding:8px 24px;font-size:10px;letter-spacing:3px;text-transform:uppercase;
    border:1px solid var(--gold);color:var(--gold);background:transparent;
    border-radius:6px;cursor:pointer;transition:all 0.2s;font-weight:600;
    font-family:'Outfit',sans-serif;
  }
  .modal-close:hover{background:var(--gold);color:var(--bg)}

  /* ===== FAMILY SECTION ===== */
  .family-box{
    background:var(--card);border:1px solid var(--border);
    border-radius:14px;padding:28px;
  }
  .family-title{
    font-family:'Cormorant Garamond',serif;font-size:22px;
    color:var(--white);margin-bottom:16px;
    display:flex;align-items:center;gap:10px;
  }

  /* ===== WISH CARDS ===== */
  .hunt-card{
    background:var(--card);border-radius:12px;padding:20px;
    border:1px solid var(--border);transition:all 0.3s;cursor:pointer;
  }
  .hunt-card:hover{border-color:rgba(245,158,11,0.3);transform:translateY(-2px)}
  .hunt-card.grail:hover{border-color:rgba(147,51,234,0.3)}
  .hunt-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--white);font-weight:500;margin-bottom:4px}
  .hunt-meta{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
  .hunt-price{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600}
  .hunt-badge{
    font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:700;
    padding:3px 10px;border-radius:4px;
  }
  .badge-primary{background:rgba(245,158,11,0.12);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
  .badge-high{background:rgba(96,165,250,0.1);color:var(--blue-accent);border:1px solid rgba(96,165,250,0.15)}
  .badge-medium{background:rgba(107,114,128,0.1);color:#9CA3AF;border:1px solid rgba(107,114,128,0.15)}
  .badge-dream{background:rgba(147,51,234,0.1);color:var(--purple);border:1px solid rgba(147,51,234,0.2)}

  /* ===== STYLE REF ===== */
  .ref-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:12px;padding:24px;
  }
  .ref-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:16px}
  .ref-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(26,26,26,0.8)}
  .ref-label{font-size:11px;color:var(--dim);font-weight:500}
  .ref-val{font-size:13px;color:var(--cream);font-weight:500}
  .color-swatch{
    display:inline-block;width:14px;height:14px;border-radius:3px;
    vertical-align:middle;margin-right:6px;border:1px solid rgba(255,255,255,0.1);
  }

  /* ===== DAILY BEZEL MODAL ===== */
  .bezel-result{
    text-align:center;padding:40px;
  }
  .bezel-result .bezel-icon{font-size:48px;margin-bottom:16px}
  .bezel-result .bezel-pick-name{
    font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--white);margin-bottom:6px;
  }
  .bezel-result .bezel-pick-role{font-size:12px;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
  .bezel-result .bezel-pick-note{font-size:12px;color:var(--gray);margin-top:16px;font-style:italic}

  /* ===== PORTFOLIO BAR ===== */
  .portfolio-strip{
    display:flex;justify-content:center;gap:48px;
    padding:32px 0;margin-top:40px;
    border-top:1px solid var(--border);
  }
  .p-stat{text-align:center}
  .p-stat-val{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--white)}
  .p-stat-val.gold{color:var(--gold)}
  .p-stat-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-top:4px}

  .footer{text-align:center;margin-top:32px;font-size:10px;color:#1A1A1A;letter-spacing:3px}

  .tab-content{display:none}
  .tab-content.active{display:block}

  @media(max-width:768px){
    .header-inner{flex-direction:column;gap:16px;text-align:center}
    .header-right{flex-wrap:wrap;justify-content:center}
    .kpi-bar{grid-template-columns:repeat(3,1fr)}
    .crown-layout{grid-template-columns:1fr;text-align:center}
    .crown-image{margin:0 auto}
    .crown-specs{justify-content:center}
    .cushion-grid{grid-template-columns:repeat(2,1fr)}
    .modal-specs{grid-template-columns:1fr}
    .portfolio-strip{flex-wrap:wrap;gap:24px}
  }
  @media(max-width:480px){
    .cushion-grid{grid-template-columns:1fr}
    .header-title{font-size:24px}
  }
</style>
</head>
<body>

<div class="glow-orb glow-1"></div>
<div class="glow-orb glow-2"></div>

<!-- ===== HEADER ===== -->
<header class="vault-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-bezel">&#x231A;</div>
      <div>
        <div class="header-title serif">THE <em>VAULT</em></div>
        <div class="header-sub">Thompson Collection &middot; Est. 2026</div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-pill active" onclick="switchTab('lt')">LT</div>
      <div class="header-pill" onclick="switchTab('jt')">JT + Kids</div>
      <div class="header-pill" onclick="switchTab('wish')">Hunt List</div>
      <div class="header-pill" onclick="switchTab('style')">Style Ref</div>
      <button class="bezel-btn" onclick="dailyBezel()">
        <i class="fas fa-dice"></i> Daily Bezel
      </button>
      <a id="vein-link" href="#" target="_blank" class="bezel-btn" style="display:none;text-decoration:none">
        <i class="fas fa-chart-line"></i> The Vein
      </a>
    </div>
  </div>
</header>

<div class="container">

  <!-- ===== LT TAB ===== -->
  <div id="tab-lt" class="tab-content active">
    <div class="kpi-bar" id="kpi-bar"></div>
    <div class="crown-section" id="crown-section"></div>
    <div id="tier-sections"></div>
    <div class="portfolio-strip" id="portfolio-strip"></div>
  </div>

  <!-- ===== JT + KIDS TAB ===== -->
  <div id="tab-jt" class="tab-content">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;padding-top:32px" id="family-grids"></div>
  </div>

  <!-- ===== WISH LIST TAB ===== -->
  <div id="tab-wish" class="tab-content">
    <div style="padding-top:32px">
      <div style="margin-bottom:32px">
        <div class="serif" style="font-size:36px;color:var(--white)">Hunting Grounds</div>
        <div style="font-size:12px;color:var(--gray);margin-top:4px">Three Role Framework locked. Bezel is the visual event. Gold in jewelry only.</div>
      </div>
      <div id="wish-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px"></div>
    </div>
  </div>

  <!-- ===== STYLE REF TAB ===== -->
  <div id="tab-style" class="tab-content">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;padding-top:32px" id="style-content"></div>
  </div>

</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal-box" id="modal-box"></div>
</div>

<div class="footer">LT Watch Vault &middot; Gold Hardware Only &middot; &Phi;&Beta;&Sigma; &middot; March 2026</div>

<script>

// ==================== RENDER ENGINE ====================
var tierOrder = ["Mid","Entry","Budget"];

function fmt(n) {
  return n ? '$' + n.toLocaleString() : '\u2014';
}

function esc(s) {
  if (!s) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(s));
  return div.innerHTML;
}

function init() {
  renderKPIs();
  renderCrown();
  renderTiers();
  renderPortfolio();
  renderFamily();
  renderWishList();
  renderStyleRef();
  switchTab('lt');
}

function renderKPIs() {
  var owned = ltWatches.filter(function(w) { return w.role.indexOf('>') === -1 && w.role.indexOf('\u2192') === -1; });
  var paid = 0, retail = 0, resale = 0;
  for (var i = 0; i < owned.length; i++) {
    paid += owned[i].paid || 0;
    retail += owned[i].retail || 0;
    resale += owned[i].resale || 0;
  }
  var savings = retail - paid;
  var pct = retail > 0 ? Math.round((savings / retail) * 100) : 0;

  document.getElementById('kpi-bar').innerHTML =
    '<div class="kpi"><div class="kpi-label">Pieces</div><div class="kpi-val">' + owned.length + '</div></div>' +
    '<div class="kpi"><div class="kpi-label">Invested</div><div class="kpi-val gold">' + fmt(paid) + '</div></div>' +
    '<div class="kpi"><div class="kpi-label">Retail Value</div><div class="kpi-val">' + fmt(retail) + '</div></div>' +
    '<div class="kpi"><div class="kpi-label">Resale Est.</div><div class="kpi-val" style="color:var(--blue-accent)">' + fmt(resale) + '</div></div>' +
    '<div class="kpi"><div class="kpi-label">Saved</div><div class="kpi-val green">' + fmt(savings) + '</div><div class="kpi-sub">' + pct + '% below retail</div></div>';
}

function renderCrown() {
  var crown = null;
  for (var i = 0; i < ltWatches.length; i++) {
    if (ltWatches[i].zone === "Crown Jewel") { crown = ltWatches[i]; break; }
  }
  if (!crown) return;
  var imgHtml = crown.img ? '<img src="' + esc(crown.img) + '">' : '<span class="crown-placeholder">&#x231A;</span>';
  document.getElementById('crown-section').innerHTML =
    '<div class="crown-badge"><i class="fas fa-crown" style="font-size:10px"></i> Crown Jewel</div>' +
    '<div class="crown-layout">' +
      '<div class="crown-image">' + imgHtml + '</div>' +
      '<div>' +
        '<div class="crown-name serif">' + esc(crown.name) + '</div>' +
        '<div class="crown-role">' + esc(crown.role) + ' &middot; ' + esc(crown.movement) + '</div>' +
        '<div class="crown-specs">' +
          '<div class="crown-spec"><div class="crown-spec-label">Paid</div><div class="crown-spec-val gold">' + fmt(crown.paid) + '</div></div>' +
          '<div class="crown-spec"><div class="crown-spec-label">Retail</div><div class="crown-spec-val">' + fmt(crown.retail) + '</div></div>' +
          '<div class="crown-spec"><div class="crown-spec-label">Resale</div><div class="crown-spec-val">' + fmt(crown.resale) + '</div></div>' +
          '<div class="crown-spec"><div class="crown-spec-label">Dial</div><div class="crown-spec-val">' + esc(crown.dial) + '</div></div>' +
          '<div class="crown-spec"><div class="crown-spec-label">Size</div><div class="crown-spec-val">' + esc(crown.size) + '</div></div>' +
        '</div>' +
        '<div class="crown-story">"' + esc(crown.story) + '"</div>' +
      '</div>' +
    '</div>';

function renderTiers() {
  var container = document.getElementById('tier-sections');
  container.innerHTML = '';
  for (var t = 0; t < tierOrder.length; t++) {
    var tier = tierOrder[t];
    var items = [];
    for (var i = 0; i < ltWatches.length; i++) {
      if (ltWatches[i].tier === tier && ltWatches[i].zone !== "Crown Jewel") {
        items.push(ltWatches[i]);
      }
    }
    if (!items.length) continue;
    var chipClass = tier === "Mid" ? "chip-mid" : tier === "Entry" ? "chip-entry" : "chip-budget";
    var html = '<div class="tier-section">' +
      '<div class="tier-bar">' +
        '<span class="tier-chip ' + chipClass + '">' + tier + ' Tier</span>' +
        '<div class="tier-line"></div>' +
        '<span class="tier-meta">' + items.length + ' piece' + (items.length > 1 ? 's' : '') + '</span>' +
      '</div>' +
      '<div class="cushion-grid">';
    for (var j = 0; j < items.length; j++) {
      var w = items[j];
      var idx = ltWatches.indexOf(w);
      var imgHtml = w.img ? '<img src="' + esc(w.img) + '">' : '<span class="cushion-emoji">&#x231A;</span>';
      var movShort = w.movement.split('(')[0].replace(/^\s+|\s+$/g, '');
      html += '<div class="cushion" onclick="openModal(' + idx + ')">' +
        '<div class="cushion-pad">' +
          '<div class="cushion-img-wrap">' + imgHtml + '</div>' +
        '</div>' +
        '<div class="cushion-info">' +
          '<div class="cushion-name">' + esc(w.name) + '</div>' +
          '<div class="cushion-row">' +
            '<span class="cushion-movement">' + esc(movShort) + '</span>' +
            '<span class="cushion-price">' + fmt(w.paid) + '</span>' +
          '</div>' +
          '<div class="cushion-role">' + esc(w.role) + '</div>' +
        '</div>' +
      '</div>';
    }
    html += '</div></div>';
    container.innerHTML += html;
  }
}

function renderPortfolio() {
  var owned = ltWatches.filter(function(w) { return w.role.indexOf('>') === -1 && w.role.indexOf('\u2192') === -1; });
  var paid = 0, retail = 0;
  for (var i = 0; i < owned.length; i++) {
    paid += owned[i].paid || 0;
    retail += owned[i].retail || 0;
  }
  var household = paid + 765 + 53;
  var pct = retail > 0 ? Math.round(((retail - paid) / retail) * 100) : 0;
  var avg = owned.length > 0 ? Math.round(paid / owned.length) : 0;
  document.getElementById('portfolio-strip').innerHTML =
    '<div class="p-stat"><div class="p-stat-val">' + (owned.length + 9) + '</div><div class="p-stat-label">Household Pieces</div></div>' +
    '<div class="p-stat"><div class="p-stat-val gold">' + fmt(household) + '</div><div class="p-stat-label">Total Invested</div></div>' +
    '<div class="p-stat"><div class="p-stat-val">' + fmt(retail) + '</div><div class="p-stat-label">LT Retail</div></div>' +
    '<div class="p-stat"><div class="p-stat-val green">' + pct + '%</div><div class="p-stat-label">Below Retail</div></div>' +
    '<div class="p-stat"><div class="p-stat-val gold">' + fmt(avg) + '</div><div class="p-stat-label">Avg / Piece</div></div>';
}

function openModal(idx) {
  var w = ltWatches[idx];
  var savings = (w.retail || 0) - w.paid;
  var pct = w.retail ? Math.round((savings / w.retail) * 100) : 0;
  var imgHtml = w.img ? '<img src="' + esc(w.img) + '">' : '<span class="modal-hero-emoji">&#x231A;</span>';
  var resaleStr = w.resale ? fmt(w.resale) : 'N/A';
  var savingsStr = savings > 0 ? fmt(savings) + ' (' + pct + '%)' : '\u2014';

  document.getElementById('modal-box').innerHTML =
    '<div class="modal-hero"><div class="modal-hero-img">' + imgHtml + '</div></div>' +
    '<div class="modal-body">' +
      '<div class="modal-tier">' + esc(w.tier) + ' Tier &middot; ' + esc(w.zone) + ' &middot; ' + esc(w.brand) + '</div>' +
      '<div class="modal-name serif">' + esc(w.name) + '</div>' +
      '<div class="modal-role">' + esc(w.role) + '</div>' +
      '<div class="modal-specs">' +
        '<div class="modal-spec"><div class="modal-spec-label">Paid</div><div class="modal-spec-val gold">' + fmt(w.paid) + '</div></div>' +
        '<div class="modal-spec"><div class="modal-spec-label">Retail</div><div class="modal-spec-val">' + fmt(w.retail) + '</div></div>' +
        '<div class="modal-spec"><div class="modal-spec-label">Resale</div><div class="modal-spec-val">' + resaleStr + '</div></div>' +
        '<div class="modal-spec"><div class="modal-spec-label">Savings</div><div class="modal-spec-val green">' + savingsStr + '</div></div>' +
        '<div class="modal-spec"><div class="modal-spec-label">Movement</div><div class="modal-spec-val">' + esc(w.movement) + '</div></div>' +
        '<div class="modal-spec"><div class="modal-spec-label">Case</div><div class="modal-spec-val">' + esc(w.size) + '</div></div>' +
        '<div class="modal-spec"><div class="modal-spec-label">Dial</div><div class="modal-spec-val">' + esc(w.dial) + '</div></div>' +
        '<div class="modal-spec"><div class="modal-spec-label">Metal</div><div class="modal-spec-val">' + esc(w.metal) + '</div></div>' +
        '<div class="modal-spec"><div class="modal-spec-label">Strap</div><div class="modal-spec-val">' + esc(w.strap) + '</div></div>' +
        '<div class="modal-spec"><div class="modal-spec-label">Zone</div><div class="modal-spec-val">' + esc(w.zone) + '</div></div>' +
      '</div>' +
      '<div class="modal-story">' + esc(w.story) + '</div>' +
    '</div>' +
    '<div class="modal-footer"><button class="modal-close" onclick="closeModal()">Close Vault</button></div>';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function handleOverlayClick(event) {
  if (event.target === document.getElementById('modal')) {
    closeModal();
  }
}

function renderWishList() {
  var container = document.getElementById('wish-grid');
  var html = '';
  var curStatus = '';
  var labels = {HUNTING:"Actively Hunting",GAP:"Collection Gap",FUTURE:"Future Target",GRAIL:"Grail Tier"};
  var colors = {HUNTING:"var(--amber)",GAP:"var(--red)",FUTURE:"var(--blue-accent)",GRAIL:"var(--purple)"};
  var badgeMap = {PRIMARY:'badge-primary',HIGH:'badge-high',MEDIUM:'badge-medium',DREAM:'badge-dream',FUTURE:'badge-medium'};

  for (var i = 0; i < wishList.length; i++) {
    var w = wishList[i];
    if (w.status !== curStatus) {
      var mt = curStatus ? '16px' : '0';
      html += '<div style="grid-column:1/-1;padding:8px 0;margin-top:' + mt + '">' +
        '<span style="font-size:10px;letter-spacing:4px;text-transform:uppercase;color:' + (colors[w.status] || 'var(--dim)') + ';font-weight:700">' + (labels[w.status] || w.status) + '</span>' +
      '</div>';
      curStatus = w.status;
    }
    var isGrail = w.status === 'GRAIL';
    var badgeClass = badgeMap[w.priority] || 'badge-medium';
    var priceColor = isGrail ? 'var(--purple)' : 'var(--amber)';
    html += '<div class="hunt-card ' + (isGrail ? 'grail' : '') + '">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">' +
        '<span class="hunt-badge ' + badgeClass + '">' + esc(w.priority) + '</span>' +
        '<span style="font-size:10px;color:var(--dim)">' + esc(w.framework) + '</span>' +
      '</div>' +
      '<div class="hunt-name">' + esc(w.name) + '</div>' +
      '<div class="hunt-meta">' + esc(w.brand) + ' &middot; ' + esc(w.movement) + ' &middot; ' + esc(w.tier) + '</div>' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:12px">' +
        '<div class="hunt-price" style="color:' + priceColor + '">~' + fmt(w.price) + '</div>' +
      '</div>' +
      '<div style="font-size:11px;color:var(--dim);margin-top:8px;line-height:1.5">' + esc(w.notes) + '</div>' +
    '</div>';
  }
  container.innerHTML = html;
}

// ==================== DAILY BEZEL ====================
function dailyBezel() {
  var owned = [];
  for (var i = 0; i < ltWatches.length; i++) {
    var w = ltWatches[i];
    if (w.zone !== "Heirloom" && w.role.indexOf('Battery') === -1) {
      owned.push(w);
    }
  }
  var pick = owned[Math.floor(Math.random() * owned.length)];
  var storyParts = pick.story.split('.');
  var lastNote = storyParts[storyParts.length - 1].replace(/^\s+|\s+$/g, '') || pick.story;

  document.getElementById('modal-box').innerHTML =
    '<div class="bezel-result">' +
      '<div class="bezel-icon">&#x1F3B2;</div>' +
      '<div style="font-size:9px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:12px">Today\'s Bezel Pick</div>' +
      '<div class="bezel-pick-name serif">' + esc(pick.name) + '</div>' +
      '<div class="bezel-pick-role">' + esc(pick.role) + '</div>' +
      '<div style="display:flex;justify-content:center;gap:24px;margin-top:20px">' +
        '<div style="text-align:center"><div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase">Paid</div><div style="font-size:18px;color:var(--gold);font-weight:600">' + fmt(pick.paid) + '</div></div>' +
        '<div style="text-align:center"><div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase">Dial</div><div style="font-size:18px;color:var(--cream);font-weight:600">' + esc(pick.dial) + '</div></div>' +
        '<div style="text-align:center"><div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase">Metal</div><div style="font-size:18px;color:var(--cream);font-weight:600">' + esc(pick.metal) + '</div></div>' +
      '</div>' +
      '<div class="bezel-pick-note">"' + esc(lastNote) + '"</div>' +
    '</div>' +
    '<div class="modal-footer"><button class="modal-close" onclick="closeModal()">Lock It In</button></div>';
  document.getElementById('modal').classList.add('open');
}

// ==================== LOAD SHEET DATA ====================
function mapLT(row) {
  return {
    name: row.watch || '', brand: row.brand || '', movement: row.movement || '',
    tier: row.tier || 'Entry', zone: row.displayZone || 'Drawer', role: row.role || '',
    paid: Number(row.pricePaid) || 0, retail: Number(row.retail) || 0,
    resale: row.estResale ? Number(row.estResale) : null,
    dial: row.dialColor || '', metal: row.metalTone || '', size: row.caseSize || '',
    strap: row.strapType || '', img: row.imageUrl || '', story: row.storyNote || '',
    status: row.status || 'Own'
  };
}
function mapJT(row) {
  return {
    name: row.watch || '', movement: row.movement || '',
    paid: row.pricePaid ? Number(row.pricePaid) : null,
    retail: Number(row.retail) || 0, role: row.role || '',
    notes: row.notes || '', cat: row.category || 'Purchased'
  };
}
function mapKids(row) {
  return {
    name: row.watch || '', owner: row.owner || '',
    paid: row.pricePaid ? Number(row.pricePaid) : null,
    retail: Number(row.retail) || 0, notes: row.notes || ''
  };
}
function mapWish(row) {
  return {
    name: row.watch || '', brand: row.brand || '', movement: row.movement || '',
    tier: row.tier || '', status: row.status || '', priority: row.priority || '',
    framework: row.frameworkRole || '', price: Number(row.targetPrice) || 0,
    notes: row.notes || ''
  };
}

function loadSheetData() {
  try {
    var data = JSON.parse(SHEET_DATA);
    if (data.LT_Collection && data.LT_Collection.length) ltWatches = data.LT_Collection.map(mapLT);
    if (data.JT_Collection && data.JT_Collection.length) jtWatches = data.JT_Collection.map(mapJT);
    if (data.Kids_Collection && data.Kids_Collection.length) kidsWatches = data.Kids_Collection.map(mapKids);
    if (data.Wishlist && data.Wishlist.length) wishList = data.Wishlist.map(mapWish);
    console.log('%c[Vault] Loaded from Google Sheets', 'color:#4ADE80;font-weight:bold');
  } catch(e) {
    console.log('%c[Vault] Using hardcoded fallback data', 'color:#F59E0B');
  }
  // Vein crosslink
  try {
    google.script.run
      .withSuccessHandler(function(url) {
        if (url) {
          var veinLink = document.getElementById('vein-link');
          veinLink.href = url + '?page=vein';
          veinLink.style.display = 'flex';
        }
      })
      .withFailureHandler(function(err) {
        console.log('[Vault] Vein crosslink unavailable: ' + err.message);
      })
      .getScriptUrlSafe();
  } catch(e) { /* standalone mode */ }
  init();
}

// ==================== TAB SWITCHING ====================
function switchTab(id) {
  var tabs = document.querySelectorAll('.tab-content');
  for (var i = 0; i < tabs.length; i++) { tabs[i].classList.remove('active'); }
  document.getElementById('tab-' + id).classList.add('active');
  var pills = document.querySelectorAll('.header-pill');
  for (var j = 0; j < pills.length; j++) {
    pills[j].classList.remove('active');
    var oc = pills[j].getAttribute('onclick');
    if (oc && oc.indexOf("'" + id + "'") !== -1) {
      pills[j].classList.add('active');
    }
  }
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ==================== INIT ====================
window.onload = loadSheetData;
</script>
