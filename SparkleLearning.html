<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="tbm-module" content="sparkle-learn">
  <meta name="tbm-version" content="v20">
  <title>SparkleLearn v3 — JJ's Learning Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════
       SparkleLearn v2 — CSS
       ═══════════════════════════════════════════════════ */

    /* ─── Font CDN Fallback (P3 Fix 10) ─── */
    /* local() sources load instantly if font is cached on device;
       browser falls through to the <link> Google Fonts stylesheet otherwise */
    @font-face {
      font-family: 'Fredoka One';
      font-style: normal;
      font-weight: 400;
      src: local('Fredoka One'), local('FredokaOne-Regular');
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; padding: 0; min-height: 100vh;
      background: linear-gradient(170deg, #1f0e35 0%, #2d1452 50%, #1f0e35 100%);
      font-family: 'Nunito', 'Arial', sans-serif;
      color: #fde68a;
      overflow-x: hidden;
      -webkit-user-select: none; user-select: none;
    }

    h1, h2, h3, .heading-text {
      font-family: 'Fredoka One', 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
    }

    /* ─── Star Counter ─── */
    .star-counter {
      position: fixed; top: 40px; right: 40px; z-index: 100;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      color: #fff; border-radius: 30px;
      padding: 8px 18px; font-size: 32px; font-weight: 800;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      gap: 6px; box-shadow: 0 4px 16px rgba(168,85,247,0.5);
    }
    .star-counter .star-icon { font-size: 26px; }

    /* ─── Progress Bar ─── */
    .progress-bar-wrap {
      position: fixed; top: 0; left: 0; right: 0; z-index: 90;
      height: 8px; background: rgba(255,255,255,0.1);
    }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, #ec4899, #a855f7, #fde68a);
      -webkit-transition: width 0.5s ease; transition: width 0.5s ease;
      border-radius: 0 4px 4px 0; width: 0%;
    }

    /* ─── Main Container ─── */
    .main-container {
      max-width: 600px; margin: 0 auto;
      padding: 60px 16px 40px 16px;
      min-height: 100vh;
    }

    /* ─── Buttons ─── */
    .btn-big {
      display: inline-block;
      min-width: 80px; min-height: 80px;
      padding: 16px 28px; margin: 8px;
      border: none; border-radius: 24px;
      font-family: 'Fredoka One', sans-serif;
      font-size: 28px; color: #fff; cursor: pointer;
      -webkit-transition: transform 0.15s, box-shadow 0.15s;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    .btn-big:active {
      -webkit-transform: scale(0.93); transform: scale(0.93);
    }
    .btn-pink {
      background: linear-gradient(135deg, #ec4899, #db2777);
      box-shadow: 0 6px 20px rgba(236,72,153,0.5);
    }
    .btn-purple {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      box-shadow: 0 6px 20px rgba(168,85,247,0.5);
    }
    .btn-gold {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      box-shadow: 0 6px 20px rgba(245,158,11,0.5);
      color: #1f0e35;
    }
    .btn-green {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 6px 20px rgba(16,185,129,0.5);
    }

    /* ─── Activity Cards ─── */
    .activity-card {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 28px; padding: 28px 20px;
      margin-bottom: 20px; text-align: center;
    }

    /* ─── Option Grid ─── */
    .option-grid {
      display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      -webkit-justify-content: center; justify-content: center;
      gap: 16px; margin: 20px 0;
    }
    .option-btn {
      min-width: 120px; min-height: 80px;
      padding: 16px 20px; border: 3px solid rgba(255,255,255,0.2);
      border-radius: 20px; background: rgba(255,255,255,0.1);
      color: #fde68a; font-family: 'Fredoka One', sans-serif;
      font-size: 42px; cursor: pointer;
      -webkit-transition: all 0.2s; transition: all 0.2s;
      -webkit-appearance: none;
    }
    .option-btn:active {
      -webkit-transform: scale(0.93); transform: scale(0.93);
    }
    .option-btn.correct {
      background: rgba(16,185,129,0.4); border-color: #10b981;
      -webkit-animation: popCorrect 0.4s ease; animation: popCorrect 0.4s ease;
    }
    .option-btn.wrong {
      background: rgba(168,85,247,0.2); border-color: rgba(168,85,247,0.6);
      -webkit-animation: gentlePulse 0.6s ease; animation: gentlePulse 0.6s ease;
    }
    .option-btn.selected {
      border-color: #fde68a; background: rgba(253,230,138,0.2);
      box-shadow: 0 0 20px rgba(253,230,138,0.3);
    }

    /* ─── 2x2 Grid ─── */
    .grid-2x2 {
      display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      -webkit-justify-content: center; justify-content: center;
      gap: 16px; margin: 20px auto; max-width: 340px;
    }
    .grid-2x2 .option-btn {
      width: 140px; height: 140px;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      font-size: 64px;
    }

    /* ─── Big Letter Display ─── */
    .big-letter {
      font-family: 'Fredoka One', sans-serif;
      font-size: 200px; line-height: 1;
      color: #ec4899; text-shadow: 0 0 40px rgba(236,72,153,0.5);
      margin: 10px 0;
    }

    /* ─── Scatter Area ─── */
    .scatter-area {
      position: relative; width: 100%; height: 320px;
      background: rgba(255,255,255,0.05); border-radius: 24px;
      margin: 16px 0; overflow: hidden;
    }
    .scatter-obj {
      position: absolute; cursor: pointer;
      -webkit-transition: transform 0.2s, opacity 0.2s;
      transition: transform 0.2s, opacity 0.2s;
    }
    .scatter-obj.tapped {
      -webkit-transform: scale(1.3); transform: scale(1.3);
    }
    .scatter-obj.counted {
      opacity: 0.5;
    }

    /* ─── Count Badge ─── */
    .count-badge {
      position: fixed; top: 50%; left: 50%;
      -webkit-transform: translate(-50%,-50%); transform: translate(-50%,-50%);
      font-family: 'Fredoka One', sans-serif; font-size: 120px;
      color: #fde68a; text-shadow: 0 0 40px rgba(253,230,138,0.7);
      pointer-events: none; z-index: 200;
      -webkit-animation: countPop 0.6s ease forwards;
      animation: countPop 0.6s ease forwards;
    }

    /* ─── Trace Canvas ─── */
    .trace-canvas-wrap {
      position: relative; width: 300px; height: 350px;
      margin: 16px auto; border-radius: 24px;
      background: rgba(255,255,255,0.08); overflow: hidden;
    }
    .trace-canvas-wrap canvas {
      display: block; width: 100%; height: 100%;
    }

    /* ─── Bin Row ─── */
    .bin-row {
      display: -webkit-flex; display: flex;
      -webkit-justify-content: center; justify-content: center;
      gap: 12px; margin-top: 16px;
    }
    .color-bin {
      width: 100px; height: 120px; border-radius: 18px;
      border: 6px solid rgba(255,255,255,0.7);
      cursor: pointer; -webkit-transition: all 0.2s; transition: all 0.2s;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
    }
    .color-bin.selected-bin {
      border-color: #fde68a; box-shadow: 0 0 20px rgba(253,230,138,0.4);
      -webkit-transform: scale(1.1); transform: scale(1.1);
    }

    /* ─── Name Builder ─── */
    .name-slots {
      display: -webkit-flex; display: flex;
      -webkit-justify-content: center; justify-content: center;
      gap: 8px; margin: 16px 0;
    }
    .name-slot {
      width: 80px; height: 80px; border-radius: 12px;
      border: 3px dashed rgba(255,255,255,0.3);
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      font-family: 'Fredoka One', sans-serif; font-size: 32px;
      color: #ec4899;
    }
    .name-slot.filled {
      border-style: solid; border-color: #ec4899;
      background: rgba(236,72,153,0.15);
    }
    .letter-bank {
      display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      -webkit-justify-content: center; justify-content: center;
      gap: 10px; margin: 16px 0;
    }
    .letter-bank-btn {
      width: 80px; height: 80px; border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(168,85,247,0.2);
      color: #fde68a; font-family: 'Fredoka One', sans-serif;
      font-size: 28px; cursor: pointer;
      -webkit-appearance: none;
      -webkit-transition: all 0.15s; transition: all 0.15s;
    }
    .letter-bank-btn:active { -webkit-transform: scale(0.9); transform: scale(0.9); }
    .letter-bank-btn.used {
      opacity: 0.3; pointer-events: none;
    }

    /* ─── Story Panel ─── */
    .story-panel {
      background: rgba(255,255,255,0.06); border-radius: 24px;
      padding: 24px 20px; margin: 16px 0;
      font-size: 20px; line-height: 1.6; color: #e0d4f5;
      text-align: left;
    }

    /* ─── Pattern Row ─── */
    .pattern-row {
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      gap: 10px; margin: 20px 0;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
    }
    .pattern-item {
      width: 64px; height: 64px;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      border-radius: 14px; background: rgba(255,255,255,0.08);
    }
    .pattern-mystery {
      width: 64px; height: 64px; border-radius: 14px;
      border: 3px solid #fde68a; background: rgba(253,230,138,0.25);
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      font-family: 'Fredoka One', 'Comic Sans MS', sans-serif; font-size: 36px;
      color: #fde68a;
    }

    /* ─── Word Card ─── */
    .word-cards {
      display: -webkit-flex; display: flex;
      -webkit-justify-content: center; justify-content: center;
      gap: 12px; margin: 16px 0;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
    }
    .word-card {
      background: rgba(236,72,153,0.15); border: 2px solid rgba(236,72,153,0.3);
      border-radius: 16px; padding: 14px 20px;
      font-size: 32px; font-weight: 700; color: #fde68a;
      cursor: pointer; min-height: 80px;
    }
    .word-card:active { -webkit-transform: scale(0.95); transform: scale(0.95); }

    /* ─── Feedback Overlay ─── */
    .feedback-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 300; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      pointer-events: none;
    }
    .feedback-text {
      font-family: 'Fredoka One', sans-serif;
      font-size: 60px; color: #10b981;
      text-shadow: 0 0 30px rgba(16,185,129,0.6);
      -webkit-animation: feedbackPop 1s ease forwards;
      animation: feedbackPop 1s ease forwards;
    }
    .feedback-text.wrong-fb {
      color: #f472b6; font-size: 40px;
      text-shadow: 0 0 30px rgba(244,114,182,0.6);
    }

    /* ─── Celebration ─── */
    .celebration-wrap {
      text-align: center; padding-top: 40px;
    }
    .celebration-stars {
      font-size: 80px; margin: 20px 0;
      -webkit-animation: celebSpin 2s ease infinite;
      animation: celebSpin 2s ease infinite;
    }

    /* ─── Sparkle Particles ─── */
    .sparkle-particle {
      position: fixed; width: 8px; height: 8px;
      border-radius: 50%; pointer-events: none; z-index: 500;
      -webkit-animation: sparkleFloat 1.5s ease forwards;
      animation: sparkleFloat 1.5s ease forwards;
    }

    /* ─── Confetti ─── */
    .confetti-piece {
      position: fixed; width: 10px; height: 16px;
      z-index: 400; pointer-events: none;
      -webkit-animation: confettiFall 3s ease forwards;
      animation: confettiFall 3s ease forwards;
    }

    /* ─── Ready Screen ─── */
    .ready-screen { text-align: center; padding-top: 30px; }
    .ready-title {
      font-family: 'Fredoka One', sans-serif;
      font-size: 42px; color: #ec4899;
      text-shadow: 0 0 30px rgba(236,72,153,0.4);
      margin-bottom: 10px;
    }
    .ready-subtitle {
      font-size: 32px; color: #e0d4f5; margin-bottom: 30px;
    }
    .activity-preview {
      display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      -webkit-justify-content: center; justify-content: center;
      gap: 12px; margin: 20px 0;
    }
    .preview-dot {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.2);
    }
    .preview-dot.done { background: #10b981; border-color: #10b981; }
    .preview-dot.current { background: #ec4899; border-color: #ec4899;
      -webkit-animation: pulse 1.5s ease infinite; animation: pulse 1.5s ease infinite; }

    /* ─── Fallback ─── */
    .fallback-wrap { text-align: center; padding-top: 60px; }

    /* ─── Instruction Text ─── */
    .instruction {
      font-size: 32px; color: #e0d4f5;
      margin: 12px 0 20px 0; line-height: 1.4;
    }

    /* ─── Animations ─── */
    @-webkit-keyframes popCorrect {
      0% { -webkit-transform: scale(1); } 50% { -webkit-transform: scale(1.15); } 100% { -webkit-transform: scale(1); }
    }
    @keyframes popCorrect {
      0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); }
    }
    @-webkit-keyframes shake {
      0%,100% { -webkit-transform: translateX(0); }
      25% { -webkit-transform: translateX(-8px); }
      75% { -webkit-transform: translateX(8px); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    @-webkit-keyframes wobble {
      0%,100% { -webkit-transform: rotate(0deg); }
      20% { -webkit-transform: rotate(-8deg); }
      40% { -webkit-transform: rotate(8deg); }
      60% { -webkit-transform: rotate(-4deg); }
      80% { -webkit-transform: rotate(4deg); }
    }
    @keyframes wobble {
      0%,100% { transform: rotate(0deg); }
      20% { transform: rotate(-8deg); }
      40% { transform: rotate(8deg); }
      60% { transform: rotate(-4deg); }
      80% { transform: rotate(4deg); }
    }
    @-webkit-keyframes countPop {
      0% { opacity: 0; -webkit-transform: translate(-50%,-50%) scale(0.3); }
      40% { opacity: 1; -webkit-transform: translate(-50%,-50%) scale(1.2); }
      100% { opacity: 0; -webkit-transform: translate(-50%,-50%) scale(1.5); }
    }
    @keyframes countPop {
      0% { opacity: 0; transform: translate(-50%,-50%) scale(0.3); }
      40% { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(1.5); }
    }
    @-webkit-keyframes feedbackPop {
      0% { opacity: 0; -webkit-transform: scale(0.5); }
      30% { opacity: 1; -webkit-transform: scale(1.1); }
      70% { opacity: 1; -webkit-transform: scale(1); }
      100% { opacity: 0; -webkit-transform: scale(0.8); }
    }
    @keyframes feedbackPop {
      0% { opacity: 0; transform: scale(0.5); }
      30% { opacity: 1; transform: scale(1.1); }
      70% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8); }
    }
    @-webkit-keyframes pulse {
      0%,100% { -webkit-transform: scale(1); opacity: 1; }
      50% { -webkit-transform: scale(1.3); opacity: 0.7; }
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }
    @-webkit-keyframes celebSpin {
      0%,100% { -webkit-transform: rotate(0deg) scale(1); }
      50% { -webkit-transform: rotate(10deg) scale(1.1); }
    }
    @keyframes celebSpin {
      0%,100% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(10deg) scale(1.1); }
    }
    @-webkit-keyframes sparkleFloat {
      0% { opacity: 1; -webkit-transform: translateY(0) scale(1); }
      100% { opacity: 0; -webkit-transform: translateY(-60px) scale(0); }
    }
    @keyframes sparkleFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(0); }
    }
    @-webkit-keyframes confettiFall {
      0% { opacity: 1; -webkit-transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; -webkit-transform: translateY(100vh) rotate(720deg); }
    }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
    @-webkit-keyframes bgSparkle {
      0%,100% { opacity: 0.3; } 50% { opacity: 0.8; }
    }
    @keyframes bgSparkle {
      0%,100% { opacity: 0.3; } 50% { opacity: 0.8; }
    }

    /* ─── Background Stars ─── */
    .bg-star {
      position: fixed; pointer-events: none; z-index: 0;
      width: 4px; height: 4px; border-radius: 50%;
      background: #fde68a;
      -webkit-animation: bgSparkle 3s ease infinite;
      animation: bgSparkle 3s ease infinite;
    }
    /* ─── Tab S10 FE Portrait (~960px CSS) ─── */
    @media (max-width: 1024px) {
      .grid-2x2 .option-btn {
        width: 150px; height: 150px;
        font-size: 68px;
      }
      .grid-2x2 {
        gap: 18px; max-width: 380px;
      }
      .option-btn {
        min-width: 130px; min-height: 90px;
        font-size: 40px; padding: 18px 22px;
      }
      .option-grid {
        gap: 18px;
      }
      .btn-big {
        min-width: 80px; min-height: 80px;
        font-size: 30px; padding: 18px 32px;
      }
      .scatter-obj {
        min-width: 70px; min-height: 70px;
      }
      .pattern-item svg, .pattern-mystery {
        min-width: 56px; min-height: 56px;
      }
    }

    /* ─── Tab S10 FE Landscape (~1280px wide, ~800px tall) ─── */
    @media (min-width: 1025px) and (max-width: 1366px) and (max-height: 900px) {
      .grid-2x2 {
        max-width: 500px; gap: 20px;
      }
      .grid-2x2 .option-btn {
        width: 140px; height: 140px;
        font-size: 64px;
      }
      .option-btn {
        min-width: 120px; min-height: 85px;
        font-size: 38px;
      }
      .option-grid {
        gap: 20px;
      }
      .btn-big {
        min-width: 80px; min-height: 80px;
        font-size: 28px;
      }
    }
    /* ─── Sparkle Kingdom Background ─── */
    @keyframes skSignPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }
    @keyframes jjAurora { from { transform: scaleX(1) translateY(0); opacity: 0.6; } to { transform: scaleX(1.1) translateY(20px); opacity: 1; } }
    @keyframes jjBgTwinkle { 0%,100% { opacity: var(--min, 0.05); transform: scale(1); } 50% { opacity: var(--max, 0.9); transform: scale(var(--sc, 1.3)); } }
    @keyframes jjOrbitCW { from { transform: translate(-50%,-50%) rotate(0deg); } to { transform: translate(-50%,-50%) rotate(360deg); } }
    @keyframes jjOrbitCCW { from { transform: translate(-50%,-50%) rotate(360deg); } to { transform: translate(-50%,-50%) rotate(0deg); } }
    @keyframes jjMascotBob { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-14px) rotate(3deg); } }
    @keyframes jjSparkleFloat { 0%,100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.7; } 33% { transform: translateY(-20px) rotate(45deg) scale(1.2); opacity: 1; } 66% { transform: translateY(-10px) rotate(90deg) scale(0.9); opacity: 0.8; } }
    @keyframes jjShoot { 0% { opacity: 0; transform: translate(0,0) rotate(-35deg); } 5% { opacity: 1; } 40% { opacity: 0; transform: translate(200px,120px) rotate(-35deg); } 100% { opacity: 0; } }
    @keyframes jjBurstPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
    @keyframes jjDotScroll { from { background-position: 0 0; } to { background-position: 20px 0; } }
    @keyframes skLoadSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes skLoadSpinRev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes skLoadPulse { 0%,100% { transform: scale(1) rotate(-5deg); } 50% { transform: scale(1.2) rotate(5deg); } }
    @keyframes skLoadBounce { from { transform: translateY(0) scale(1); } to { transform: translateY(-12px) scale(1.05); } }
    @keyframes skLoadShimmer { 0%,100% { opacity: 0.7; color: #ffaaee; } 50% { opacity: 1; color: #ffe0ff; } }
    @keyframes skLoadDot { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-16px) scale(1.3); } }
    @keyframes skLoadFloat { 0% { opacity: 0; transform: translateY(0) scale(0.5); } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-320px) rotate(40deg) scale(1.2); } }

function runFreePlayRound() {
  var letter = FREE_PLAY_LETTERS[_freePlayIdx % FREE_PLAY_LETTERS.length];
  var colors = ['red', 'blue', 'green', 'yellow', 'pink', 'purple'];
  var shapes = ['circle', 'square', 'triangle', 'star', 'heart'];

    var nextBatch = FREE_PLAY_LETTERS.slice(8, 16);
    var silentClips = [];
    var prefix = type === 'find_the_letter' ? 'jj_find_' : type === 'letter_trace' ? 'jj_trace_' : type === 'letter_sound' ? 'jj_sound_' : 'jj_letter_phrase_';

    activity.letter = letter;
  } else if (type === 'letter_sound') {
    var sounds = { K:'kuh', I:'ih', N:'nnn', D:'duh', L:'lll', E:'eh', J:'juh', B:'buh', A:'ah', C:'kuh', F:'fff', G:'guh', H:'huh' };
    var wordMap = { K:'Kindle', I:'Ice cream', N:'Nest', D:'Dog', L:'Lion', E:'Egg', J:'Jump', B:'Ball', A:'Apple', C:'Cat', F:'Fish', G:'Goat', H:'Hat' };
    activity.letter = letter;
    activity.sound = sounds[letter] || 'ah';

    activity.target = _freePlayIdx % 2 === 0 ? 'JJ' : 'KINDLE';
  } else if (type === 'count_with_me') {
    activity.count = number;

  } else if (type === 'color_hunt') {

    activity.target = shape;

/* ═══════════════════════════════════════════════════════════
   ASSET REGISTRY — fetch once at load, resolve at render time
   ═══════════════════════════════════════════════════════════ */

/**
 * Fetches ASSET_REGISTRY from server (12h CacheService TTL server-side).
 * Stores result in module-level _assetRegistry. Calls cb() when ready.
 * Safe to call multiple times — returns immediately if already loaded.
 */
function loadAssetRegistry(cb) {
  if (_assetRegistry) { cb(); return; }
  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    _assetRegistry = {};
    cb();
    return;
  }
  google.script.run
    .withSuccessHandler(function(r) { _assetRegistry = r || {}; cb(); })
    .withFailureHandler(function() { _assetRegistry = {}; cb(); })
    .getAssetRegistrySafe();
}

/**
 * Resolves an asset ID to renderable HTML.
 * Lookup order: exact key → plural/singular normalization → fallback circle.
 * type:'emoji' → <span> with font-size
 * type:'svg'   → renderShape() dispatch
 * type:'image' → Phase 2 placeholder img tag (src filled lazily)
 * Falls back to renderShape('circle', fallbackColor, size) on miss.
 */
function resolveAsset(assetId, size, fallbackColor) {
  var reg = _assetRegistry || {};
  var key = String(assetId || '').toLowerCase();
  var entry = reg[key];
  if (!entry) {
    // Try plural-to-singular normalization (butterflies→butterfly, sparkles→sparkle)
    var normalized = key.replace(/ies$/, 'y').replace(/s$/, '');
    entry = reg[normalized];
  }
  if (!entry) {
    if (typeof console !== 'undefined' && console.warn) { console.warn('asset miss:', assetId); }
    return renderShape('circle', fallbackColor || 'pink', size || 64);
  }
  if (entry.type === 'emoji') {
    return '<span class="asset-emoji" style="font-size:' + (size || 120) + 'px;line-height:1;display:inline-block;">' + entry.value + '</span>';
  }
  if (entry.type === 'svg') {
    return renderShape(entry.value, entry.color || fallbackColor, size || 64);
  }
  if (entry.type === 'image') {
    // Phase 2 lazy-load never shipped — fall back to emoji if entry has one,
    // otherwise render a colored SVG circle with the first letter of the asset name.
    if (entry.emoji) {
      return '<span class="asset-emoji" style="font-size:' + (size || 120) + 'px;line-height:1;display:inline-block;">' + entry.emoji + '</span>';
    }
    var _fc = (entry.name || assetId || '?').charAt(0).toUpperCase();
    var _bgCol = entry.color ? (COLOR_MAP[entry.color] || entry.color) : '#a855f7';
    var _sz = size || 120;
    return '<svg width="' + _sz + '" height="' + _sz + '" viewBox="0 0 120 120">' +
      '<circle cx="60" cy="60" r="56" fill="' + _bgCol + '"/>' +
      '<circle cx="42" cy="42" r="16" fill="rgba(255,255,255,0.35)"/>' +
      '<text x="60" y="82" text-anchor="middle" font-family="Fredoka One,Comic Sans MS,sans-serif" font-size="58" fill="white">' + escapeHtml(_fc) + '</text>' +
      '</svg>';
  }
  return renderShape('circle', fallbackColor || 'pink', size || 64);
}

function loadContent() {
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function(content) {
        if (content && content.content && content.content.activities) {
          todayContent = content.content;
          // Cap at 10 activities per session — 15 is too long for pre-K
          if (todayContent.activities.length > 10) {
            todayContent.activities = todayContent.activities.slice(0, 10);
          }
          // v13: Lazy load — only preload FIRST activity now, rest load as kid plays
          if (todayContent.activities.length > 0) {
            loadAudioForGame(todayContent.activities[0].type, function() {
              showReadyScreen(todayContent);
            });
          } else {
            showReadyScreen(todayContent);
          }
        } else {
          showFallback();
        }
      })
      .withFailureHandler(function() {
        showFallback();
      })
      .getTodayContentSafe('jj');
  } else {
    showFallback();
  }
}

    var sparkleSubject = lettersCompleted.length > 0 ? 'Letters' : 'Numbers';
    google.script.run
      .withSuccessHandler(function() { console.log('Sparkle progress logged to Notion'); })
      .withFailureHandler(function(err) { console.error('Sparkle log failed:', err.message); })
      .logSparkleProgressSafe({
        activity: 'SparkleLearn Session',
        subject: sparkleSubject,
        score: sessionStars,
        date: new Date().toISOString().slice(0, 10)
      });
  }

  showCelebrationScreen(sessionStars);
}

function showCelebrationScreen(sessionStars) {
  var mc = getMainContent();
  var bar = document.getElementById('progressBar');
  if (bar) { bar.style.width = '100%'; }

  launchConfetti();

  var html = '<div class="celebration-wrap">';
  html += '<div class="celebration-stars" style="font-size:100px;">&#127775;&#11088;&#127775;</div>';
  html += '<div class="ready-title" style="font-size:44px;">All Done!</div>';
  html += '<p class="instruction" style="font-size:28px;">You earned <span style="color:#fde68a;font-size:36px;">' + sessionStars + '</span> stars today!</p>';
  html += '<p class="instruction" style="font-size:22px;">Total stars: <span style="color:#fde68a;">' + totalStars + '</span></p>';

  /* Star explosion */
  html += '<div style="margin:24px 0;">';
  for (var i = 0; i < Math.min(sessionStars, 10); i++) {
    html += '<span style="font-size:48px;display:inline-block;margin:4px;-webkit-animation:celebSpin 2s ease infinite;animation:celebSpin 2s ease infinite;animation-delay:' + (i * 0.2) + 's;">&#11088;</span>';
  }
  html += '</div>';

  html += '<button class="btn-big btn-pink" onclick="replaySession()" style="font-size:28px;margin-top:16px;">Play Again! &#127881;</button>';
  html += '<button class="btn-big btn-green" onclick="window.location.href=\'/daily-missions?child=jj\'" style="font-size:24px;margin-top:12px;">All Done! &#127752;</button>';
  html += '</div>';
  mc.innerHTML = html;

  playAudioCached('celebration.mp3');
  playAudioCached('jj_feedback_complete3.mp3', 'Amazing job!');
  setTimeout(function() {
    playAudioCached('jj_instruction_great_session.mp3', 'Great learning today!');
  }, 2000);
}

function replaySession() {
  currentActivityIndex = 0;
  completedActivities = [];
  if (todayContent) {
    showReadyScreen(todayContent);
  } else {
    loadContent();
  }
}

/* ═══════════════════════════════════════════════════════════
   FALLBACK SCREEN
   ═══════════════════════════════════════════════════════════ */
function showFallback() {
  hideSparkleLoading();
  var mc = getMainContent();
  var html = '<div class="fallback-wrap">';
  html += '<div style="font-size:80px;margin-bottom:16px;">&#10024;</div>';
  html += '<div class="ready-title">No sparkle games today!</div>';
  html += '<p class="instruction">But we can still practice letters!</p>';
  html += '<div class="option-grid" id="fallbackLetters">';

  var letters = ['K', 'I', 'N', 'D', 'L', 'E', 'J', 'B'];
  for (var i = 0; i < letters.length; i++) {
    html += '<button class="option-btn" style="font-size:48px;width:80px;height:80px;" ';
    html += 'onclick="fallbackLetterTap(\'' + letters[i] + '\',this)">' + letters[i] + '</button>';
  }

  html += '</div>';
  html += '<button class="btn-big btn-purple" onclick="showMoreFallbackLetters()" style="margin-top:16px;">More Letters</button>';
  html += '</div>';
  mc.innerHTML = html;

  speak("No sparkle games loaded today, but lets practice letters! Tap a letter to hear it!");
}

function fallbackLetterTap(letter, el) {
  speak(letter + "! " + letter + " is for " + getFallbackWord(letter), 'jj_letter_phrase_' + letter + '.mp3');
  var rect = el.getBoundingClientRect();
  spawnSparkles(rect.left + 40, rect.top + 40, 8);
}

function getFallbackWord(letter) {
  var words = {
    A: 'Apple', B: 'Ball', C: 'Cat', D: 'Dog', E: 'Elephant', F: 'Fish',
    G: 'Giraffe', H: 'Hat', I: 'Ice cream', J: 'Jellyfish', K: 'Kite',
    L: 'Lion', M: 'Moon', N: 'Nest', O: 'Octopus', P: 'Penguin',
    Q: 'Queen', R: 'Rainbow', S: 'Star', T: 'Tiger', U: 'Umbrella',
    V: 'Violin', W: 'Whale', X: 'Xylophone', Y: 'Yarn', Z: 'Zebra'
  };
  return words[letter] || letter;
}

function showMoreFallbackLetters() {
  var container = document.getElementById('fallbackLetters');
  if (!container) { return; }
  var allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  var html = '';
  for (var i = 0; i < allLetters.length; i++) {
    var l = allLetters.charAt(i);
    html += '<button class="option-btn" style="font-size:36px;width:68px;height:68px;" ';
    html += 'onclick="fallbackLetterTap(\'' + l + '\',this)">' + l + '</button>';
  }
  container.innerHTML = html;
  speak("Here are all the letters! Tap any letter to hear it!");
}

/* ═══════════════════════════════════════════════════════════
   INIT ON LOAD
   ═══════════════════════════════════════════════════════════ */
window.onload = function() {
  init();
};
</script>

<!-- ═══ Kid Feedback Widget (ES5 IIFE) ═══ -->
<script>
(function() {
  var FB_STYLES = '#tbm-fb-btn{position:fixed;bottom:12px;left:12px;width:48px;height:48px;border-radius:50%;'
    + 'background:rgba(11,19,29,0.7);border:1px solid #1e3347;color:#e2e8f0;font-size:22px;cursor:pointer;'
    + 'z-index:9000;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.3);'
    + 'transition:opacity 0.2s;opacity:0.6;}'
    + '#tbm-fb-btn:hover{opacity:1;}'
    + '#tbm-fb-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9001;}'
    + '#tbm-fb-modal{position:fixed;bottom:70px;left:12px;width:260px;background:#0b131d;border:1px solid #1e3347;'
    + 'border-radius:12px;padding:16px;z-index:9002;box-shadow:0 4px 24px rgba(0,0,0,0.5);display:none;}'
    + '#tbm-fb-modal h3{margin:0 0 12px 0;color:#e2e8f0;font-size:16px;text-align:center;}'
    + '.tbm-fb-emojis{display:flex;justify-content:center;gap:16px;margin-bottom:12px;}'
    + '.tbm-fb-emojis button{width:52px;height:52px;border-radius:50%;border:2px solid #1e3347;background:#0f1a2a;'
    + 'font-size:26px;cursor:pointer;transition:border-color 0.15s,transform 0.15s;}'
    + '.tbm-fb-emojis button.selected{border-color:#38bdf8;transform:scale(1.15);}'
    + '#tbm-fb-text{width:100%;box-sizing:border-box;background:#0f1a2a;border:1px solid #1e3347;border-radius:8px;'
    + 'color:#e2e8f0;padding:8px;font-size:14px;font-family:inherit;resize:none;height:52px;margin-bottom:10px;}'
    + '#tbm-fb-text::placeholder{color:#4a6080;}'
    + '.tbm-fb-actions{display:flex;justify-content:flex-end;gap:8px;}'
    + '.tbm-fb-actions button{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:none;}'
    + '#tbm-fb-skip{background:transparent;color:#4a6080;}#tbm-fb-skip:hover{color:#e2e8f0;}'
    + '#tbm-fb-send{background:#1e3a5f;color:#38bdf8;font-weight:700;}#tbm-fb-send:hover{background:#254a73;}'
    + '.tbm-fb-toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#0b131d;'
    + 'border:1px solid #1e3347;color:#e2e8f0;padding:8px 20px;border-radius:8px;font-size:14px;z-index:9010;'
    + 'opacity:0;transition:opacity 0.3s;}';

  var style = document.createElement('style');
  style.textContent = FB_STYLES;
  document.head.appendChild(style);

  var btn = document.createElement('button');
  btn.id = 'tbm-fb-btn';
  btn.innerHTML = '&#x1F4AC;';
  btn.setAttribute('aria-label', 'Give feedback');
  document.body.appendChild(btn);

  var overlay = document.createElement('div');
  overlay.id = 'tbm-fb-overlay';
  document.body.appendChild(overlay);

  var modal = document.createElement('div');
  modal.id = 'tbm-fb-modal';
  modal.innerHTML = '<h3>How was it?</h3>'
    + '<div class="tbm-fb-emojis">'
    + '<button data-score="1" aria-label="Okay">&#x1F610;</button>'
    + '<button data-score="3" aria-label="Good">&#x1F642;</button>'
    + '<button data-score="5" aria-label="Awesome">&#x1F929;</button>'
    + '</div>'
    + '<textarea id="tbm-fb-text" placeholder="What happened? (optional)" maxlength="200"></textarea>'
    + '<div class="tbm-fb-actions">'
    + '<button id="tbm-fb-skip">Skip</button>'
    + '<button id="tbm-fb-send">Send</button>'
    + '</div>';
  document.body.appendChild(modal);

  var selectedScore = 0;

  function getUser() {
    var search = window.location.search || '';
    var match = search.match(/[?&]child=([^&]+)/);
    if (match) return decodeURIComponent(match[1]);
    return 'unknown';
  }

  function getSurface() {
    var meta = document.querySelector('meta[name="tbm-module"]');
    return meta ? meta.getAttribute('content') : 'unknown';
  }

  function showToast(msg) {
    var t = document.createElement('div');
    t.className = 'tbm-fb-toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.style.opacity = '1'; }, 10);
    setTimeout(function() {
      t.style.opacity = '0';
      setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 300);
    }, 1500);
  }

  function openModal() {
    selectedScore = 0;
    var btns = modal.querySelectorAll('.tbm-fb-emojis button');
    for (var i = 0; i < btns.length; i++) btns[i].className = '';
    var ta = document.getElementById('tbm-fb-text');
    if (ta) ta.value = '';
    overlay.style.display = 'block';
    modal.style.display = 'block';
  }

  function closeModal() {
    overlay.style.display = 'none';
    modal.style.display = 'none';
  }

  btn.onclick = openModal;
  overlay.onclick = closeModal;

  var emojiButtons = modal.querySelectorAll('.tbm-fb-emojis button');
  for (var e = 0; e < emojiButtons.length; e++) {
    emojiButtons[e].onclick = (function(b) {
      return function() {
        selectedScore = parseInt(b.getAttribute('data-score'), 10);
        var all = modal.querySelectorAll('.tbm-fb-emojis button');
        for (var k = 0; k < all.length; k++) all[k].className = '';
        b.className = 'selected';
      };
    })(emojiButtons[e]);
  }

  document.getElementById('tbm-fb-skip').onclick = closeModal;

  document.getElementById('tbm-fb-send').onclick = function() {
    if (!selectedScore) { showToast('Tap an emoji first!'); return; }
    var ta = document.getElementById('tbm-fb-text');
    var payload = {
      surface: getSurface(),
      layout: selectedScore,
      readability: selectedScore,
      text: ta ? ta.value : '',
      user: getUser()
    };
    closeModal();
    google.script.run
      .withSuccessHandler(function() { showToast('\u2713 Thanks!'); })
      .withFailureHandler(function() { showToast('Oops, try later'); })
      .submitFeedbackSafe(payload);
  };
})();
</script>
</body>
