<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="tbm-module" content="sparkle-learn">
  <meta name="tbm-version" content="v13">
  <title>SparkleLearn v3 — JJ's Learning Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════
       SparkleLearn v2 — CSS
       ═══════════════════════════════════════════════════ */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; padding: 0; min-height: 100vh;
      background: linear-gradient(170deg, #1f0e35 0%, #2d1452 50%, #1f0e35 100%);
      font-family: 'Nunito', 'Arial', sans-serif;
      color: #fde68a;
      overflow-x: hidden;
      -webkit-user-select: none; user-select: none;
    }

    h1, h2, h3, .heading-text {
      font-family: 'Fredoka One', 'Arial Rounded MT Bold', sans-serif;
    }

    /* ─── Star Counter ─── */
    .star-counter {
      position: fixed; top: 12px; right: 16px; z-index: 100;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      color: #fff; border-radius: 30px;
      padding: 8px 18px; font-size: 22px; font-weight: 800;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      gap: 6px; box-shadow: 0 4px 16px rgba(168,85,247,0.5);
    }
    .star-counter .star-icon { font-size: 26px; }

    /* ─── Progress Bar ─── */
    .progress-bar-wrap {
      position: fixed; top: 0; left: 0; right: 0; z-index: 90;
      height: 8px; background: rgba(255,255,255,0.1);
    }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, #ec4899, #a855f7, #fde68a);
      -webkit-transition: width 0.5s ease; transition: width 0.5s ease;
      border-radius: 0 4px 4px 0; width: 0%;
    }

    /* ─── Main Container ─── */
    .main-container {
      max-width: 600px; margin: 0 auto;
      padding: 60px 16px 40px 16px;
      min-height: 100vh;
    }

    /* ─── Buttons ─── */
    .btn-big {
      display: inline-block;
      min-width: 64px; min-height: 64px;
      padding: 16px 28px; margin: 8px;
      border: none; border-radius: 24px;
      font-family: 'Fredoka One', sans-serif;
      font-size: 28px; color: #fff; cursor: pointer;
      -webkit-transition: transform 0.15s, box-shadow 0.15s;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    .btn-big:active {
      -webkit-transform: scale(0.93); transform: scale(0.93);
    }
    .btn-pink {
      background: linear-gradient(135deg, #ec4899, #db2777);
      box-shadow: 0 6px 20px rgba(236,72,153,0.5);
    }
    .btn-purple {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      box-shadow: 0 6px 20px rgba(168,85,247,0.5);
    }
    .btn-gold {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      box-shadow: 0 6px 20px rgba(245,158,11,0.5);
      color: #1f0e35;
    }
    .btn-green {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 6px 20px rgba(16,185,129,0.5);
    }

    /* ─── Activity Cards ─── */
    .activity-card {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 28px; padding: 28px 20px;
      margin-bottom: 20px; text-align: center;
    }

    /* ─── Option Grid ─── */
    .option-grid {
      display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      -webkit-justify-content: center; justify-content: center;
      gap: 16px; margin: 20px 0;
    }
    .option-btn {
      min-width: 120px; min-height: 80px;
      padding: 16px 20px; border: 3px solid rgba(255,255,255,0.2);
      border-radius: 20px; background: rgba(255,255,255,0.1);
      color: #fde68a; font-family: 'Fredoka One', sans-serif;
      font-size: 36px; cursor: pointer;
      -webkit-transition: all 0.2s; transition: all 0.2s;
      -webkit-appearance: none;
    }
    .option-btn:active {
      -webkit-transform: scale(0.93); transform: scale(0.93);
    }
    .option-btn.correct {
      background: rgba(16,185,129,0.4); border-color: #10b981;
      -webkit-animation: popCorrect 0.4s ease; animation: popCorrect 0.4s ease;
    }
    .option-btn.wrong {
      background: rgba(239,68,68,0.3); border-color: #ef4444;
      -webkit-animation: shake 0.4s ease; animation: shake 0.4s ease;
    }
    .option-btn.selected {
      border-color: #fde68a; background: rgba(253,230,138,0.2);
      box-shadow: 0 0 20px rgba(253,230,138,0.3);
    }

    /* ─── 2x2 Grid ─── */
    .grid-2x2 {
      display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      -webkit-justify-content: center; justify-content: center;
      gap: 16px; margin: 20px auto; max-width: 340px;
    }
    .grid-2x2 .option-btn {
      width: 140px; height: 140px;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      font-size: 64px;
    }

    /* ─── Big Letter Display ─── */
    .big-letter {
      font-family: 'Fredoka One', sans-serif;
      font-size: 200px; line-height: 1;
      color: #ec4899; text-shadow: 0 0 40px rgba(236,72,153,0.5);
      margin: 10px 0;
    }

    /* ─── Scatter Area ─── */
    .scatter-area {
      position: relative; width: 100%; height: 320px;
      background: rgba(255,255,255,0.05); border-radius: 24px;
      margin: 16px 0; overflow: hidden;
    }
    .scatter-obj {
      position: absolute; cursor: pointer;
      -webkit-transition: transform 0.2s, opacity 0.2s;
      transition: transform 0.2s, opacity 0.2s;
    }
    .scatter-obj.tapped {
      -webkit-transform: scale(1.3); transform: scale(1.3);
    }
    .scatter-obj.counted {
      opacity: 0.5;
    }

    /* ─── Count Badge ─── */
    .count-badge {
      position: fixed; top: 50%; left: 50%;
      -webkit-transform: translate(-50%,-50%); transform: translate(-50%,-50%);
      font-family: 'Fredoka One', sans-serif; font-size: 120px;
      color: #fde68a; text-shadow: 0 0 40px rgba(253,230,138,0.7);
      pointer-events: none; z-index: 200;
      -webkit-animation: countPop 0.6s ease forwards;
      animation: countPop 0.6s ease forwards;
    }

    /* ─── Trace Canvas ─── */
    .trace-canvas-wrap {
      position: relative; width: 300px; height: 350px;
      margin: 16px auto; border-radius: 24px;
      background: rgba(255,255,255,0.08); overflow: hidden;
    }
    .trace-canvas-wrap canvas {
      display: block; width: 100%; height: 100%;
    }

    /* ─── Bin Row ─── */
    .bin-row {
      display: -webkit-flex; display: flex;
      -webkit-justify-content: center; justify-content: center;
      gap: 12px; margin-top: 16px;
    }
    .color-bin {
      width: 80px; height: 80px; border-radius: 16px;
      border: 3px solid rgba(255,255,255,0.3);
      cursor: pointer; -webkit-transition: all 0.2s; transition: all 0.2s;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      font-size: 12px; color: #fff; font-weight: 700;
    }
    .color-bin.selected-bin {
      border-color: #fde68a; box-shadow: 0 0 20px rgba(253,230,138,0.4);
      -webkit-transform: scale(1.1); transform: scale(1.1);
    }

    /* ─── Name Builder ─── */
    .name-slots {
      display: -webkit-flex; display: flex;
      -webkit-justify-content: center; justify-content: center;
      gap: 8px; margin: 16px 0;
    }
    .name-slot {
      width: 56px; height: 64px; border-radius: 12px;
      border: 3px dashed rgba(255,255,255,0.3);
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      font-family: 'Fredoka One', sans-serif; font-size: 32px;
      color: #ec4899;
    }
    .name-slot.filled {
      border-style: solid; border-color: #ec4899;
      background: rgba(236,72,153,0.15);
    }
    .letter-bank {
      display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      -webkit-justify-content: center; justify-content: center;
      gap: 10px; margin: 16px 0;
    }
    .letter-bank-btn {
      width: 64px; height: 64px; border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(168,85,247,0.2);
      color: #fde68a; font-family: 'Fredoka One', sans-serif;
      font-size: 28px; cursor: pointer;
      -webkit-appearance: none;
      -webkit-transition: all 0.15s; transition: all 0.15s;
    }
    .letter-bank-btn:active { -webkit-transform: scale(0.9); transform: scale(0.9); }
    .letter-bank-btn.used {
      opacity: 0.3; pointer-events: none;
    }

    /* ─── Story Panel ─── */
    .story-panel {
      background: rgba(255,255,255,0.06); border-radius: 24px;
      padding: 24px 20px; margin: 16px 0;
      font-size: 20px; line-height: 1.6; color: #e0d4f5;
      text-align: left;
    }

    /* ─── Pattern Row ─── */
    .pattern-row {
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      gap: 10px; margin: 20px 0;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
    }
    .pattern-item {
      width: 64px; height: 64px;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      border-radius: 14px; background: rgba(255,255,255,0.08);
    }
    .pattern-mystery {
      width: 64px; height: 64px; border-radius: 14px;
      border: 3px dashed #fde68a; background: rgba(253,230,138,0.1);
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      font-family: 'Fredoka One', sans-serif; font-size: 36px;
      color: #fde68a;
    }

    /* ─── Word Card ─── */
    .word-cards {
      display: -webkit-flex; display: flex;
      -webkit-justify-content: center; justify-content: center;
      gap: 12px; margin: 16px 0;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
    }
    .word-card {
      background: rgba(236,72,153,0.15); border: 2px solid rgba(236,72,153,0.3);
      border-radius: 16px; padding: 14px 20px;
      font-size: 22px; font-weight: 700; color: #fde68a;
      cursor: pointer;
    }
    .word-card:active { -webkit-transform: scale(0.95); transform: scale(0.95); }

    /* ─── Feedback Overlay ─── */
    .feedback-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 300; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      pointer-events: none;
    }
    .feedback-text {
      font-family: 'Fredoka One', sans-serif;
      font-size: 60px; color: #10b981;
      text-shadow: 0 0 30px rgba(16,185,129,0.6);
      -webkit-animation: feedbackPop 1s ease forwards;
      animation: feedbackPop 1s ease forwards;
    }
    .feedback-text.wrong-fb {
      color: #f59e0b; font-size: 40px;
      text-shadow: 0 0 30px rgba(245,158,11,0.6);
    }

    /* ─── Celebration ─── */
    .celebration-wrap {
      text-align: center; padding-top: 40px;
    }
    .celebration-stars {
      font-size: 80px; margin: 20px 0;
      -webkit-animation: celebSpin 2s ease infinite;
      animation: celebSpin 2s ease infinite;
    }

    /* ─── Sparkle Particles ─── */
    .sparkle-particle {
      position: fixed; width: 8px; height: 8px;
      border-radius: 50%; pointer-events: none; z-index: 500;
      -webkit-animation: sparkleFloat 1.5s ease forwards;
      animation: sparkleFloat 1.5s ease forwards;
    }

    /* ─── Confetti ─── */
    .confetti-piece {
      position: fixed; width: 10px; height: 16px;
      z-index: 400; pointer-events: none;
      -webkit-animation: confettiFall 3s ease forwards;
      animation: confettiFall 3s ease forwards;
    }

    /* ─── Ready Screen ─── */
    .ready-screen { text-align: center; padding-top: 30px; }
    .ready-title {
      font-family: 'Fredoka One', sans-serif;
      font-size: 42px; color: #ec4899;
      text-shadow: 0 0 30px rgba(236,72,153,0.4);
      margin-bottom: 10px;
    }
    .ready-subtitle {
      font-size: 22px; color: #e0d4f5; margin-bottom: 30px;
    }
    .activity-preview {
      display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      -webkit-justify-content: center; justify-content: center;
      gap: 12px; margin: 20px 0;
    }
    .preview-dot {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.2);
    }
    .preview-dot.done { background: #10b981; border-color: #10b981; }
    .preview-dot.current { background: #ec4899; border-color: #ec4899;
      -webkit-animation: pulse 1.5s ease infinite; animation: pulse 1.5s ease infinite; }

    /* ─── Fallback ─── */
    .fallback-wrap { text-align: center; padding-top: 60px; }

    /* ─── Instruction Text ─── */
    .instruction {
      font-size: 24px; color: #e0d4f5;
      margin: 12px 0 20px 0; line-height: 1.4;
    }

    /* ─── Animations ─── */
    @-webkit-keyframes popCorrect {
      0% { -webkit-transform: scale(1); } 50% { -webkit-transform: scale(1.15); } 100% { -webkit-transform: scale(1); }
    }
    @keyframes popCorrect {
      0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); }
    }
    @-webkit-keyframes shake {
      0%,100% { -webkit-transform: translateX(0); }
      25% { -webkit-transform: translateX(-8px); }
      75% { -webkit-transform: translateX(8px); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    @-webkit-keyframes countPop {
      0% { opacity: 0; -webkit-transform: translate(-50%,-50%) scale(0.3); }
      40% { opacity: 1; -webkit-transform: translate(-50%,-50%) scale(1.2); }
      100% { opacity: 0; -webkit-transform: translate(-50%,-50%) scale(1.5); }
    }
    @keyframes countPop {
      0% { opacity: 0; transform: translate(-50%,-50%) scale(0.3); }
      40% { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(1.5); }
    }
    @-webkit-keyframes feedbackPop {
      0% { opacity: 0; -webkit-transform: scale(0.5); }
      30% { opacity: 1; -webkit-transform: scale(1.1); }
      70% { opacity: 1; -webkit-transform: scale(1); }
      100% { opacity: 0; -webkit-transform: scale(0.8); }
    }
    @keyframes feedbackPop {
      0% { opacity: 0; transform: scale(0.5); }
      30% { opacity: 1; transform: scale(1.1); }
      70% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8); }
    }
    @-webkit-keyframes pulse {
      0%,100% { -webkit-transform: scale(1); opacity: 1; }
      50% { -webkit-transform: scale(1.3); opacity: 0.7; }
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }
    @-webkit-keyframes celebSpin {
      0%,100% { -webkit-transform: rotate(0deg) scale(1); }
      50% { -webkit-transform: rotate(10deg) scale(1.1); }
    }
    @keyframes celebSpin {
      0%,100% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(10deg) scale(1.1); }
    }
    @-webkit-keyframes sparkleFloat {
      0% { opacity: 1; -webkit-transform: translateY(0) scale(1); }
      100% { opacity: 0; -webkit-transform: translateY(-60px) scale(0); }
    }
    @keyframes sparkleFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(0); }
    }
    @-webkit-keyframes confettiFall {
      0% { opacity: 1; -webkit-transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; -webkit-transform: translateY(100vh) rotate(720deg); }
    }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
    @-webkit-keyframes bgSparkle {
      0%,100% { opacity: 0.3; } 50% { opacity: 0.8; }
    }
    @keyframes bgSparkle {
      0%,100% { opacity: 0.3; } 50% { opacity: 0.8; }
    }

    /* ─── Background Stars ─── */
    .bg-star {
      position: fixed; pointer-events: none; z-index: 0;
      width: 4px; height: 4px; border-radius: 50%;
      background: #fde68a;
      -webkit-animation: bgSparkle 3s ease infinite;
      animation: bgSparkle 3s ease infinite;
    }
    /* ─── Tab S10 FE Portrait (~960px CSS) ─── */
    @media (max-width: 1024px) {
      .grid-2x2 .option-btn {
        width: 150px; height: 150px;
        font-size: 68px;
      }
      .grid-2x2 {
        gap: 18px; max-width: 380px;
      }
      .option-btn {
        min-width: 130px; min-height: 90px;
        font-size: 40px; padding: 18px 22px;
      }
      .option-grid {
        gap: 18px;
      }
      .btn-big {
        min-width: 72px; min-height: 72px;
        font-size: 30px; padding: 18px 32px;
      }
      .scatter-obj {
        min-width: 70px; min-height: 70px;
      }
      .pattern-item svg, .pattern-mystery {
        min-width: 56px; min-height: 56px;
      }
    }

    /* ─── Tab S10 FE Landscape (~1280px wide, ~800px tall) ─── */
    @media (min-width: 1025px) and (max-width: 1366px) and (max-height: 900px) {
      .grid-2x2 {
        max-width: 500px; gap: 20px;
      }
      .grid-2x2 .option-btn {
        width: 140px; height: 140px;
        font-size: 64px;
      }
      .option-btn {
        min-width: 120px; min-height: 85px;
        font-size: 38px;
      }
      .option-grid {
        gap: 20px;
      }
      .btn-big {
        min-width: 68px; min-height: 68px;
        font-size: 28px;
      }
    }
    /* ─── Sparkle Kingdom Background ─── */
    @keyframes skSignPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }
    @keyframes jjAurora { from { transform: scaleX(1) translateY(0); opacity: 0.6; } to { transform: scaleX(1.1) translateY(20px); opacity: 1; } }
    @keyframes jjBgTwinkle { 0%,100% { opacity: var(--min, 0.05); transform: scale(1); } 50% { opacity: var(--max, 0.9); transform: scale(var(--sc, 1.3)); } }
    @keyframes jjOrbitCW { from { transform: translate(-50%,-50%) rotate(0deg); } to { transform: translate(-50%,-50%) rotate(360deg); } }
    @keyframes jjOrbitCCW { from { transform: translate(-50%,-50%) rotate(360deg); } to { transform: translate(-50%,-50%) rotate(0deg); } }
    @keyframes jjMascotBob { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-14px) rotate(3deg); } }
    @keyframes jjSparkleFloat { 0%,100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.7; } 33% { transform: translateY(-20px) rotate(45deg) scale(1.2); opacity: 1; } 66% { transform: translateY(-10px) rotate(90deg) scale(0.9); opacity: 0.8; } }
    @keyframes jjShoot { 0% { opacity: 0; transform: translate(0,0) rotate(-35deg); } 5% { opacity: 1; } 40% { opacity: 0; transform: translate(200px,120px) rotate(-35deg); } 100% { opacity: 0; } }
    @keyframes jjBurstPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
    @keyframes jjDotScroll { from { background-position: 0 0; } to { background-position: 20px 0; } }
    @keyframes skLoadSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes skLoadSpinRev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes skLoadPulse { 0%,100% { transform: scale(1) rotate(-5deg); } 50% { transform: scale(1.2) rotate(5deg); } }
    @keyframes skLoadBounce { from { transform: translateY(0) scale(1); } to { transform: translateY(-12px) scale(1.05); } }
    @keyframes skLoadShimmer { 0%,100% { opacity: 0.7; color: #ffaaee; } 50% { opacity: 1; color: #ffe0ff; } }
    @keyframes skLoadDot { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-16px) scale(1.3); } }
    @keyframes skLoadFloat { 0% { opacity: 0; transform: translateY(0) scale(0.5); } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-320px) rotate(40deg) scale(1.2); } }
  </style>
</head>
<body style="background:#1a0533;">

  <!-- Loading Screen -->
  <div id="sparkle-loading" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:linear-gradient(135deg,#1a0533 0%,#2d0a5e 40%,#4a0e8f 70%,#1a0533 100%);display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;overflow:hidden;"></div>

  <!-- Star Counter -->
  <div class="star-counter" id="starCounter">
    <span class="star-icon">&#11088;</span>
    <span id="starCount">0</span>
  </div>

  <!-- Progress Bar -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar"></div>
  </div>

  <!-- Main Content -->

// Settle any in-flight audio before starting new playback.
// If speechSynthesis is mid-cancel, the 20ms delay lets the
// cancel flag flush before the next speak() fires (WebKit bug).
function _stopAllAudio(cb) {
  if (_activeClip) {
    try {
      _activeClip.onended = null;
      _activeClip.onerror = null;
      _activeClip.pause();
      _activeClip.currentTime = 0;
    } catch(e) {}
    _activeClip = null;
  }
  _audioPlaying = false;
  if (window.speechSynthesis && (speechSynthesis.speaking || speechSynthesis.pending)) {
    try { speechSynthesis.cancel(); } catch(e) {}
    setTimeout(function() { if (cb) cb(); }, 20);
    return;
  }
  if (cb) cb();
}

function speak(text, onEndOrKey, maybeOnEnd) {
  if (!text) { if (typeof onEndOrKey === 'function') { onEndOrKey(); } else if (maybeOnEnd) { maybeOnEnd(); } return; }
  // speak(text, onEnd) or speak(text, audioKey, onEnd)
  var audioKey = null;
  var onEnd = null;
  if (typeof onEndOrKey === 'function') {
    onEnd = onEndOrKey;
  } else if (typeof onEndOrKey === 'string') {
    audioKey = onEndOrKey;
    onEnd = maybeOnEnd || null;
  }

  // Auto-match: if no explicit key, try to derive one from text
  if (!audioKey) { audioKey = autoMatchAudio(String(text)); }

  // Sequence guard: only the most-recent call wins.
  _audioRequestSeq += 1;
  var mySeq = _audioRequestSeq;

  _stopAllAudio(function() {
    if (mySeq !== _audioRequestSeq) { return; } // superseded — bail

    // Try ElevenLabs cached clip first
    if (audioKey && audioCache[audioKey]) {
      try {
        var clip = audioCache[audioKey];
        clip.currentTime = 0;
        _activeClip = clip;
        _audioPlaying = true;
        clip.onended = function() {
          _activeClip = null;
          _audioPlaying = false;
          if (onEnd) { onEnd(); }
        };
        clip.onerror = function() {
          _activeClip = null;
          _audioPlaying = false;
          if (onEnd) { onEnd(); }
        };
        clip.play();
        return;
      } catch(e) {
        _activeClip = null;
        _audioPlaying = false;
        /* fall through to Web Speech */
      }
    }

    // Web Speech fallback
    if (!window.speechSynthesis) { if (onEnd) { onEnd(); } return; }
    var u = new SpeechSynthesisUtterance(String(text));
    u.rate = 0.85;
    u.pitch = 1.1;
    _audioPlaying = true;
    u.onend = function() {
      _audioPlaying = false;
      if (onEnd) { onEnd(); }
    };
    u.onerror = function() {
      _audioPlaying = false;
      if (onEnd) { onEnd(); }
    };
    speechSynthesis.speak(u);
  });
}

function autoMatchAudio(text) {
  var t = text.toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, ' ').trim();

  // Positive feedback → random Nia correct clip
  var positives = ['awesome', 'super', 'great job', 'yes', 'you found', 'beautiful', 'amazing', 'wonderful', 'perfect', 'nice'];
  for (var p = 0; p < positives.length; p++) {
    if (t.indexOf(positives[p]) !== -1) {
      var idx = Math.floor(Math.random() * 4) + 1;
      return 'jj_feedback_correct' + idx + '.mp3';
    }
  }

  // Negative feedback → random try again clip
  var negatives = ['not quite', 'try again', 'thats not', 'that is not', 'not the'];
  for (var n = 0; n < negatives.length; n++) {
    if (t.indexOf(negatives[n]) !== -1) {
      var ti = Math.floor(Math.random() * 2) + 1;
      return 'jj_feedback_tryagain' + ti + '.mp3';
    }
  }

  // Completion
  if (t.indexOf('you did it') !== -1 || t.indexOf('all done') !== -1 || t.indexOf('you got') !== -1 || t.indexOf('earned') !== -1) {
    return 'jj_feedback_complete1.mp3';
  }
  if (t.indexOf('star') !== -1 && t.indexOf('bonus') !== -1) {
    return 'jj_feedback_star_earned.mp3';
  }

  // Letter-specific: "find the letter X"
  var findMatch = t.match(/find the letter ([a-z])/);
  if (findMatch) { return 'jj_find_' + findMatch[1].toUpperCase() + '.mp3'; }

  // "trace the letter X"
  var traceMatch = t.match(/trace the letter ([a-z])/);
  if (traceMatch) { return 'jj_trace_' + traceMatch[1].toUpperCase() + '.mp3'; }

  // Single letter call: "K!" or just "K"
  if (t.length <= 2 && t.match(/^[a-z]$/)) {
    return 'jj_letter_name_' + t.toUpperCase() + '.mp3';
  }

  // Single digit 1–10: route to cached number clip
  var numMatch = t.match(/^(\d{1,2})$/);
  if (numMatch) {
    var n = parseInt(numMatch[1], 10);
    if (n >= 1 && n <= 10) { return 'jj_number_' + n + '.mp3'; }
  }

  // "X is for Y" pattern
  var isForMatch = t.match(/^([a-z]) is for/);
  if (isForMatch) { return 'jj_letter_phrase_' + isForMatch[1].toUpperCase() + '.mp3'; }

  // "X says Y" pattern (letter sounds)
  var saysMatch = t.match(/^([a-z]) says/);
  if (saysMatch) { return 'jj_sound_' + saysMatch[1].toUpperCase() + '.mp3'; }

  // Number: "find the number X"
  var numFindMatch = t.match(/find the number (\d+)/);
  if (numFindMatch) {
    var num = parseInt(numFindMatch[1], 10);
    if (num >= 1 && num <= 10) { return 'jj_number_' + num + '.mp3'; }
  }

  // Bare number spoken: "1", "2", etc
  var bareNum = parseInt(t, 10);
  if (!isNaN(bareNum) && bareNum >= 1 && bareNum <= 10 && t === String(bareNum)) {
    return 'jj_number_' + bareNum + '.mp3';
  }

  // Instruction patterns
  if (t.indexOf('pick a game') !== -1) { return 'jj_instruction_pick_game.mp3'; }
  if (t.indexOf('what color') !== -1) { return 'jj_instruction_what_color.mp3'; }
  if (t.indexOf('what comes next') !== -1) { return 'jj_instruction_what_next.mp3'; }
  if (t.indexOf('tap each') !== -1 || t.indexOf('count') !== -1) { return 'jj_instruction_count.mp3'; }
  if (t.indexOf('build the name') !== -1 || t.indexOf('spell') !== -1) { return 'jj_instruction_name_game.mp3'; }

  // No match
  return null;
}

function speakOptions(options, index, callback) {

function playAudioCached(name, fallbackText) {

}

/* ═══════════════════════════════════════════════════════════
   OBJECT SCATTER
   ═══════════════════════════════════════════════════════════ */
function scatterObjects(count, areaWidth, areaHeight, minSpacing) {
  var positions = [];
  var objSize = 56;
  var maxAttempts = 100;

  for (var i = 0; i < count; i++) {
    var placed = false;
    for (var attempt = 0; attempt < maxAttempts; attempt++) {
      var x = Math.floor(Math.random() * (areaWidth - objSize - 20)) + 10;
      var y = Math.floor(Math.random() * (areaHeight - objSize - 20)) + 10;
      var collision = false;

      for (var j = 0; j < positions.length; j++) {
        var dx = x - positions[j].x;
        var dy = y - positions[j].y;
        if (Math.sqrt(dx * dx + dy * dy) < minSpacing) {
          collision = true;
          break;
        }
      }

      if (!collision) {
        positions.push({ x: x, y: y });
        placed = true;
        break;
      }
    }

    /* Fallback to grid */
    if (!placed) {
      var cols = Math.ceil(Math.sqrt(count));
      var cellW = Math.floor(areaWidth / cols);
      var cellH = Math.floor(areaHeight / Math.ceil(count / cols));
      var row = Math.floor(i / cols);
      var col = i % cols;
      positions.push({
        x: col * cellW + Math.floor(cellW / 2) - Math.floor(objSize / 2),
        y: row * cellH + Math.floor(cellH / 2) - Math.floor(objSize / 2)
      });
    }
  }

  return positions;
}

function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = a[i];
    a[i] = a[j];
    a[j] = temp;
  }
  return a;
}

function getParam(name) {
  var qs = window.location.search;
  if (!qs || qs.length < 2) return null;
  var pairs = qs.substring(1).split('&');
  for (var i = 0; i < pairs.length; i++) {
    var kv = pairs[i].split('=');
    if (kv[0] === name) return decodeURIComponent(kv[1] || '');
  }
  return null;
}

function init() {
  buildSparkleLoadingScreen();
  buildSparkleKingdomBg();

  // Free play mode — skip curriculum, show game picker (no bulk preload)
  var isFreePlay = getParam('mode') === 'freeplay' || window.location.pathname.indexOf('sparkle-free') !== -1;
  if (isFreePlay) {
    setTimeout(function() {
      hideSparkleLoading();
      renderFreePlayMenu();
    }, 1200);
    return;
  }

  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function(progress) {
        if (progress) {
          totalStars = progress.stars || 0;
          updateStarCounter();
        }
        loadContent();
      })
      .withFailureHandler(function() {
        loadContent();
      })
      .loadProgressSafe('jj');
  } else {
    loadContent();
  }

}

// ── Lazy Audio Loader — fetch only what's needed per game ──
var _audioLoaded = {}; // track which game types already loaded

function loadAudioForGame(gameType, onReady) {
  // Skip if already loaded for this game type
  if (_audioLoaded[gameType]) { if (onReady) { onReady(); } return; }

  var files = getClipsForGame(gameType);
  // Filter out already-cached clips
  var needed = [];
  for (var i = 0; i < files.length; i++) {
    if (!audioCache[files[i]]) { needed.push(files[i]); }
  }
  if (needed.length === 0) {
    _audioLoaded[gameType] = true;
    if (onReady) { onReady(); }
    return;
  }

  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    if (onReady) { onReady(); }
    return;
  }
  google.script.run
    .withSuccessHandler(function(batch) {
      if (batch) {
        for (var k in batch) {
          if (batch.hasOwnProperty(k)) {
            audioCache[k] = new Audio('data:audio/mp3;base64,' + batch[k]);
          }
        }
      }
      _audioLoaded[gameType] = true;
      if (onReady) { onReady(); }
    })
    .withFailureHandler(function() {
      _audioLoaded[gameType] = true;
      if (onReady) { onReady(); }
    })
    .getAudioBatchSafe(needed);
}

function getClipsForGame(gameType) {
  var base = [
    'jj_feedback_correct1.mp3','jj_feedback_correct2.mp3','jj_feedback_correct3.mp3','jj_feedback_correct4.mp3',
    'jj_feedback_tryagain1.mp3','jj_feedback_tryagain2.mp3',
    'jj_feedback_complete1.mp3','jj_feedback_star_earned.mp3'
  ];
  var seq = ['K','I','N','D','L','E','J','B'];
  var gameClips = [];

  if (gameType === 'find_the_letter') {
    for (var i = 0; i < seq.length; i++) { gameClips.push('jj_find_' + seq[i] + '.mp3'); }
    gameClips.push('jj_instruction_find_game.mp3');
  } else if (gameType === 'letter_trace') {
    for (var i = 0; i < seq.length; i++) { gameClips.push('jj_trace_' + seq[i] + '.mp3'); }
    gameClips.push('jj_instruction_trace_game.mp3');
  } else if (gameType === 'letter_sound') {
    for (var i = 0; i < seq.length; i++) { gameClips.push('jj_sound_' + seq[i] + '.mp3'); }
    gameClips.push('jj_instruction_sound_game.mp3');
  } else if (gameType === 'letter_intro') {
    for (var i = 0; i < seq.length; i++) {
      gameClips.push('jj_letter_name_' + seq[i] + '.mp3');
      gameClips.push('jj_letter_phrase_' + seq[i] + '.mp3');
    }
  } else if (gameType === 'name_builder') {
    gameClips.push('jj_spell_jj.mp3', 'jj_spell_kindle.mp3', 'jj_spell_next_letter.mp3', 'jj_spell_tap_letter.mp3');
    gameClips.push('jj_instruction_name_game.mp3');
  } else if (gameType === 'count_with_me') {
    for (var n = 1; n <= 10; n++) { gameClips.push('jj_number_' + n + '.mp3'); }
    gameClips.push('jj_instruction_count.mp3');
  } else if (gameType === 'color_hunt') {
    gameClips.push('jj_instruction_what_color.mp3');
  } else if (gameType === 'shape_match' || gameType === 'pattern_next' || gameType === 'more_or_less') {
    gameClips.push('jj_instruction_what_next.mp3');
  }

  return base.concat(gameClips);
}

// Curriculum mode: load clips for today's activities
function preloadCurriculumAudio(activities) {
  if (!activities || activities.length === 0) return;
  var allClips = [];
  var seen = {};
  for (var a = 0; a < activities.length; a++) {
    var clips = getClipsForGame(activities[a].type);
    for (var c = 0; c < clips.length; c++) {
      if (!seen[clips[c]]) { seen[clips[c]] = true; allClips.push(clips[c]); }
    }
  }
  if (allClips.length === 0) return;
  if (typeof google === 'undefined' || !google.script || !google.script.run) return;
  google.script.run
    .withSuccessHandler(function(batch) {
      if (batch) {
        for (var k in batch) {
          if (batch.hasOwnProperty(k)) {
            audioCache[k] = new Audio('data:audio/mp3;base64,' + batch[k]);
          }
        }
      }
    })
    .withFailureHandler(function() {})
    .getAudioBatchSafe(allClips);
}

function startFreePlayGame(type) {
  _freePlayGame = type;

  var mc = getMainContent();

  loadAudioForGame(type, function() {
    runFreePlayRound();
  });

function runFreePlayRound() {
  var letter = FREE_PLAY_LETTERS[_freePlayIdx % FREE_PLAY_LETTERS.length];
  var colors = ['red', 'blue', 'green', 'yellow', 'pink', 'purple'];
  var shapes = ['circle', 'square', 'triangle', 'star', 'heart'];
  var color = colors[_freePlayIdx % colors.length];
  var shape = shapes[_freePlayIdx % shapes.length];
  var number = (_freePlayIdx % 5) + 1;
  var type = _freePlayGame;

  // Predictive preload: at letter 4, silently fetch next batch
  if (_freePlayIdx === 4 && type.indexOf('letter') !== -1) {
    var nextBatch = FREE_PLAY_LETTERS.slice(8, 16);
    var silentClips = [];
    var prefix = type === 'find_the_letter' ? 'jj_find_' : type === 'letter_trace' ? 'jj_trace_' : type === 'letter_sound' ? 'jj_sound_' : 'jj_letter_phrase_';
    for (var b = 0; b < nextBatch.length; b++) {
      if (!audioCache[prefix + nextBatch[b] + '.mp3']) {
        silentClips.push(prefix + nextBatch[b] + '.mp3');
      }
    }
    if (silentClips.length > 0 && typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function(batch) {
          if (batch) { for (var k in batch) { if (batch.hasOwnProperty(k) && !audioCache[k]) { audioCache[k] = new Audio('data:audio/mp3;base64,' + batch[k]); } } }
        })
        .withFailureHandler(function() {})
        .getAudioBatchSafe(silentClips);
    }
  }

  var activity = { type: type, stars: 1 };

  if (type === 'find_the_letter') {
    var distractors = shuffleArray(['B', 'M', 'S', 'T', 'P', 'R']).slice(0, 3);
    distractors.push(letter);
    activity.target = letter;
    activity.options = shuffleArray(distractors);
  } else if (type === 'letter_trace') {
    activity.letter = letter;
  } else if (type === 'letter_sound') {
    var sounds = { K:'kuh', I:'ih', N:'nnn', D:'duh', L:'lll', E:'eh', J:'juh', B:'buh', A:'ah', C:'kuh', F:'fff', G:'guh', H:'huh' };
    var wordMap = { K:'Kindle', I:'Ice cream', N:'Nest', D:'Dog', L:'Lion', E:'Egg', J:'Jump', B:'Ball', A:'Apple', C:'Cat', F:'Fish', G:'Goat', H:'Hat' };
    activity.letter = letter;
    activity.sound = sounds[letter] || 'ah';
    activity.words = [wordMap[letter] || 'Apple'];
  } else if (type === 'name_builder') {
    activity.target = _freePlayIdx % 2 === 0 ? 'JJ' : 'KINDLE';
  } else if (type === 'count_with_me') {
    activity.count = number;
    activity.shape = shape;
    activity.color = color;
  } else if (type === 'color_hunt') {
    activity.targetColor = color;
    activity.count = 4;
  } else if (type === 'shape_match') {
    activity.target = shape;
    var shapeOpts = shuffleArray(shapes).slice(0, 4);
    if (shapeOpts.indexOf(shape) === -1) { shapeOpts[0] = shape; shapeOpts = shuffleArray(shapeOpts); }
    activity.options = shapeOpts;
  } else if (type === 'pattern_next') {
    var patternSets = [
      { pattern: [{shape:'circle',color:'red'},{shape:'square',color:'blue'},{shape:'circle',color:'red'},{shape:'square',color:'blue'}], answer: {shape:'circle',color:'red'}, options: [{shape:'circle',color:'red'},{shape:'triangle',color:'green'},{shape:'square',color:'yellow'}] },
      { pattern: [{shape:'triangle',color:'green'},{shape:'circle',color:'pink'},{shape:'triangle',color:'green'},{shape:'circle',color:'pink'}], answer: {shape:'triangle',color:'green'}, options: [{shape:'triangle',color:'green'},{shape:'star',color:'blue'},{shape:'heart',color:'red'}] },
      { pattern: [{shape:'star',color:'yellow'},{shape:'star',color:'yellow'},{shape:'heart',color:'red'},{shape:'star',color:'yellow'},{shape:'star',color:'yellow'}], answer: {shape:'heart',color:'red'}, options: [{shape:'heart',color:'red'},{shape:'circle',color:'blue'},{shape:'star',color:'yellow'}] },
      { pattern: [{shape:'square',color:'blue'},{shape:'circle',color:'red'},{shape:'square',color:'blue'},{shape:'circle',color:'red'}], answer: {shape:'square',color:'blue'}, options: [{shape:'square',color:'blue'},{shape:'heart',color:'pink'},{shape:'triangle',color:'green'}] },
      { pattern: [{shape:'heart',color:'pink'},{shape:'star',color:'yellow'},{shape:'heart',color:'pink'},{shape:'star',color:'yellow'}], answer: {shape:'heart',color:'pink'}, options: [{shape:'heart',color:'pink'},{shape:'circle',color:'red'},{shape:'square',color:'blue'}] }
    ];
    var ps = patternSets[_freePlayIdx % patternSets.length];
    activity.pattern = ps.pattern;
    activity.answer = ps.answer;
    activity.options = ps.options;
  } else if (type === 'more_or_less') {
    var a = (_freePlayIdx % 4) + 1;
    var b = a + (_freePlayIdx % 3) + 1;
    activity.groupA = { count: a, shape: 'star' };
    activity.groupB = { count: b, shape: 'heart' };
    activity.mode = _freePlayIdx % 2 === 0 ? 'more' : 'less';
  }

  currentActivityIndex = 0;
  todayContent = { activities: [activity] };
  renderActivity(0);

  // Add back-to-menu button
  var mc = getMainContent();
  var backBtn = document.createElement('div');
  backBtn.style.cssText = 'text-align:center;margin-top:16px;';
  backBtn.innerHTML = '<button onclick="_freePlayGame=null;_freePlayIdx=0;renderFreePlayMenu()" style="padding:10px 24px;border-radius:999px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#f9a8d4;font-size:14px;font-weight:600;cursor:pointer;font-family:Nunito,sans-serif;">&#8592; Pick Different Game</button>';
  mc.appendChild(backBtn);
}

function loadContent() {
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function(content) {
        if (content && content.content && content.content.activities) {
          todayContent = content.content;
          // Cap at 10 activities per session — 15 is too long for pre-K
          if (todayContent.activities.length > 10) {
            todayContent.activities = todayContent.activities.slice(0, 10);
          }
          preloadCurriculumAudio(todayContent.activities);
          showReadyScreen(todayContent);
        } else {
          showFallback();
        }
      })
      .withFailureHandler(function() {
        showFallback();
      })
      .getTodayContentSafe('jj');
  } else {
    showFallback();
  }
}

/* ═══════════════════════════════════════════════════════════
   READY SCREEN
   ═══════════════════════════════════════════════════════════ */
function showReadyScreen(content) {
  hideSparkleLoading();
  var mc = getMainContent();
  var actCount = content.activities ? content.activities.length : 0;
  var html = '<div class="ready-screen">';
  html += '<div class="ready-title">&#10024; SparkleLearn &#10024;</div>';
  html += '<p class="ready-subtitle">Hi JJ! You have ' + actCount + ' sparkle games today!</p>';
  html += '<div class="activity-preview">';
  for (var i = 0; i < actCount; i++) {
    html += '<div class="preview-dot"></div>';
  }
  html += '</div>';
  html += '<button class="btn-big btn-pink" onclick="startSession()" style="font-size:36px;padding:20px 48px;margin-top:20px;">';
  html += "Let's Play! &#127775;</button>";
  html += '</div>';
  mc.innerHTML = html;

  playAudioCached('jj_instruction_welcome.mp3', content.audioIntro || 'Time for sparkle learning!');
}

function validateActivities(activities) {
  for (var i = 0; i < activities.length; i++) {
    if (KNOWN_ACTIVITY_TYPES.indexOf(activities[i].type) === -1) {
      console.warn('Unknown activity type: ' + activities[i].type + ' at index ' + i);
    }
  }
}

function startSession() {
  currentActivityIndex = 0;
  completedActivities = [];
  updateProgressBar();
  validateActivities(todayContent.activities);
  renderActivity(currentActivityIndex);
}

/* ═══════════════════════════════════════════════════════════
   ACTIVITY ROUTER
   ═══════════════════════════════════════════════════════════ */
function renderActivity(index) {
  if (!todayContent || !todayContent.activities) { return; }
  if (index >= todayContent.activities.length) {
    showSessionComplete();
    return;
  }

  setMascotVisible(true);
  currentActivityIndex = index;
  activityLocked = false;
  updateProgressBar();

  var activity = todayContent.activities[index];
  var type = activity.type;

  switch (type) {
    case 'letter_intro':       renderLetterIntro(activity); break;
    case 'find_letter':
    case 'find_the_letter':    renderFindLetter(activity); break;
    case 'find_number':
    case 'find_the_number':    renderFindNumber(activity); break;
    case 'count_with_me':      renderCountWithMe(activity); break;
    case 'quantity_match':
    case 'quantity_matching':  renderQuantityMatch(activity); break;
    case 'color_hunt':         renderColorHunt(activity); break;
    case 'shape_match':        renderShapeMatch(activity); break;
    case 'pattern_next':
    case 'pattern_completion': renderPatternNext(activity); break;
    case 'letter_sound':
    case 'what_sound':         renderLetterSound(activity); break;
    case 'beginning_sound':    renderBeginningSound(activity); break;
    case 'letter_trace':       renderLetterTrace(activity); break;
    case 'number_trace':       renderNumberTrace(activity); break;
    case 'audio_story':
    case 'story_listen':       renderAudioStory(activity); break;
    case 'color_sort':         renderColorSort(activity); break;
    case 'more_or_less':       renderMoreOrLess(activity); break;
    case 'name_builder':       renderNameBuilder(activity); break;
    case 'celebration':
    case 'star_celebration':   renderCelebration(activity); break;
    case 'sparkle_challenge':  renderSparkleChallenge(activity); break;
    case 'free_draw':
      var fdMc = getMainContent();
      fdMc.innerHTML = '<div class="activity-card"><p class="instruction">' + escapeHtml(activity.prompt || 'Free draw time!') + '</p>' +
        '<div style="background:#1a1040;border:2px solid rgba(255,255,255,0.2);border-radius:16px;height:200px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:18px">Draw on paper, then tap Done!</div>' +
        '<button class="btn-big btn-green" onclick="advanceActivity(' + (activity.stars || 1) + ')" style="margin-top:16px">Done!</button></div>';
      speak(activity.prompt || 'Free draw time! Draw on paper, then tap done!');
      break;
    default:
      /* Skip unknown types */
      advanceActivity(activity.stars || 0);
  }
}

function advanceActivity(starsEarned) {
  completedActivities.push({
    index: currentActivityIndex,
    starsEarned: starsEarned || 0
  });
  totalStars += (starsEarned || 0);
  updateStarCounter();

  if (_freePlayMode && _freePlayGame) {
    _freePlayIdx++;
    setTimeout(function() { runFreePlayRound(); }, 800);
    return;
  }
  if (_freePlayMode) {
    setTimeout(function() { renderFreePlayMenu(); }, 800);
    return;
  }

  setTimeout(function() {
    renderActivity(currentActivityIndex + 1);
  }, 600);
}

function handleCorrectAnswer(activity, el) {
  if (activityLocked) { return; }
  activityLocked = true;

  if (el) {
    el.className += ' correct';
    var rect = el.getBoundingClientRect();
    spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 12);
  }

  playAudioCached('jj_feedback_correct1.mp3', 'Correct!');
  showFeedback('Great job!', true);
  var celebClips = ['jj_feedback_correct1.mp3','jj_feedback_correct2.mp3','jj_feedback_correct3.mp3','jj_feedback_correct4.mp3','jj_feedback_correct5.mp3','jj_feedback_correct6.mp3','jj_feedback_correct7.mp3','jj_feedback_correct8.mp3'];
  setTimeout(function() {
    playAudioCached(celebClips[Math.floor(Math.random() * celebClips.length)], 'Great job!');
    setTimeout(function() {
      advanceActivity(activity.stars || 1);
    }, 1200);
  }, 500);
}

function handleWrongAnswer(el) {
  if (activityLocked) { return; }
  if (el) { el.className += ' wrong'; }
  var tryClips = ['jj_feedback_tryagain1.mp3','jj_feedback_tryagain2.mp3','jj_feedback_tryagain3.mp3','jj_feedback_tryagain4.mp3'];
  playAudioCached(tryClips[Math.floor(Math.random() * tryClips.length)], 'Try again!');
  setTimeout(function() {
    if (el) {
      el.className = el.className.replace(' wrong', '');
    }
  }, 600);
}

/* ═══════════════════════════════════════════════════════════
   ACTIVITY 1: LETTER INTRO
   ═══════════════════════════════════════════════════════════ */
function renderLetterIntro(activity) {
  var mc = getMainContent();
  var letter = activity.letter || 'A';
  var words = activity.words || (activity.word ? [activity.word] : ['Apple', 'Ant', 'Alligator']);

  var html = '<div class="activity-card">';
  html += '<p class="instruction">Meet the letter:</p>';
  html += '<div class="big-letter">' + letter.toUpperCase() + '</div>';
  html += '<p class="instruction" style="font-size:20px;">and lowercase: <span style="font-size:80px;color:#a855f7;">' + letter.toLowerCase() + '</span></p>';
  html += '<div class="word-cards">';
  for (var i = 0; i < words.length; i++) {
    html += '<div class="word-card" onclick="speak(\'' + words[i].replace(/'/g, "\\'") + '\')">' + escapeHtml(words[i]) + '</div>';
  }
  html += '</div>';
  html += '<button class="btn-big btn-green" onclick="handleLetterIntroDone()" style="margin-top:20px;">I got it! &#128077;</button>';
  html += '</div>';
  mc.innerHTML = html;

  /* Track letter */
  if (lettersCompleted.indexOf(letter.toUpperCase()) === -1) {
    lettersCompleted.push(letter.toUpperCase());
  }

  playAudioCached('jj_letter_name_' + letter.toUpperCase() + '.mp3', activity.audioPhrase || ('This is the letter ' + letter.toUpperCase()));
  setTimeout(function() {
    speak(letter.toUpperCase() + " is for " + words.join(", and "), 'jj_letter_phrase_' + letter.toUpperCase() + '.mp3');
  }, 1500);
}

function handleLetterIntroDone() {
  if (activityLocked) { return; }
  activityLocked = true;
  var act = todayContent.activities[currentActivityIndex];
  showFeedback('Awesome!', true);
  speak("Awesome!", function() {
    advanceActivity(act.stars || 1);
  });
}

/* ═══════════════════════════════════════════════════════════
   ACTIVITY 2: FIND LETTER
   ═══════════════════════════════════════════════════════════ */
function renderFindLetter(activity) {
  var mc = getMainContent();
  var target = activity.target || 'A';
  var options = activity.options || ['A', 'B', 'C', 'D'];

  var html = '<div class="activity-card">';
  html += '<p class="instruction">Find the letter:</p>';
  html += '<div class="big-letter" style="font-size:100px;">' + target.toUpperCase() + '</div>';
  html += '<div class="grid-2x2">';
  for (var i = 0; i < options.length; i++) {
    html += '<button class="option-btn" onclick="checkFindLetter(this, \'' + options[i] + '\', \'' + target + '\')">' + options[i].toUpperCase() + '</button>';
  }
  html += '</div></div>';
  mc.innerHTML = html;

  speak("Find the letter " + target.toUpperCase() + "!", 'jj_find_' + target.toUpperCase() + '.mp3', function() {
    speakOptions(options, 0);
  });
}

function checkFindLetter(el, chosen, target) {
  if (chosen.toUpperCase() === target.toUpperCase()) {
    handleCorrectAnswer(todayContent.activities[currentActivityIndex], el);
  } else {
    handleWrongAnswer(el);
  }
}

/* ═══════════════════════════════════════════════════════════
   ACTIVITY 3: FIND NUMBER
   ═══════════════════════════════════════════════════════════ */
function renderFindNumber(activity) {
  var mc = getMainContent();
  var target = activity.target || '3';
  var options = activity.options || ['1', '2', '3', '4'];

  var html = '<div class="activity-card">';
  html += '<p class="instruction">Find the number:</p>';
  html += '<div class="big-letter" style="font-size:100px;">' + String(target) + '</div>';
  html += '<div class="grid-2x2">';
  for (var i = 0; i < options.length; i++) {
    html += '<button class="option-btn" onclick="checkFindNumber(this, \'' + options[i] + '\', \'' + target + '\')">' + String(options[i]) + '</button>';
  }
  html += '</div></div>';
  mc.innerHTML = html;

  var numKey = (parseInt(target, 10) >= 1 && parseInt(target, 10) <= 10) ? 'jj_number_' + target + '.mp3' : null;
  speak("Find the number " + target + "!", numKey, function() {
    var labels = [];
    for (var j = 0; j < options.length; j++) { labels.push(String(options[j])); }
    speakOptions(labels, 0);
  });
}

function checkFindNumber(el, chosen, target) {
  if (String(chosen) === String(target)) {
    handleCorrectAnswer(todayContent.activities[currentActivityIndex], el);
  } else {
    handleWrongAnswer(el);
  }
}

/* ═══════════════════════════════════════════════════════════
   ACTIVITY 4: COUNT WITH ME
   ═══════════════════════════════════════════════════════════ */
function renderCountWithMe(activity) {
  var mc = getMainContent();
  var count = activity.count || activity.targetNumber || 5;
  var shape = activity.shape || activity.objects || 'star';
  var color = activity.color || 'pink';

  countState = { total: count, tapped: 0, done: false };

  var html = '<div class="activity-card">';
  html += '<p class="instruction">Tap each ' + escapeHtml(shape) + ' to count!</p>';
  html += '<div class="scatter-area" id="scatterArea">';

  var positions = scatterObjects(count, 320, 280, 80);
  for (var i = 0; i < count; i++) {
    html += '<div class="scatter-obj" id="countObj' + i + '" ';
    html += 'style="left:' + positions[i].x + 'px;top:' + positions[i].y + 'px;" ';
    html += 'onclick="tapCountObject(' + i + ')">';
    html += renderShape(shape, color, 56);
    html += '</div>';
  }
  html += '</div></div>';
  mc.innerHTML = html;

  speak("Tap each " + shape + " to count them! There are " + count + "!");
}

function tapCountObject(idx) {
  if (countState.done) { return; }
  var el = document.getElementById('countObj' + idx);
  if (!el || el.className.indexOf('counted') !== -1) { return; }

  countState.tapped++;
  el.className += ' tapped counted';
  showCountBadge(countState.tapped);
  if (countState.tapped <= 10) {
    playAudioCached('jj_number_' + countState.tapped + '.mp3', String(countState.tapped));
  } else {
    speak(String(countState.tapped));
  }

  var rect = el.getBoundingClientRect();
  spawnSparkles(rect.left + 28, rect.top + 28, 5);

  if (countState.tapped >= countState.total) {
    countState.done = true;
    setTimeout(function() {
      handleCorrectAnswer(todayContent.activities[currentActivityIndex], null);
    }, 800);
  }
}

/* ═══════════════════════════════════════════════════════════
   ACTIVITY 5: QUANTITY MATCH (tap-tap)
   ═══════════════════════════════════════════════════════════ */
function renderQuantityMatch(activity) {
  var mc = getMainContent();
  var groups = activity.groups;
  if (!groups && activity.numbers) {
    groups = [];
    for (var ni = 0; ni < activity.numbers.length; ni++) {
      groups.push({ dots: activity.numbers[ni], numeral: String(activity.numbers[ni]) });
    }
  }
  if (!groups) { groups = [{ dots: 3, numeral: '3' }, { dots: 5, numeral: '5' }, { dots: 2, numeral: '2' }]; }

  var qmState = { phase: 'dots', selectedDots: null, pairsLeft: groups.length, groups: groups };
  window._qmState = qmState;

  var html = '<div class="activity-card">';
  html += '<p class="instruction">Tap the dots, then tap the matching number!</p>';
  html += '<div style="display:-webkit-flex;display:flex;-webkit-justify-content:space-around;justify-content:space-around;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:16px;">';

  /* Dot groups */
  html += '<div>';
  html += '<p style="font-size:18px;color:#e0d4f5;margin-bottom:8px;">Dots</p>';
  var shuffledG = shuffleArray(groups);
  for (var i = 0; i < shuffledG.length; i++) {
    html += '<button class="option-btn" id="qmDots' + i + '" style="display:block;margin:8px auto;min-width:100px;font-size:18px;" ';
    html += 'onclick="tapQmDots(' + i + ',' + shuffledG[i].dots + ')">';
    for (var d = 0; d < shuffledG[i].dots; d++) {
      html += '&#9679; ';
    }
    html += '</button>';
  }
  html += '</div>';

  /* Numeral buttons */
  html += '<div>';
  html += '<p style="font-size:18px;color:#e0d4f5;margin-bottom:8px;">Numbers</p>';
  var shuffledN = shuffleArray(groups);
  for (var j = 0; j < shuffledN.length; j++) {
    html += '<button class="option-btn" id="qmNum' + j + '" style="display:block;margin:8px auto;min-width:100px;" ';
    html += 'onclick="tapQmNum(' + j + ',' + shuffledN[j].dots + ')">' + escapeHtml(shuffledN[j].numeral) + '</button>';
  }
  html += '</div>';

  html += '</div></div>';
  mc.innerHTML = html;

  window._qmShuffledG = shuffledG;
  window._qmShuffledN = shuffledN;

  speak("Tap the dots, then tap the matching number!");
}

function tapQmDots(idx, dotCount) {
  var st = window._qmState;
  if (!st || st.phase !== 'dots') { return; }
  var el = document.getElementById('qmDots' + idx);
  if (!el || el.className.indexOf('correct') !== -1) { return; }

  /* Deselect previous */
  var all = document.querySelectorAll('[id^=qmDots]');
  for (var i = 0; i < all.length; i++) {
    all[i].className = all[i].className.replace(' selected', '');
  }

  el.className += ' selected';
  st.selectedDots = dotCount;
  st.selectedDotsIdx = idx;
  st.phase = 'num';
  speak(dotCount + " dots. Now find the number " + dotCount + "!");
}

function tapQmNum(idx, dotCount) {
  var st = window._qmState;
  if (!st || st.phase !== 'num') { return; }
  var el = document.getElementById('qmNum' + idx);
  if (!el || el.className.indexOf('correct') !== -1) { return; }

  if (dotCount === st.selectedDots) {
    el.className += ' correct';
    var dotsEl = document.getElementById('qmDots' + st.selectedDotsIdx);
    if (dotsEl) { dotsEl.className += ' correct'; }
    st.pairsLeft--;
    st.phase = 'dots';
    st.selectedDots = null;

    if (st.pairsLeft <= 0) {
      handleCorrectAnswer(todayContent.activities[currentActivityIndex], el);
    } else {
      speak("Yes! " + dotCount + "! Find the next match!");
      spawnSparkles(el.getBoundingClientRect().left + 50, el.getBoundingClientRect().top + 40, 8);
    }
  } else {
    handleWrongAnswer(el);
    st.phase = 'dots';
    st.selectedDots = null;
    var prevDots = document.getElementById('qmDots' + st.selectedDotsIdx);
    if (prevDots) { prevDots.className = prevDots.className.replace(' selected', ''); }
  }
}

/* ═══════════════════════════════════════════════════════════
   ACTIVITY 6: COLOR HUNT
   ═══════════════════════════════════════════════════════════ */
function renderColorHunt(activity) {
  var mc = getMainContent();
  var targetColor = activity.targetColor || 'red';
  var shapes = activity.shapes || [];
  /* shapes: [{shape:'circle', color:'red'}, {shape:'square', color:'blue'}, ...] */

  if (shapes.length === 0) {
    /* Generate default */
    var allColors = ['red', 'blue', 'green', 'yellow', 'purple'];
    for (var g = 0; g < 8; g++) {
      shapes.push({
        shape: ['circle', 'star', 'heart', 'square'][Math.floor(Math.random() * 4)],
        color: g < 3 ? targetColor : allColors[Math.floor(Math.random() * allColors.length)]
      });
    }
  }

  var targetCount = 0;
  for (var t = 0; t < shapes.length; t++) {
    if (shapes[t].color === targetColor) { targetCount++; }
  }

  window._chState = { targetColor: targetColor, found: 0, total: targetCount };

  var html = '<div class="activity-card">';
  html += '<p class="instruction">Tap all the <span style="color:' + (COLOR_MAP[targetColor] || targetColor) + ';font-weight:800;">' + escapeHtml(targetColor) + '</span> shapes!</p>';
  html += '<div class="scatter-area" id="colorHuntArea">';

  var positions = scatterObjects(shapes.length, 320, 280, 80);
  for (var i = 0; i < shapes.length; i++) {
    html += '<div class="scatter-obj" id="chObj' + i + '" ';
    html += 'style="left:' + positions[i].x + 'px;top:' + positions[i].y + 'px;" ';
    html += 'onclick="tapColorHunt(' + i + ',\'' + shapes[i].color + '\')">';
    html += renderShape(shapes[i].shape, shapes[i].color, 56);
    html += '</div>';
  }

  html += '</div></div>';
  mc.innerHTML = html;

  speak("Find all the " + targetColor + " shapes! Tap them!");
}

function tapColorHunt(idx, color) {
  var st = window._chState;
  if (!st) { return; }
  var el = document.getElementById('chObj' + idx);
  if (!el || el.className.indexOf('tapped') !== -1) { return; }

  if (color === st.targetColor) {
    el.className += ' tapped';
    st.found++;
    var rect = el.getBoundingClientRect();
    spawnSparkles(rect.left + 28, rect.top + 28, 6);
    speak("Yes!");

    if (st.found >= st.total) {
      setTimeout(function() {
        handleCorrectAnswer(todayContent.activities[currentActivityIndex], null);
      }, 500);
    }
  } else {
    speak("That one is not " + st.targetColor + ". Try again!");
  }
}

/* ═══════════════════════════════════════════════════════════
   ACTIVITY 7: SHAPE MATCH
   ═══════════════════════════════════════════════════════════ */
function renderShapeMatch(activity) {
  var mc = getMainContent();
  var target = activity.target || 'star';
  var options = activity.options || ['circle', 'star', 'triangle', 'square'];

  // Safety: ensure target is always among the tappable options
  var hasTarget = false;
  for (var k = 0; k < options.length; k++) {
    if (options[k] === target) { hasTarget = true; break; }
  }
  if (!hasTarget) {
    if (options.length >= 4) { options[0] = target; } else { options.push(target); }
    options = shuffleArray(options);
  }

  var html = '<div class="activity-card">';
  html += '<p class="instruction">Find the shape:</p>';
  html += '<div style="margin:16px 0;">' + renderShape(target, 'gold', 120) + '</div>';
  html += '<p class="instruction" style="font-size:20px;">Which one is the ' + escapeHtml(target) + '?</p>';
  html += '<div class="grid-2x2">';
  for (var i = 0; i < options.length; i++) {
    html += '<button class="option-btn" style="padding:12px;" onclick="checkShapeMatch(this,\'' + options[i] + '\',\'' + target + '\')">';
    html += renderShape(options[i], 'pink', 80);
    html += '</button>';

   ACTIVITY 11: LETTER TRACE
   ═══════════════════════════════════════════════════════════ */
function setMascotVisible(visible) {
  var img = document.querySelector('#sparkle-bg img');
  if (img) { img.style.opacity = visible ? '1' : '0'; }
}

function renderLetterTrace(activity) {
  setMascotVisible(false);
  var mc = getMainContent();
  var letter = activity.letter || 'A';

  var html = '<div class="activity-card">';
  html += '<p class="instruction">Trace the letter with your finger!</p>';
  html += '<div class="trace-canvas-wrap" id="traceWrap">';
  html += '<canvas id="traceCanvas" width="300" height="350"></canvas>';
  html += '</div>';
  html += '<div style="display:-webkit-flex;display:flex;-webkit-justify-content:center;justify-content:center;gap:12px;margin-top:12px;">';
  html += '<button class="btn-big btn-purple" onclick="clearTraceCanvas()">Try Again</button>';
  html += '<button class="btn-big btn-green" onclick="handleTraceDone()">Done! &#128077;</button>';
  html += '</div></div>';
  mc.innerHTML = html;

  traceState = { drawing: false, letter: letter };

  setTimeout(function() {
    var canvas = document.getElementById('traceCanvas');
    if (!canvas) { return; }
    var ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    /* Draw guide letter */
    ctx.fillStyle = 'rgba(168,85,247,0.15)';
    ctx.font = 'bold ' + Math.floor(canvas.height * 0.75) + 'px Fredoka One, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(letter.toUpperCase(), canvas.width / 2, canvas.height / 2);

    /* Touch drawing */
    ctx.strokeStyle = '#ec4899';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    var getPos = function(e) {
      var rect = canvas.getBoundingClientRect();
      var touch = e.touches ? e.touches[0] : e;
      return {
        x: (touch.clientX - rect.left) * (canvas.width / rect.width),
        y: (touch.clientY - rect.top) * (canvas.height / rect.height)
      };
    };

    canvas.addEventListener('touchstart', function(e) {
      e.preventDefault();
      traceState.drawing = true;
      var pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    });
    canvas.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (!traceState.drawing) { return; }
      var pos = getPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    });
    canvas.addEventListener('touchend', function(e) {
      e.preventDefault();
      traceState.drawing = false;
    });

    /* Mouse fallback */
    canvas.addEventListener('mousedown', function(e) {
      traceState.drawing = true;
      var pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    });
    canvas.addEventListener('mousemove', function(e) {
      if (!traceState.drawing) { return; }
      var pos = getPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    });
    canvas.addEventListener('mouseup', function() { traceState.drawing = false; });
  }, 100);

  speak("Trace the letter " + letter.toUpperCase() + " with your finger! Follow the purple shape!", 'jj_trace_' + letter.toUpperCase() + '.mp3');
}

function clearTraceCanvas() {
  var canvas = document.getElementById('traceCanvas');
  if (!canvas) { return; }
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  /* Redraw guide */
  ctx.fillStyle = 'rgba(168,85,247,0.15)';
  ctx.font = 'bold ' + Math.floor(canvas.height * 0.75) + 'px Fredoka One, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(traceState.letter.toUpperCase(), canvas.width / 2, canvas.height / 2);

  ctx.strokeStyle = '#ec4899';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  speak("Try again! Trace the letter " + traceState.letter.toUpperCase());
}

function tapSortItem(idx, color) {

  el.className += ' selected';

function tapSortBin(binIdx, binColor) {
  if (!sortState.selectedItem) {
    speak("First tap a shape!");
    return;
  }

  var binEl = document.getElementById('sortBin' + binIdx);
  var itemEl = document.getElementById('sortItem' + sortState.selectedItem.idx);

  if (sortState.selectedItem.color === binColor) {
    if (itemEl) { itemEl.className += ' correct'; itemEl.style.opacity = '0.3'; }
    if (binEl) { binEl.className += ' selected-bin'; }
    sortState.remaining--;
    sortState.selectedItem = null;

    if (sortState.remaining <= 0) {
      handleCorrectAnswer(todayContent.activities[currentActivityIndex], binEl);
    } else {
      spawnSparkles(binEl.getBoundingClientRect().left + 40, binEl.getBoundingClientRect().top + 40, 6);
      speak("Yes! Pick another shape!");
    }
  } else {
    speak("That bin is " + binColor + ". Try the " + sortState.selectedItem.color + " bin!");
    if (itemEl) { itemEl.className = itemEl.className.replace(' selected', ''); }
    sortState.selectedItem = null;

/* ═══════════════════════════════════════════════════════════
   ACTIVITY 16: NAME BUILDER
   ═══════════════════════════════════════════════════════════ */
function renderNameBuilder(activity) {
  var mc = getMainContent();
  var target = (activity.target || activity.name || 'JJ').toUpperCase();
  var letters = activity.letters || null;

  if (!letters) {
    /* Build shuffled letter bank from target + random extras */
    var pool = target.split('');
    var extras = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    while (pool.length < target.length + 3) {
      var randChar = extras.charAt(Math.floor(Math.random() * extras.length));
      if (pool.indexOf(randChar) === -1 || pool.length < target.length + 2) {
        pool.push(randChar);
      }
    }
    letters = shuffleArray(pool);
  }

  nameState = {
    target: target,
    progress: '',
    bankUsed: []
  };

  var html = '<div class="activity-card">';
  html += '<p class="instruction">Build the name: <span style="color:#ec4899;font-size:32px;">' + escapeHtml(target) + '</span></p>';

  /* Slots */
  html += '<div class="name-slots" id="nameSlots">';
  for (var s = 0; s < target.length; s++) {
    html += '<div class="name-slot" id="nameSlot' + s + '"></div>';
  }
  html += '</div>';

  /* Letter bank */
  html += '<div class="letter-bank" id="nameBank">';
  for (var i = 0; i < letters.length; i++) {
    html += '<button class="letter-bank-btn" id="bankBtn' + i + '" ';
    html += 'onclick="tapNameLetter(' + i + ',\'' + letters[i] + '\')">' + letters[i] + '</button>';
  }
  html += '</div></div>';
  mc.innerHTML = html;

  var spellKey = target === 'JJ' ? 'jj_spell_jj.mp3' : (target === 'KINDLE' ? 'jj_spell_kindle.mp3' : null);
  speak("Build the name " + target + "! Tap the letters in order. First, find " + target.charAt(0) + "!", spellKey);
}

function tapNameLetter(bankIdx, letter) {
  var nextIdx = nameState.progress.length;
  if (nextIdx >= nameState.target.length) { return; }

  var expected = nameState.target.charAt(nextIdx);
  if (letter === expected) {
    nameState.progress += letter;
    nameState.bankUsed.push(bankIdx);

    /* Fill slot */
    var slot = document.getElementById('nameSlot' + nextIdx);
    if (slot) {
      slot.textContent = letter;
      slot.className += ' filled';
    }

    /* Disable bank button */
    var btn = document.getElementById('bankBtn' + bankIdx);
    if (btn) { btn.className += ' used'; }

    spawnSparkles(slot.getBoundingClientRect().left + 28, slot.getBoundingClientRect().top + 32, 5);
    speak(letter + "!");

    /* Check complete */
    if (nameState.progress.length >= nameState.target.length) {
      setTimeout(function() {
        handleCorrectAnswer(todayContent.activities[currentActivityIndex], null);
      }, 500);
    } else {
      var nextExpected = nameState.target.charAt(nameState.progress.length);
      setTimeout(function() {
        speak("Now find " + nextExpected + "!");
      }, 400);
    }
  } else {
    var btn2 = document.getElementById('bankBtn' + bankIdx);
    handleWrongAnswer(btn2);
    speak("That is " + letter + ". Find " + expected + "!");
  }
}

/* ═══════════════════════════════════════════════════════════
   ACTIVITY 17: CELEBRATION
   ═══════════════════════════════════════════════════════════ */
/* ═══ SPARKLE CHALLENGE — multi-question MC quiz ═══ */
function renderSparkleChallenge(activity) {
  var mc = getMainContent();
  var qs = activity.questions || [];
  if (!qs.length) { advanceActivity(activity.stars || 2); return; }
  var qIdx = 0;
  var correct = 0;

  function showQ() {
    if (qIdx >= qs.length) {
      var html = '<div class="activity-card">';
      html += '<p class="instruction" style="font-size:28px;">' + escapeHtml(correct + '/' + qs.length + ' correct!') + '</p>';
      html += '<button class="btn-big btn-green" onclick="advanceActivity(' + (activity.stars || 2) + ')" style="margin-top:20px;">Next! &#x2728;</button>';
      html += '</div>';
      mc.innerHTML = html;
      speak('You got ' + correct + ' out of ' + qs.length + '!');
      return;
    }
    var q = qs[qIdx];
    var html = '<div class="activity-card">';
    html += '<p class="instruction">' + escapeHtml(q.prompt || 'Pick the answer:') + '</p>';
    html += '<div style="display:flex;flex-direction:column;gap:12px;margin-top:16px">';
    for (var i = 0; i < (q.options || []).length; i++) {
      html += '<button class="btn-big" style="min-height:64px;font-size:22px;" onclick="handleSC(' + i + ')">' + escapeHtml(q.options[i]) + '</button>';
    }
    html += '</div></div>';
    mc.innerHTML = html;
    speak(q.prompt || 'Pick the answer', function() {
      speakOptions(q.options || [], 0);
    });
  }

  window.handleSC = function(idx) {
    var q = qs[qIdx];
    var picked = q.options[idx];
    if (String(picked) === String(q.answer)) {
      correct++;
      speak('Yes! ' + picked + '!', function() { qIdx++; showQ(); });
    } else {
      speak('Not quite. The answer is ' + q.answer, function() { qIdx++; showQ(); });
    }
  };

  showQ();
}

function renderCelebration(activity) {
  var mc = getMainContent();
  var message = activity.message || 'You are a superstar!';
  var starsAwarded = activity.stars || 3;

  var html = '<div class="celebration-wrap">';
  html += '<div class="celebration-stars">&#11088;&#11088;&#11088;</div>';
  html += '<div class="ready-title" style="font-size:48px;">' + escapeHtml(message) + '</div>';
  html += '<p class="instruction">You earned ' + starsAwarded + ' bonus stars!</p>';
  html += '<button class="btn-big btn-gold" onclick="handleCelebrationDone()" style="font-size:32px;margin-top:24px;">';
  html += 'Yay! &#127881;</button>';
  html += '</div>';
  mc.innerHTML = html;

  launchConfetti();
  playAudioCached('celebration.mp3');
  speak(message + " You earned " + starsAwarded + " bonus stars!");
}

function handleCelebrationDone() {
  if (activityLocked) { return; }
  activityLocked = true;
  var act = todayContent.activities[currentActivityIndex];
  advanceActivity(act.stars || 3);
}

/* ═══════════════════════════════════════════════════════════
   SESSION COMPLETE
   ═══════════════════════════════════════════════════════════ */
function showSessionComplete() {
  var sessionStars = 0;
  for (var i = 0; i < completedActivities.length; i++) {
    sessionStars += (completedActivities[i].starsEarned || 0);
  }

  /* Save progress + award rings */
  if (TBM_TEST_MODE) {
    console.log('[TEST MODE] saveProgressSafe skipped');
    console.log('[TEST MODE] awardRingsSafe skipped, rings=' + sessionStars);
  } else if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function() {})
      .withFailureHandler(function(e) { console.error('Save:', e); })
      .saveProgressSafe({
        child: 'jj',
        stars: totalStars,
        lettersCompleted: lettersCompleted
      });
    google.script.run
      .withSuccessHandler(function() {})
      .withFailureHandler(function(e) { console.error('Award:', e); })
      .awardRingsSafe('jj', sessionStars, 'sparkle-learn');
    // v12: Log session to Notion Sparkle Progress DB
    var sparkleSubject = lettersCompleted.length > 0 ? 'Letters' : 'Numbers';
    google.script.run
      .withSuccessHandler(function() { console.log('Sparkle progress logged to Notion'); })
      .withFailureHandler(function(err) { console.error('Sparkle log failed:', err.message); })
      .logSparkleProgressSafe({
        activity: 'SparkleLearn Session',
        subject: sparkleSubject,
        score: sessionStars,
        date: new Date().toISOString().slice(0, 10)
      });
  }

  showCelebrationScreen(sessionStars);
}

function showCelebrationScreen(sessionStars) {
  var mc = getMainContent();
  var bar = document.getElementById('progressBar');
  if (bar) { bar.style.width = '100%'; }

  launchConfetti();

  var html = '<div class="celebration-wrap">';
  html += '<div class="celebration-stars" style="font-size:100px;">&#127775;&#11088;&#127775;</div>';
  html += '<div class="ready-title" style="font-size:44px;">All Done!</div>';
  html += '<p class="instruction" style="font-size:28px;">You earned <span style="color:#fde68a;font-size:36px;">' + sessionStars + '</span> stars today!</p>';
  html += '<p class="instruction" style="font-size:22px;">Total stars: <span style="color:#fde68a;">' + totalStars + '</span></p>';

  /* Star explosion */
  html += '<div style="margin:24px 0;">';
  for (var i = 0; i < Math.min(sessionStars, 10); i++) {
    html += '<span style="font-size:48px;display:inline-block;margin:4px;-webkit-animation:celebSpin 2s ease infinite;animation:celebSpin 2s ease infinite;animation-delay:' + (i * 0.2) + 's;">&#11088;</span>';
  }
  html += '</div>';

  html += '<button class="btn-big btn-pink" onclick="replaySession()" style="font-size:28px;margin-top:16px;">Play Again! &#127881;</button>';
  html += '<button class="btn-big btn-green" onclick="window.location.href=\'/daily-missions?child=jj\'" style="font-size:24px;margin-top:12px;">All Done! &#127752;</button>';
  html += '</div>';
  mc.innerHTML = html;

  playAudioCached('celebration.mp3');
  playAudioCached('jj_feedback_complete3.mp3', 'Amazing job!');
  setTimeout(function() {
    playAudioCached('jj_instruction_great_session.mp3', 'Great learning today!');
  }, 2000);
}

function replaySession() {
  currentActivityIndex = 0;
  completedActivities = [];
  if (todayContent) {
    showReadyScreen(todayContent);
  } else {
    loadContent();
  }
}

/* ═══════════════════════════════════════════════════════════
   FALLBACK SCREEN
   ═══════════════════════════════════════════════════════════ */
function showFallback() {
  hideSparkleLoading();
  var mc = getMainContent();
  var html = '<div class="fallback-wrap">';
  html += '<div style="font-size:80px;margin-bottom:16px;">&#10024;</div>';
  html += '<div class="ready-title">No sparkle games today!</div>';
  html += '<p class="instruction">But we can still practice letters!</p>';
  html += '<div class="option-grid" id="fallbackLetters">';

  var letters = ['K', 'I', 'N', 'D', 'L', 'E', 'J', 'B'];
  for (var i = 0; i < letters.length; i++) {
    html += '<button class="option-btn" style="font-size:48px;width:80px;height:80px;" ';
    html += 'onclick="fallbackLetterTap(\'' + letters[i] + '\',this)">' + letters[i] + '</button>';
  }

  html += '</div>';
  html += '<button class="btn-big btn-purple" onclick="showMoreFallbackLetters()" style="margin-top:16px;">More Letters</button>';
  html += '</div>';
  mc.innerHTML = html;

  speak("No sparkle games loaded today, but lets practice letters! Tap a letter to hear it!");
}

function fallbackLetterTap(letter, el) {
  speak(letter + "! " + letter + " is for " + getFallbackWord(letter), 'jj_letter_phrase_' + letter + '.mp3');
  var rect = el.getBoundingClientRect();
  spawnSparkles(rect.left + 40, rect.top + 40, 8);
}

function getFallbackWord(letter) {
  var words = {
    A: 'Apple', B: 'Ball', C: 'Cat', D: 'Dog', E: 'Elephant', F: 'Fish',
    G: 'Giraffe', H: 'Hat', I: 'Ice cream', J: 'Jellyfish', K: 'Kite',
    L: 'Lion', M: 'Moon', N: 'Nest', O: 'Octopus', P: 'Penguin',
    Q: 'Queen', R: 'Rainbow', S: 'Star', T: 'Tiger', U: 'Umbrella',
    V: 'Violin', W: 'Whale', X: 'Xylophone', Y: 'Yarn', Z: 'Zebra'
  };
  return words[letter] || letter;
}

function showMoreFallbackLetters() {
  var container = document.getElementById('fallbackLetters');
  if (!container) { return; }
  var allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  var html = '';
  for (var i = 0; i < allLetters.length; i++) {
    var l = allLetters.charAt(i);
    html += '<button class="option-btn" style="font-size:36px;width:68px;height:68px;" ';
    html += 'onclick="fallbackLetterTap(\'' + l + '\',this)">' + l + '</button>';
  }
  container.innerHTML = html;
  speak("Here are all the letters! Tap any letter to hear it!");
}
