<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- TBM: DesignDashboard.html v4 — THE WOLFDOME home + wizard behind wrench -->
<meta name="tbm-module" content="design-dashboard">
<meta name="tbm-version" content="v4">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════════════
   WOLFDOME BACKGROUND KEYFRAMES
   ══════════════════════════════════════════ */
@keyframes wdTwinkle {
  0%,100% { opacity: var(--min, 0.1); }
  50% { opacity: var(--max, 0.9); }
}
@keyframes wdBoltFlash {
  0%   { opacity: 1; filter: brightness(1); }
  15%  { opacity: 0.3; filter: brightness(0.5); }
  30%  { opacity: 1; filter: brightness(1.6); }
  45%  { opacity: 0.5; filter: brightness(0.8); }
  60%  { opacity: 1; filter: brightness(1); }
  75%  { opacity: 0.2; filter: brightness(0.4); }
  90%  { opacity: 1; filter: brightness(1.8); }
  100% { opacity: 1; }
}
@keyframes wdPulse {
  0% { width: 40px; height: 20px; opacity: 0.8; }
  100% { width: 620px; height: 310px; opacity: 0; }
}
@keyframes wdSpot {
  from { transform: rotate(var(--from, -14deg)); opacity: 0.55; }
  to   { transform: rotate(var(--to, 6deg)); opacity: 0.25; }
}
@keyframes wdFloorScroll {
  from { background-position: 0 0; }
  to   { background-position: 40px 40px; }
}
@keyframes wdSparkFloat {
  0%   { opacity: 0; transform: translate(0,0); }
  20%  { opacity: 1; }
  80%  { opacity: 0.5; }
  100% { opacity: 0; transform: translate(var(--dx, 20px), -130px); }
}
@keyframes wdSignPulse {
  0%,100% { opacity: 1; }
  50%     { opacity: 0.8; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════════════════
   BASE
   ══════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #020508;
  color: #E2E8F0;
  font-family: 'Nunito', sans-serif;
}
input::placeholder { color: #64748B; }

/* ══════════════════════════════════════════
   LOADING SCREEN
   ══════════════════════════════════════════ */
#loading {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 9999;
  background: #030a10;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
}

/* ══════════════════════════════════════════
   HOME VIEW
   ══════════════════════════════════════════ */
#home-view {
  min-height: 100vh;
  padding: 96px 16px 80px;
  position: relative;
  z-index: 1;
}
.wd-content {
  max-width: 560px;
  margin: 0 auto;
}

/* Ring counter pill — top-right */
#wd-ring-pill {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 30;
  background: rgba(6,14,28,0.82);
  border: 1px solid rgba(30,120,255,0.45);
  border-radius: 20px;
  padding: 6px 14px;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  gap: 5px;
  font-family: 'Orbitron', monospace;
  font-size: 15px;
  color: #FFD700;
  white-space: nowrap;
}

/* Stats row */
.wd-stats-row {
  display: -webkit-flex;
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
}
.wd-stat-pill {
  background: rgba(6,14,28,0.72);
  border: 1px solid rgba(30,120,255,0.28);
  border-radius: 20px;
  padding: 8px 16px;
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  color: #60A5FA;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  gap: 5px;
}
.wd-stat-val { color: #FFD700; font-weight: 700; }

/* Today card */
.wd-today-card {
  background: rgba(6,14,28,0.75);
  border: 1px solid rgba(30,120,255,0.22);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 22px;
  text-align: center;
  cursor: pointer;
  animation: fadeUp 0.4s ease;
}
.wd-today-card:active { border-color: rgba(30,120,255,0.7); }
.wd-today-main {
  font-family: 'Orbitron', monospace;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #E2E8F0;
}
.wd-today-sub {
  font-size: 11px;
  color: #60A5FA;
  margin-top: 5px;
  font-family: 'Nunito', sans-serif;
}

/* Nav cards */
.wd-nav-cards {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  gap: 12px;
  animation: fadeUp 0.5s ease;
}
.wd-card {
  display: block;
  width: 100%;
  text-align: left;
  padding: 18px 64px 18px 18px;
  background: rgba(6,14,28,0.85);
  border: 2px solid rgba(30,120,255,0.28);
  border-radius: 14px;
  cursor: pointer;
  color: #E2E8F0;
  font-family: 'Nunito', sans-serif;
  position: relative;
  min-height: 84px;
  -webkit-transition: border-color 0.15s, box-shadow 0.15s;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.wd-card:active {
  border-color: rgba(30,120,255,0.75);
  box-shadow: 0 0 18px rgba(30,120,255,0.3);
}
.wd-card-top {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  gap: 10px;
  margin-bottom: 5px;
}
.wd-card-icon { font-size: 24px; }
.wd-card-title {
  font-family: 'Orbitron', monospace;
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 1.5px;
  color: #FFD700;
}
.wd-card-sub {
  font-size: 12px;
  color: #64748B;
  margin-left: 34px;
}
.wd-card-arrow {
  position: absolute;
  right: 16px;
  top: 50%;
  -webkit-transform: translateY(-50%);
  transform: translateY(-50%);
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: #1e78ff;
  letter-spacing: 1px;
}

/* Settings wrench */
#wd-wrench {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  background: rgba(6,14,28,0.82);
  border: 1px solid rgba(30,120,255,0.22);
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  z-index: 30;
  color: #475569;
  -webkit-transition: color 0.2s, border-color 0.2s;
  transition: color 0.2s, border-color 0.2s;
}
#wd-wrench:active { color: #60A5FA; border-color: rgba(30,120,255,0.6); }

/* ══════════════════════════════════════════
   PIN OVERLAY
   ══════════════════════════════════════════ */
#wd-pin-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 9000;
  background: rgba(2,5,8,0.93);
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
}
.wd-pin-box {
  background: #0B0F1A;
  border: 2px solid #1E2A4A;
  border-radius: 16px;
  padding: 28px 24px;
  width: 290px;
  text-align: center;
}
.wd-pin-title {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  font-weight: 700;
  color: #60A5FA;
  letter-spacing: 2px;
  margin-bottom: 18px;
}
.wd-pin-input {
  width: 100%;
  padding: 14px;
  background: #131829;
  border: 2px solid #1E2A4A;
  border-radius: 10px;
  color: #E2E8F0;
  font-size: 24px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  outline: none;
  letter-spacing: 4px;
  margin-bottom: 14px;
}
.wd-pin-input:focus { border-color: #3B82F6; }
.wd-pin-btns { display: -webkit-flex; display: flex; gap: 10px; }
.wd-pin-submit {
  -webkit-flex: 1; flex: 1;
  padding: 12px;
  background: #3B82F6;
  border: none;
  border-radius: 8px;
  color: #fff;
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
}
.wd-pin-cancel {
  padding: 12px 18px;
  background: #171D30;
  border: 1px solid #1E2A4A;
  border-radius: 8px;
  color: #94A3B8;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  cursor: pointer;
}
.wd-pin-error {
  font-size: 12px;
  color: #EF4444;
  margin-top: 10px;
  font-weight: 700;
  letter-spacing: 1px;
}

/* ══════════════════════════════════════════
   WIZARD VIEW WRAPPER
   ══════════════════════════════════════════ */
#wizard-view {
  min-height: 100vh;
  background: #0B0F1A;
  position: relative;
  z-index: 5;
}
#wizard-back-btn {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 50;
  padding: 8px 16px;
  background: rgba(11,15,26,0.95);
  border: 1px solid #1E2A4A;
  border-radius: 8px;
  color: #94A3B8;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  cursor: pointer;
}

.dd-name-input { width: 100%; padding: 16px; background: #171D30; border: 2px solid #1E2A4A; border-radius: 12px; color: #E2E8F0; font-size: 18px; font-family: 'Orbitron', sans-serif; font-weight: 700; text-align: center; outline: none; -webkit-transition: border-color 0.2s; transition: border-color 0.2s; }

<body>

<!-- Loading screen — filled by buildBuggsyLoadingScreen() -->
<div id="loading"></div>

<!-- Home view — shown after data loads -->
<div id="home-view" style="display:none">
  <div id="wd-ring-pill">&#x2B55;<span id="wd-ring-value">--</span></div>
  <div class="wd-content">
    <div class="wd-stats-row">
      <div class="wd-stat-pill">&#x2B55; <span id="wd-rings-stat" class="wd-stat-val">--</span>&nbsp;rings</div>
      <div class="wd-stat-pill">&#x2694;&#xFE0F; <span id="wd-level-stat" class="wd-stat-val">--</span></div>
    </div>
    <div class="wd-today-card" onclick="window.location.href='/daily-missions'">
      <div class="wd-today-main" id="wd-today-text">&#x26A1; LET'S GO</div>
      <div class="wd-today-sub">Tap to launch Mission Control</div>
    </div>
    <div class="wd-nav-cards">
      <button class="wd-card" onclick="window.location.href='/daily-missions'">
        <div class="wd-card-top">
          <span class="wd-card-icon">&#x2694;&#xFE0F;</span>
          <span class="wd-card-title">MISSION CONTROL</span>
        </div>
        <div class="wd-card-sub">Today's homework + education</div>
        <span class="wd-card-arrow">LAUNCH &#x2192;</span>
      </button>
      <button class="wd-card" onclick="window.location.href='/buggsy'">
        <div class="wd-card-top">
          <span class="wd-card-icon">&#x1F3AF;</span>
          <span class="wd-card-title">DAILY QUESTS</span>
        </div>
        <div class="wd-card-sub">Chores + ring economy</div>
        <span class="wd-card-arrow">ENTER &#x2192;</span>
      </button>
      <button class="wd-card" onclick="window.location.href='/buggsy'">
        <div class="wd-card-top">
          <span class="wd-card-icon">&#x1F3C6;</span>
          <span class="wd-card-title">POWER-UP SHOP</span>
        </div>
        <div class="wd-card-sub">Spend your rings</div>
        <span class="wd-card-arrow">OPEN &#x2192;</span>
      </button>
    </div>
  </div>
  <button id="wd-wrench" onclick="onWrenchClick()">&#x2699;</button>
</div>

<!-- Wizard view — behind wrench or ?customize=1 -->
<div id="wizard-view" style="display:none">

function safeParse(d) { return typeof d === 'string' ? JSON.parse(d) : d; }

function getLevel(points, child) {
  var arr = (child === 'jj') ? LEVELS_JJ : LEVELS_FALLBACK;
  var level = arr[0];
  for (var i = 0; i < arr.length; i++) {
    if (points >= arr[i].min) level = arr[i];
  }
  return level;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  var s = state.step;

}

/* ═══════════════════════════════════════════════════════════════════
   HOME — DATA LOADING
   ═══════════════════════════════════════════════════════════════════ */

function loadHomeData() {
  _homeTimeout = setTimeout(function() {
    if (!_homeDataLoaded) {
      _homeDataLoaded = true;
      showHomeView();
    }
  }, 8000);

  if (TBM_TEST_MODE) {
    setTimeout(function() { showHomeView(); }, 500);
    return;
  }

  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(onKidsHubData)
      .withFailureHandler(function() { onKidsHubData(null); })
      .getKidsHubDataSafe('buggsy');

    google.script.run
      .withSuccessHandler(onDailySchedule)
      .withFailureHandler(function() {})
      .getDailyScheduleSafe('buggsy');

    // Seed confirmed defaults on first load if no design choices saved yet
    google.script.run
      .withSuccessHandler(function(choices) {
        if (!choices) {
          google.script.run
            .withSuccessHandler(function() {})
            .withFailureHandler(function() {})
            .saveDesignChoicesSafe({
              child: 'buggsy', theme: 'wolfkid', dashName: 'THE WOLFDOME',
              mascot: 'custom_creature', sectionHomework: 'Mission Control',
              sectionChores: 'Daily Quests', sectionRewards: 'Power-Up Shop',
              date: new Date().toISOString()
            });
        }
      })
      .withFailureHandler(function() {})
      .getDesignChoicesSafe('buggsy');
  } else {
    setTimeout(function() { showHomeView(); }, 400);
  }
}

function onKidsHubData(raw) {
  if (raw) {
    try {
      var data = safeParse(raw);
      var rings = (data && data.balances && data.balances.buggsy) ? data.balances.buggsy.balance : null;
      var levelData = getLevel(rings !== null ? rings : 0, 'buggsy');
      if (rings !== null) {
        var ringPillEl = document.getElementById('wd-ring-value');
        var ringsStatEl = document.getElementById('wd-rings-stat');
        if (ringPillEl) ringPillEl.textContent = rings;
        if (ringsStatEl) ringsStatEl.textContent = rings;
      }
      if (levelData) {
        var levelEl = document.getElementById('wd-level-stat');
        if (levelEl) levelEl.textContent = levelData.name;
      }
    } catch(e) {
      console.log('[WD] onKidsHubData error: ' + e.message);
    }
  }
  if (!_homeDataLoaded) {
    _homeDataLoaded = true;
    if (_homeTimeout) { clearTimeout(_homeTimeout); _homeTimeout = null; }
    showHomeView();
  }
}

function onDailySchedule(raw) {
  if (!raw) return;
  try {
    var schedule = safeParse(raw);
    var count = 0;
    if (Array.isArray(schedule)) {
      count = schedule.length;
    } else if (schedule && schedule.blocks && Array.isArray(schedule.blocks)) {
      count = schedule.blocks.length;
    } else if (schedule && typeof schedule === 'object') {
      var keys = Object.keys(schedule);
      count = keys.length;
    }
    if (count > 0) {
      var todayEl = document.getElementById('wd-today-text');
      if (todayEl) todayEl.textContent = count + ' MISSIONS TODAY';
    }
  } catch(e) {
    console.log('[WD] onDailySchedule error: ' + e.message);
  }
}

function showHomeView() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('home-view').style.display = 'block';
  document.getElementById('wizard-view').style.display = 'none';
  document.getElementById('wd-pin-overlay').style.display = 'none';
}

/* ═══════════════════════════════════════════════════════════════════
   WRENCH / PIN
   ═══════════════════════════════════════════════════════════════════ */

function onWrenchClick() {
  showPinOverlay();
}

function showPinOverlay() {
  var overlay = document.getElementById('wd-pin-overlay');
  overlay.style.display = '-webkit-flex';
  overlay.style.display = 'flex';
  var inp = document.getElementById('wd-pin-input');
  if (inp) { inp.value = ''; inp.focus(); }
  var errEl = document.getElementById('wd-pin-error');
  if (errEl) errEl.style.display = 'none';
}

function hidePinOverlay() {
  document.getElementById('wd-pin-overlay').style.display = 'none';
  var inp = document.getElementById('wd-pin-input');
  if (inp) inp.value = '';
  var errEl = document.getElementById('wd-pin-error');
  if (errEl) errEl.style.display = 'none';
}

function submitPin() {
  var inp = document.getElementById('wd-pin-input');
  var pin = inp ? inp.value : '';
  if (!pin) return;
  var errEl = document.getElementById('wd-pin-error');
  if (errEl) errEl.style.display = 'none';

  if (TBM_TEST_MODE) {
    hidePinOverlay();
    showWizardView();
    return;
  }

  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function(ok) {
        if (ok) {
          hidePinOverlay();
          showWizardView();
        } else {
          if (errEl) errEl.style.display = 'block';
          var i2 = document.getElementById('wd-pin-input');
          if (i2) { i2.value = ''; i2.focus(); }
        }
      })
      .withFailureHandler(function() {
        if (errEl) errEl.style.display = 'block';
      })
      .khVerifyPinSafe(pin);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   WIZARD VIEW
   ═══════════════════════════════════════════════════════════════════ */

function showWizardView() {
  // Pre-populate wizard with Buggsy's confirmed design choices
  state.submitted = false;
  state.started = true;
  state.step = 0;
  state.theme            = state.theme            || 'wolfkid';
  state.mascot           = state.mascot           || 'custom_creature';
  state.sectionHomework  = state.sectionHomework  || 'Mission Control';
  state.sectionChores    = state.sectionChores    || 'Daily Quests';
  state.sectionRewards   = state.sectionRewards   || 'Power-Up Shop';
  state.dashName         = state.dashName         || 'THE WOLFDOME';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('wizard-view').style.display = 'block';
  render();
}

function onWizardBack() {
  if (TBM_CUSTOMIZE_MODE) {
    window.location.href = '/wolfdome';
  } else {
    showHomeView();
  }
}

/* ═══════════════════════════════════════════════════════════════════
   WIZARD ACTIONS
   ═══════════════════════════════════════════════════════════════════ */

function startWizard()        { state.started = true; render(); }
function goBack()             { if (state.step > 0) { state.step--; render(); } }
function goNext()             { if (canNext() && state.step < 4) { state.step++; render(); } }
function selectTheme(id)      { state.theme = id; render(); }
function selectMascot(id)     { state.mascot = id; render(); }

function selectSection(category, name) {
  if (category === 'homework')     state.sectionHomework = name;
  else if (category === 'chores')  state.sectionChores   = name;
  else if (category === 'rewards') state.sectionRewards  = name;
  render();
}

function updateDashName(el) {
  state.dashName = el.value;
  render();
  var inp = document.getElementById('dash-name-input');
  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}

function lockItIn() {
  var payload = {
    child: 'buggsy', theme: state.theme, dashName: state.dashName,
    mascot: state.mascot, sectionHomework: state.sectionHomework,
    sectionChores: state.sectionChores, sectionRewards: state.sectionRewards,
    date: new Date().toISOString()
  };
  if (TBM_TEST_MODE) {
    console.log('[TEST MODE] saveDesignChoicesSafe skipped', payload);
    state.submitted = true; render(); return;
  }
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function() { state.submitted = true; render(); })
      .withFailureHandler(function(err) {
        var el = document.getElementById('wd-save-error');
        if (el) { el.textContent = 'Save failed — ' + (err && err.message ? err.message : 'unknown error') + '. Try again.'; el.style.display = 'block'; }
      })
      .saveDesignChoicesSafe(payload);
  } else {
    state.submitted = true; render();
  }
}

/* ═══════════════════════════════════════════════════════════════════
   WIZARD RENDER
   ═══════════════════════════════════════════════════════════════════ */

function render() {
  var app = document.getElementById('dd-app');
  var html = '';
  html += '<header class="dd-header"><div class="dd-header-inner">';
  html += '<div class="dd-title">\uD83C\uDFA8 DESIGN YOUR DASHBOARD</div>';
  html += '<div class="dd-subtitle">Customize the Wolfdome</div>';
  if (state.started && !state.submitted) {
    html += '<div class="dd-progress">';
    for (var i = 0; i < STEPS.length; i++) {
      html += '<div class="dd-bar ' + (i <= state.step ? 'dd-bar-active' : 'dd-bar-inactive') + '"></div>';
    }
    html += '</div><div class="dd-labels">';
    for (var i = 0; i < STEPS.length; i++) {
      html += '<span class="dd-label ' + (i === state.step ? 'dd-label-active' : 'dd-label-inactive') + '">' + STEPS[i] + '</span>';
    }
    html += '</div>';
  }
  html += '</div></header>';
  html += '<main class="dd-main">';
  if (!state.started)      html += renderPlanScreen();
  else if (state.submitted) html += renderSubmitted();
  else if (state.step === 0) html += renderThemeStep();
  else if (state.step === 1) html += renderSectionsStep();
  else if (state.step === 2) html += renderMascotStep();
  else if (state.step === 3) html += renderNameStep();
  else if (state.step === 4) html += renderPreviewStep();
  html += '</main>';
  if (state.started && !state.submitted) html += renderNav();
  app.innerHTML = html;
}

function renderPlanScreen() {
  var h = '<div class="dd-plan">';
  h += '<div class="dd-plan-icon">\uD83D\uDCCB</div>';
  h += '<div class="dd-plan-title">CUSTOMIZE THE WOLFDOME</div>';
  h += '<div class="dd-plan-desc">Change your theme, rename your sections,<br>choose a guide, and update your dashboard name.</div>';
  h += '<div class="dd-plan-time">\u23F1 Estimated time: <strong>2-3 minutes</strong></div>';
  h += '<button class="dd-plan-start" onclick="startWizard()">\uD83D\uDE80 LET\'S CUSTOMIZE</button>';
  h += '</div>';
  return h;
}

function renderThemeStep() {
  var h = '<div class="dd-step"><div class="dd-step-title">Pick Your Vibe</div>';
  h += '<div class="dd-step-desc">Sets the colors and feel for your dashboard.</div>';
  h += '<div class="dd-choices">';
  for (var i = 0; i < THEMES.length; i++) {
    var t = THEMES[i];
    var sel = state.theme === t.id;
    h += '<button class="dd-wizcard' + (sel ? ' dd-wizcard-selected' : '') + '" onclick="selectTheme(\'' + t.id + '\')">';
    h += '<div class="dd-wizcard-check">\u2713</div>';
    h += '<div class="dd-wizcard-row">';
    h += '<div class="dd-wizcard-icon" style="background:' + t.preview + '">' + t.emoji + '</div>';
    h += '<div class="dd-wizcard-body"><div class="dd-wizcard-name">' + escHtml(t.name) + '</div>';
    h += '<div class="dd-wizcard-desc">' + escHtml(t.desc) + '</div>';
    h += '<div class="dd-swatches">';
    for (var j = 0; j < t.colors.length; j++) {
      h += '<div class="dd-swatch" style="background:' + t.colors[j] + '"></div>';
    }
    h += '</div></div></div></button>';
  }
  h += '</div></div>';
  return h;
}

function renderSectionsStep() {
  var categories = [
    { key: 'homework', label: '\uD83D\uDCDA Homework Area', stateKey: 'sectionHomework' },
    { key: 'chores',   label: '\uD83C\uDFE0 Chores Area',   stateKey: 'sectionChores'   },
    { key: 'rewards',  label: '\uD83C\uDF81 Rewards Area',  stateKey: 'sectionRewards'  }
  ];
  var h = '<div class="dd-step"><div class="dd-step-title">Name Your Sections</div>';
  h += '<div class="dd-step-desc">What do you want to call each part?</div>';
  for (var c = 0; c < categories.length; c++) {
    var cat = categories[c];
    var options = SECTION_NAMES[cat.key];
    var selected = state[cat.stateKey];
    h += '<div class="dd-section-group"><div class="dd-section-label">' + cat.label + '</div>';
    h += '<div class="dd-section-grid">';
    for (var i = 0; i < options.length; i++) {
      var name = options[i];
      var isSel = selected === name;
      h += '<button class="dd-section-btn' + (isSel ? ' dd-section-btn-selected' : '') + '" ';
      h += 'onclick="selectSection(\'' + cat.key + '\', \'' + escHtml(name) + '\')">' + escHtml(name) + '</button>';
    }
    h += '</div></div>';
  }
  h += '</div>';
  return h;
}

function renderMascotStep() {
  var h = '<div class="dd-step"><div class="dd-step-title">Pick Your Guide</div>';
  h += '<div class="dd-step-desc">Who shows up on your dashboard?</div>';
  h += '<div class="dd-choices">';
  for (var i = 0; i < MASCOT_IDEAS.length; i++) {
    var m = MASCOT_IDEAS[i];
    var sel = state.mascot === m.id;
    h += '<button class="dd-wizcard' + (sel ? ' dd-wizcard-selected' : '') + '" onclick="selectMascot(\'' + m.id + '\')">';
    h += '<div class="dd-wizcard-check">\u2713</div>';
    h += '<div class="dd-wizcard-row">';
    h += '<div class="dd-wizcard-mascot-icon">' + m.emoji + '</div>';
    h += '<div class="dd-wizcard-body"><div class="dd-wizcard-name">' + escHtml(m.name) + '</div>';
    h += '<div class="dd-wizcard-desc">' + escHtml(m.desc) + '</div></div></div></button>';
  }
  h += '</div></div>';
  return h;
}

function renderNameStep() {
  var selTheme = findTheme(state.theme);
  var preview = selTheme ? selTheme.preview : '#171D30';
  var h = '<div class="dd-step"><div class="dd-step-title">Name Your Dashboard</div>';
  h += '<div class="dd-step-desc">What shows up at the top. Make it yours.</div>';
  h += '<input id="dash-name-input" class="dd-name-input' + (state.dashName ? ' dd-name-input-active' : '') + '" ';
  h += 'value="' + escHtml(state.dashName) + '" placeholder="e.g., THE WOLFDOME..." maxlength="30" oninput="updateDashName(this)">';
  h += '<div class="dd-char-count">' + state.dashName.length + '/30</div>';
  if (state.dashName) {
    h += '<div class="dd-name-preview" style="background:' + preview + '">';
    h += '<div class="dd-name-preview-text">' + escHtml(state.dashName.toUpperCase()) + '</div></div>';
  }
  h += '</div>';
  return h;
}

function renderPreviewStep() {
  var selTheme  = findTheme(state.theme);
  var selMascot = findMascot(state.mascot);
  var preview    = selTheme  ? selTheme.preview   : '#171D30';
  var mascotEmoji = selMascot ? selMascot.emoji   : '';
  var mascotName  = selMascot ? selMascot.name    : '';
  var themeName   = selTheme  ? selTheme.name     : '';
  var h = '<div class="dd-step"><div class="dd-step-title">Here\'s Your Dashboard</div>';
  h += '<div class="dd-step-desc">This is what your command center will look like.</div>';
  h += '<div class="dd-preview-banner" style="background:' + preview + '">';
  h += '<div class="dd-preview-title">' + mascotEmoji + ' ' + escHtml(state.dashName.toUpperCase()) + '</div>';
  h += '<div class="dd-preview-theme">Theme: ' + escHtml(themeName) + '</div></div>';
  var sections = [
    { key: 'sectionHomework', icon: '\uD83D\uDCDA', color: '#8B5CF6', sub: 'Math, Science, CER' },
    { key: 'sectionChores',   icon: '\uD83C\uDFE0', color: '#22C55E', sub: 'Daily tasks' },
    { key: 'sectionRewards',  icon: '\uD83C\uDF81', color: '#F97316', sub: 'Rings & unlocks' }
  ];
  h += '<div class="dd-preview-sections">';
  for (var i = 0; i < sections.length; i++) {
    var s = sections[i];
    h += '<div class="dd-preview-section" style="border-left:3px solid ' + s.color + '">';
    h += '<span class="dd-preview-section-icon">' + s.icon + '</span><div>';
    h += '<div class="dd-preview-section-name">' + escHtml(state[s.key] || '') + '</div>';
    h += '<div class="dd-preview-section-sub">' + s.sub + '</div></div></div>';
  }
  h += '</div>';
  var rows = [
    ['Theme', themeName], ['Dashboard Name', state.dashName], ['Guide', mascotName],
    ['Homework Section', state.sectionHomework || ''],
    ['Chores Section',   state.sectionChores   || ''],
    ['Rewards Section',  state.sectionRewards  || '']
  ];
  h += '<div class="dd-summary"><div class="dd-summary-header">YOUR CHOICES</div>';
  for (var i = 0; i < rows.length; i++) {
    var isLast = (i === rows.length - 1);
    h += '<div class="dd-summary-row' + (isLast ? ' dd-summary-row-last' : '') + '">';
    h += '<span class="dd-summary-label">' + escHtml(rows[i][0]) + '</span>';
    h += '<span class="dd-summary-value">' + escHtml(rows[i][1]) + '</span></div>';
  }
  h += '</div>';
  h += '<button class="dd-lockin" onclick="lockItIn()">\uD83D\uDE80 LOCK IT IN \u2014 SAVE MY WOLFDOME</button>';
  h += '</div>';
  return h;
}

function renderSubmitted() {
  var h = '<div class="dd-done">';
  h += '<div class="dd-done-emoji">\uD83C\uDF89</div>';
  h += '<div class="dd-done-title">WOLFDOME LOCKED IN</div>';
  h += '<div class="dd-done-text">Your choices have been saved.<br>';
  h += '<strong style="color:#E2E8F0">' + escHtml(state.dashName) + '</strong> is your command center.</div>';
  h += '<div class="dd-done-ring">\uD83D\uDC3A Wolfdome customization saved.</div>';
  h += '<button style="margin-top:24px;padding:14px 32px;background:#3B82F6;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif" onclick="window.location.href=\'/wolfdome\'">\uD83C\uDFE0 Back to The Wolfdome</button>';
  h += '</div>';
  return h;
}

function renderNav() {
  var enabled  = canNext();
  var showBack = state.step > 0;
  var h = '<div class="dd-nav">';
  h += '<button class="dd-back' + (!showBack ? ' dd-back-hidden' : '') + '"';
  if (showBack) h += ' onclick="goBack()"';
  h += '>\u2190 Back</button>';
  h += '<button class="dd-next ' + (enabled ? 'dd-next-enabled' : 'dd-next-disabled') + '"';
  if (enabled && state.step < 4) h += ' onclick="goNext()"';
  h += '>';
  h += (state.step === 4 ? 'Review \u2191' : 'Next \u2192');
  h += '</button></div>';
  return h;
}

/* ═══════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════ */
buildBuggsyLoadingScreen();
buildWolfdomeBackground();

if (TBM_CUSTOMIZE_MODE) {
  document.getElementById('loading').style.display = 'none';
  showWizardView();
} else {
  loadHomeData();
}

(function() {
  var FB_STYLES = '#tbm-fb-btn{position:fixed;bottom:12px;left:12px;width:48px;height:48px;border-radius:50%;'
    + 'background:rgba(11,19,29,0.7);border:1px solid #1e3347;color:#e2e8f0;font-size:22px;cursor:pointer;'
    + 'z-index:9000;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.3);'
    + 'transition:opacity 0.2s;opacity:0.6;}'
    + '#tbm-fb-btn:hover{opacity:1;}'
    + '#tbm-fb-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9001;}'
    + '#tbm-fb-modal{position:fixed;bottom:70px;left:12px;width:260px;background:#0b131d;border:1px solid #1e3347;'
    + 'border-radius:12px;padding:16px;z-index:9002;box-shadow:0 4px 24px rgba(0,0,0,0.5);display:none;}'
    + '#tbm-fb-modal h3{margin:0 0 12px 0;color:#e2e8f0;font-size:16px;text-align:center;}'
    + '.tbm-fb-emojis{display:flex;justify-content:center;gap:16px;margin-bottom:12px;}'
    + '.tbm-fb-emojis button{width:52px;height:52px;border-radius:50%;border:2px solid #1e3347;background:#0f1a2a;'
    + 'font-size:26px;cursor:pointer;transition:border-color 0.15s,transform 0.15s;}'
    + '.tbm-fb-emojis button.selected{border-color:#38bdf8;transform:scale(1.15);}'
    + '#tbm-fb-text{width:100%;box-sizing:border-box;background:#0f1a2a;border:1px solid #1e3347;border-radius:8px;'
    + 'color:#e2e8f0;padding:8px;font-size:14px;font-family:inherit;resize:none;height:52px;margin-bottom:10px;}'
    + '#tbm-fb-text::placeholder{color:#4a6080;}'
    + '.tbm-fb-actions{display:flex;justify-content:flex-end;gap:8px;}'
    + '.tbm-fb-actions button{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:none;}'
    + '#tbm-fb-skip{background:transparent;color:#4a6080;}#tbm-fb-skip:hover{color:#e2e8f0;}'
    + '#tbm-fb-send{background:#1e3a5f;color:#38bdf8;font-weight:700;}#tbm-fb-send:hover{background:#254a73;}'
    + '.tbm-fb-toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#0b131d;'
    + 'border:1px solid #1e3347;color:#e2e8f0;padding:8px 20px;border-radius:8px;font-size:14px;z-index:9010;'
    + 'opacity:0;transition:opacity 0.3s;}';

  var style = document.createElement('style');
  style.textContent = FB_STYLES;
  document.head.appendChild(style);

  var btn = document.createElement('button');
  btn.id = 'tbm-fb-btn';
  btn.innerHTML = '&#x1F4AC;';
  btn.setAttribute('aria-label', 'Give feedback');
  document.body.appendChild(btn);

  var overlay = document.createElement('div');
  overlay.id = 'tbm-fb-overlay';
  document.body.appendChild(overlay);

  var modal = document.createElement('div');
  modal.id = 'tbm-fb-modal';
  modal.innerHTML = '<h3>How was it?</h3>'
    + '<div class="tbm-fb-emojis">'
    + '<button data-score="1" aria-label="Okay">&#x1F610;</button>'
    + '<button data-score="3" aria-label="Good">&#x1F642;</button>'
    + '<button data-score="5" aria-label="Awesome">&#x1F929;</button>'
    + '</div>'
    + '<textarea id="tbm-fb-text" placeholder="What happened? (optional)" maxlength="200"></textarea>'
    + '<div class="tbm-fb-actions">'
    + '<button id="tbm-fb-skip">Skip</button>'
    + '<button id="tbm-fb-send">Send</button>'
    + '</div>';
  document.body.appendChild(modal);

  var selectedScore = 0;

  function getUser() {
    var search = window.location.search || '';
    var match = search.match(/[?&]child=([^&]+)/);
    if (match) return decodeURIComponent(match[1]);
    return 'unknown';
  }

  function getSurface() {
    var meta = document.querySelector('meta[name="tbm-module"]');
    return meta ? meta.getAttribute('content') : 'unknown';
  }

  function showToast(msg) {
    var t = document.createElement('div');
    t.className = 'tbm-fb-toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.style.opacity = '1'; }, 10);
    setTimeout(function() {
      t.style.opacity = '0';
      setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 300);
    }, 1500);
  }

  function openModal() {
    selectedScore = 0;
    var btns = modal.querySelectorAll('.tbm-fb-emojis button');
    for (var i = 0; i < btns.length; i++) btns[i].className = '';
    var ta = document.getElementById('tbm-fb-text');
    if (ta) ta.value = '';
    overlay.style.display = 'block';
    modal.style.display = 'block';
  }

  function closeModal() {
    overlay.style.display = 'none';
    modal.style.display = 'none';
  }

  btn.onclick = openModal;
  overlay.onclick = closeModal;

  var emojiButtons = modal.querySelectorAll('.tbm-fb-emojis button');
  for (var e = 0; e < emojiButtons.length; e++) {
    emojiButtons[e].onclick = (function(b) {
      return function() {
        selectedScore = parseInt(b.getAttribute('data-score'), 10);
        var all = modal.querySelectorAll('.tbm-fb-emojis button');
        for (var k = 0; k < all.length; k++) all[k].className = '';
        b.className = 'selected';
      };
    })(emojiButtons[e]);
  }

  document.getElementById('tbm-fb-skip').onclick = closeModal;

  document.getElementById('tbm-fb-send').onclick = function() {
    if (!selectedScore) { showToast('Tap an emoji first!'); return; }
    var ta = document.getElementById('tbm-fb-text');
    var payload = {
      surface: getSurface(),
      layout: selectedScore,
      readability: selectedScore,
      text: ta ? ta.value : '',
      user: getUser()
    };
    closeModal();
    google.script.run
      .withSuccessHandler(function() { showToast('\u2713 Thanks!'); })
      .withFailureHandler(function() { showToast('Oops, try later'); })
      .submitFeedbackSafe(payload);
  };
})();
</script>
</body>
</html>
