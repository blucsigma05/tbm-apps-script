<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="tbm-version" content="v3">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── Wolfdome keyframes ── */
  @keyframes wdTwinkle {
    0%, 100% { opacity: var(--min, 0.1); }
    50%       { opacity: var(--max, 0.6); }
  }
  @keyframes wdBoltFlash {
    0%,  49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  @keyframes wdPulse {
    0%   { width: 20px; height: 20px; opacity: 0.7; margin-left: -10px; }
    100% { width: 300px; height: 300px; opacity: 0; margin-left: -150px; }
  }
  @keyframes wdSpot {
    from { transform: rotate(-12deg); }
    to   { transform: rotate(12deg); }
  }
  @keyframes wdFloorScroll {
    from { background-position: 0 0; }
    to   { background-position: 40px 40px; }
  }
  @keyframes wdSparkFloat {
    0%, 100% { transform: translateY(0) translateX(0); opacity: 0.8; }
    50%       { transform: translateY(-60px) translateX(var(--dx, 0px)); opacity: 0.3; }
  }
  @keyframes wdSignPulse {
    0%, 100% { opacity: 0.9; }
    50%       { opacity: 1; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #020508;
    color: #E2E8F0;
    font-family: 'Nunito', sans-serif;
  }
  input::placeholder { color: #64748B; }

  /* ── HOME VIEW ── */
  #home-view {
    display: none;
    position: relative;
    z-index: 5;
    min-height: 100vh;
    padding: 88px 16px 80px;
    max-width: 600px;
    margin: 0 auto;
  }
  #wd-ring-pill {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 30;
    background: rgba(3, 10, 20, 0.75);
    border: 1px solid rgba(30, 120, 255, 0.45);
    border-radius: 20px;
    padding: 6px 14px;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    gap: 6px;
  }
  #wd-ring-value {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    color: #FFD700;
    font-weight: 700;
  }
  .wd-today-card {
    background: rgba(10, 20, 50, 0.55);
    border: 1px solid rgba(30, 120, 255, 0.25);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 16px;
    text-align: center;
  }
  #wd-today-text {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #60A5FA;
    letter-spacing: 2px;
  }
  .wd-nav-cards {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    gap: 12px;
  }
  .wd-card {
    background: rgba(10, 20, 50, 0.55);
    border: 1px solid rgba(30, 120, 255, 0.25);
    border-radius: 14px;
    padding: 18px 20px;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .wd-card:active {
    border-color: rgba(30, 120, 255, 0.7);
    background: rgba(20, 40, 90, 0.7);
  }
  .wd-card-icon { font-size: 32px; -webkit-flex-shrink: 0; flex-shrink: 0; }
  .wd-card-body { -webkit-flex: 1; flex: 1; }
  .wd-card-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #E2E8F0;
    letter-spacing: 1px;
  }
  .wd-card-sub { font-size: 12px; color: #64748B; margin-top: 3px; }
  .wd-card-arrow { font-size: 18px; color: rgba(30, 120, 255, 0.6); }
  #wd-wrench {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 30;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(10, 20, 50, 0.85);
    border: 1px solid rgba(30, 120, 255, 0.3);
    display: none;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
  }

  /* ── PIN OVERLAY ── */
  #wd-pin-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 200;
    background: rgba(2, 5, 8, 0.88);
    display: none;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
    padding: 24px;
  }
  .wd-pin-box {
    width: 100%;
    max-width: 320px;
    background: rgba(5, 12, 30, 0.98);
    border: 1px solid rgba(30, 120, 255, 0.45);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
  }
  .wd-pin-title {
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    font-weight: 700;
    color: #FFD700;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .wd-pin-sub { font-size: 12px; color: #64748B; margin-bottom: 20px; }
  .wd-pin-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(30, 120, 255, 0.4);
    color: #E2E8F0;
    font-size: 32px;
    text-align: center;
    letter-spacing: 12px;
    padding: 8px 10px;
    outline: none;
    font-family: 'Orbitron', monospace;
    transition: border-bottom-color 0.2s;
  }
  .wd-pin-input:focus { border-bottom-color: rgba(30, 120, 255, 0.9); }
  .wd-pin-error { min-height: 16px; font-size: 12px; color: #ff8383; margin-top: 8px; }
  .wd-pin-enter {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: linear-gradient(135deg, #1e78ff, #0a3a8a);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .wd-pin-cancel {
    background: transparent;
    border: none;
    color: #64748B;
    font-size: 13px;
    margin-top: 10px;
    cursor: pointer;
    display: block;
    width: 100%;
  }

  /* ── WIZARD VIEW ── */
  #wizard-view { display: none; }

  /* Wizard header */
  .dd-header {
    background: rgba(11,15,26,0.95);
    border-bottom: 1px solid #1E2A4A;
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .dd-header-inner { max-width: 600px; margin: 0 auto; }
  .dd-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 900;
    text-align: center;
    background: linear-gradient(90deg, #60A5FA, #F97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .dd-subtitle {
    font-size: 11px;
    color: #64748B;
    text-align: center;
    margin-top: 4px;
  }
  .dd-progress { display: -webkit-flex; display: flex; gap: 4px; margin-top: 10px; }
  .dd-bar {
    -webkit-flex: 1; flex: 1;
    height: 4px;
    border-radius: 2px;
    transition: background 0.3s;
  }
  .dd-bar-active { background: #3B82F6; }
  .dd-bar-inactive { background: #1E2A4A; }
  .dd-labels { display: -webkit-flex; display: flex; -webkit-justify-content: space-between; justify-content: space-between; margin-top: 4px; }
  .dd-label { font-size: 9px; font-family: 'Orbitron', sans-serif; }
  .dd-label-active { color: #60A5FA; font-weight: 700; }
  .dd-label-inactive { color: #64748B; font-weight: 400; }

  /* Wizard main */
  .dd-main {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px 16px 100px;
  }
  .dd-step { animation: fadeUp 0.3s ease; }
  .dd-step-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; text-align: center; }
  .dd-step-desc { font-size: 13px; color: #94A3B8; text-align: center; margin-bottom: 16px; }

  /* Wizard choice cards (renamed from dd-card to dd-wizcard) */
  .dd-choices { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 8px; }
  .dd-wizcard {
    width: 100%;
    text-align: left;
    padding: 14px;
    background: #171D30;
    border: 2px solid #1E2A4A;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    color: #E2E8F0;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
  }
  .dd-wizcard-selected {
    background: rgba(59,130,246,0.08);
    border-color: #3B82F6;
  }
  .dd-wizcard-check {
    position: absolute;
    top: 8px; right: 8px;
    background: #3B82F6;
    border-radius: 50%;
    width: 22px; height: 22px;
    display: none;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    font-size: 12px;
    color: #fff;
  }
  .dd-wizcard-selected .dd-wizcard-check { display: -webkit-flex; display: flex; }
  .dd-wizcard-row { display: -webkit-flex; display: flex; gap: 12px; -webkit-align-items: center; align-items: center; }
  .dd-wizcard-icon {
    width: 52px; height: 52px;
    border-radius: 12px;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    font-size: 24px;
    -webkit-flex-shrink: 0; flex-shrink: 0;
  }
  .dd-wizcard-mascot-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: #131829;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    font-size: 24px;
    border: 1px solid #1E2A4A;
    -webkit-flex-shrink: 0; flex-shrink: 0;
  }
  .dd-wizcard-body { -webkit-flex: 1; flex: 1; }
  .dd-wizcard-name { font-size: 15px; font-weight: 700; color: #E2E8F0; }
  .dd-wizcard-desc { font-size: 12px; color: #94A3B8; margin-top: 2px; }
  .dd-swatches { display: -webkit-flex; display: flex; gap: 4px; margin-top: 6px; }
  .dd-swatch { width: 16px; height: 16px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

  /* Section names */
  .dd-section-label {
    font-size: 11px; color: #F97316;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1.5px; margin-bottom: 8px;
    text-transform: uppercase;
  }
  .dd-section-group { margin-bottom: 16px; }
  .dd-section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .dd-section-btn {
    padding: 10px 12px;
    background: #171D30;
    border: 1px solid #1E2A4A;
    border-radius: 8px;
    color: #94A3B8;
    font-size: 13px; font-weight: 400;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.2s;
  }
  .dd-section-btn-selected {
    background: rgba(59,130,246,0.08);
    border-color: #3B82F6;
    color: #60A5FA;
    font-weight: 700;
  }

  /* Name input */
  .dd-name-input {
    width: 100%; padding: 16px;
    background: #171D30;
    border: 2px solid #1E2A4A;
    border-radius: 12px;
    color: #E2E8F0;
    font-size: 18px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .dd-name-input-active { border-color: #3B82F6; }
  .dd-char-count { font-size: 11px; color: #64748B; text-align: right; margin-top: 4px; }
  .dd-name-preview { margin-top: 16px; padding: 20px; border-radius: 12px; text-align: center; }
  .dd-name-preview-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px; font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  /* Preview step */
  .dd-preview-banner { border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #1E2A4A; }
  .dd-preview-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 900;
    color: #fff; text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    margin-bottom: 4px;
  }
  .dd-preview-theme { font-size: 11px; color: rgba(255,255,255,0.6); text-align: center; }
  .dd-preview-sections { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .dd-preview-section {
    background: #171D30; border: 1px solid #1E2A4A;
    border-radius: 10px; padding: 12px;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    gap: 10px;
  }
  .dd-preview-section-icon { font-size: 20px; }
  .dd-preview-section-name { font-size: 14px; font-weight: 700; color: #E2E8F0; }
  .dd-preview-section-sub { font-size: 11px; color: #64748B; }

  /* Summary table */
  .dd-summary {
    background: #131829; border: 1px solid #1E2A4A;
    border-radius: 12px; padding: 14px; font-size: 12px;
  }
  .dd-summary-header { color: #3B82F6; font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 1.5px; margin-bottom: 8px; }
  .dd-summary-row { display: -webkit-flex; display: flex; -webkit-justify-content: space-between; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1E2A4A; }
  .dd-summary-row-last { border-bottom: none; }
  .dd-summary-label { color: #64748B; }
  .dd-summary-value { color: #E2E8F0; font-weight: 600; }

  /* Lock in */
  .dd-lockin {
    width: 100%; margin-top: 16px; padding: 14px;
    background: linear-gradient(135deg, #3B82F6, #2563EB);
    border: none; border-radius: 12px;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700; font-size: 14px;
    cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(59,130,246,0.3);
  }

  /* Submitted */
  .dd-done { animation: fadeUp 0.5s ease; text-align: center; padding-top: 40px; }
  .dd-done-emoji { font-size: 56px; margin-bottom: 12px; }
  .dd-done-title { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; color: #22C55E; margin-bottom: 8px; }
  .dd-done-text { font-size: 14px; color: #94A3B8; line-height: 1.7; margin-bottom: 24px; }
  .dd-done-ring { background: rgba(249,115,22,0.06); border: 1px solid rgba(249,115,22,0.19); border-radius: 10px; padding: 14px; font-size: 13px; color: #94A3B8; }

  /* Plan Your Attack */
  .dd-plan { animation: fadeUp 0.3s ease; text-align: center; padding-top: 20px; }
  .dd-plan-icon { font-size: 48px; margin-bottom: 12px; }
  .dd-plan-title { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900; color: #60A5FA; margin-bottom: 8px; }
  .dd-plan-desc { font-size: 14px; color: #94A3B8; line-height: 1.7; margin-bottom: 16px; }
  .dd-plan-time { background: #131829; border: 1px solid #1E2A4A; border-radius: 10px; padding: 12px; font-size: 13px; color: #64748B; margin-bottom: 20px; }
  .dd-plan-time strong { color: #F97316; }
  .dd-plan-start {
    padding: 14px 32px;
    background: linear-gradient(135deg, #3B82F6, #2563EB);
    border: none; border-radius: 12px;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700; font-size: 14px;
    cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(59,130,246,0.3);
  }

  /* Nav */
  .dd-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(11,15,26,0.95);
    border-top: 1px solid #1E2A4A;
    padding: 10px 16px;
    display: -webkit-flex; display: flex;
    -webkit-justify-content: space-between; justify-content: space-between;
    max-width: 600px; margin: 0 auto; z-index: 20;
  }
  .dd-back {
    padding: 10px 20px; border-radius: 8px;
    font-size: 13px; cursor: pointer;
    font-family: 'Nunito', sans-serif;
    background: #171D30; border: 1px solid #1E2A4A; color: #94A3B8;
  }
  .dd-back-hidden { background: transparent; border: 1px solid transparent; color: transparent; cursor: default; }
  .dd-next {
    padding: 10px 24px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 0.5px; cursor: pointer;
  }
  .dd-next-enabled { background: #3B82F6; color: #fff; }
  .dd-next-disabled { background: #1E2A4A; color: #64748B; cursor: not-allowed; }
</style>
</head>
<body>

<div id="loading"></div>

<div id="home-view">
  <div id="wd-ring-pill">
    <span style="font-size:18px;">&#x1F48D;</span>
    <span id="wd-ring-value">--</span>
  </div>
  <div class="wd-today-card">
    <div id="wd-today-text">WOLFKID COMMAND CENTER</div>
  </div>
  <div class="wd-nav-cards">
    <a class="wd-card" href="/daily-missions">
      <div class="wd-card-icon">&#x1F3AF;</div>
      <div class="wd-card-body">
        <div class="wd-card-title">DAILY MISSIONS</div>
        <div class="wd-card-sub">Today's activities &amp; goals</div>
      </div>
      <div class="wd-card-arrow">&#x276F;</div>
    </a>
    <a class="wd-card" href="/homework">
      <div class="wd-card-icon">&#x1F4DA;</div>
      <div class="wd-card-body">
        <div class="wd-card-title">HOMEWORK MODULE</div>
        <div class="wd-card-sub">Math, Science, CER training</div>
      </div>
      <div class="wd-card-arrow">&#x276F;</div>
    </a>
    <a class="wd-card" href="/buggsy">
      <div class="wd-card-icon">&#x1F43A;</div>
      <div class="wd-card-body">
        <div class="wd-card-title">BUGGSY BOARD</div>
        <div class="wd-card-sub">Chores, rings &amp; rewards</div>
      </div>
      <div class="wd-card-arrow">&#x276F;</div>
    </a>
  </div>
</div>

<div id="wd-wrench" onclick="showPinOverlay()">&#x1F527;</div>

<div id="wd-pin-overlay">
  <div class="wd-pin-box">
    <div class="wd-pin-title">CUSTOMIZE</div>
    <div class="wd-pin-sub">Parent PIN required</div>
    <input class="wd-pin-input" id="wd-pin-input" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off" placeholder="****">
    <div class="wd-pin-error" id="wd-pin-error"></div>
    <button class="wd-pin-enter" onclick="submitPin()">ENTER</button>
    <button class="wd-pin-cancel" onclick="hidePinOverlay()">Cancel</button>
  </div>
</div>

<div id="wizard-view">
  <div id="dd-app"></div>
</div>

<script>
// ── Mode Detection ──
var TBM_TEST_MODE = window.location.search.indexOf('test=1') !== -1;
var TBM_CUSTOMIZE_MODE = window.location.search.indexOf('customize=1') !== -1;

if (TBM_TEST_MODE) {
  var _tbanner = document.createElement('div');
  _tbanner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#fbbf24;color:#000;text-align:center;padding:4px;font-size:12px;font-weight:700;z-index:99999;letter-spacing:1px';
  _tbanner.textContent = 'TEST MODE \u2014 Nothing saves';
  document.body.appendChild(_tbanner);
  document.body.style.paddingTop = '28px';
}

/* ===== LEVELS ===== */
var LEVELS_FALLBACK = [
  { min: 0, label: 'Recruit', color: '#64748B' },
  { min: 25, label: 'Scout', color: '#22C55E' },
  { min: 75, label: 'Ranger', color: '#3B82F6' },
  { min: 150, label: 'Warrior', color: '#8B5CF6' },
  { min: 300, label: 'Champion', color: '#F97316' },
  { min: 500, label: 'Legend', color: '#FFD700' }
];

function safeParse(d) { return typeof d === 'string' ? JSON.parse(d) : d; }

function getLevel(points, tiers) {
  var tbl = tiers || LEVELS_FALLBACK;
  var lvl = tbl[0];
  for (var i = 0; i < tbl.length; i++) {
    if (points >= tbl[i].min) { lvl = tbl[i]; }
  }
  return lvl;
}

/* ===== WIZARD DATA ===== */
var THEMES = [
  { id: "wolfkid", name: "Wolfkid Universe", emoji: "\uD83D\uDC3A", colors: ["#0B0F1A","#3B82F6","#60A5FA","#EF4444"], desc: "Dark & electric. Your original universe.", preview: "linear-gradient(135deg, #0B0F1A 0%, #1E293B 50%, #3B82F6 100%)" },
  { id: "minecraft", name: "Minecraft", emoji: "\u26CF\uFE0F", colors: ["#3B7D4F","#8B6914","#5C8A3C","#4A4A4A"], desc: "Blocky, green, earthy. Craft your homework.", preview: "linear-gradient(135deg, #3B7D4F 0%, #5C8A3C 50%, #8B6914 100%)" },

  rewards:  ["Loot Shop", "Prize Vault", "Reward Center", "Trophy Room", "The Armory", "Power-Up Shop"]
};

  { id: "wolfkid",        name: "Wolfkid",        emoji: "\uD83D\uDC3A", desc: "Your original character" },

];

var STEPS = ["Theme", "Sections", "Mascot", "Name It", "Preview"];

/* ===== WIZARD STATE ===== */
var state = {
  started: false,
  step: 0,
  theme: null,
  sectionHomework: null,
  sectionChores: null,
  sectionRewards: null,
  mascot: null,
  dashName: "",
  submitted: false
};

/* ===== HELPERS ===== */
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function findTheme(id) {
  for (var i = 0; i < THEMES.length; i++) { if (THEMES[i].id === id) return THEMES[i]; }
  return null;
}
function findMascot(id) {
  for (var i = 0; i < MASCOT_IDEAS.length; i++) { if (MASCOT_IDEAS[i].id === id) return MASCOT_IDEAS[i]; }
  return null;
}
function canNext() {
  var s = state.step;
  if (s === 0) return state.theme !== null;
  if (s === 1) return state.sectionHomework !== null && state.sectionChores !== null && state.sectionRewards !== null;
  if (s === 2) return state.mascot !== null;
  if (s === 3) return state.dashName.replace(/^\s+|\s+$/g,'').length > 0;
  return true;
}

/* ===== HOME VIEW ACTIONS ===== */
function showPinOverlay() {
  var overlay = document.getElementById('wd-pin-overlay');
  var inp = document.getElementById('wd-pin-input');
  var err = document.getElementById('wd-pin-error');
  if (overlay) { overlay.style.display = '-webkit-flex'; overlay.style.display = 'flex'; }
  if (err) { err.textContent = ''; }
  if (inp) { inp.value = ''; setTimeout(function() { inp.focus(); }, 50); }
}

function hidePinOverlay() {
  var overlay = document.getElementById('wd-pin-overlay');
  if (overlay) { overlay.style.display = 'none'; }
}

function submitPin() {
  var inp = document.getElementById('wd-pin-input');
  var err = document.getElementById('wd-pin-error');
  var pin = (inp ? inp.value : '').replace(/\D/g,'').slice(0,4);
  if (pin.length !== 4) {
    if (err) { err.textContent = 'Enter all 4 digits'; }
    return;
  }
  if (TBM_TEST_MODE) {
    hidePinOverlay();
    showWizardView();
    return;
  }
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    var btn = document.querySelector('.wd-pin-enter');
    if (btn) { btn.disabled = true; }
    google.script.run
      .withSuccessHandler(function(ok) {
        if (btn) { btn.disabled = false; }
        if (ok) { hidePinOverlay(); showWizardView(); }
        else { if (err) { err.textContent = 'Incorrect PIN'; } if (inp) { inp.value = ''; inp.focus(); } }
      })
      .withFailureHandler(function() {
        if (btn) { btn.disabled = false; }
        if (err) { err.textContent = 'Connection error — try again'; }
      })
      .khVerifyPinSafe(pin);
  } else {
    hidePinOverlay();
    showWizardView();
  }
}

function showWizardView() {
  var homeView = document.getElementById('home-view');
  var wrench = document.getElementById('wd-wrench');
  var wizView = document.getElementById('wizard-view');
  if (homeView) { homeView.style.display = 'none'; }
  if (wrench) { wrench.style.display = 'none'; }
  if (wizView) { wizView.style.display = 'block'; }
  // Pre-populate defaults
  if (!state.theme) { state.theme = 'wolfkid'; }
  if (!state.mascot) { state.mascot = 'custom_creature'; }
  if (!state.sectionHomework) { state.sectionHomework = 'Mission Control'; }
  if (!state.sectionChores) { state.sectionChores = 'Daily Quests'; }
  if (!state.sectionRewards) { state.sectionRewards = 'Power-Up Shop'; }
  if (!state.dashName) { state.dashName = 'THE WOLFDOME'; }
  state.started = true;
  state.step = 0;
  render();
}

function onWizardBack() {
  if (TBM_CUSTOMIZE_MODE) {
    window.location.href = '/wolfdome';
  } else {
    var homeView = document.getElementById('home-view');
    var wrench = document.getElementById('wd-wrench');
    var wizView = document.getElementById('wizard-view');
    if (homeView) { homeView.style.display = 'block'; }
    if (wrench) { wrench.style.display = '-webkit-flex'; wrench.style.display = 'flex'; }
    if (wizView) { wizView.style.display = 'none'; }
  }
}

/* ===== HOME DATA ===== */
function loadHomeData() {
  var timeout = setTimeout(function() {
    showHomeView();
  }, 8000);

  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function(raw) {
        clearTimeout(timeout);
        onKidsHubData(raw);
      })
      .withFailureHandler(function() {
        clearTimeout(timeout);
        showHomeView();
      })
      .getKidsHubDataSafe('buggsy');
  } else {
    clearTimeout(timeout);
    showHomeView();
  }
}

function onKidsHubData(raw) {
  try {
    var data = safeParse(raw);
    var balance = (data && data.balances && data.balances.buggsy) ? (data.balances.buggsy.balance || 0) : 0;
    var ringVal = document.getElementById('wd-ring-value');
    if (ringVal) { ringVal.textContent = balance; }
    // Seed defaults on first load
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function(choices) {
          if (!choices) {
            var defaults = {
              child: 'buggsy', theme: 'wolfkid', dashName: 'THE WOLFDOME',
              mascot: 'custom_creature', sectionHomework: 'Mission Control',
              sectionChores: 'Daily Quests', sectionRewards: 'Power-Up Shop',
              date: new Date().toISOString()
            };
            google.script.run
              .withSuccessHandler(function() {})
              .withFailureHandler(function() {})
              .saveDesignChoicesSafe(defaults);
          }
        })
        .withFailureHandler(function() {})
        .getDesignChoicesSafe('buggsy');
    }
  } catch(e) {}
  showHomeView();
}

function showHomeView() {
  var loading = document.getElementById('loading');
  var homeView = document.getElementById('home-view');
  var wrench = document.getElementById('wd-wrench');
  if (loading) { loading.style.display = 'none'; }
  if (homeView) { homeView.style.display = 'block'; }
  if (wrench) { wrench.style.display = '-webkit-flex'; wrench.style.display = 'flex'; }
}

/* ===== WIZARD ACTIONS ===== */
function startWizard() { state.started = true; render(); }
function goBack() { if (state.step > 0) { state.step--; render(); } }
function goNext() { if (canNext() && state.step < 4) { state.step++; render(); } }
function selectTheme(id) { state.theme = id; render(); }
function selectSection(category, name) {
  if (category === 'homework') { state.sectionHomework = name; }
  else if (category === 'chores') { state.sectionChores = name; }
  else if (category === 'rewards') { state.sectionRewards = name; }
  render();
}
function selectMascot(id) { state.mascot = id; render(); }
function updateDashName(el) {
  state.dashName = el.value;
  render();
  var inp = document.getElementById('dash-name-input');
  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}
function lockItIn() {
  var payload = {
    child: 'buggsy',
    theme: state.theme,
    dashName: state.dashName,
    mascot: state.mascot,
    sectionHomework: state.sectionHomework,
    sectionChores: state.sectionChores,
    sectionRewards: state.sectionRewards,
    date: new Date().toISOString()
  };
  if (TBM_TEST_MODE) {
    console.log('[TEST MODE] saveDesignChoicesSafe skipped', payload);
    state.submitted = true; render(); return;
  }
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function() { state.submitted = true; render(); })
      .withFailureHandler(function(err) { alert('Save failed \u2014 ' + (err && err.message ? err.message : 'unknown error') + '. Try again.'); })
      .saveDesignChoicesSafe(payload);
  } else {
    state.submitted = true; render();
  }
}

/* ===== WIZARD RENDER ===== */
function render() {
  var app = document.getElementById('dd-app');
  if (!app) return;
  var html = '';

  html += '<header class="dd-header"><div class="dd-header-inner">';
  html += '<div class="dd-title">\uD83C\uDFA8 DESIGN YOUR DASHBOARD</div>';
  html += '<div class="dd-subtitle">First mission: make this YOURS</div>';
  if (state.started && !state.submitted) {
    html += '<div class="dd-progress">';
    for (var i = 0; i < STEPS.length; i++) {
      html += '<div class="dd-bar ' + (i <= state.step ? 'dd-bar-active' : 'dd-bar-inactive') + '"></div>';
    }
    html += '</div><div class="dd-labels">';
    for (var i = 0; i < STEPS.length; i++) {
      html += '<span class="dd-label ' + (i === state.step ? 'dd-label-active' : 'dd-label-inactive') + '">' + STEPS[i] + '</span>';
    }
    html += '</div>';
  }
  html += '</div></header>';

  html += '<main class="dd-main">';
  if (!state.started) { html += renderPlanScreen(); }
  else if (state.submitted) { html += renderSubmitted(); }
  else if (state.step === 0) { html += renderThemeStep(); }
  else if (state.step === 1) { html += renderSectionsStep(); }
  else if (state.step === 2) { html += renderMascotStep(); }
  else if (state.step === 3) { html += renderNameStep(); }
  else if (state.step === 4) { html += renderPreviewStep(); }
  html += '</main>';

  if (state.started && !state.submitted) { html += renderNav(); }
  app.innerHTML = html;
}
