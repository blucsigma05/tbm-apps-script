<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="tbm-module" content="daily-missions">
<meta name="tbm-version" content="v16">
<title>Daily Missions</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0B0F1A;
  color: #E2E8F0;
  font-family: 'Nunito', sans-serif;
  position: relative;
  overflow-x: hidden;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.15; }
  50% { opacity: 0.6; }
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes ringPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
@keyframes celebrateBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes sparkleFloat {
  0% { opacity: 0; transform: translateY(100vh) scale(0.4); }
  15% { opacity: 0.5; }
  50% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-10vh) scale(0.9); }
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1E2A4A; border-radius: 3px; }

/* ─── Starfield (Buggsy) ─── */
#starfield {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: #ffffff;
  opacity: 0.2;
}

/* ─── Header (Buggsy) ─── */
#app-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(11,15,26,0.95);
  border-bottom: 1px solid #1E2A4A;
  padding: 10px 16px;
}
.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 800px;
  margin: 0 auto;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-logo { font-size: 22px; }
.header-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 900;
  background: linear-gradient(90deg, #f59e0b, #fbbf24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 1px;
}
.header-subtitle {
  font-size: 9px;
  color: #64748B;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
}
.header-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #94A3B8;
  background: #171D30;
  padding: 4px 12px;
  border-radius: 8px;
  border: 1px solid #1E2A4A;
}

/* ─── Main Content ─── */
.main-content {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px 16px 100px;
  position: relative;
  z-index: 10;
}
body.jj-theme .main-content {
  padding: 40px 40px 100px;
}

/* ─── Greeting ─── */
.greeting {
  font-size: 16px;
  font-weight: 600;
  color: #94A3B8;
  margin-bottom: 6px;
  animation: fadeSlide 0.4s ease;
}
.day-focus {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: #f59e0b;
  letter-spacing: 1px;
  margin-bottom: 20px;
  animation: fadeSlide 0.5s ease;
}

/* ─── Mission Card ─── */
.mission-card {
  background: #111827;
  border: 1px solid #1E2A4A;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 14px;
  animation: fadeSlide 0.4s ease;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.mission-card:hover {
  border-color: rgba(96,165,250,0.3);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.mission-card.completed {
  border-color: rgba(34,197,94,0.3);
  opacity: 0.7;
}
.mission-number {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1E2A4A, #111827);
  border: 1px solid #334155;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #f59e0b;
  flex-shrink: 0;
}
.mission-card.completed .mission-number {
  background: linear-gradient(135deg, #14532D, #111827);
  border-color: #22C55E;
  color: #22C55E;
}
.mission-info {
  flex: 1;
  min-width: 0;
}
.mission-name {
  font-size: 15px;
  font-weight: 700;
  color: #E2E8F0;
  margin-bottom: 4px;
}
.mission-card.completed .mission-name {
  text-decoration: line-through;
  color: #64748B;
}
.mission-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.mission-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #64748B;
}
.mission-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 500;
}
.tag-math { background: rgba(96,165,250,0.15); color: #60A5FA; border: 1px solid rgba(96,165,250,0.3); }
.tag-rla { background: rgba(168,85,247,0.15); color: #A855F7; border: 1px solid rgba(168,85,247,0.3); }
.tag-science { background: rgba(34,197,94,0.15); color: #22C55E; border: 1px solid rgba(34,197,94,0.3); }
.tag-review { background: rgba(245,158,11,0.15); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
.tag-creative { background: rgba(236,72,153,0.15); color: #EC4899; border: 1px solid rgba(236,72,153,0.3); }

.mission-actions {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.launch-btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  font-weight: 700;
  background: linear-gradient(135deg, #2a1a00, #1a1000);
  border: 1px solid #f59e0b;
  color: #f59e0b;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 1px;
  min-height: 36px;
}
.launch-btn:hover {
  box-shadow: 0 0 12px rgba(245,158,11,0.4);
  background: linear-gradient(135deg, #3d2500, #2a1a00);
}
.check-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid #334155;
  background: transparent;
  color: #64748B;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
  padding: 0;
}
.check-btn:hover {
  border-color: #22C55E;
  color: #22C55E;
}
.check-btn.checked {
  background: #22C55E;
  border-color: #22C55E;
  color: #fff;
}

/* ─── Footer Summary ─── */
.footer-summary {
  background: #111827;
  border: 1px solid #1E2A4A;
  border-radius: 12px;
  padding: 16px;
  margin-top: 8px;
  text-align: center;
}
.total-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #94A3B8;
  margin-bottom: 8px;
}
.ring-reward {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: #F59E0B;
  letter-spacing: 0.5px;
  animation: ringPulse 2s ease infinite;
  display: inline-block;
}

/* ─── Celebration Banner ─── */
.celebration-banner {
  background: linear-gradient(135deg, #2a1a00, #1a1000);
  border: 2px solid #f59e0b;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  margin-bottom: 16px;
  animation: celebrateBounce 1s ease infinite;
  display: none;
}
.celebration-banner.active { display: block; }
.celebration-emoji { font-size: 36px; margin-bottom: 8px; }
.celebration-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #f59e0b;
  letter-spacing: 1px;
}
.celebration-sub {
  font-size: 12px;
  color: #94A3B8;
  margin-top: 4px;
}

/* ─── Weekend ─── */
.weekend-card {
  background: #111827;
  border: 1px solid #1E2A4A;
  border-radius: 12px;
  padding: 40px 20px;
  text-align: center;
}
.weekend-emoji { font-size: 48px; margin-bottom: 12px; }
.weekend-text {
  font-size: 16px;
  font-weight: 700;
  color: #94A3B8;
  margin-bottom: 16px;
}
.bonus-card {
  background: linear-gradient(135deg, #1A1400, #261800);
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: 12px;
  padding: 16px;
  margin-top: 16px;
  text-align: center;
}
.bonus-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: #F59E0B;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.bonus-desc {
  font-size: 13px;
  color: #94A3B8;
}

/* ════════════════════════════════════════
   JJ / SPARKLE THEME
   ════════════════════════════════════════ */
body.jj-theme {
  background: linear-gradient(170deg, #1f0e35 0%, #251240 50%, #1f0e35 100%);
  color: #fff;
  font-family: 'Nunito', sans-serif;
}
body.jj-theme ::-webkit-scrollbar-thumb { background: #a855f7; }

/* JJ sparkle bg */
.jj-sparkle-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
  display: none;
}
body.jj-theme .jj-sparkle-bg { display: block; }
body.jj-theme #starfield { display: none; }
.jj-sparkle-dot {
  position: absolute;
  border-radius: 50%;
  opacity: 0.35;
  animation-name: jjDotTwinkle;
  animation-timing-function: ease-in-out;
  animation-iteration-count: infinite;
}
@keyframes jjDotTwinkle {
  0%, 100% { opacity: 0.1; transform: scale(0.8); }
  50%       { opacity: 0.6; transform: scale(1.2); }
}

/* JJ Header */
body.jj-theme #app-header {
  background: linear-gradient(180deg, #2d0a5e 0%, #1a0533 100%);
  border-bottom: 2px solid rgba(236,72,153,0.35);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
body.jj-theme .header-title {
  font-family: 'Fredoka One', cursive;
  font-size: 32px;
  background: linear-gradient(135deg, #fde68a, #f9a8d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0;
}
body.jj-theme .header-subtitle {
  font-family: 'Fredoka One', cursive;
  color: rgba(249,168,212,0.65);
  letter-spacing: 1px;
}
body.jj-theme .header-date {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.2);
  color: #fde68a;
}

/* JJ Greeting */
body.jj-theme .greeting {
  color: #f9a8d4;
  font-family: 'Fredoka One', cursive;
  font-size: 42px;
  font-weight: 400;
}
body.jj-theme .day-focus {
  font-family: 'Fredoka One', cursive;
  color: rgba(249,168,212,0.8);
  font-size: 24px;
}

/* JJ Mission Cards */
body.jj-theme .mission-card {
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 16px;
  padding: 16px;
  min-height: 80px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
body.jj-theme .mission-card:hover {
  border-color: rgba(236,72,153,0.7);
  box-shadow: 0 8px 24px rgba(236,72,153,0.3);
  transform: translateY(-2px);
}
body.jj-theme .mission-card.completed {
  border-color: rgba(253,230,138,0.5);
  background: rgba(253,230,138,0.06);
  opacity: 0.8;
}
body.jj-theme .mission-number {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6c1b9a, #a855f7);
  border: 2px solid rgba(253,230,138,0.6);
  font-family: 'Fredoka One', cursive;
  font-size: 20px;
  color: #fde68a;
  box-shadow: 0 0 12px rgba(168,85,247,0.4);
}
body.jj-theme .mission-card.completed .mission-number {
  background: linear-gradient(135deg, #92400e, #b45309);
  border-color: #fde68a;
  color: #fde68a;
  box-shadow: 0 0 8px rgba(253,230,138,0.3);
}
body.jj-theme .mission-name {
  font-family: 'Fredoka One', cursive;
  font-size: 32px;
  font-weight: 400;
  color: #fff;
}
body.jj-theme .mission-card.completed .mission-name {
  text-decoration: line-through;
  color: rgba(255,255,255,0.5);
}
body.jj-theme .mission-meta { display: none; }
.star-reward {
  display: none;
  font-size: 32px;
  color: #FFD700;
  font-family: 'Fredoka One', cursive;
}
body.jj-theme .star-reward {
  display: block;
  margin-top: 2px;
  background: rgba(253,230,138,0.12);
  border: 1px solid rgba(253,230,138,0.35);
  border-radius: 10px;
  padding: 2px 8px;
  animation: starGlow 2s ease-in-out infinite;
}
@keyframes starGlow {
  0%, 100% { box-shadow: 0 0 6px rgba(253,230,138,0.3); }
  50%       { box-shadow: 0 0 14px rgba(253,230,138,0.7); }
}
body.jj-theme .launch-btn {
  font-family: 'Fredoka One', cursive;
  font-size: 32px;
  background: linear-gradient(135deg, #ec4899, #a855f7);
  border: 2px solid rgba(255,255,255,0.3);
  color: #FFFFFF;
  padding: 10px 18px;
  border-radius: 24px;
  letter-spacing: 0;
  min-height: 80px;
  min-width: 80px;
  box-shadow: 0 4px 16px rgba(168,85,247,0.4);
}
body.jj-theme .launch-btn:hover {
  box-shadow: 0 6px 24px rgba(236,72,153,0.6);
  transform: scale(1.04);
}
body.jj-theme .check-btn {
  width: 80px;
  height: 80px;
  border-color: rgba(255,255,255,0.2);
  font-size: 18px;
  color: rgba(255,255,255,0.4);
}
body.jj-theme .check-btn:hover {
  border-color: #fde68a;
  color: #fde68a;
}
body.jj-theme .check-btn.checked {
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  border-color: #fde68a;
  color: #000;
}

/* JJ Footer */
body.jj-theme .footer-summary {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.18);
  box-shadow: 0 -4px 16px rgba(168,85,247,0.15);
}
body.jj-theme .total-time {
  color: rgba(249,168,212,0.7);
  font-family: 'Fredoka One', cursive;
}
body.jj-theme .ring-reward {
  font-family: 'Fredoka One', cursive;
  color: #fde68a;
}

/* JJ Celebration */
body.jj-theme .celebration-banner {
  background: linear-gradient(135deg, #2d0a5e, #1a0533);
  border-color: #fde68a;
  box-shadow: 0 0 24px rgba(253,230,138,0.25);
}
body.jj-theme .celebration-text {
  font-family: 'Fredoka One', cursive;
  color: #f9a8d4;
}
body.jj-theme .celebration-sub { color: rgba(255,200,240,0.7); }

/* JJ Weekend */
body.jj-theme .weekend-card {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.18);
}
body.jj-theme .weekend-text {
  font-family: 'Fredoka One', cursive;
  color: #f9a8d4;
}
body.jj-theme .bonus-card {
  background: rgba(253,230,138,0.08);
  border-color: rgba(253,230,138,0.3);
}
body.jj-theme .bonus-title {
  font-family: 'Fredoka One', cursive;
  color: #fde68a;
}
body.jj-theme .bonus-desc { color: rgba(255,255,255,0.6); }

/* ─── Ring Burst ─── */
.b-ring-particle {
  position: fixed;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  animation: ringBurst 0.7s ease-out forwards;
}
@keyframes ringBurst {
  0%   { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
}

/* ─── XP Pop ─── */
.xp-pop {
  position: fixed;
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  font-weight: 900;
  color: #f59e0b;
  text-shadow: 0 0 12px rgba(245,158,11,0.8);
  pointer-events: none;
  z-index: 9999;
  animation: xpFloat 1.4s ease-out forwards;
}
@keyframes xpFloat {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  60%  { opacity: 1; transform: translateY(-60px) scale(1.2); }
  100% { opacity: 0; transform: translateY(-100px) scale(0.9); }
}

/* ─── JJ Launch Btn Pulse ─── */
@keyframes jjBtnPulse {
  0%, 100% { box-shadow: 0 4px 16px rgba(168,85,247,0.4), 0 0 0 0 rgba(236,72,153,0.5); }
  50%       { box-shadow: 0 4px 24px rgba(168,85,247,0.6), 0 0 0 10px rgba(236,72,153,0); }
}
body.jj-theme .launch-btn {
  animation: jjBtnPulse 2s ease-in-out infinite;
}
#launch-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: #07001a;
  z-index: 9999;
  -webkit-box-sizing: border-box;
  box-sizing: border-box;
  padding-top: 200px;
  text-align: center;
}
#launch-overlay .ov-icon { font-size: 72px; margin-bottom: 20px; }
#launch-overlay .ov-text { color: #fff; font-size: 26px; font-weight: 800; letter-spacing: 3px; }
#launch-overlay .ov-sub  { color: rgba(255,255,255,0.45); font-size: 15px; margin-top: 14px; }

}
body.jj-theme #brain-break-overlay .bb-icon { font-size: 56px; }

}

/* ─── ExecSkills Styles (inlined #171) ─── */
.es-plan-attack{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;margin:16px 0;text-align:center;}
.es-plan-attack h2{font-size:20px;color:#f0f0f0;margin:0 0 8px 0;font-family:'Orbitron','Segoe UI',sans-serif;letter-spacing:1px;}
.es-plan-attack .es-subtitle{font-size:13px;color:#8b8fa3;margin:0 0 20px 0;}
.es-plan-overview{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:8px;-webkit-justify-content:center;justify-content:center;margin:16px 0;}
.es-plan-pill{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:8px 16px;font-size:13px;color:#c0c4d6;}
.es-plan-pill .es-pill-type{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#6c63ff;display:block;margin-bottom:2px;}

      var q = options.questions[i];
      pills += '<div class="es-plan-pill"><span class="es-pill-type">' + (q.type || 'Mission ' + (i + 1)) + '</span>' + (q.topic || 'Mission ' + (i + 1)) + '</div>';
    }

      '<h2>' + title + '</h2>' +
      '<p class="es-subtitle">' + subtitle + '</p>' +
      '<div class="es-time-estimate">&#9202; Estimated time: ~' + (options.timeEstimate || 30) + ' min</div>' +
      '<div class="es-plan-overview">' + pills + '</div>' +
      '<button class="es-ready-btn" onclick="ExecSkills._onPlanReady()">' + btnText + '</button>' +
    '</div>';
    var overlay = document.getElementById('es-plan-overlay');
    var container = document.getElementById(options.container);
    if (container) container.innerHTML = html;
    if (overlay) overlay.style.display = '-webkit-flex';
    if (overlay) overlay.style.display = 'flex';
  }

  function _onPlanReady() {
    startSessionTimer(_isSparkle);
    if (_planAttackCallback) _planAttackCallback();
  }

  function startSessionTimer(isSparkle) {
    _sessionStartTime = Date.now();
    var timerEl = document.createElement('div');
    timerEl.id = 'es-session-timer';
    timerEl.className = 'es-session-timer' + (isSparkle ? ' sparkle' : '');
    timerEl.innerHTML = '0:00';
    document.body.appendChild(timerEl);
    _sessionTimerInterval = setInterval(function() {
      var elapsed = Math.floor((Date.now() - _sessionStartTime) / 1000);
      var min = Math.floor(elapsed / 60);
      var sec = elapsed % 60;
      timerEl.innerHTML = min + ':' + (sec < 10 ? '0' : '') + sec;
    }, 1000);
  }

  function stopSessionTimer() {
    if (_sessionTimerInterval) { clearInterval(_sessionTimerInterval); _sessionTimerInterval = null; }
    return _sessionStartTime ? Math.floor((Date.now() - _sessionStartTime) / 1000) : 0;
  }

  return {
    showPlanYourAttack: showPlanYourAttack, startSessionTimer: startSessionTimer,
    stopSessionTimer: stopSessionTimer, _onPlanReady: _onPlanReady
  };
})();

// ─── BRAIN BREAK (#170) ───
var _brainBreakAfter = 4;
var _brainBreakPrompt = 'Stand up and do 10 jumping jacks!';
var _missionsSinceBrainBreak = 0;
var _brainBreakTimerInterval = null;
var _pendingLaunchUrl = null;

function checkBrainBreak(pendingUrl) {
  _missionsSinceBrainBreak++;
  if (_brainBreakAfter > 0 && _missionsSinceBrainBreak >= _brainBreakAfter) {
    _pendingLaunchUrl = pendingUrl || null;
    showBrainBreak();
    _missionsSinceBrainBreak = 0;
    return true;
  }
  return false;
}

function showBrainBreak() {
  var overlay = document.getElementById('brain-break-overlay');
  if (!overlay) return;
  var promptEl = document.getElementById('bb-prompt');
  var timerEl = document.getElementById('bb-timer');
  /* #185 — swap icon and header for JJ Sparkle Kingdom theme */
  var bbIcon = overlay.querySelector('[style*="font-size:56px"]');
  var bbHeader = overlay.querySelector('[style*="BRAIN BREAK"], [style*="color:#a855f7"]');
  if (isJJ()) {
    if (bbIcon) { bbIcon.textContent = '\uD83C\uDF1F'; }
    if (bbHeader) { bbHeader.textContent = 'SPARKLE BREAK!'; }
    if (promptEl) { promptEl.textContent = _brainBreakPrompt || 'Stand up and spin around 5 times!'; }
  } else {
    if (promptEl) { promptEl.textContent = _brainBreakPrompt; }
  }
  overlay.style.display = 'block';
  var remaining = 30;
  if (timerEl) timerEl.textContent = remaining;
  _brainBreakTimerInterval = setInterval(function() {
    remaining--;
    if (timerEl) timerEl.textContent = remaining;
    if (remaining <= 0) { endBrainBreak(); }
  }, 1000);
}

function endBrainBreak() {
  if (_brainBreakTimerInterval) { clearInterval(_brainBreakTimerInterval); _brainBreakTimerInterval = null; }
  var overlay = document.getElementById('brain-break-overlay');
  if (overlay) overlay.style.display = 'none';
  if (_pendingLaunchUrl) {
    var url = _pendingLaunchUrl;
    _pendingLaunchUrl = null;
    window.location.href = url;
  }
}

// ============================================================
// INIT — v10 perf: single combined server call replaces 4 sequential
// ============================================================
function init() {
  parseChildParam();
  setupDate();

  if (isJJ()) {
    applyJJTheme();
  } else {
    buildStarfield();
  }

  // Try combined endpoint first (1 call instead of 4)
  // Wrapped in try/catch because CF worker shim may not have this function yet
  var combinedAvailable = false;
  try {
    if (typeof google !== 'undefined' && google.script && google.script.run &&
        typeof google.script.run.getDailyMissionsInitSafe === 'function') {
      combinedAvailable = true;
      google.script.run
        .withSuccessHandler(function(result) {
          try {
            var data = (typeof result === 'string') ? JSON.parse(result) : result;
            if (data && typeof data.isDay1 !== 'undefined') {
              applyInitData_(data);
              return;
            }
          } catch(e) { /* fall through to legacy */ }
          initLegacy_();
        })
        .withFailureHandler(function() {
          initLegacy_();
        })
        .getDailyMissionsInitSafe(currentChild);
    }
  } catch(e) { /* function not on shim — fall through */ }
  if (!combinedAvailable) {
    initLegacy_();
  }
}

// Apply combined init data from getDailyMissionsInitSafe
function applyInitData_(data) {
  // 1. Day 1
  if (data.isDay1 === true) {
    dayOfWeek = 0;
  }

  // 2. Mission state
  if (data.missionState && typeof data.missionState === 'object') {
    _cachedMissionState = data.missionState;
    try { localStorage.setItem(todayKey, JSON.stringify(data.missionState)); } catch (e) {}
  }
  _serverStateLoaded = true;

  // 3. Design unlock
  _designUnlocked = (data.designUnlocked === true);

  // 4. Schedule
  var dynamicBlocks = null;
  if (data.schedule && data.schedule.blocks && data.schedule.blocks.length > 0) {
    dynamicSchedule = data.schedule;
    dynamicBlocks = data.schedule.blocks;
  }

  if (dayOfWeek !== 0 && dynamicBlocks) {
    var schedule = currentChild === 'jj' ? JJ_SCHEDULE : BUGGSY_SCHEDULE;
    if (schedule[dayOfWeek]) {
      schedule[dayOfWeek].blocks = dynamicBlocks;
    }
  }
  render();
}

// Legacy fallback: parallel calls 2+3, then schedule, then render
function initLegacy_() {
  isDay1(function(firstTime) {
    if (firstTime) {
      dayOfWeek = 0;
    }
    // Fire calls 2 and 3 in parallel (they are independent)
    var pendingCalls = 2;
    function checkReady() {
      pendingCalls--;
      if (pendingCalls === 0) {
        loadSchedule(function(dynamicBlocks) {
          if (dayOfWeek !== 0 && dynamicBlocks) {
            var schedule = isJJ() ? JJ_SCHEDULE : BUGGSY_SCHEDULE;
            if (schedule[dayOfWeek]) {
              schedule[dayOfWeek].blocks = dynamicBlocks;
            }
          }
          render();
        });
      }
    }
    loadMissionStateFromServer(checkReady);
    checkDesignUnlock(checkReady);
  });
}

// ============================================================
// URL PARAM PARSING (no URLSearchParams)
// ============================================================
function parseChildParam() {
  var search = window.location.search;
  if (!search || search.length < 2) return;
  var qs = search.substring(1);
  var pairs = qs.split('&');
  for (var i = 0; i < pairs.length; i++) {
    var kv = pairs[i].split('=');
    if (kv[0] === 'child' && kv[1]) {
      var val = decodeURIComponent(kv[1]).toLowerCase();
      if (val === 'jj') {
        currentChild = 'jj';
      }
    }
  }
}
// Sandbox mode: prefix child for isolated writes
if (TBM_SANDBOX) {
  currentChild = 'sandbox-' + currentChild;
}

function setupDate() {
  var now = new Date();
  dayOfWeek = now.getDay();
  var y = now.getFullYear();
  var m = String(now.getMonth() + 1);
  var d = String(now.getDate());
  if (m.length < 2) m = '0' + m;
  if (d.length < 2) d = '0' + d;
  todayKey = 'missions_' + y + '-' + m + '-' + d;
  launchedKey = 'launched_' + y + '-' + m + '-' + d;

  var dateStr = DAY_NAMES[dayOfWeek] + ', ' + MONTH_NAMES[now.getMonth()] + ' ' + now.getDate();
  document.getElementById('header-date').textContent = dateStr;
}

// ============================================================
// LOCALSTORAGE HELPERS
// ============================================================
function getMissionState() {
  if (_serverStateLoaded) return _cachedMissionState;
  try {
    var raw = localStorage.getItem(todayKey);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* ignore */ }
  return {};
}

function setMissionState(state) {
  try {
    localStorage.setItem(todayKey, JSON.stringify(state));
  } catch (e) { /* ignore */ }
  _cachedMissionState = state;
  if (TBM_TEST_MODE) {
    console.log('[TEST MODE] saveMissionStateSafe skipped');
  } else if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function() {})
      .withFailureHandler(function(err) { console.log('Mission state save failed: ' + (err && err.message ? err.message : 'unknown')); })
      .saveMissionStateSafe(currentChild, todayKey, state);
  }
}

function loadMissionStateFromServer(callback) {
  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    _serverStateLoaded = true;
    if (callback) callback();
    return;
  }
  google.script.run
    .withSuccessHandler(function(state) {
      if (state && typeof state === 'object') {
        _cachedMissionState = state;
        try { localStorage.setItem(todayKey, JSON.stringify(state)); } catch (e) {}
      }
      _serverStateLoaded = true;
      if (callback) callback();
    })
    .withFailureHandler(function() {
      _serverStateLoaded = true;
      if (callback) callback();
    })
    .getMissionStateSafe(currentChild, todayKey);
}

function loadSchedule(callback) {
  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    callback(null);
    return;
  }
  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.blocks && result.blocks.length > 0) {
        dynamicSchedule = result;
        callback(result.blocks);
      } else {
        callback(null);
      }
    })
    .withFailureHandler(function() {
      callback(null);
    })
    .getDailyScheduleSafe(currentChild);
}

function isMissionDone(missionId) {
  var state = getMissionState();
  return state[missionId] === true;
}

function toggleMission(missionId) {
  var state = getMissionState();
  if (state[missionId]) {
    delete state[missionId];
  } else {
    state[missionId] = true;
  }
  setMissionState(state);
  render();
}

function getGreeting() {
  var hour = new Date().getHours();
  if (isJJ()) {
    return 'Hi JJ! Let\'s play!';
  }
  var timeOfDay = 'morning';
  if (hour >= 12 && hour < 17) timeOfDay = 'afternoon';
  if (hour >= 17) timeOfDay = 'evening';
  return 'Good ' + timeOfDay + ', Wolfkid. Here\'s today\'s mission briefing.';
}

// ============================================================
// BUILD LAUNCH URL
// ============================================================
function buildLaunchUrl(block) {
  var url = '/' + block.page;
  var params = [];
  if (block.activity) {
    params.push('activity=' + block.activity);
  }
  if (isJJ()) {
    params.push('child=jj');
  }
  if (params.length > 0) {
    url += '?' + params.join('&');
  }
  if (TBM_TEST_MODE) {
    url += (url.indexOf('?') === -1 ? '?' : '&') + 'test=1';
  }
  if (TBM_SANDBOX) {
    url += (url.indexOf('?') === -1 ? '?' : '&') + 'sandbox=1';
  }
  return url;
}

function getLaunchedState() {
  try { return JSON.parse(localStorage.getItem(launchedKey) || '{}'); } catch(e) { return {}; }
}

function launchMission(url, missionId, missionName) {
  try {
    var launched = getLaunchedState();
    launched[missionId] = true;
    localStorage.setItem(launchedKey, JSON.stringify(launched));
  } catch(e) {}
  var brainBreaking = checkBrainBreak(url); // #170 — pass url so endBrainBreak() navigates after break
  if (!brainBreaking) {
    var overlay = document.getElementById('launch-overlay');
    if (overlay) {
      overlay.style.display = 'block';
      var nameEl = document.getElementById('overlay-mission-name');
      if (nameEl) { nameEl.innerHTML = missionName || ''; }
      var iconEl = overlay.querySelector('.ov-icon');
      var textEl = overlay.querySelector('.ov-text');
      if (isJJ()) {
        if (iconEl) { iconEl.textContent = '\u2728\uD83C\uDF1F\u2728'; }
        if (textEl) { textEl.textContent = 'Here we go!'; }
      } else {
        if (iconEl) { iconEl.innerHTML = '&#128640;'; }
        if (textEl) { textEl.textContent = 'LOADING...'; }
      }
    }
    setTimeout(function() { window.location.href = url; }, 280);
  }
}

// ============================================================
// RENDER
// ============================================================
function render() {
  hideDailyMissionsLoader();
  var container = document.getElementById('main-content');

  // Set header emoji for Buggsy
  if (!isJJ()) {
    document.getElementById('header-emoji').textContent = '\uD83C\uDFAF';
  }

  var schedule = isJJ() ? JJ_SCHEDULE : BUGGSY_SCHEDULE;
  var dayData = schedule[dayOfWeek];

  // Weekend check — but allow Day 1 (key 0) to pass through
  if (!dayData && (dayOfWeek === 0 || dayOfWeek === 6)) {
    renderWeekend(container);
    return;
  }
  if (!dayData) {
    renderWeekend(container);
    return;
  }

  var blocks = dayData.blocks;
  var state = getMissionState();
  var launched = getLaunchedState();
  var doneCount = 0;
  var totalTime = 0;

  for (var i = 0; i < blocks.length; i++) {
    var mId = blocks[i].page + '_' + i;
    if (state[mId]) doneCount++;
    if (blocks[i].time) totalTime += blocks[i].time;
  }

  var allDone = doneCount === blocks.length;
  var html = '';

  // Celebration banner
  html += '<div class="celebration-banner' + (allDone ? ' active' : '') + '">';
  if (isJJ()) {
    html += '<div class="celebration-emoji">\uD83C\uDF1F\u2728\uD83C\uDF1F</div>';
    html += '<div class="celebration-text">YAY! ALL DONE!</div>';
    html += '<div class="celebration-sub">You earned all your stars today!</div>';
  } else {
    html += '<div class="celebration-emoji">\uD83C\uDF89\uD83D\uDE80\uD83C\uDF89</div>';
    html += '<div class="celebration-text">ALL MISSIONS COMPLETE</div>';
    html += '<div class="celebration-sub">+10 Bonus Rings earned! Great work, Wolfkid.</div>';
  }
  html += '</div>';

  // Greeting
  html += '<div class="greeting">' + getGreeting() + '</div>';
  html += '<div class="day-focus">' + DAY_NAMES[dayOfWeek].toUpperCase() + ' \u2014 ' + dayData.focus.toUpperCase() + '</div>';

  // Mission cards
  for (var j = 0; j < blocks.length; j++) {
    var block = blocks[j];
    var missionId = block.page + '_' + j;
    var done = state[missionId] === true;
    var cardClass = 'mission-card' + (done ? ' completed' : '');

    // Homework gate: locked card for unlockAfterHomework blocks
    if (block.unlockAfterHomework && !done && !_designUnlocked) {
      html += '<div class="mission-card" style="opacity:0.35;pointer-events:none;animation-delay:' + (j * 0.08) + 's">';
      html += '<div class="mission-number">\uD83D\uDD12</div>';
      html += '<div class="mission-info"><div class="mission-name">' + block.name + '</div>';
      html += '<div class="mission-meta"><span class="mission-time">Unlocks after today\'s homework</span></div></div>';
      html += '</div>';
    } else if (block.unlockAfterHomework && !done && _designUnlocked) {
      html += '<div class="mission-card" style="border-color:rgba(0,255,136,0.4);box-shadow:0 0 16px rgba(0,255,136,0.15);animation-delay:' + (j * 0.08) + 's">';
      html += '<div class="mission-number" style="background:linear-gradient(135deg,#003311,#001a0a);border-color:#00ff88;color:#00ff88;">\uD83C\uDF89</div>';
      html += '<div class="mission-info"><div class="mission-name">' + block.name + '</div>';
      html += '<div class="mission-meta"><span class="mission-time">Take as long as you want. No timer.</span></div></div>';
      html += '<div class="mission-actions"><button class="launch-btn" onclick="window.location.href=\'/wolfdome?customize=1\'" style="border-color:#00ff88;color:#00ff88;box-shadow:0 0 10px rgba(0,255,136,0.3);">ENTER \u2192</button></div>';
      html += '</div>';
    } else {
      // Normal card
      html += '<div class="' + cardClass + '" style="animation-delay:' + (j * 0.08) + 's">';

      // Number
      if (done) {
        html += '<div class="mission-number">\u2713</div>';
      } else {
        html += '<div class="mission-number">' + (j + 1) + '</div>';
      }

      // Info
      html += '<div class="mission-info">';
      html += '<div class="mission-name">' + block.name + '</div>';

      // Star reward for JJ
      if (isJJ() && block.stars) {
        var starStr = '';
        for (var s = 0; s < block.stars; s++) {
          starStr += '\u2B50';
        }
        html += '<div class="star-reward">' + starStr + '</div>';
      }

      // Meta (Buggsy only — hidden for JJ via CSS)
      html += '<div class="mission-meta">';
      if (block.time) {
        html += '<span class="mission-time">~' + block.time + ' min</span>';
      }
      if (dayData.tag) {
        html += '<span class="mission-tag tag-' + dayData.tag + '">' + dayData.focus + '</span>';
      }
      html += '</div>';
      html += '</div>';

      // Actions
      var hasLaunched = launched[missionId] === true;
      html += '<div class="mission-actions">';
      if (!done) {
        var launchUrl = buildLaunchUrl(block);
        var safeName = (block.name || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        if (isJJ()) {
          html += '<button class="launch-btn" onclick="launchMission(\'' + launchUrl + '\',\'' + missionId + '\',\'' + safeName + '\')">Let\'s Go!</button>';
        } else {
          html += '<button class="launch-btn" onclick="launchMission(\'' + launchUrl + '\',\'' + missionId + '\',\'' + safeName + '\')">LAUNCH</button>';
        }

    }
    html += '<div class="total-time">' + doneCount + ' of ' + blocks.length + ' activities done</div>';
    html += '<div class="ring-reward">Complete all for ' + totalStars + ' \u2B50 bonus stars!</div>';

    html += '<div class="total-time">Total estimated time: ~' + totalTime + ' min \u00B7 ' + doneCount + '/' + blocks.length + ' complete</div>';
    if (!allDone) {
      html += '<div class="ring-reward">\uD83D\uDCAD Complete all missions for +10 bonus Rings</div>';
    } else {
      html += '<div class="ring-reward">\u2728 +10 Bonus Rings EARNED \u2728</div>';
    }
  }
  html += '</div>';

  container.innerHTML = html;

  // #171 — ExecSkills plan screen (Buggsy only, first visit before any missions started)
  if (!isJJ() && doneCount === 0) {
    var missionPills = [];
    for (var mp = 0; mp < blocks.length; mp++) {
      missionPills.push({ type: blocks[mp].subject || 'Mission', topic: blocks[mp].name || ('Mission ' + (mp + 1)) });
    }
    ExecSkills.showPlanYourAttack({
      container: 'es-plan-inner',
      child: currentChild,
      timeEstimate: totalTime || 30,
      questions: missionPills,
      onReady: function() {
        var overlay = document.getElementById('es-plan-overlay');
        if (overlay) overlay.style.display = 'none';
      }
    });
  }

  // Ring burst + XP pop on completion (Buggsy only)
  if (allDone && !isJJ()) {
    var banner = container.querySelector('.celebration-banner');
    if (banner) {
      var rect = banner.getBoundingClientRect();
      var cx = Math.round(rect.left + rect.width / 2);
      var cy = Math.round(rect.top + rect.height / 2);
      fireRingBurst(cx, cy);
      setTimeout(function() { fireRingBurst(cx - 80, cy + 20); }, 200);
      setTimeout(function() { showXPPop(cx, cy, '+10 RINGS'); }, 300);
    }
  }
}

    html += '<div class="bonus-desc">Pick any game you want, JJ!</div>';
    html += '<div style="margin-top:12px;display:-webkit-flex;display:flex;gap:10px;-webkit-justify-content:center;justify-content:center;-webkit-flex-wrap:wrap;flex-wrap:wrap">';
    html += '<button class="launch-btn" onclick="launchMission(\'/sparkle-free\',\'freeplay_jj\',\'Sparkle Free Play\')">Sparkle Kingdom \u2728</button>';
    html += '</div>';
  } else {
    html += '<div class="bonus-title">\uD83C\uDFAE FREE TIME \uD83C\uDFAE</div>';
    html += '<div class="bonus-desc">No missions today. Pick what you want to do.</div>';
    html += '<div style="margin-top:12px;display:-webkit-flex;display:flex;gap:10px;-webkit-justify-content:center;justify-content:center;-webkit-flex-wrap:wrap;flex-wrap:wrap">';
    html += '<button class="launch-btn" onclick="launchMission(\'/facts\',\'bonus_facts\',\'Fact Sprint\')">Fact Sprint \u26A1</button>';
    html += '<button class="launch-btn" onclick="launchMission(\'/comic-studio\',\'freeplay_comic\',\'Comic Studio\')">Comic Studio \uD83C\uDFA8</button>';
    html += '</div>';
  }
  html += '</div>';

  html += '</div>';
  container.innerHTML = html;
}

// ============================================================
// RING BURST + XP POP
// ============================================================
function fireRingBurst(cx, cy) {
  var colors = ['#f59e0b', '#fbbf24', '#fde68a', '#fff', '#d97706'];
  var count = 18;
  for (var i = 0; i < count; i++) {
    var p = document.createElement('div');
    p.className = 'b-ring-particle';
    var angle = (360 / count) * i;
    var rad = angle * Math.PI / 180;
    var dist = 60 + Math.random() * 60;
    var tx = Math.round(Math.cos(rad) * dist);
    var ty = Math.round(Math.sin(rad) * dist);
    var c = colors[Math.floor(Math.random() * colors.length)];
    p.style.cssText =
      'left:' + (cx - 6) + 'px;' +
      'top:' + (cy - 6) + 'px;' +
      'background:' + c + ';' +
      '--tx:' + tx + 'px;' +
      '--ty:' + ty + 'px;';
    document.body.appendChild(p);
    (function(el) {
      setTimeout(function() {
        if (el.parentNode) { el.parentNode.removeChild(el); }
      }, 800);
    }(p));
  }
}

function showXPPop(cx, cy, label) {
  var el = document.createElement('div');
  el.className = 'xp-pop';
  el.textContent = label || '+10 RINGS';
  el.style.left = (cx - 50) + 'px';
  el.style.top = (cy - 30) + 'px';
  document.body.appendChild(el);
  setTimeout(function() {
    if (el.parentNode) { el.parentNode.removeChild(el); }
  }, 1500);
}

// ============================================================
init();
