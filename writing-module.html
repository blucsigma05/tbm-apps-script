<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="tbm-module" content="writing-module">
<meta name="tbm-version" content="v4">
<title>Writing Module - Buggsy</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1E2A4A; border-radius: 3px; }

  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.6; }
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 8px rgba(245,158,11,0.2); }
    50% { box-shadow: 0 0 20px rgba(245,158,11,0.4); }
  }
  @keyframes navBlockFade {
    0%{opacity:0;transform:translateX(-50%) translateY(6px)}
    15%{opacity:1;transform:translateX(-50%) translateY(0)}
    75%{opacity:1}
    100%{opacity:0;transform:translateX(-50%) translateY(-4px)}
  }
  .b-ring-particle {
    position:fixed;width:16px;height:16px;border-radius:50%;
    border:3px solid #ffd700;
    box-shadow:0 0 8px rgba(255,215,0,0.7),inset 0 0 4px rgba(255,215,0,0.2);
    background:transparent;pointer-events:none;z-index:500;
    animation:ringBurst 0.8s cubic-bezier(0.15,0,0.55,1) forwards;
  }
  @keyframes ringBurst {
    0%{opacity:1;transform:translate(0,0) scale(1.3)}
    60%{opacity:1}
    100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.2)}
  }

  body {
    min-height: 100vh;
    background: #0B0F1A;
    color: #E2E8F0;
    font-family: 'Nunito', sans-serif;
    position: relative;
    overflow-x: hidden;
  }

  textarea::placeholder { color: #64748B; }

  /* ─── Star Field ─── */
  #starField {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fbbf24;
    opacity: 0.3;
  }

  /* ─── Header ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(11,15,26,0.92);
    border-bottom: 1px solid #1E2A4A;
    padding: 10px 16px;
  }
  .header-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 800px;
    margin: 0 auto;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-brand-icon { font-size: 24px; }
  .header-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 900;
    background: linear-gradient(90deg, #f59e0b, #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .header-subtitle {
    font-size: 10px;
    color: #64748B;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 2px;
  }
  .header-timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #94A3B8;
  }

  /* ─── Format Selector ─── */
  .format-selector {
    max-width: 800px;
    margin: 0 auto;
    padding: 12px 16px 0;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    position: relative;
    z-index: 10;
  }
  .format-tab {
    padding: 8px 14px;
    background: transparent;
    border: 1px solid #1E2A4A;
    border-radius: 20px;
    color: #64748B;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .format-tab-active {
    background: rgba(245,158,11,0.12);
    border-color: #f59e0b;
    color: #f59e0b;
  }

  /* ─── Main Content ─── */
  .main-content {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 16px 100px;
    position: relative;
    z-index: 10;
  }

  /* ─── Plan Your Attack ─── */
  .plan-attack {
    background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    margin-top: 16px;
    animation: fadeSlide 0.4s ease forwards;
  }
  .plan-attack-label {
    font-size: 11px;
    color: #f59e0b;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .plan-attack-text {
    font-size: 14px;
    line-height: 1.6;
    color: #E2E8F0;
  }
  .plan-attack-format {
    display: inline-block;
    background: rgba(245,158,11,0.15);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 6px;
    padding: 2px 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #f59e0b;
    margin: 4px 0;
  }
  .btn-ready {
    width: 100%;
    margin-top: 14px;
    padding: 14px 20px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(245,158,11,0.3);
    transition: all 0.2s;
  }

  /* ─── Prompt Card ─── */
  .prompt-card {
    background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    animation: fadeSlide 0.4s ease forwards;
  }
  .prompt-label {
    font-size: 11px;
    color: #f59e0b;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .prompt-text {
    font-size: 15px;
    line-height: 1.7;
    color: #E2E8F0;
  }
  .prompt-guidance {
    margin-top: 10px;
    font-size: 12px;
    color: #94A3B8;
    line-height: 1.6;
    padding-left: 12px;
    border-left: 2px solid rgba(245,158,11,0.3);
  }

  /* ─── Timer Row ─── */
  .timer-row {
    background: #171D30;
    border: 1px solid #1E2A4A;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .timer-label {
    font-size: 11px;
    color: #64748B;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
  }
  .timer-value {
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    color: #94A3B8;
  }
  .timer-value-warn {
    color: #EAB308;
  }

  /* ─── Edit/Revise Original Text ─── */
  .original-text-card {
    background: #171D30;
    border: 1px solid #1E2A4A;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .original-text-label {
    font-size: 11px;
    color: #F97316;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  .original-text-content {
    font-size: 15px;
    line-height: 1.9;
    color: #F87171;
    font-style: italic;
  }
  .error-hint {
    margin-top: 10px;
    font-size: 12px;
    color: #94A3B8;
    line-height: 1.5;
  }

  /* ─── CER Section (3-part layout) ─── */
  .cer-section {
    background: #171D30;
    border: 1px solid #1E2A4A;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .cer-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .cer-label-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cer-icon { font-size: 18px; }
  .cer-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .cer-counter {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .cer-counter-met {
    color: #22C55E;
    background: rgba(34,197,94,0.1);
  }
  .cer-counter-unmet {
    color: #64748B;
    background: transparent;
  }

  /* ─── Writing Section (single textarea) ─── */
  .writing-section {
    background: #171D30;
    border: 1px solid #1E2A4A;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .writing-section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .writing-section-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #f59e0b;
  }

  /* ─── Sentence Starters ─── */
  .starters-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .starter-pill {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.25);
    color: #fbbf24;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .starter-pill:hover {
    background: rgba(245,158,11,0.18);
    border-color: #f59e0b;
  }

  /* ─── Textarea ─── */
  .write-textarea {
    width: 100%;
    min-height: 200px;
    background: #131829;
    border: 1px solid #1E2A4A;
    border-radius: 8px;
    color: #E2E8F0;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    padding: 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .write-textarea:focus {
    border-color: #f59e0b;
  }
  .write-textarea-cer {
    min-height: 100px;
  }
  .write-textarea,
  .write-textarea-cer {
    background-image: repeating-linear-gradient(
      transparent,
      transparent 27px,
      rgba(245,158,11,0.06) 27px,
      rgba(245,158,11,0.06) 28px
    );
    background-attachment: local;
  }

  /* ─── Stats Row ─── */
  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .stat-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #64748B;
  }
  .stat-met { color: #22C55E; }
  .stat-unmet { color: #64748B; }

  /* ─── Submit Row ─── */
  .submit-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
  }
  .word-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #64748B;
  }
  .btn-submit {
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    transition: all 0.3s;
  }
  .btn-submit-active {
    background: linear-gradient(135deg, #ef4444, #1e78ff);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(239,68,68,0.3);
  }
  .btn-submit-disabled {
    background: #1E2A4A;
    color: #64748B;
    cursor: not-allowed;
  }

  /* ─── Completion Screen ─── */
  .completion-screen {
    text-align: center;
    padding: 40px 20px;
    animation: fadeSlide 0.5s ease forwards;
  }
  .completion-icon { font-size: 60px; margin-bottom: 16px; }
  .completion-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #22C55E;
    margin-bottom: 10px;
  }
  .completion-stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #94A3B8;
    margin-bottom: 6px;
  }
  .completion-rings {
    display: inline-block;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 10px;
    padding: 8px 20px;
    margin: 16px 0;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #f59e0b;
    animation: pulseGlow 2s ease-in-out infinite;
  }
  .completion-message {
    font-size: 15px;
    color: #E2E8F0;
    line-height: 1.6;
    margin-top: 16px;
    margin-bottom: 20px;
  }
  .btn-primary {
    display: inline-block;
    margin-top: 12px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(245,158,11,0.3);
    transition: all 0.2s;
  }

  .hidden { display: none; }
</style>
</head>
<body>

<!-- ─── Star Field ─── -->
<div id="starField"></div>

<!-- ─── Header ─── -->
<header class="header">
  <div class="header-inner">
    <div class="header-brand">
      <span class="header-brand-icon">&#x270D;&#xFE0F;</span>
      <div>
        <div class="header-title">WRITING LAB</div>
        <div class="header-subtitle">BUGGSY</div>
      </div>
    </div>
    <span id="sessionTimer" class="header-timer">00:00</span>
  </div>
</header>

<!-- ─── Format Selector (for testing) ─── -->
<div class="format-selector" id="formatSelector">
  <button class="format-tab format-tab-active" onclick="selectFormat(0)">CER</button>
  <button class="format-tab" onclick="selectFormat(1)">Persuasive</button>
  <button class="format-tab" onclick="selectFormat(2)">POV Journal</button>
  <button class="format-tab" onclick="selectFormat(3)">Edit/Revise</button>
</div>

<!-- ─── Main Content ─── -->
<main class="main-content">

  <!-- ══════ PLAN YOUR ATTACK ══════ -->
  <div id="viewPlan" style="padding-top:16px;">
    <div class="plan-attack">
      <div class="plan-attack-label">&#x1F3AF; PLAN YOUR ATTACK</div>
      <div class="plan-attack-text">
        <div id="planFormatBadge" class="plan-attack-format"></div>
        <div id="planDescription" style="margin-top:8px;"></div>
        <div style="margin-top:6px;font-size:12px;color:#94A3B8;">
          &#x23F1; Time target: <strong style="color:#f59e0b;">~12 minutes</strong>
        </div>
      </div>
      <button class="btn-ready" onclick="startWriting()">&#x270D;&#xFE0F; I'M READY TO WRITE</button>
    </div>
  </div>

  <!-- ══════ PROMPT VIEW ══════ -->
  <div id="viewPrompt" class="hidden" style="padding-top:16px;">
    <div class="prompt-card">
      <div class="prompt-label">&#x1F4DD; YOUR PROMPT</div>
      <div class="prompt-text" id="promptText"></div>
      <div class="prompt-guidance" id="promptGuidance"></div>
    </div>
    <button class="btn-ready" onclick="goToWriting()">&#x270D;&#xFE0F; START WRITING</button>
  </div>

  <!-- ══════ WRITING VIEW ══════ -->
  <div id="viewWrite" class="hidden" style="padding-top:16px;">
    <!-- Timer -->
    <div class="timer-row">
      <span class="timer-label">WRITING TIME</span>
      <span id="writingTimer" class="timer-value">00:00</span>
    </div>

    <!-- Writing area gets built dynamically -->
    <div id="writingArea"></div>

    <!-- Stats + Submit -->
    <div class="submit-row">
      <div>
        <span id="wordCount" class="stat-item">0 words</span>
        <span style="margin:0 6px;color:#1E2A4A;">|</span>
        <span id="sentenceCount" class="stat-item">0 sentences</span>
        <span style="margin:0 6px;color:#1E2A4A;">|</span>
        <span id="minIndicator" class="stat-item stat-unmet">min not met</span>
      </div>
      <button id="submitBtn" class="btn-submit btn-submit-disabled" onclick="handleSubmit()" disabled>&#x2705; SUBMIT</button>
    </div>
  </div>

  <!-- ══════ COMPLETION SCREEN ══════ -->
  <div id="viewCompletion" class="hidden" style="padding-top:16px;">
    <div class="completion-screen">
      <div class="completion-icon">&#x270D;&#xFE0F;&#x2728;</div>
      <div class="completion-title">WRITING COMPLETE</div>
      <div id="completionWords" class="completion-stats"></div>
      <div id="completionSentences" class="completion-stats"></div>
      <div id="completionTime" class="completion-stats"></div>
      <div class="completion-rings">+3 Rings &#x2B55;</div>
      <div class="completion-message">
        Submitted for review.<br>
        Great effort on today's writing!
      </div>
      <button style="margin-top:20px;padding:12px 28px;background:#3B82F6;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif" onclick="window.location.href='/daily-missions'">Back to Missions</button>
    </div>
  </div>

</main>

<script>
// ─── ES5 ONLY ───

// ── Themed Loading Screen ──
function showBuggsyLoader() {
  var el = document.createElement('div');
  el.id = 'bLoader';
  el.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#030a10;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px';
  var img = document.createElement('img');
  img.src = 'https://i.ibb.co/93k6DNRc/1775230300543.png';
  img.style.cssText = 'width:120px;height:auto;filter:drop-shadow(0 0 12px #ff2200) drop-shadow(0 0 24px #ff6600)';
  var txt = document.createElement('div');
  txt.style.cssText = "font-family:'Orbitron',monospace;font-size:11px;color:#f59e0b;letter-spacing:3px;";
  txt.textContent = 'LOADING MISSION DATA...';
  el.appendChild(img);
  el.appendChild(txt);
  document.body.appendChild(el);
}
function hideBuggsyLoader() {
  var el = document.getElementById('bLoader');
  if (el) el.parentNode.removeChild(el);
}
showBuggsyLoader();

// ── Ring Burst ──
function fireRingBurst(cx, cy) {
  for (var i = 0; i < 8; i++) {
    (function(idx) {
      setTimeout(function() {
        var r = document.createElement('div');
        r.className = 'b-ring-particle';
        var angle = (idx / 8) * Math.PI * 2;
        var dist = 50 + Math.random() * 35;
        r.style.left = cx + 'px';
        r.style.top = cy + 'px';
        r.style.setProperty('--tx', (Math.cos(angle) * dist).toFixed(0) + 'px');
        r.style.setProperty('--ty', (Math.sin(angle) * dist).toFixed(0) + 'px');
        document.body.appendChild(r);
        setTimeout(function() { if (r.parentNode) { r.parentNode.removeChild(r); } }, 900);
      }, idx * 35);
    })(i);
  }
}

// ── Footer Nav Block ──
var WOLFKID_NAV_BLOCKS = [
  '\uD83D\uDC3A Finish the mission first.',
  '\u26A1 No escaping. Eyes on the mission.',
  '\uD83D\uDC3A Almost there. Lock in.'
];
var _navBlockIdx = 0;
function showNavBlock() {
  var msg = WOLFKID_NAV_BLOCKS[_navBlockIdx % WOLFKID_NAV_BLOCKS.length];
  _navBlockIdx++;
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:72px;left:50%;transform:translateX(-50%);' +
    'background:rgba(15,24,36,0.97);border:1px solid rgba(245,158,11,0.4);' +
    'color:#f59e0b;font-family:Orbitron,monospace;font-size:9px;' +
    'padding:10px 18px;border-radius:8px;z-index:9999;pointer-events:none;' +
    'box-shadow:0 0 16px rgba(245,158,11,0.2);letter-spacing:0.5px;' +
    'animation:navBlockFade 1.8s ease forwards;white-space:nowrap;';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() {
    if (el.parentNode) { el.parentNode.removeChild(el); }
  }, 1900);
}

// ── Test Mode Detection ──
var TBM_TEST_MODE = window.location.search.indexOf('test=1') !== -1;
if (TBM_TEST_MODE) {
  var _tbanner = document.createElement('div');
  _tbanner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#fbbf24;color:#000;text-align:center;padding:4px;font-size:12px;font-weight:700;z-index:99999;letter-spacing:1px';
  _tbanner.textContent = 'TEST MODE — Nothing saves';
  document.body.appendChild(_tbanner);
  document.body.style.paddingTop = '28px';
}

// ── Audio System (Marco / ElevenLabs) ──
var audioCache = {};
function preloadBugsyAudio() {
  var files = [
    'buggsy_feedback_correct1.mp3','buggsy_feedback_correct2.mp3','buggsy_feedback_correct3.mp3','buggsy_feedback_correct4.mp3',
    'buggsy_feedback_correct5.mp3','buggsy_feedback_correct6.mp3','buggsy_feedback_correct7.mp3','buggsy_feedback_correct8.mp3',

// ─── State ───
var currentFormat = 0;
var currentScreen = 'plan';
var sessionStartTime = null;
var sessionInterval = null;
var writingStartTime = null;
var writingInterval = null;
var writingSeconds = 0;
var submitted = false;

// ─── Determine week of 4-week cycle ───
function getWeekFormat() {
  var now = new Date();
  var startOfYear = new Date(now.getFullYear(), 0, 1);
  var diff = now.getTime() - startOfYear.getTime();
  var weekNum = Math.floor(diff / (7 * 24 * 60 * 60 * 1000));
  return weekNum % 4;
}

// ─── Init ───
function init() {
  hideBuggsyLoader();
  buildStarField();
  currentFormat = getWeekFormat();
  highlightFormatTab(currentFormat);
  renderPlan();
}

// ─── Star Field ───
function buildStarField() {
  var container = document.getElementById('starField');
  var html = '';
  for (var i = 0; i < 35; i++) {
    var x = Math.random() * 100;
    var y = Math.random() * 100;
    var size = Math.random() * 2 + 0.5;
    var delay = Math.random() * 4;
    var duration = Math.random() * 3 + 2;
    html += '<div class="star" style="'
      + 'left:' + x + '%;'
      + 'top:' + y + '%;'
      + 'width:' + size + 'px;'
      + 'height:' + size + 'px;'
      + 'animation:twinkle ' + duration + 's ease-in-out ' + delay + 's infinite;'
      + '"></div>';
  }
  container.innerHTML = html;
}

// ─── Format Selection ───
function selectFormat(index) {
  if (submitted) return;
  currentFormat = index;
  highlightFormatTab(index);
  // Reset state
  stopWritingTimer();
  writingSeconds = 0;
  submitted = false;
  currentScreen = 'plan';
  renderPlan();
  showScreen('plan');
}

function highlightFormatTab(index) {
  var tabs = document.getElementById('formatSelector').getElementsByTagName('button');
  for (var i = 0; i < tabs.length; i++) {
    if (i === index) {
      tabs[i].className = 'format-tab format-tab-active';
    } else {
      tabs[i].className = 'format-tab';
    }
  }
}

// ─── Screen Management ───
function showScreen(screen) {
  currentScreen = screen;
  var screens = ['viewPlan', 'viewPrompt', 'viewWrite', 'viewCompletion'];
  for (var i = 0; i < screens.length; i++) {
    document.getElementById(screens[i]).className = 'hidden';
  }
  if (screen === 'plan') {
    document.getElementById('viewPlan').className = '';
  } else if (screen === 'prompt') {
    document.getElementById('viewPrompt').className = '';
  } else if (screen === 'write') {
    document.getElementById('viewWrite').className = '';
  } else if (screen === 'completion') {
    document.getElementById('viewCompletion').className = '';
  }
}

// ─── Plan Your Attack ───
function renderPlan() {

  document.getElementById('planFormatBadge').textContent = fmt.name;
  document.getElementById('planDescription').textContent = fmt.description;

// ─── Start Writing (Plan -> Prompt) ───

// ─── Go To Writing (Prompt -> Write) ───
function goToWriting() {

// ─── Build Writing Area (format-specific) ───
function buildWritingArea() {
  var fmt = FORMATS[currentFormat];
  var container = document.getElementById('writingArea');

  if (fmt.type === 'cer') {
    // 3-section CER layout
    var cerSections = [
      { key: 'claim', label: 'CLAIM', icon: '&#x1F3AF;', color: '#3B82F6', min: 1, starterKey: 'claim' },
      { key: 'evidence', label: 'EVIDENCE', icon: '&#x1F4DD;', color: '#F97316', min: 2, starterKey: 'evidence' },
      { key: 'reasoning', label: 'REASONING', icon: '&#x1F9E0;', color: '#22C55E', min: 1, starterKey: 'reasoning' }
    ];
    for (var s = 0; s < cerSections.length; s++) {
      var sec = cerSections[s];
      html += '<div class="cer-section" style="border-left:3px solid ' + sec.color + ';">';
      html += '<div class="cer-header">';
      html += '<div class="cer-label-wrap">';
      html += '<span class="cer-icon">' + sec.icon + '</span>';
      html += '<span class="cer-label" style="color:' + sec.color + ';">' + sec.label + '</span>';
      html += '</div>';
      html += '<span id="counter-' + sec.key + '" class="cer-counter cer-counter-unmet">0/' + sec.min + '+ sentences</span>';
      html += '</div>';

      var starters = fmt.starters[sec.starterKey];
      html += '<div class="starters-row">';

      }
      html += '</div>';

      html += '<textarea id="textarea-' + sec.key + '" class="write-textarea write-textarea-cer" placeholder="Write your ' + sec.key + ' here..." oninput="updateCounts()"></textarea>';

// ─── Sentence Starter Insertion ───
function escapeJsString(str) {
  return "'" + str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"') + "'";
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function insertStarter(targetId, text) {
  var ta = document.getElementById(targetId);
  if (!ta) return;
  var val = ta.value;
  var newVal = val ? val + ' ' + text : text;
  ta.value = newVal;
  updateCounts();
  setTimeout(function() {
    ta.focus();
    if (typeof ta.setSelectionRange === 'function') {
      ta.setSelectionRange(newVal.length, newVal.length);
    }
  }, 50);
}

// ─── Word & Sentence Counting ───
function countWords(text) {
  var trimmed = text.replace(/\s+/g, ' ').replace(/^\s+|\s+$/g, '');
  if (trimmed === '') return 0;
  return trimmed.split(' ').length;
}

function countSentences(text) {
  var parts = text.split(/[.!?]+/);
  var count = 0;
  for (var i = 0; i < parts.length; i++) {
    if (parts[i].replace(/\s/g, '').length > 3) {
      count++;
    }
  }
  return count;
}

function getAllText() {
  var fmt = FORMATS[currentFormat];
  if (fmt.type === 'cer') {
    var c = document.getElementById('textarea-claim');
    var e = document.getElementById('textarea-evidence');
    var r = document.getElementById('textarea-reasoning');
    var cVal = c ? c.value : '';
    var eVal = e ? e.value : '';
    var rVal = r ? r.value : '';
    return { combined: cVal + ' ' + eVal + ' ' + rVal, parts: { claim: cVal, evidence: eVal, reasoning: rVal } };
  } else {
    var main = document.getElementById('textarea-main');
    var mainVal = main ? main.value : '';
    return { combined: mainVal, parts: { main: mainVal } };
  }
}

function updateCounts() {
  var fmt = FORMATS[currentFormat];
  var textData = getAllText();
  var totalWords = countWords(textData.combined);
  var totalSentences = countSentences(textData.combined);

  // Update word and sentence display
  var wordEl = document.getElementById('wordCount');
  var sentEl = document.getElementById('sentenceCount');
  if (wordEl) wordEl.textContent = totalWords + ' words';
  if (sentEl) sentEl.textContent = totalSentences + ' sentences';

  var minMet = false;

  if (fmt.type === 'cer') {
    // Check each CER section individually
    var claimSentences = countSentences(textData.parts.claim);
    var evidenceSentences = countSentences(textData.parts.evidence);
    var reasoningSentences = countSentences(textData.parts.reasoning);

    var claimMet = claimSentences >= 1;
    var evidenceMet = evidenceSentences >= 2;
    var reasoningMet = reasoningSentences >= 1;

    updateCounter('counter-claim', claimSentences, 1);
    updateCounter('counter-evidence', evidenceSentences, 2);
    updateCounter('counter-reasoning', reasoningSentences, 1);

    minMet = claimMet && evidenceMet && reasoningMet;
  } else {
    minMet = totalSentences >= fmt.minSentences;
  }

  // Update minimum indicator
  var minEl = document.getElementById('minIndicator');
  if (minEl) {
    if (minMet) {
      minEl.textContent = 'min met!';
      minEl.className = 'stat-item stat-met';
    } else {
      if (fmt.type === 'cer') {
        minEl.textContent = 'C:1+ E:2+ R:1+ needed';
      } else {
        minEl.textContent = fmt.minSentences + '+ sentences needed';
      }
      minEl.className = 'stat-item stat-unmet';
    }
  }

  // Submit button
  var submitBtn = document.getElementById('submitBtn');
  if (submitBtn) {
    if (minMet && totalWords > 0) {
      submitBtn.disabled = false;
      submitBtn.className = 'btn-submit btn-submit-active';
    } else {
      submitBtn.disabled = true;
      submitBtn.className = 'btn-submit btn-submit-disabled';
    }
  }
}

function updateCounter(counterId, current, min) {
  var el = document.getElementById(counterId);
  if (!el) return;
  el.textContent = current + '/' + min + '+ sentences';
  if (current >= min) {
    el.className = 'cer-counter cer-counter-met';
  } else {
    el.className = 'cer-counter cer-counter-unmet';
  }
}

// ─── Session Timer ───
function startSessionTimer() {
  sessionInterval = setInterval(function() {
    var elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
    var m = Math.floor(elapsed / 60);
    var s = elapsed % 60;
    var el = document.getElementById('sessionTimer');
    if (el) {
      if (m < 1) { el.textContent = 'Just started'; }
      else { el.textContent = 'Working for ' + m + ' min'; }
    }
  }, 1000);
}

// ─── Writing Timer ───
function startWritingTimer() {
  writingStartTime = Date.now();
  writingSeconds = 0;
  writingInterval = setInterval(function() {
    writingSeconds++;
    var m = Math.floor(writingSeconds / 60);
    var s = writingSeconds % 60;
    var el = document.getElementById('writingTimer');
    el.textContent = padTwo(m) + ':' + padTwo(s);
    if (m >= TARGET_MINUTES) {
      el.className = 'timer-value timer-value-warn';
    } else {
      el.className = 'timer-value';
    }
  }, 1000);
}

function stopWritingTimer() {
  if (writingInterval) {
    clearInterval(writingInterval);
    writingInterval = null;
  }
}

function padTwo(n) {
  return n < 10 ? '0' + n : '' + n;
}

function getSessionTimeString() {
  if (!sessionStartTime) return '00:00';
  var elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
  var m = Math.floor(elapsed / 60);
  var s = elapsed % 60;
  return padTwo(m) + ':' + padTwo(s);
}

// ─── Submit ───
function handleSubmit() {
  if (submitted) return;
  submitted = true;

  stopWritingTimer();
  if (sessionInterval) {
    clearInterval(sessionInterval);
    sessionInterval = null;
  }

  var textData = getAllText();
  var totalWords = countWords(textData.combined);
  var totalSentences = countSentences(textData.combined);
  var fmt = FORMATS[currentFormat];

  document.getElementById('completionWords').textContent = totalWords + ' words written';
  document.getElementById('completionSentences').textContent = totalSentences + ' sentences';
  document.getElementById('completionTime').textContent = 'Writing time: ' + padTwo(Math.floor(writingSeconds / 60)) + ':' + padTwo(writingSeconds % 60) + ' | Session: ' + getSessionTimeString();

  showScreen('completion');
  var cx = window.innerWidth / 2;
  var cy = window.innerHeight / 3;
  fireRingBurst(cx, cy);
  setTimeout(function() { fireRingBurst(cx - 60, cy + 30); }, 350);
  playBugsyComplete();

  // Submit homework via GAS backend (if available)
  if (_usingFallback) {
    console.log('Practice mode — rings not awarded');
  } else if (!TBM_TEST_MODE) {
    try {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(result) {
            console.log('Submitted: ' + (result && result.status ? result.status : 'unknown'));
          })
          .withFailureHandler(function(err) { console.error('Submit failed:', err); })
          .submitHomeworkSafe({
            child: CHILD,
            module: 'writing',
            subject: 'RLA-Writing-' + fmt.id,
            score: 0,
            responseText: textData.combined,
            rings: 3
          });
      }
    } catch (e) {
      // Standalone mode
    }
  }

  // Award rings via GAS backend (if available)
  if (_usingFallback) {
    // Already logged above
  } else if (TBM_TEST_MODE) {
    console.log('[TEST MODE] awardRingsSafe skipped, rings=3');
  } else {
    try {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function() { })
          .withFailureHandler(function(err) { })
          .awardRingsSafe(CHILD, 3, 'writing-module-' + fmt.id);
      }
    } catch (e) {
      // Standalone mode — no GAS backend
    }
  }

  // Log to Notion via GAS backend (if available)
  if (!TBM_TEST_MODE) {
    try {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function() { })
          .withFailureHandler(function(err) { })
          .logHomeworkCompletionSafe({
            child: CHILD,
            subject: 'RLA',
            assignment: 'Writing - ' + fmt.name,
            score: null,
            teksCode: 'ELA 4.12',
            difficulty: 'Medium',
            date: new Date().toISOString().split('T')[0]
          });
      }
    } catch (e) {
      // Standalone mode
    }
  } else {
    console.log('[TEST MODE] logHomeworkCompletionSafe skipped');
  }
}

// ─── CURRICULUM LOADING ───
function loadWritingContent() {
  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    _usingFallback = true;
    init();
    return;
  }
  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.content) {
        var c = result.content;
        if (c.quick_write || c.grammar_sprint) {
          // Use curriculum content to override default prompts
          if (c.quick_write && c.quick_write.prompt) {
            for (var i = 0; i < FORMATS.length; i++) {
              if (FORMATS[i].id === 'quick_write' || FORMATS[i].id === 'journal') {
                FORMATS[i].prompt = c.quick_write.prompt;
                if (c.quick_write.guidance) { FORMATS[i].guidance = c.quick_write.guidance; }
              }
            }
          }
          init();
        } else {
          _usingFallback = true;
          init();
        }
      } else {
        _usingFallback = true;
        init();
      }
    })
    .withFailureHandler(function() {
      _usingFallback = true;
      init();
    })
    .getTodayContentSafe('buggsy');
}

// ─── Start ───
loadWritingContent();
preloadBugsyAudio();
