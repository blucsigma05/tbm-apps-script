<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="tbm-module" content="writing-module">
<meta name="tbm-version" content="v9">
<title>Writing Module - Buggsy</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1E2A4A; border-radius: 3px; }

  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.6; }
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 8px rgba(245,158,11,0.2); }
    50% { box-shadow: 0 0 20px rgba(245,158,11,0.4); }
  }
  @keyframes navBlockFade {
    0%{opacity:0;transform:translateX(-50%) translateY(6px)}
    15%{opacity:1;transform:translateX(-50%) translateY(0)}
    75%{opacity:1}
    100%{opacity:0;transform:translateX(-50%) translateY(-4px)}
  }
  .b-ring-particle {
    position:fixed;width:16px;height:16px;border-radius:50%;
    border:3px solid #ffd700;
    box-shadow:0 0 8px rgba(255,215,0,0.7),inset 0 0 4px rgba(255,215,0,0.2);
    background:transparent;pointer-events:none;z-index:500;
    animation:ringBurst 0.8s cubic-bezier(0.15,0,0.55,1) forwards;
  }
  @keyframes ringBurst {
    0%{opacity:1;transform:translate(0,0) scale(1.3)}
    60%{opacity:1}
    100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.2)}
  }

  body {
    min-height: 100vh;
    background: #0B0F1A;
    color: #E2E8F0;
    font-family: 'Nunito', sans-serif;
    position: relative;
    overflow-x: hidden;
  }

  textarea::placeholder { color: #64748B; }

  /* ─── Star Field ─── */
  #starField {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fbbf24;
    opacity: 0.3;
  }

  /* ─── Header ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(11,15,26,0.92);
    border-bottom: 1px solid #1E2A4A;
    padding: 10px 16px;
  }
  .header-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 800px;
    margin: 0 auto;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-brand-icon { font-size: 24px; }
  .header-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 900;
    background: linear-gradient(90deg, #f59e0b, #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .header-subtitle {
    font-size: 10px;
    color: #64748B;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 2px;
  }
  .header-timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #94A3B8;
  }

  /* ─── Format Selector ─── */
  .format-selector {
    max-width: 800px;
    margin: 0 auto;
    padding: 12px 16px 0;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    position: relative;
    z-index: 10;
  }
  .format-tab {
    padding: 8px 14px;
    background: transparent;
    border: 1px solid #1E2A4A;
    border-radius: 20px;
    color: #64748B;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .format-tab-active {
    background: rgba(245,158,11,0.12);
    border-color: #f59e0b;
    color: #f59e0b;
  }

  /* ─── Main Content ─── */
  .main-content {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 16px 100px;
    position: relative;
    z-index: 10;
  }

  /* ─── Plan Your Attack ─── */
  .plan-attack {
    background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    margin-top: 16px;
    animation: fadeSlide 0.4s ease forwards;
  }
  .plan-attack-label {
    font-size: 11px;
    color: #f59e0b;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .plan-attack-text {
    font-size: 14px;
    line-height: 1.6;
    color: #E2E8F0;
  }
  .plan-attack-format {
    display: inline-block;
    background: rgba(245,158,11,0.15);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 6px;
    padding: 2px 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #f59e0b;
    margin: 4px 0;
  }
  .btn-ready {
    width: 100%;
    margin-top: 14px;
    padding: 14px 20px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(245,158,11,0.3);
    transition: all 0.2s;
  }

  /* ─── Prompt Card ─── */
  .prompt-card {
    background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    animation: fadeSlide 0.4s ease forwards;
  }
  .prompt-label {
    font-size: 11px;
    color: #f59e0b;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .prompt-text {
    font-size: 15px;
    line-height: 1.7;
    color: #E2E8F0;
  }
  .prompt-guidance {
    margin-top: 10px;
    font-size: 12px;
    color: #94A3B8;
    line-height: 1.6;
    padding-left: 12px;
    border-left: 2px solid rgba(245,158,11,0.3);
  }

  /* ─── Timer Row ─── */
  .timer-row {
    background: #171D30;
    border: 1px solid #1E2A4A;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .timer-label {
    font-size: 11px;
    color: #64748B;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
  }
  .timer-value {
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    color: #94A3B8;
  }
  .timer-value-warn {
    color: #EAB308;
  }

  /* ─── Edit/Revise Original Text ─── */
  .original-text-card {
    background: #171D30;
    border: 1px solid #1E2A4A;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .original-text-label {
    font-size: 11px;
    color: #F97316;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  .original-text-content {
    font-size: 15px;
    line-height: 1.9;
    color: #F87171;
    font-style: italic;
  }
  .error-hint {
    margin-top: 10px;
    font-size: 12px;
    color: #94A3B8;
    line-height: 1.5;
  }

  /* ─── CER Section (3-part layout) ─── */
  .cer-section {
    background: #171D30;
    border: 1px solid #1E2A4A;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .cer-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .cer-label-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cer-icon { font-size: 18px; }
  .cer-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .cer-counter {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .cer-counter-met {
    color: #22C55E;
    background: rgba(34,197,94,0.1);
  }
  .cer-counter-unmet {
    color: #64748B;
    background: transparent;
  }

  /* ─── Writing Section (single textarea) ─── */
  .writing-section {
    background: #171D30;
    border: 1px solid #1E2A4A;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .writing-section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .writing-section-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #f59e0b;
  }

  /* ─── Sentence Starters ─── */
  .starters-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .starter-pill {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.25);
    color: #fbbf24;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .starter-pill:hover {
    background: rgba(245,158,11,0.18);
    border-color: #f59e0b;
  }

  /* ─── Textarea ─── */
  .write-textarea {
    width: 100%;
    min-height: 200px;
    background: #131829;
    border: 1px solid #1E2A4A;
    border-radius: 8px;
    color: #E2E8F0;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    padding: 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .write-textarea:focus {
    border-color: #f59e0b;
  }
  .write-textarea-cer {
    min-height: 100px;
  }
  .write-textarea,
  .write-textarea-cer {
    background-image: repeating-linear-gradient(
      transparent,
      transparent 27px,
      rgba(245,158,11,0.06) 27px,
      rgba(245,158,11,0.06) 28px
    );
    background-attachment: local;
  }

  /* ─── Stats Row ─── */
  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .stat-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #64748B;
  }
  .stat-met { color: #22C55E; }
  .stat-unmet { color: #64748B; }

  /* ─── Submit Row ─── */
  .submit-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
  }
  .word-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #64748B;
  }
  .btn-submit {
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    transition: all 0.3s;
  }
  .btn-submit-active {
    background: linear-gradient(135deg, #ef4444, #1e78ff);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(239,68,68,0.3);
  }
  .btn-submit-disabled {
    background: #1E2A4A;
    color: #64748B;
    cursor: not-allowed;
  }

  /* ─── Completion Screen ─── */
  .completion-screen {
    text-align: center;
    padding: 40px 20px;
    animation: fadeSlide 0.5s ease forwards;
  }
  .completion-icon { font-size: 60px; margin-bottom: 16px; }
  .completion-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #22C55E;
    margin-bottom: 10px;
  }
  .completion-stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #94A3B8;
    margin-bottom: 6px;
  }
  .completion-rings {
    display: inline-block;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 10px;
    padding: 8px 20px;
    margin: 16px 0;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #f59e0b;
    animation: pulseGlow 2s ease-in-out infinite;
  }
  .completion-message {
    font-size: 15px;
    color: #E2E8F0;
    line-height: 1.6;
    margin-top: 16px;
    margin-bottom: 20px;
  }
  .btn-primary {
    display: inline-block;
    margin-top: 12px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(245,158,11,0.3);
    transition: all 0.2s;
  }

  .hidden { display: none; }

/* ─── ExecSkills Styles (inlined #171) ─── */
.es-plan-attack{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;margin:16px 0;text-align:center;}
.es-plan-attack h2{font-size:20px;color:#f0f0f0;margin:0 0 8px 0;font-family:'Orbitron','Segoe UI',sans-serif;letter-spacing:1px;}
.es-plan-attack .es-subtitle{font-size:13px;color:#8b8fa3;margin:0 0 20px 0;}
.es-plan-overview{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:8px;-webkit-justify-content:center;justify-content:center;margin:16px 0;}
.es-plan-pill{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:8px 16px;font-size:13px;color:#c0c4d6;}
.es-plan-pill .es-pill-type{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#6c63ff;display:block;margin-bottom:2px;}
.es-time-estimate{display:-webkit-inline-flex;display:inline-flex;-webkit-align-items:center;align-items:center;gap:6px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);border-radius:8px;padding:6px 14px;font-size:13px;color:#a5b4fc;margin:12px 0;}
.es-ready-btn{background:linear-gradient(135deg,#6c63ff 0%,#8b5cf6 100%);color:#fff;border:none;border-radius:12px;padding:14px 40px;font-size:16px;font-weight:700;cursor:pointer;margin-top:20px;}
.es-session-timer{position:fixed;top:12px;right:12px;background:rgba(15,15,30,0.85);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:6px 14px;font-size:13px;color:#a5b4fc;font-family:'JetBrains Mono',monospace;z-index:100;}
.es-reflection{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);border:1px solid rgba(139,92,246,0.2);border-radius:16px;padding:24px;margin:16px 0;}
.es-reflection h3{color:#a78bfa;font-size:16px;margin:0 0 4px 0;}
.es-reflection .es-ref-subtitle{color:#8b8fa3;font-size:13px;margin:0 0 16px 0;}
.es-ref-prompt{color:#c4b5fd;font-size:14px;font-weight:600;margin:14px 0 6px 0;}
.es-ref-textarea{width:100%;min-height:60px;background:rgba(255,255,255,0.04);border:1px solid rgba(139,92,246,0.2);border-radius:10px;padding:12px;color:#e0e0e0;font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box;}
/* ExecSkills plan overlay */
#es-plan-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(11,15,26,0.97);z-index:200;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:24px;}
#es-plan-inner{max-width:520px;width:100%;}

  /* WCAG 2.1 Animation from Interactions — respect OS reduced motion (#438) */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>
</head>
<body>

<!-- ExecSkills Plan Overlay (#171) -->
<div id="es-plan-overlay">
  <div id="es-plan-inner"></div>
</div>

<!-- Brain Break Overlay (#170) -->
<div id="brain-break-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(11,15,26,0.97);z-index:9000;">
  <div style="position:absolute;top:50%;left:50%;-webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%);text-align:center;padding:0 24px;width:100%;max-width:480px;">
    <div style="font-size:56px;margin-bottom:16px;">&#x1F9E0;</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:20px;color:#a855f7;letter-spacing:2px;margin-bottom:12px;">BRAIN BREAK</div>
    <div id="bb-prompt" style="font-size:16px;color:#E2E8F0;margin-bottom:28px;line-height:1.6;"></div>
    <div id="bb-timer" style="font-family:'JetBrains Mono',monospace;font-size:56px;font-weight:700;color:#a855f7;margin-bottom:28px;">30</div>
    <button onclick="endBrainBreak()" style="background:#a855f7;color:#fff;border:none;border-radius:12px;padding:14px 36px;font-size:16px;font-family:'Orbitron',sans-serif;font-weight:700;letter-spacing:1px;cursor:pointer;">I'M DONE</button>
  </div>
</div>

<!-- ─── Star Field ─── -->
<div id="starField"></div>

<!-- ─── Header ─── -->
<header class="header">
  <div class="header-inner">
    <div class="header-brand">
      <span class="header-brand-icon">&#x270D;&#xFE0F;</span>
      <div>
        <div class="header-title">WRITING LAB</div>
        <div class="header-subtitle">BUGGSY</div>
      </div>
    </div>
    <span id="sessionTimer" class="header-timer">00:00</span>
  </div>
</header>

<!-- ─── Format Selector (for testing) ─── -->
<div class="format-selector" id="formatSelector">
  <button class="format-tab format-tab-active" onclick="selectFormat(0)">CER</button>
  <button class="format-tab" onclick="selectFormat(1)">Persuasive</button>
  <button class="format-tab" onclick="selectFormat(2)">POV Journal</button>
  <button class="format-tab" onclick="selectFormat(3)">Edit/Revise</button>
</div>

<!-- ─── Main Content ─── -->
<main class="main-content">

  <!-- ══════ PLAN YOUR ATTACK ══════ -->
  <div id="viewPlan" style="padding-top:16px;">
    <div class="plan-attack">
      <div class="plan-attack-label">&#x1F3AF; PLAN YOUR ATTACK</div>
      <div class="plan-attack-text">
        <div id="planFormatBadge" class="plan-attack-format"></div>
        <div id="planDescription" style="margin-top:8px;"></div>
        <div style="margin-top:6px;font-size:12px;color:#94A3B8;">
          &#x23F1; Time target: <strong style="color:#f59e0b;">~12 minutes</strong>
        </div>
      </div>
      <button class="btn-ready" onclick="startWriting()">&#x270D;&#xFE0F; I'M READY TO WRITE</button>
    </div>
  </div>

  <!-- ══════ PROMPT VIEW ══════ -->
  <div id="viewPrompt" class="hidden" style="padding-top:16px;">
    <div class="prompt-card">
      <div class="prompt-label">&#x1F4DD; YOUR PROMPT</div>
      <div class="prompt-text" id="promptText"></div>
      <div class="prompt-guidance" id="promptGuidance"></div>
    </div>
    <button class="btn-ready" onclick="goToWriting()">&#x270D;&#xFE0F; START WRITING</button>
  </div>

  <!-- ══════ WRITING VIEW ══════ -->
  <div id="viewWrite" class="hidden" style="padding-top:16px;">
    <!-- Timer -->
    <div class="timer-row">
      <span class="timer-label">WRITING TIME</span>
      <span id="writingTimer" class="timer-value">00:00</span>
    </div>

    <!-- Writing area gets built dynamically -->
    <div id="writingArea"></div>

    <!-- Stats + Submit -->
    <div class="submit-row">
      <div>
        <span id="wordCount" class="stat-item">0 words</span>
        <span style="margin:0 6px;color:#1E2A4A;">|</span>
        <span id="sentenceCount" class="stat-item">0 sentences</span>
        <span style="margin:0 6px;color:#1E2A4A;">|</span>
        <span id="minIndicator" class="stat-item stat-unmet">min not met</span>
      </div>
      <button id="submitBtn" class="btn-submit btn-submit-disabled" onclick="handleSubmit()" disabled>&#x2705; SUBMIT</button>
    </div>
  </div>

  <!-- ══════ COMPLETION SCREEN ══════ -->
  <div id="viewCompletion" class="hidden" style="padding-top:16px;">
    <div class="completion-screen">
      <div class="completion-icon">&#x270D;&#xFE0F;&#x2728;</div>

// ── Ring Burst ──
function fireRingBurst(cx, cy) {
  for (var i = 0; i < 8; i++) {
    (function(idx) {
      setTimeout(function() {
        var r = document.createElement('div');
        r.className = 'b-ring-particle';
        var angle = (idx / 8) * Math.PI * 2;
        var dist = 50 + Math.random() * 35;
        r.style.left = cx + 'px';
        r.style.top = cy + 'px';
        r.style.setProperty('--tx', (Math.cos(angle) * dist).toFixed(0) + 'px');
        r.style.setProperty('--ty', (Math.sin(angle) * dist).toFixed(0) + 'px');
        document.body.appendChild(r);
        setTimeout(function() { if (r.parentNode) { r.parentNode.removeChild(r); } }, 900);
      }, idx * 35);
    })(i);
  }
}

var ExecSkills = (function() {
  'use strict';
  var _sessionStartTime = null;
  var _sessionTimerInterval = null;
  var _planAttackCallback = null;
  var _isSparkle = false;

  function showPlanYourAttack(options) {
    _isSparkle = (options.child === 'jj' || options.child === 'kindle');
    _planAttackCallback = options.onReady;
    var title = _isSparkle ? 'Let\'s Get Ready!' : 'PLAN YOUR ATTACK';
    var subtitle = _isSparkle ? 'Here\'s what we\'re playing today!' : 'Scan the mission. Know what you\'re walking into.';
    var btnText = _isSparkle ? 'Let\'s Go!' : 'I\'m Ready \u2014 Start Mission';
    var pills = '';
    for (var i = 0; i < options.questions.length; i++) {
      var q = options.questions[i];
      pills += '<div class="es-plan-pill"><span class="es-pill-type">' + (q.type || 'Q' + (i + 1)) + '</span>' + (q.topic || 'Q' + (i + 1)) + '</div>';
    }
    var html = '<div class="es-plan-attack">' +
      '<h2>' + title + '</h2>' +
      '<p class="es-subtitle">' + subtitle + '</p>' +
      '<div class="es-time-estimate">&#9202; Estimated time: ~' + (options.timeEstimate || 5) + ' min</div>' +
      '<div class="es-plan-overview">' + pills + '</div>' +
      '<button class="es-ready-btn" onclick="ExecSkills._onPlanReady()">' + btnText + '</button>' +
    '</div>';
    var container = document.getElementById(options.container);
    if (container) container.innerHTML = html;
  }

  function _onPlanReady() {
    startSessionTimer(_isSparkle);
    if (_planAttackCallback) _planAttackCallback();
  }

  function startSessionTimer(isSparkle) {
    _sessionStartTime = Date.now();
    var timerEl = document.createElement('div');
    timerEl.id = 'es-session-timer';
    timerEl.className = 'es-session-timer' + (isSparkle ? ' sparkle' : '');
    timerEl.innerHTML = '0:00';
    document.body.appendChild(timerEl);
    _sessionTimerInterval = setInterval(function() {
      var elapsed = Math.floor((Date.now() - _sessionStartTime) / 1000);
      var min = Math.floor(elapsed / 60);
      var sec = elapsed % 60;
      timerEl.innerHTML = min + ':' + (sec < 10 ? '0' : '') + sec;
    }, 1000);
  }

  function stopSessionTimer() {
    if (_sessionTimerInterval) { clearInterval(_sessionTimerInterval); _sessionTimerInterval = null; }
    return _sessionStartTime ? Math.floor((Date.now() - _sessionStartTime) / 1000) : 0;
  }

  function showFridayReflection(container) {
    var html = '<div class="es-reflection"><h3>&#128588; Weekly Debrief</h3><p class="es-ref-subtitle">Quick reflection \u2014 just two sentences.</p><div class="es-ref-prompt">What was the hardest thing this week?</div><textarea class="es-ref-textarea" id="es-ref-hard" placeholder="The hardest thing was..."></textarea><div class="es-ref-prompt">What are you proud of?</div><textarea class="es-ref-textarea" id="es-ref-proud" placeholder="I\'m proud that I..."></textarea><div style="text-align:center;margin-top:16px;"><button class="es-ready-btn" onclick="ExecSkills._submitReflection()" style="font-size:14px;padding:10px 30px;background:linear-gradient(135deg,#7c3aed,#a78bfa);">Submit Reflection &#127775;</button></div></div>';
    var el = document.getElementById(container);
    if (el) el.innerHTML = html;
  }

  function _submitReflection() {
    var hard = document.getElementById('es-ref-hard');
    var proud = document.getElementById('es-ref-proud');
    var hardVal = hard ? hard.value.replace(/^\s+|\s+$/g, '') : '';
    var proudVal = proud ? proud.value.replace(/^\s+|\s+$/g, '') : '';
    if (hardVal.length < 3 || proudVal.length < 3) {
      if (hard && hardVal.length < 3) hard.style.borderColor = '#a78bfa';
      if (proud && proudVal.length < 3) proud.style.borderColor = '#a78bfa';
      return;
    }
    ExecSkills._reflectionData = { hardest: hardVal, proudOf: proudVal, timestamp: new Date().toISOString() };
    var parent = hard ? hard.parentNode : null;
    if (parent) parent.innerHTML = '<div class="es-reflection"><h3>&#127775; Reflection Logged!</h3><p class="es-ref-subtitle">Great week. Come back Monday ready to level up.</p></div>';
  }

  function showCompletion(container, options) {
    var elapsed = stopSessionTimer();
    var min = Math.floor(elapsed / 60);
    var sec = elapsed % 60;
    var timeStr = min + ':' + (sec < 10 ? '0' : '') + sec;
    var skillsEarned = [];
    skillsEarned.push('&#127919; Sustained Attention \u2014 ' + timeStr + ' focused');
    skillsEarned.push('&#128203; Planning \u2014 scanned before starting');
    skillsEarned.push('&#9997; Task Initiation \u2014 started writing');
    if (options.dayOfWeek === 'Friday') skillsEarned.push('&#129518; Self-Reflection \u2014 Weekly Debrief');
    var skillsList = '';
    for (var i = 0; i < skillsEarned.length; i++) {
      skillsList += '<div style="font-size:13px;color:#a5b4fc;padding:4px 0;">' + skillsEarned[i] + '</div>';
    }
    var html = '<div style="background:rgba(255,255,255,0.04);border-radius:12px;padding:16px;margin:16px 0;text-align:left;"><div style="font-size:11px;color:#6c63ff;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Executive Skills Built Today</div>' + skillsList + '</div>';
    var el = document.getElementById(container);
    if (el) el.innerHTML = html;
  }

  return {
    showPlanYourAttack: showPlanYourAttack, startSessionTimer: startSessionTimer,
    stopSessionTimer: stopSessionTimer,
    showFridayReflection: showFridayReflection, showCompletion: showCompletion,
    _onPlanReady: _onPlanReady, _submitReflection: _submitReflection,
    _reflectionData: null
  };
})();

// ─── Determine week of 4-week cycle ───
function getWeekFormat() {
  var now = new Date();
  var startOfYear = new Date(now.getFullYear(), 0, 1);
  var diff = now.getTime() - startOfYear.getTime();
  var weekNum = Math.floor(diff / (7 * 24 * 60 * 60 * 1000));
  return weekNum % 4;
}

  hideBuggsyLoader();
  buildStarField();
  currentFormat = getWeekFormat();
  highlightFormatTab(currentFormat);
  initDraftAutoSave_();

  ExecSkills.showPlanYourAttack({
    container: 'es-plan-inner',
    child: CHILD,
    timeEstimate: 12,
    questions: [
      { type: 'Format', topic: fmt.name },
      { type: 'Writing', topic: 'Open-ended response' }

      document.getElementById('es-plan-overlay').style.display = 'none';
      startWriting();
    }
  });
}

// ─── Draft Auto-Save (#162) ───
var _DRAFT_LS_KEY = 'tbm_writing_draft_' + new Date().toISOString().slice(0, 10);
var _draftInterval = null;

function saveDraft_() {
  if (submitted) return;
  try {
    var data = getAllText();
    if (!data || !data.parts) return;
    var hasContent = false;
    var keys = Object.keys(data.parts);
    for (var i = 0; i < keys.length; i++) {
      if (data.parts[keys[i]] && data.parts[keys[i]].replace(/^\s+|\s+$/g, '').length > 0) {
        hasContent = true;
        break;
      }
    }
    if (!hasContent) return;
    localStorage.setItem(_DRAFT_LS_KEY, JSON.stringify({
      format: currentFormat,
      parts: data.parts,
      savedAt: new Date().toISOString()
    }));
  } catch (e) { /* localStorage may be unavailable */ }
}

function loadDraft_() {
  try {
    var raw = localStorage.getItem(_DRAFT_LS_KEY);
    if (!raw) return;
    var draft = JSON.parse(raw);
    if (!draft || !draft.parts) return;
    if (draft.format !== currentFormat) return;
    // Restore after a short delay to let DOM render
    setTimeout(function() {
      var keys = Object.keys(draft.parts);
      for (var i = 0; i < keys.length; i++) {
        var el = document.getElementById('textarea-' + keys[i]);
        if (el && draft.parts[keys[i]]) {
          el.value = draft.parts[keys[i]];
        }
      }
      updateCounts();
      console.log('Draft restored from ' + draft.savedAt);
    }, 300);
  } catch (e) { /* ignore parse errors */ }
}

function clearDraft_() {
  try { localStorage.removeItem(_DRAFT_LS_KEY); } catch (e) {}
}

function initDraftAutoSave_() {
  // Auto-save every 30 seconds
  _draftInterval = setInterval(saveDraft_, 30000);
  // Save on page unload
  window.addEventListener('beforeunload', saveDraft_);
  // Restore any saved draft after rendering
  loadDraft_();

      { key: 'evidence', label: 'EVIDENCE', icon: '&#x1F4DD;', color: '#F97316', min: 2, starterKey: 'evidence' },
      { key: 'reasoning', label: 'REASONING', icon: '&#x1F9E0;', color: '#22C55E', min: 1, starterKey: 'reasoning' }

    for (var s = 0; s < cerSections.length; s++) {

      }

      html += '<textarea id="textarea-' + sec.key + '" class="write-textarea write-textarea-cer" placeholder="Write your ' + sec.key + ' here..." oninput="updateCounts()"></textarea>';

    // Show original text with errors

// ─── Sentence Starter Insertion ───
function escapeJsString(str) {
  return "'" + str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"') + "'";
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function insertStarter(targetId, text) {
  var ta = document.getElementById(targetId);
  if (!ta) return;
  var val = ta.value;
  var newVal = val ? val + ' ' + text : text;
  ta.value = newVal;
  updateCounts();
  setTimeout(function() {
    ta.focus();
    if (typeof ta.setSelectionRange === 'function') {
      ta.setSelectionRange(newVal.length, newVal.length);
    }
  }, 50);
}

// ─── Word & Sentence Counting ───
function countWords(text) {
  var trimmed = text.replace(/\s+/g, ' ').replace(/^\s+|\s+$/g, '');
  if (trimmed === '') return 0;
  return trimmed.split(' ').length;
}

function countSentences(text) {
  var parts = text.split(/[.!?]+/);
  var count = 0;
  for (var i = 0; i < parts.length; i++) {
    if (parts[i].replace(/\s/g, '').length > 3) {
      count++;
    }
  }
  return count;
}

function getAllText() {
  var fmt = FORMATS[currentFormat];
  if (fmt.type === 'cer') {
    var c = document.getElementById('textarea-claim');
    var e = document.getElementById('textarea-evidence');
    var r = document.getElementById('textarea-reasoning');
    var cVal = c ? c.value : '';
    var eVal = e ? e.value : '';
    var rVal = r ? r.value : '';
    return { combined: cVal + ' ' + eVal + ' ' + rVal, parts: { claim: cVal, evidence: eVal, reasoning: rVal } };
  } else {
    var main = document.getElementById('textarea-main');
    var mainVal = main ? main.value : '';
    return { combined: mainVal, parts: { main: mainVal } };
  }
}

function updateCounts() {
  var fmt = FORMATS[currentFormat];
  var textData = getAllText();
  var totalWords = countWords(textData.combined);
  var totalSentences = countSentences(textData.combined);

  // Update word and sentence display
  var wordEl = document.getElementById('wordCount');
  var sentEl = document.getElementById('sentenceCount');
  if (wordEl) wordEl.textContent = totalWords + ' words';
  if (sentEl) sentEl.textContent = totalSentences + ' sentences';

  var minMet = false;

  if (fmt.type === 'cer') {
    // Check each CER section individually
    var claimSentences = countSentences(textData.parts.claim);
    var evidenceSentences = countSentences(textData.parts.evidence);
    var reasoningSentences = countSentences(textData.parts.reasoning);

    var claimMet = claimSentences >= 1;
    var evidenceMet = evidenceSentences >= 2;
    var reasoningMet = reasoningSentences >= 1;

    updateCounter('counter-claim', claimSentences, 1);
    updateCounter('counter-evidence', evidenceSentences, 2);
    updateCounter('counter-reasoning', reasoningSentences, 1);

    minMet = claimMet && evidenceMet && reasoningMet;
  } else {
    minMet = totalSentences >= fmt.minSentences;
  }

  // Update minimum indicator
  var minEl = document.getElementById('minIndicator');
  if (minEl) {
    if (minMet) {
      minEl.textContent = 'min met!';
      minEl.className = 'stat-item stat-met';
    } else {
      if (fmt.type === 'cer') {
        minEl.textContent = 'C:1+ E:2+ R:1+ needed';
      } else {
        minEl.textContent = fmt.minSentences + '+ sentences needed';
      }
      minEl.className = 'stat-item stat-unmet';
    }
  }

  // Submit button
  var submitBtn = document.getElementById('submitBtn');
  if (submitBtn) {
    if (minMet && totalWords > 0) {
      submitBtn.disabled = false;
      submitBtn.className = 'btn-submit btn-submit-active';
    } else {
      submitBtn.disabled = true;
      submitBtn.className = 'btn-submit btn-submit-disabled';
    }
  }
}

function updateCounter(counterId, current, min) {
  var el = document.getElementById(counterId);
  if (!el) return;
  el.textContent = current + '/' + min + '+ sentences';
  if (current >= min) {
    el.className = 'cer-counter cer-counter-met';
  } else {
    el.className = 'cer-counter cer-counter-unmet';
  }
}

// ─── Session Timer ───
function startSessionTimer() {
  sessionInterval = setInterval(function() {
    var elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
    var m = Math.floor(elapsed / 60);
    var s = elapsed % 60;
    var el = document.getElementById('sessionTimer');
    if (el) {
      if (m < 1) { el.textContent = 'Just started'; }
      else { el.textContent = 'Working for ' + m + ' min'; }
    }
  }, 1000);
}

// ─── Writing Timer ───
function startWritingTimer() {
  writingStartTime = Date.now();
  writingSeconds = 0;
  writingInterval = setInterval(function() {
    writingSeconds++;
    var m = Math.floor(writingSeconds / 60);
    var s = writingSeconds % 60;
    var el = document.getElementById('writingTimer');
    el.textContent = padTwo(m) + ':' + padTwo(s);
    if (m >= TARGET_MINUTES) {
      el.className = 'timer-value timer-value-warn';
    } else {
      el.className = 'timer-value';
    }
  }, 1000);
}

function stopWritingTimer() {
  if (writingInterval) {
    clearInterval(writingInterval);
    writingInterval = null;
  }
}

function padTwo(n) {
  return n < 10 ? '0' + n : '' + n;
}

function getSessionTimeString() {
  if (!sessionStartTime) return '00:00';
  var elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
  var m = Math.floor(elapsed / 60);
  var s = elapsed % 60;
  return padTwo(m) + ':' + padTwo(s);
}

// ─── Submit ───
function handleSubmit() {
  if (submitted) return;
  submitted = true;
  /* clearDraft_ moved to submitHomeworkSafe success handler — prevents data loss if submit fails */

  stopWritingTimer();
  if (sessionInterval) {
    clearInterval(sessionInterval);
    sessionInterval = null;
  }

  var textData = getAllText();
  var totalWords = countWords(textData.combined);
  var totalSentences = countSentences(textData.combined);
  var fmt = FORMATS[currentFormat];

  document.getElementById('completionWords').textContent = totalWords + ' words written';
  document.getElementById('completionSentences').textContent = totalSentences + ' sentences';
  document.getElementById('completionTime').textContent = 'Writing time: ' + padTwo(Math.floor(writingSeconds / 60)) + ':' + padTwo(writingSeconds % 60) + ' | Session: ' + getSessionTimeString();

  showScreen('completion');
  var cx = window.innerWidth / 2;
  var cy = window.innerHeight / 3;
  fireRingBurst(cx, cy);
  setTimeout(function() { fireRingBurst(cx - 60, cy + 30); }, 350);
  playBugsyComplete();
  // #171 — ExecSkills completion + Friday reflection
  var compScreen = document.querySelector('#viewCompletion .completion-screen');
  if (compScreen) {
    var esDiv = document.createElement('div');
    esDiv.id = 'es-completion-block';
    compScreen.appendChild(esDiv);
    ExecSkills.showCompletion('es-completion-block', { score: 0, total: 0, rings: 3, dayOfWeek: _dayOfWeek });
  }
  if (_dayOfWeek === 'Friday') {
    setTimeout(function() {
      var refDiv = document.createElement('div');
      refDiv.id = 'es-reflection-block';
      var card = document.querySelector('#viewCompletion .completion-screen');
      if (card) { card.appendChild(refDiv); ExecSkills.showFridayReflection('es-reflection-block'); }
    }, 500);
  }

  // Submit homework via GAS backend (if available)
  if (!TBM_TEST_MODE) {
    try {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(result) {
            clearDraft_(); /* Only clear draft after server confirms success */
            console.log('Submitted: ' + (result && result.status ? result.status : 'unknown'));
          })
          .withFailureHandler(function(err) { console.error('Submit failed:', err); })
          .submitHomeworkSafe({
            child: CHILD,
            module: 'writing',
            subject: 'RLA-Writing-' + fmt.id,
            score: 0,
            responseText: textData.combined,
            rings: 3
          });
      }
    } catch (e) {
      // Standalone mode
    }
  }

  // Award rings via GAS backend (if available)
  if (TBM_TEST_MODE) {
    console.log('[TEST MODE] awardRingsSafe skipped, rings=3');
  } else {
    try {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function() { })
          .withFailureHandler(function(err) { })
          .awardRingsSafe(CHILD, 3, 'writing-module-' + fmt.id);
      }
    } catch (e) {
      // Standalone mode — no GAS backend
    }
  }

  // Log to Notion via GAS backend (if available)
  if (!TBM_TEST_MODE) {
    try {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function() { })
          .withFailureHandler(function(err) { })
          .logHomeworkCompletionSafe({
            child: CHILD,
            subject: 'RLA',
            assignment: 'Writing - ' + fmt.name,
            score: null,
            teksCode: 'ELA 4.12',
            difficulty: 'Medium',
            date: new Date().toISOString().split('T')[0]
          });
      }
    } catch (e) {
      // Standalone mode
    }
  } else {
    console.log('[TEST MODE] logHomeworkCompletionSafe skipped');
  }
}

// ─── CURRICULUM LOADING ───
function loadWritingContent() {
  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    console.warn('[TBM FALLBACK] writing-module \u2014 reason: no google.script.run available');
    showLoadError_('offline');
    return;
  }
  google.script.run
    .withSuccessHandler(function(result) {
      // #170 — read adhd scaffold config
      if (result && result.scaffoldConfig && result.scaffoldConfig.adhd) {
        var adhd = result.scaffoldConfig.adhd;
        if (adhd.brainBreakAfter) { _brainBreakAfter = adhd.brainBreakAfter; }
        if (adhd.brainBreakPrompt) { _brainBreakPrompt = adhd.brainBreakPrompt; }
      }
      if (!result || !result.content) {
        console.warn('[TBM FALLBACK] writing-module \u2014 reason: getTodayContentSafe returned empty/missing content');
        showLoadError_('no-content');
        return;
      }
      var c = result.content;
      var qw = c.quick_write && c.quick_write.prompt ? c.quick_write : null;
      if (!qw) {
        console.warn('[TBM FALLBACK] writing-module \u2014 reason: response had content but no quick_write.prompt');
        showLoadError_('no-content');
        return;
      }
      // Override default prompts with today's curriculum.
      for (var i = 0; i < FORMATS.length; i++) {
        if (FORMATS[i].id === 'quick_write' || FORMATS[i].id === 'journal') {
          FORMATS[i].prompt = qw.prompt;
          if (qw.guidance) { FORMATS[i].guidance = qw.guidance; }
        }
      }
      init();
    })
    .withFailureHandler(function(err) {
      console.warn('[TBM FALLBACK] writing-module \u2014 reason: getTodayContentSafe failed: ' + (err && err.message ? err.message : 'unknown'));
      showLoadError_('load-error');
    })
    .getTodayContentSafe('buggsy');
}

preloadBugsyAudio();

    + 'font-size:26px;cursor:pointer;transition:border-color 0.15s,transform 0.15s;}'
    + '.tbm-fb-emojis button.selected{border-color:#38bdf8;transform:scale(1.15);}'
    + '#tbm-fb-text{width:100%;box-sizing:border-box;background:#0f1a2a;border:1px solid #1e3347;border-radius:8px;'
    + 'color:#e2e8f0;padding:8px;font-size:14px;font-family:inherit;resize:none;height:52px;margin-bottom:10px;}'
    + '#tbm-fb-text::placeholder{color:#4a6080;}'
    + '.tbm-fb-actions{display:flex;justify-content:flex-end;gap:8px;}'
    + '.tbm-fb-actions button{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:none;}'
    + '#tbm-fb-skip{background:transparent;color:#4a6080;}#tbm-fb-skip:hover{color:#e2e8f0;}'
    + '#tbm-fb-send{background:#1e3a5f;color:#38bdf8;font-weight:700;}#tbm-fb-send:hover{background:#254a73;}'
    + '.tbm-fb-toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#0b131d;'
    + 'border:1px solid #1e3347;color:#e2e8f0;padding:8px 20px;border-radius:8px;font-size:14px;z-index:9010;'
    + 'opacity:0;transition:opacity 0.3s;}';

  var style = document.createElement('style');
  style.textContent = FB_STYLES;
  document.head.appendChild(style);

  var btn = document.createElement('button');
  btn.id = 'tbm-fb-btn';
  btn.innerHTML = '&#x1F4AC;';
  btn.setAttribute('aria-label', 'Give feedback');
  document.body.appendChild(btn);

  var overlay = document.createElement('div');
  overlay.id = 'tbm-fb-overlay';
  document.body.appendChild(overlay);

  var modal = document.createElement('div');
  modal.id = 'tbm-fb-modal';
  modal.innerHTML = '<h3>How was it?</h3>'
    + '<div class="tbm-fb-emojis">'
    + '<button data-score="1" aria-label="Okay">&#x1F610;</button>'
    + '<button data-score="3" aria-label="Good">&#x1F642;</button>'
    + '<button data-score="5" aria-label="Awesome">&#x1F929;</button>'
    + '</div>'
    + '<textarea id="tbm-fb-text" placeholder="What happened? (optional)" maxlength="200"></textarea>'
    + '<div class="tbm-fb-actions">'
    + '<button id="tbm-fb-skip">Skip</button>'
    + '<button id="tbm-fb-send">Send</button>'
    + '</div>';
  document.body.appendChild(modal);

  var selectedScore = 0;

  function getUser() {
    var search = window.location.search || '';
    var match = search.match(/[?&]child=([^&]+)/);
    if (match) return decodeURIComponent(match[1]);
    return 'unknown';
  }

  function getSurface() {
    var meta = document.querySelector('meta[name="tbm-module"]');
    return meta ? meta.getAttribute('content') : 'unknown';
  }

  function showToast(msg) {
    var t = document.createElement('div');
    t.className = 'tbm-fb-toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.style.opacity = '1'; }, 10);
    setTimeout(function() {
      t.style.opacity = '0';
      setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 300);
    }, 1500);
  }

  function openModal() {
    selectedScore = 0;
    var btns = modal.querySelectorAll('.tbm-fb-emojis button');
    for (var i = 0; i < btns.length; i++) btns[i].className = '';
    var ta = document.getElementById('tbm-fb-text');
    if (ta) ta.value = '';
    overlay.style.display = 'block';
    modal.style.display = 'block';
  }

  function closeModal() {
    overlay.style.display = 'none';
    modal.style.display = 'none';
  }

  btn.onclick = openModal;
  overlay.onclick = closeModal;

  var emojiButtons = modal.querySelectorAll('.tbm-fb-emojis button');
  for (var e = 0; e < emojiButtons.length; e++) {
    emojiButtons[e].onclick = (function(b) {
      return function() {
        selectedScore = parseInt(b.getAttribute('data-score'), 10);
        var all = modal.querySelectorAll('.tbm-fb-emojis button');
        for (var k = 0; k < all.length; k++) all[k].className = '';
        b.className = 'selected';
      };
    })(emojiButtons[e]);
  }

  document.getElementById('tbm-fb-skip').onclick = closeModal;

  document.getElementById('tbm-fb-send').onclick = function() {
    if (!selectedScore) { showToast('Tap an emoji first!'); return; }
    var ta = document.getElementById('tbm-fb-text');
    var payload = {
      surface: getSurface(),
      layout: selectedScore,
      readability: selectedScore,
      text: ta ? ta.value : '',
      user: getUser()
    };
    closeModal();
    google.script.run
      .withSuccessHandler(function() { showToast('\u2713 Thanks!'); })
      .withFailureHandler(function() { showToast('Oops, try later'); })
      .submitFeedbackSafe(payload);
  };
})();
</script>
</body>
</html>
