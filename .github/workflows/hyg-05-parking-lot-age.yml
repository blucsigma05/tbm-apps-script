# .github/workflows/hyg-05-parking-lot-age.yml
# Parking Lot Age Sweep — runs 1st and 15th of each month at 7am Central (13:00 UTC).
# Reads Notion Parking Lot page, flags items older than STALE_DAYS.
# Called by: cron 1st/15th 13:00 UTC + workflow_dispatch
# Env vars required: NOTION_API_KEY, PUSHOVER_USER_KEY, PUSHOVER_APP_TOKEN

name: HYG-05 Parking Lot Age Sweep

on:
  schedule:
    - cron: '0 13 1,15 * *'   # 1st & 15th 07:00 Central (13:00 UTC)
  workflow_dispatch:
    inputs:
      stale_days:
        description: 'Days before a parking lot item is flagged (default: 14)'
        required: false
        default: '14'

permissions:
  contents: read

jobs:
  parking-lot-sweep:
    name: Parking Lot Age Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run parking lot age check
        id: check
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PARKING_LOT_ID: '32ccea3cd9e881809257fd5e7973c6d7'
          STALE_DAYS: ${{ inputs.stale_days || '14' }}
        run: python3 .github/scripts/check_parking_lot_age.py

      - name: Pushover — stale items found
        if: steps.check.outputs.has_findings == 'true'
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
        run: |
          if [ -z "$PUSHOVER_USER_KEY" ] || [ -z "$PUSHOVER_APP_TOKEN" ]; then
            echo "Pushover secrets not set — skipping notification."
            exit 0
          fi
          MSG=$(cat hyg05-message.txt 2>/dev/null || echo "Stale Parking Lot items found — see Actions log.")
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sS \
            --form-string "token=${PUSHOVER_APP_TOKEN}" \
            --form-string "user=${PUSHOVER_USER_KEY}" \
            --form-string "title=HYG-05: Parking Lot Stale" \
            --form-string "message=${MSG}" \
            --form-string "url=${RUN_URL}" \
            --form-string "url_title=View run" \
            --form-string "priority=0" \
            https://api.pushover.net/1/messages.json
