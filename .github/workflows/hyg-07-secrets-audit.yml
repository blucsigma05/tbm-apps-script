# .github/workflows/hyg-07-secrets-audit.yml
# Secrets Audit — runs monthly 1st at 8am Central (14:00 UTC).
# Lists GH repo secrets, flags orphaned (not referenced in any workflow) or > 90 days old.
# Called by: cron 1st 14:00 UTC + workflow_dispatch
# Env vars required: PIPELINE_BOT_TOKEN (PAT with repo scope), PUSHOVER_USER_KEY, PUSHOVER_APP_TOKEN
# Note: GITHUB_TOKEN cannot list repo secrets — a PAT is required.

name: HYG-07 Secrets Audit

on:
  schedule:
    - cron: '0 14 1 * *'   # 1st 08:00 Central (14:00 UTC)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-audit:
    name: Secrets Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run secrets audit
        id: check
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_BOT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/check_secrets_audit.py

      - name: Pushover — orphaned secrets found
        if: steps.check.outputs.has_findings == 'true'
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
        run: |
          if [ -z "$PUSHOVER_USER_KEY" ] || [ -z "$PUSHOVER_APP_TOKEN" ]; then
            echo "Pushover secrets not set — skipping notification."
            exit 0
          fi
          MSG=$(cat hyg07-message.txt 2>/dev/null || echo "Secrets audit findings — see Actions log.")
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sS \
            --form-string "token=${PUSHOVER_APP_TOKEN}" \
            --form-string "user=${PUSHOVER_USER_KEY}" \
            --form-string "title=HYG-07: Secrets Audit" \
            --form-string "message=${MSG}" \
            --form-string "url=${RUN_URL}" \
            --form-string "url_title=View run" \
            --form-string "priority=0" \
            https://api.pushover.net/1/messages.json
