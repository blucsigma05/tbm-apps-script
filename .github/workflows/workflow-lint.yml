# .github/workflows/workflow-lint.yml
# Lint gate for workflow files and scripts — prevents broken YAML from reaching main.

name: Workflow Lint

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint Workflows + Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Pin tool versions for deterministic CI — no surprise failures from upstream updates.
      - name: Install actionlint v1.7.7
        run: |
          ACTIONLINT_VERSION="1.7.7"
          curl -sL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin actionlint
          actionlint --version

      - name: Verify shellcheck version
        run: |
          # Pre-installed on ubuntu-latest runners. Log version for audit trail.
          SC_VERSION=$(shellcheck --version | grep '^version:' | awk '{print $2}')
          echo "shellcheck $SC_VERSION"

      - name: Lint workflow YAML files
        run: |
          echo "--- actionlint v1.7.7: all workflow files ---"
          actionlint .github/workflows/*.yml
          echo "PASS: all workflow YAML files are valid"

      - name: Compile Python scripts
        run: |
          echo "--- py_compile: all Python scripts ---"
          FAIL=0
          for pyfile in .github/scripts/*.py; do
            if [ -f "$pyfile" ]; then
              if python3 -m py_compile "$pyfile"; then
                echo "  OK: $pyfile"
              else
                echo "  FAIL: $pyfile"
                FAIL=1
              fi
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "FAIL: one or more Python scripts failed to compile"
            exit 1
          fi
          echo "PASS: all Python scripts compile cleanly"

      - name: Check shell scripts with shellcheck
        run: |
          echo "--- shellcheck: all shell scripts ---"
          FAIL=0
          for shfile in .github/scripts/*.sh; do
            if [ -f "$shfile" ]; then
              if shellcheck "$shfile"; then
                echo "  OK: $shfile"
              else
                echo "  FAIL: $shfile"
                FAIL=1
              fi
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "FAIL: one or more shell scripts have issues"
            exit 1
          fi
          echo "PASS: all shell scripts pass shellcheck (or none found)"

      - name: Policy — pull_request_target must not check out untrusted head code (F07)
        run: |
          # pull_request_target runs with trusted base-context permissions (write access, secrets).
          # Checking out PR head code via head.ref or head.sha exposes those secrets to
          # potentially untrusted fork code — a severe trust-escalation vector.
          #
          # Guard scope: only workflows actually TRIGGERED BY pull_request_target (i.e., the
          # string appears as a key under `on:` at the top of the YAML, not merely referenced
          # in a condition or if: expression inside a different trigger's job).
          # Detection: match `^on:` block lines until the next top-level key, then check for
          # the trigger name. A workflow that mentions pull_request_target only in an `if:`
          # expression (e.g. workflow_run checking event type) is correctly excluded.
          FAIL=0
          for wf in .github/workflows/*.yml; do
            # Extract whether pull_request_target is an actual on: trigger.
            # Strategy: check lines between `^on:` and next `^[a-z]` top-level key.
            # Use awk to parse only the on: block (stops at next non-indented line after on:).
            is_prt_trigger=$(awk '
              /^on:/ { in_on=1; next }
              in_on && /^[a-z]/ { exit }
              in_on && /pull_request_target/ { print "yes"; exit }
            ' "$wf")
            if [ "$is_prt_trigger" = "yes" ]; then
              # Detect checkout steps referencing head ref/sha (dot or underscore form)
              if grep -qE 'ref:[[:space:]]*.*head[._](ref|sha)' "$wf"; then
                echo "::error::POLICY VIOLATION: $wf is triggered by pull_request_target and checks out untrusted head code."
                echo "  Only base-branch checkout is safe in pull_request_target workflows."
                echo "  Remove head.ref / head.sha / head_ref / head_sha from any checkout ref: field."
                FAIL=1
              else
                echo "  OK (no unsafe head checkout): $(basename "$wf")"
              fi
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "FAIL: pull_request_target untrusted-checkout policy violated"
            exit 1
          fi
          echo "PASS: no pull_request_target workflows check out untrusted head code"

      - name: Policy — no artifact downloads in workflow_run handlers (F08)
        run: |
          # workflow_run runs with repo-level write permissions in the trusted context.
          # Artifact downloads from untrusted forks are a classic trust-escalation vector.
          # Fail if any workflow_run-triggered file introduces artifact-fetch APIs.
          # Patterns split to avoid self-match when this policy file is scanned.
          P1="actions/download-artifact"
          P2="github.rest.actions.downloadArtifact"
          P3="gh run download"
          FAIL=0
          for wf in .github/workflows/*.yml; do
            # Skip this file — its run block contains the trigger string and would self-match
            [ "$(basename "$wf")" = "workflow-lint.yml" ] && continue
            # Only check files that have workflow_run in their on: trigger block
            if grep -q 'workflow_run:' "$wf"; then
              if grep -qE "${P1}|${P2}|${P3}" "$wf"; then
                echo "::error::POLICY VIOLATION: $wf uses workflow_run and contains an artifact-download API."
                echo "  Add explicit trust-model docs and origin validation before using artifacts in workflow_run handlers."
                FAIL=1
              else
                echo "  OK (no artifact download): $wf"
              fi
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "FAIL: workflow_run artifact-download policy violated"
            exit 1
          fi
          echo "PASS: no workflow_run handlers contain artifact-download APIs"
