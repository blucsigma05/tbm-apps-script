# .github/workflows/codex-pr-review.yml
# Codex PR Review — sends PR diff to OpenAI gpt-4o for TBM-specific code review.
# Logic lives in .github/scripts/codex_review.py (no heredocs in YAML).

name: Codex PR Review

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number to review
        required: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: true

jobs:
  review:
    name: Codex PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build PR diff
        id: diff
        run: |
          git fetch origin main --depth=1
          git diff origin/main...HEAD -- '*.js' '*.html' > pr_diff.txt
          DIFF_BYTES=$(wc -c < pr_diff.txt)
          echo "diff_bytes=$DIFF_BYTES" >> "$GITHUB_OUTPUT"
          head -c 12000 pr_diff.txt > pr_diff_send.txt
          if [ "$DIFF_BYTES" -gt 12000 ]; then
            echo "truncated=true" >> "$GITHUB_OUTPUT"
          else
            echo "truncated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send to OpenAI gpt-4o
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIFF_FILE: pr_diff_send.txt
          TRUNCATED: ${{ steps.diff.outputs.truncated }}
        run: python3 .github/scripts/codex_review.py

      - name: Post review comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = 'Codex review output could not be read. Check workflow logs.';
            try { body = fs.readFileSync('review_comment.md', 'utf8'); } catch (e) {}

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Codex PR Review')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail check on critical violations
        if: steps.review.outputs.verdict == 'FAIL'
        run: |
          echo "Codex found P1 critical violations — merge blocked."
          exit 1
