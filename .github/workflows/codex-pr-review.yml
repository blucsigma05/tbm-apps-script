# .github/workflows/codex-pr-review.yml
# Codex PR Review — sends PR diff to OpenAI gpt-4o for TBM-specific code review.
# Logic lives in .github/scripts/codex_review.py (no heredocs in YAML).
#
# Runs a fast YAML lint gate first; skips the OpenAI call if workflows are broken.
# This avoids wasting API calls on a PR that will fail workflow-lint anyway.

name: Codex PR Review

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number to review
        required: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: true

jobs:
  # Fast gate: if workflow YAML is broken, fail early and skip the OpenAI call.
  lint-gate:
    name: Pre-flight Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install actionlint v1.7.7
        run: |
          curl -sL "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin actionlint

      - name: Lint workflows
        run: actionlint .github/workflows/*.yml

      - name: Compile scripts
        run: |
          for pyfile in .github/scripts/*.py; do
            [ -f "$pyfile" ] && python3 -m py_compile "$pyfile"
          done

  review:
    name: Codex PR Review
    needs: lint-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build PR diff
        id: diff
        run: |
          git fetch origin main --depth=1
          # Diff ALL text files — no extension filter. Binary files are excluded by git diff default.
          git diff origin/main...HEAD > pr_diff.txt
          DIFF_BYTES=$(wc -c < pr_diff.txt)
          CHANGED_COUNT=$(git diff --name-only origin/main...HEAD | wc -l)
          echo "diff_bytes=$DIFF_BYTES" >> "$GITHUB_OUTPUT"
          echo "changed_count=$CHANGED_COUNT" >> "$GITHUB_OUTPUT"
          # Truncate to 12000 chars — keeps well under gpt-4o 128k context, costs ~$0.01/review
          head -c 12000 pr_diff.txt > pr_diff_send.txt
          if [ "$DIFF_BYTES" -gt 12000 ]; then
            echo "truncated=true" >> "$GITHUB_OUTPUT"
          else
            echo "truncated=false" >> "$GITHUB_OUTPUT"
          fi
          # Force INCONCLUSIVE when files changed but diff is empty (binary-only PR)
          if [ "$CHANGED_COUNT" -gt 0 ] && [ "$DIFF_BYTES" -eq 0 ]; then
            echo "empty_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send to OpenAI gpt-4o
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIFF_FILE: pr_diff_send.txt
          TRUNCATED: ${{ steps.diff.outputs.truncated }}
          EMPTY_DIFF: ${{ steps.diff.outputs.empty_diff }}
        run: python3 .github/scripts/codex_review.py

      - name: Post review comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = 'Codex review output could not be read. Check workflow logs.';
            try { body = fs.readFileSync('review_comment.md', 'utf8'); } catch (e) {}

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- codex-pr-review -->')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Integrity check — detect rubber-stamped audits
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try { body = fs.readFileSync('review_comment.md', 'utf8'); } catch (e) {}

            const MARKER = '<!-- codex-pr-review -->';

            // Skip rubber-stamp check when review script already set INCONCLUSIVE —
            // the truncation note IS the intended output, not a rubber stamp.
            if (body.includes('INCONCLUSIVE')) {
              core.info('Review is INCONCLUSIVE — skipping rubber-stamp check.');
              return;
            }

            const rubberStamp = [
              'usage limits',
              'Please provide the PR diff',
              'could not review',
              'cannot review',
              'no diff provided',
              'no code to review',
              'please share',
              'could you provide',
            ];

            const missingMarker = !body.includes(MARKER);
            const matched = rubberStamp.filter(p => body.toLowerCase().includes(p.toLowerCase()));

            if (missingMarker || matched.length > 0) {
              const reasons = [];
              if (missingMarker) reasons.push('missing HTML marker (<!-- codex-pr-review -->)');
              matched.forEach(p => reasons.push('contains rubber-stamp phrase: "' + p + '"'));
              core.setFailed('Codex audit incomplete — ' + reasons.join('; '));
            }

      - name: Fail check on non-PASS verdict
        if: steps.review.outputs.verdict != 'PASS'
        run: |
          echo "Codex PR Review: ${{ steps.review.outputs.verdict }} — manual Codex audit required"
          exit 1
