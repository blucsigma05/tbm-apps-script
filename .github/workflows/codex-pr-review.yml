# .github/workflows/codex-pr-review.yml
# Codex PR Review v3 — structured review with base-branch workflow safety.
# Uses pull_request_target so older PR branches cannot run stale review logic.
# Sends full diff + changed files to OpenAI gpt-4o for TBM-specific review.
# Outputs structured JSON findings for fix agent consumption.
# Logic lives in .github/scripts/codex_review.py (no heredocs in YAML).

name: Codex PR Review

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number to review
        required: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  # Per-PR group cancels stale runs when a new push arrives (desirable — avoids
  # reviewing an outdated commit). The primary 429 fix is exponential backoff in
  # codex_review.py (15/30/60/120s) rather than workflow-level serialization,
  # since a shared global group with cancel-in-progress: false still drops runs
  # when GitHub's single pending-slot limit is hit under burst conditions.
  group: codex-pr-review-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: true

jobs:
  # Fast gate: broken YAML → fail early, skip OpenAI call.
  lint-gate:
    name: Pre-flight Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install actionlint v1.7.7
        run: |
          curl -sL "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin actionlint

      - name: Lint workflows
        run: actionlint .github/workflows/*.yml

      - name: Compile scripts
        run: |
          for pyfile in .github/scripts/*.py; do
            [ -f "$pyfile" ] && python3 -m py_compile "$pyfile"
          done

  review:
    name: Codex PR Review
    needs: lint-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'workflow_dispatch'
              ? Number(core.getInput('pr'))
              : Number(context.payload.pull_request.number);

            if (!prNumber) {
              core.setFailed('PR number could not be resolved.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('number', String(prNumber));
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('same_repo', String(pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`));
            core.setOutput('draft', String(Boolean(pr.draft)));

      # Manual audit override — only on the label-add event itself.
      - name: Check for audit-pass override
        id: override
        if: github.event_name == 'pull_request_target' && github.event.action == 'labeled' && github.event.label.name == 'audit-pass'
        run: |
          echo "audit-pass label just added — manual audit override in effect."
          echo "overridden=true" >> "$GITHUB_OUTPUT"

      - name: Checkout base branch code
        if: steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.base_ref }}
          fetch-depth: 0

      - name: Build PR diff and file list
        if: steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true'
        id: diff
        env:
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          git fetch origin "$BASE_REF"
          git fetch origin "pull/${PR_NUMBER}/head:pr-head"

          # Full diff (not truncated — the Python script handles context limits)
          git diff "origin/$BASE_REF...pr-head" > pr_diff.txt
          DIFF_BYTES=$(wc -c < pr_diff.txt)

          # List of changed files
          git diff --name-only "origin/$BASE_REF...pr-head" > changed_files.txt
          CHANGED_COUNT=$(wc -l < changed_files.txt)

          echo "diff_bytes=$DIFF_BYTES" >> "$GITHUB_OUTPUT"
          echo "changed_count=$CHANGED_COUNT" >> "$GITHUB_OUTPUT"

          # Detect empty diff (binary-only PR)
          if [ "$CHANGED_COUNT" -gt 0 ] && [ "$DIFF_BYTES" -eq 0 ]; then
            echo "empty_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Triage review scope
        if: steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true'
        id: triage
        env:
          DIFF_FILE: pr_diff.txt
          CHANGED_FILES_FILE: changed_files.txt
        run: python3 .github/scripts/triage_review.py

      - name: Upload triage artifact
        if: always() && steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: triage-output
          path: triage_output.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Post skip comment
        if: steps.triage.outputs.mode == 'skip' && github.event_name == 'pull_request_target' && steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const reason = '${{ steps.triage.outputs.reason }}';
            const body = [
              '<!-- codex-pr-review -->',
              '## Codex PR Review \u2014 Skipped',
              '',
              '**Verdict:** SKIPPED',
              '',
              'Codex review was skipped because: ' + reason + '.',
              '',
              'No OpenAI API call was made. This PR does not contain code changes',
              'that require automated code review.',
              '',
              '**Files Reviewed:** (none \u2014 triage-skipped)',
              '',
              '_If this skip is incorrect, add a code file to trigger a real review,',
              'or remove the file from `.codex-review-skip`._',
            ].join('\n');

            const issueNumber = Number('${{ steps.pr.outputs.number }}');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- codex-pr-review -->')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }

      - name: Apply triage label
        if: github.event_name == 'pull_request_target' && steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true' && steps.triage.outputs.mode != ''
        uses: actions/github-script@v7
        with:
          script: |
            const mode = '${{ steps.triage.outputs.mode }}';
            const labelMap = {
              'skip':   'pipeline:triage-skipped',
              'light':  'pipeline:triage-light',
              'medium': 'pipeline:triage-medium',
              'full':   'pipeline:triage-full',
            };
            const newLabel = labelMap[mode];
            if (!newLabel) return;

            const issueNumber = Number('${{ steps.pr.outputs.number }}');

            // Remove any existing pipeline:triage-* label
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            for (const label of currentLabels) {
              if (label.name.startsWith('pipeline:triage-')) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: label.name,
                  });
                } catch (e) {}
              }
            }

            // Add the new triage label
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [newLabel],
              });
            } catch (e) {
              core.warning('Could not apply triage label: ' + e.message);
            }

      - name: Send to OpenAI gpt-4o
        if: steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true' && steps.triage.outputs.mode != 'skip'
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIFF_FILE: pr_diff.txt
          CHANGED_FILES_FILE: changed_files.txt
          EMPTY_DIFF: ${{ steps.diff.outputs.empty_diff }}
          REVIEW_MODE: ${{ steps.triage.outputs.mode }}
        run: python3 .github/scripts/codex_review.py

      - name: Upload review report artifact
        if: always() && steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: review-report
          path: |
            review-report.json
            codex_response.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Post review comment on PR
        if: always() && steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true' && steps.triage.outputs.mode != 'skip'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = 'Codex review output could not be read. Check workflow logs.';
            try { body = fs.readFileSync('review_comment.md', 'utf8'); } catch (e) {}
            const issueNumber = Number('${{ steps.pr.outputs.number }}');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- codex-pr-review -->')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }

      - name: Apply finding labels
        if: always() && steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true' && steps.triage.outputs.mode != 'skip'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = null;
            try { report = JSON.parse(fs.readFileSync('review-report.json', 'utf8')); } catch (e) {}
            if (!report || !Array.isArray(report.findings)) return;
            const issueNumber = Number('${{ steps.pr.outputs.number }}');

            // Collect unique severity and type labels from findings
            const newLabels = new Set();
            for (const f of report.findings) {
              if (f.severity) newLabels.add('severity:' + f.severity);
              if (f.type) newLabels.add('type:' + f.type);
            }

            // Get current labels
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            // Remove old severity/type labels
            for (const label of currentLabels) {
              if (label.name.startsWith('severity:') || label.name.startsWith('type:')) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: label.name,
                  });
                } catch (e) { /* label may already be removed */ }
              }
            }

            // Add new labels (only if they exist in the repo)
            const labelsToAdd = [...newLabels];
            if (labelsToAdd.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: labelsToAdd,
                });
              } catch (e) {
                core.warning('Could not add finding labels: ' + e.message);
              }
            }

      - name: Integrity check — detect rubber-stamped audits
        if: always() && steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true' && steps.triage.outputs.mode != 'skip'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try { body = fs.readFileSync('review_comment.md', 'utf8'); } catch (e) {}

            const MARKER = '<!-- codex-pr-review -->';

            // Skip rubber-stamp check when already INCONCLUSIVE
            if (body.includes('INCONCLUSIVE')) {
              core.info('Review is INCONCLUSIVE — skipping rubber-stamp check.');
              return;
            }

            const rubberStamp = [
              'usage limits',
              'Please provide the PR diff',
              'could not review',
              'cannot review',
              'no diff provided',
              'no code to review',
              'please share',
              'could you provide',
            ];

            const missingMarker = !body.includes(MARKER);
            const matched = rubberStamp.filter(p => body.toLowerCase().includes(p.toLowerCase()));

            if (missingMarker || matched.length > 0) {
              const reasons = [];
              if (missingMarker) reasons.push('missing HTML marker (<!-- codex-pr-review -->)');
              matched.forEach(p => reasons.push('contains rubber-stamp phrase: "' + p + '"'));
              core.setFailed('Codex audit incomplete — ' + reasons.join('; '));
            }

      - name: Auto-requeue on 429 rate limit
        if: steps.review.outputs.rate_limited == 'true' && steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ steps.pr.outputs.number }}');

            // Check if we've already retried (max 2 auto-retries via label)
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const retryLabels = labels.filter(l => l.name.startsWith('pipeline:429-retry-'));
            const retryCount = retryLabels.length;

            if (retryCount >= 2) {
              core.warning('429 rate limit: max 2 auto-retries reached. Manual re-run required.');
              return;
            }

            // Add retry tracking label
            const retryLabel = 'pipeline:429-retry-' + (retryCount + 1);
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [retryLabel],
              });
            } catch (e) {
              core.warning('Could not add retry label: ' + e.message);
            }

            // Schedule a retry via workflow_dispatch after 5 minutes
            // We use repository_dispatch instead since workflow_dispatch
            // doesn't support delayed execution natively.
            core.info('Scheduling auto-retry #' + (retryCount + 1) + ' for PR #' + issueNumber + ' in 5 minutes...');

            // Post a comment so the PR author knows what's happening
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- codex-429-retry -->')
            );
            const retryMsg = [
              '<!-- codex-429-retry -->',
              '> ⏳ **Codex review hit OpenAI rate limits (429).** Auto-retry #' + (retryCount + 1) + ' of 2 scheduled.',
              '> The review will re-run automatically on the next push or you can re-run manually from the Actions tab.',
              '> Model fallback (gpt-4o → gpt-4o-mini) was attempted before giving up.',
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: retryMsg,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: retryMsg,
              });
            }

      - name: Fail check on INCONCLUSIVE verdict
        if: steps.review.outputs.verdict == 'INCONCLUSIVE' && steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true'
        run: |
          echo "Codex PR Review: INCONCLUSIVE — context was truncated or review could not complete."
          echo "Manual audit required before merge."
          exit 1

      - name: Fail check on critical violations
        if: steps.review.outputs.verdict == 'FAIL' && steps.override.outputs.overridden != 'true' && steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true'
        run: |
          echo "Codex found P1 critical violations — merge blocked."
          exit 1
