name: Gemini Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@gemini-cli /review'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather PR context
        id: pr
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER_FROM_EVENT: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          write_output() {
            local name="$1"
            local value="$2"
            local delimiter="GITHUB_OUTPUT_$(uuidgen)"
            {
              echo "${name}<<${delimiter}"
              printf '%s\n' "${value}"
              echo "${delimiter}"
            } >> "${GITHUB_OUTPUT}"
          }

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            PR_NUMBER="${PR_NUMBER_FROM_EVENT}"
            ADDITIONAL_INSTRUCTIONS=""
          else
            PR_NUMBER="${ISSUE_NUMBER_FROM_EVENT}"
            ADDITIONAL_INSTRUCTIONS="$(printf '%s' "${COMMENT_BODY}" | sed 's/^.*@gemini-cli \/review[[:space:]]*//')"
          fi

          if [[ -z "${PR_NUMBER}" ]]; then
            echo "Unable to resolve PR number" >&2
            exit 1
          fi

          gh pr view "${PR_NUMBER}" \
            --repo "${REPOSITORY}" \
            --json title,body,headRefName,headRefOid,baseRefName,author,mergeable,state,isDraft \
            > pr-data.json

          gh pr diff "${PR_NUMBER}" --repo "${REPOSITORY}" --name-only > changed-files.txt

          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "head_sha=$(jq -r '.headRefOid' pr-data.json)" >> "${GITHUB_OUTPUT}"
          write_output "additional_instructions" "${ADDITIONAL_INSTRUCTIONS}"
          write_output "pr_data" "$(cat pr-data.json)"
          write_output "changed_files" "$(cat changed-files.txt)"

      - name: Generate Gemini review payload
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          settings: |
            {
              "coreTools": [
                "run_shell_command(echo)",
                "run_shell_command(gh pr view)",
                "run_shell_command(gh pr diff)",
                "run_shell_command(cat)",
                "run_shell_command(head)",
                "run_shell_command(tail)",
                "run_shell_command(grep)",
                "run_shell_command(sed)"
              ]
            }
          prompt: |
            Review GitHub pull request #${{ steps.pr.outputs.pr_number }} in ${{ github.repository }}.

            Pull request metadata:
            ${{ steps.pr.outputs.pr_data }}

            Changed files:
            ${{ steps.pr.outputs.changed_files }}

            Additional review instructions:
            ${{ steps.pr.outputs.additional_instructions }}

            Working rules:
            - Return only valid JSON with no Markdown fence and no surrounding commentary.
            - Use exactly this JSON shape: {"event":"APPROVE"|"REQUEST_CHANGES","body":"...","comments":[{"path":"relative/file.ext","line":123,"body":"..."}]}.
            - Start `body` with `## Gemini Review Summary` so the pipeline can detect it.
            - Include the word `Gemini` in `body`.
            - Briefly justify the verdict in `body` using specific files or behaviors from this PR.
            - Use inline comments only for real, actionable findings on changed lines.
            - Return `event` as `REQUEST_CHANGES` if you found one or more blocking issues.
            - Return `event` as `APPROVE` if you found no blocking issues.
            - Return `comments` as an empty array when there are no inline comments.
            - Do not return `COMMENT`, `COMMENTED`, or any other event value.

            Codebase constraints:
            - All `.html` files must stay ES5-safe for HtmlService / Fire Stick WebView. No arrow functions, `let`, `const`, template literals, `??`, `?.`, `.includes()`, or `backdrop-filter`.
            - All `.gs` files run in Google Apps Script V8 runtime.
            - Sheet references must use `TAB_MAP` from `DataEngine.gs`, never hardcoded sheet names.
            - Every `google.script.run` call must have a matching `withFailureHandler()`.
            - Use `openById(SSID)`, never `getActiveSpreadsheet()`.

            Review focus:
            1. P0: ES5 violations in `.html` files that would break target clients.
            2. P1: Missing error handlers on `google.script.run` calls.
            3. P1: Logic bugs, off-by-one errors, stale-state issues, or race conditions.
            4. P1: Security issues such as XSS or injection risk.
            5. P2: Visual-state inconsistencies where related surfaces drift apart.

            Before submitting the review:
            - Read the diff with `gh pr diff ${{ steps.pr.outputs.pr_number }} --repo ${{ github.repository }}`.
            - If needed, inspect file context in the checked-out workspace.
            - Keep the summary concise and high signal.
            - Make sure the final output is valid JSON.

      - name: Submit Gemini review artifact
        id: submit
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          GEMINI_RESPONSE: ${{ steps.gemini.outputs.gemini_response }}
        run: node .github/scripts/submit-gemini-review.js

      - name: Report Gemini review failure
        if: failure() && steps.pr.outcome == 'success'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh pr comment "${PR_NUMBER}" \
            --repo "${REPOSITORY}" \
            --body "Gemini review workflow failed before it could leave a valid current-head review artifact. Logs: ${RUN_URL}"
