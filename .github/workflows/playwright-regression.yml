# .github/workflows/playwright-regression.yml
# Playwright E2E Regression — runs Chromium tests against thompsonfams.com.
# Result parsing lives in .github/scripts/parse_playwright_results.py.
#
# Path filter (#464): skip E2E on PRs that only touch docs / specs / Issue
# templates. Doc edits cannot affect live-site rendering, so running the full
# 30-min suite against thompsonfams.com on a CLAUDE.md-only PR is wasted time
# AND exposes the PR to pre-existing Homework flakes that have nothing to do
# with the change under review.
#
# GitHub behavior: `paths-ignore` skips the workflow iff EVERY changed file
# matches at least one pattern. Mixed PRs (docs + code) still run the suite.

name: Playwright Regression

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'ops/**'
      - 'specs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  # issues:write is required by the Playwright Failure Filer step below
  # (#465 Phase 2 automation). The filer shells out to file_hygiene_issue.py
  # which calls `gh issue create` / reopen. Without this permission the
  # dedup'd-Issue path silently fails with 403 and Playwright flakes
  # continue to evaporate with the PR.
  issues: write

concurrency:
  group: playwright-regression-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E Regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright + Chromium
        run: |
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Run E2E regression
        id: playwright
        env:
          TBM_BASE_URL: https://thompsonfams.com
          TBM_PIN: ${{ secrets.TBM_PIN }}
        run: |
          SPEC="tests/tbm/tbm-e2e-safe.spec.js"
          if [ ! -f "$SPEC" ]; then
            echo "::warning::Spec file $SPEC not found — skipping Playwright run."
            echo "## Playwright Regression: SKIPPED" > playwright-comment.md
            echo "" >> playwright-comment.md
            echo "Spec file \`$SPEC\` not found in repo." >> playwright-comment.md
            echo "verdict=SKIP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npx playwright test "$SPEC" \
            --project=tbm-workflows \
            --reporter=json \
            --output=test-results \
            2>&1 | tee playwright-output.txt || true
          PW_EXIT=${PIPESTATUS[0]}
          echo "pw_exit=$PW_EXIT" >> "$GITHUB_OUTPUT"
          export PW_EXIT

          python3 .github/scripts/parse_playwright_results.py

      - name: Run education workflow tests
        id: education
        env:
          TBM_BASE_URL: https://thompsonfams.com
        run: |
          EDU_SPEC="tests/tbm/education-workflows.spec.js"
          if [ ! -f "$EDU_SPEC" ]; then
            echo "::warning::Education spec not found — skipping."
            echo "edu_exit=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          npx playwright test "$EDU_SPEC" \
            --project=chromium \
            --reporter=json \
            --output=test-results/education \
            2>&1 | tee education-output.txt || true
          EDU_EXIT=${PIPESTATUS[0]}
          echo "edu_exit=$EDU_EXIT" >> "$GITHUB_OUTPUT"
          # Parse education results into a separate file (COMMENT_FILE prevents
          # overwriting the main playwright-comment.md — see Finding 1 on PR #176)
          PW_EXIT=$EDU_EXIT PW_OUTPUT_FILE=education-output.txt \
            COMMENT_FILE=education-comment.md \
            python3 .github/scripts/parse_playwright_results.py || true
          # Rename section header and append
          sed -i 's/## .* Playwright Regression:/## Education Workflow Tests:/' education-comment.md
          printf '\n\n---\n\n' >> playwright-comment.md
          cat education-comment.md >> playwright-comment.md

      # Upload education failure artifacts BEFORE the screenshot step. Screenshot run
      # uses --output=test-results/screenshots-artifacts (isolated dir) so it cannot
      # reset test-results/education/, but uploading first is an extra safety belt.
      - name: Upload education failure artifacts
        if: steps.education.outputs.edu_exit != '0'
        uses: actions/upload-artifact@v4
        with:
          name: education-traces-${{ github.run_id }}
          path: test-results/education/
          retention-days: 7
          if-no-files-found: ignore

      # Phase 2 automation (#465): file dedup'd Issues for each unique
      # Playwright failure via file_hygiene_issue.py. Defaults OFF — LT
      # flips vars.PLAYWRIGHT_FILER_ENABLED=true after a canary run.
      # Runs on every Playwright job outcome (the filer short-circuits if
      # no failures are detected), so the decision is in the script, not
      # in the `if:` expression here.
      - name: File Playwright failures (Phase 2, dedup'd Issues)
        if: always()
        env:
          PW_OUTPUT_FILE: playwright-output.txt
          EDU_OUTPUT_FILE: education-output.txt
          PW_EXIT: ${{ steps.playwright.outputs.pw_exit }}
          EDU_EXIT: ${{ steps.education.outputs.edu_exit }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTOMATION_ENABLED: ${{ vars.AUTOMATION_ENABLED || 'true' }}
          PLAYWRIGHT_FILER_ENABLED: ${{ vars.PLAYWRIGHT_FILER_ENABLED || 'false' }}
          AUTOMATION_MAX_DAILY_ISSUES: ${{ vars.AUTOMATION_MAX_DAILY_ISSUES || '5' }}
          STATUS_ISSUE_NUMBER: ${{ vars.STATUS_ISSUE_NUMBER || '' }}
        run: python3 .github/scripts/file_playwright_failure_issue.py

      - name: Detect changed UI files
        id: changed
        run: |
          git fetch origin main --depth=1
          CHANGED=$(git diff origin/main...HEAD --name-only -- '*.html' '*.js' | tr '\n' ',')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED" ]; then
            echo "No UI files changed — screenshots will be skipped."
          else
            echo "Changed files: $CHANGED"
          fi

      - name: Capture viewport screenshots
        id: screenshots
        if: always()
        env:
          TBM_BASE_URL: https://thompsonfams.com
          TBM_PIN: ${{ secrets.TBM_PIN }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          SCREENSHOT_SPEC="tests/tbm/screenshots.spec.js"
          if [ ! -f "$SCREENSHOT_SPEC" ]; then
            echo "::warning::Screenshot spec not found — skipping."
            exit 0
          fi
          npx playwright test "$SCREENSHOT_SPEC" \
            --project=tbm-screenshots \
            --reporter=list \
            --output=test-results/screenshots-artifacts \
            2>&1 | tee screenshot-output.txt || true
          echo "Screenshots captured to test-results/screenshots/"

      - name: Upload screenshots (every PR)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: viewport-screenshots-${{ github.run_id }}
          path: test-results/screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload education screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: education-screenshots-${{ github.run_id }}
          path: test-results/screenshots/education/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload traces on failure
        if: steps.playwright.outputs.pw_exit != '0' || steps.education.outputs.edu_exit != '0'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Post results comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = 'Playwright results could not be read. Check workflow logs.';
            try { body = fs.readFileSync('playwright-comment.md', 'utf8'); } catch (e) {}

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Playwright Regression')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail check on test failures
        if: steps.playwright.outputs.verdict == 'FAIL'
        run: |
          echo "Playwright found failures — merge blocked."
          exit 1

      - name: Fail check on education test failures
        if: steps.education.outputs.edu_exit != '0'
        run: |
          echo "Education workflow tests failed — merge blocked."
          exit 1

  # ── Perf trace job — MVSS v1 S5 instrumentation (Issue #360) ──
  # Baseline measurement: does NOT block merge. Traces uploaded as artifacts.
  perf-trace:
    name: Frame Budget Trace (S5 baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright + Chromium
        run: |
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Run Surface Pro 5 frame budget
        id: perf_surface
        env:
          TBM_BASE_URL: https://thompsonfams.com
          TBM_PIN: ${{ secrets.TBM_PIN }}
        run: |
          npx playwright test tests/tbm/perf-frame-budget.spec.js \
            --project=perf-surface-pro5 \
            --reporter=json \
            --output=test-results/perf-surface \
            2>&1 | tee perf-surface-output.txt || true
          echo "surface_exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run Samsung S10 FE frame budget
        id: perf_s10
        env:
          TBM_BASE_URL: https://thompsonfams.com
          TBM_PIN: ${{ secrets.TBM_PIN }}
        run: |
          npx playwright test tests/tbm/perf-frame-budget.spec.js \
            --project=perf-s10-fe \
            --reporter=json \
            --output=test-results/perf-s10 \
            2>&1 | tee perf-s10-output.txt || true
          echo "s10_exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload perf traces — Surface Pro 5
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-traces-surface-pro5-${{ github.run_id }}
          path: test-results/perf-surface/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload perf traces — Samsung S10 FE
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-traces-s10-fe-${{ github.run_id }}
          path: test-results/perf-s10/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload frame budget evidence JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frame-budget-evidence-${{ github.run_id }}
          path: ops/evidence/preview/
          retention-days: 30
          if-no-files-found: ignore
