# .github/workflows/ci.yml
# TBM Continuous Integration — runs smoke + regression tests on every PR
#
# HOW IT WORKS:
# 1. Developer pushes branch + creates PR
# 2. This workflow fires automatically
# 3. Hits the GAS deployment's ?action=runTests endpoint
# 4. Posts PASS/FAIL as a PR comment
# 5. Blocks merge if tests fail
#
# SETUP (one-time):
# 1. Copy this file to .github/workflows/ci.yml in your repo
# 2. Go to repo Settings → Secrets → Actions → New repository secret
#    Name: GAS_DEPLOY_URL
#    Value: https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec
# 3. Go to repo Settings → Branches → Add branch protection rule
#    Branch name pattern: main
#    ☑ Require status checks to pass before merging
#    ☑ Require branches to be up to date before merging
#    Search for "TBM Smoke + Regression" and add it
# 4. Done. Every PR now auto-tests before merge is allowed.

name: TBM Smoke + Regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Run TBM Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke + regression tests
        id: run_tests
        run: |
          echo "🧪 Hitting GAS test endpoint..."
          RESPONSE=$(curl -s -L --max-time 120 \
            "${{ secrets.GAS_DEPLOY_URL }}?action=runTests")

          echo "Raw response length: ${#RESPONSE}"

          # Parse overall result
          OVERALL=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print(data.get('overall', 'UNKNOWN'))
          except:
              print('ERROR')
          ")

          echo "overall=$OVERALL" >> $GITHUB_OUTPUT

          # Extract summary for PR comment
          SUMMARY=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              smoke = data.get('smoke', {})
              reg = data.get('regression', {})
              versions = data.get('versions', {})

              lines = []
              lines.append(f\"## {'✅' if data['overall'] == 'PASS' else '❌'} TBM Test Results: {data['overall']}\")
              lines.append('')
              lines.append(f\"**Smoke Test:** {smoke.get('overall', '?')} ({smoke.get('runtime_ms', '?')}ms)\")
              lines.append(f\"**Regression:** {reg.get('overall', '?')} — {reg.get('passed', '?')}/{reg.get('total', '?')} passed\")
              lines.append('')

              # Show failures if any
              if reg.get('failed', 0) > 0:
                  lines.append('### ⛔ Failures:')
                  for a in reg.get('assertions', []):
                      if a.get('status') == 'FAIL':
                          lines.append(f\"- **{a['id']}**: {a.get('description', '')}\")
                          lines.append(f\"  {a.get('details', '')}\")
                  lines.append('')

              lines.append(f\"**Versions:** {', '.join(f'{k} {v}' for k,v in versions.items())}\")
              lines.append(f\"**Timestamp:** {data.get('timestamp', '?')}\")

              print(chr(10).join(lines))
          except Exception as e:
              print(f'⚠️ Could not parse test results: {e}')
          ")

          # Save summary for PR comment step
          echo "$SUMMARY" > test_summary.md
          echo "$SUMMARY"

          # Set exit code
          if [ "$OVERALL" = "PASS" ]; then
            echo "✅ All tests passed"
            exit 0
          else
            echo "❌ Tests failed — merge blocked"
            exit 1
          fi

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('test_summary.md', 'utf8');
            } catch {
              body = '⚠️ Test results could not be parsed. Check workflow logs.';
            }

            // Find existing bot comment to update (avoid spam)
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('TBM Test Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
