# .github/workflows/ci.yml
# TBM Continuous Integration — runs smoke + regression tests on every PR.
# Result parsing lives in .github/scripts/parse_test_results.py.

name: TBM Smoke + Regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Run TBM Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke + regression tests
        id: run_tests
        env:
          GAS_DEPLOY_URL: ${{ secrets.GAS_DEPLOY_URL }}
        run: |
          echo "Hitting GAS test endpoint..."
          RESPONSE=$(curl -s -L --max-time 120 \
            "${GAS_DEPLOY_URL}?action=runTests")
          echo "Raw response length: ${#RESPONSE}"
          export TEST_RESPONSE="$RESPONSE"
          python3 .github/scripts/parse_test_results.py

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('test_summary.md', 'utf8');
            } catch {
              body = 'Test results could not be parsed. Check workflow logs.';
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('TBM Test Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
