name: TBM Smoke + Regression

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    name: Run TBM Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke + regression tests
        id: run_tests
        shell: bash
        env:
          GAS_DEPLOY_URL: ${{ secrets.GAS_DEPLOY_URL }}
        run: |
          if [ -z "$GAS_DEPLOY_URL" ]; then
            cat <<'EOF' > test_summary.md
          ## ⚠️ TBM Test Results: CONFIG_ERROR

          **Missing secret:** GAS_DEPLOY_URL
          The CI workflow cannot hit the deployed Apps Script test endpoint until this repo secret is configured.
          EOF
            echo "overall=CONFIG_ERROR" >> "$GITHUB_OUTPUT"
            cat test_summary.md
            exit 1
          fi

          echo "Hitting GAS test endpoint..."
          if ! response="$(curl -sS -L --max-time 120 "${GAS_DEPLOY_URL}?action=runTests")"; then
            cat <<'EOF' > test_summary.md
          ## ⚠️ TBM Test Results: ENDPOINT_ERROR

          The CI workflow could not reach the deployed Apps Script test endpoint.
          Check `GAS_DEPLOY_URL`, deployment health, and workflow logs.
          EOF
            echo "overall=ENDPOINT_ERROR" >> "$GITHUB_OUTPUT"
            cat test_summary.md
            exit 1
          fi
          printf '%s' "$response" > test_response.json
          echo "Raw response length: ${#response}"

          overall="$(python3 - <<'PY'
          import json
          try:
              with open('test_response.json', 'r', encoding='utf-8') as fh:
                  data = json.load(fh)
              print(data.get('overall', 'UNKNOWN'))
          except Exception:
              print('ERROR')
          PY
          )"
          echo "overall=$overall" >> "$GITHUB_OUTPUT"

          python3 - <<'PY' > test_summary.md
          import json
          try:
              with open('test_response.json', 'r', encoding='utf-8') as fh:
                  data = json.load(fh)
              smoke = data.get('smoke', {})
              reg = data.get('regression', {})
              versions = data.get('versions', {})
              icon = '✅' if data.get('overall') in ('PASS', 'WARN') else '❌'
              lines = [
                  f"## {icon} TBM Test Results: {data.get('overall', 'UNKNOWN')}",
                  '',
                  f"**Smoke Test:** {smoke.get('overall', '?')} ({smoke.get('runtime_ms', '?')}ms)",
                  f"**Regression:** {reg.get('overall', '?')} - {reg.get('passed', '?')}/{reg.get('total', '?')} passed",
                  ''
              ]
              if reg.get('failed', 0) > 0:
                  lines.append('### Failures')
                  for assertion in reg.get('assertions', []):
                      if assertion.get('status') == 'FAIL':
                          lines.append(f"- **{assertion.get('id', '?')}**: {assertion.get('description', '')}")
                          details = assertion.get('details', '')
                          if details:
                              lines.append(f"  {details}")
                  lines.append('')
              if versions:
                  version_line = ', '.join([f"{k} {v}" for k, v in versions.items()])
                  lines.append(f"**Versions:** {version_line}")
              lines.append(f"**Timestamp:** {data.get('timestamp', '?')}")
              print('\n'.join(lines))
          except Exception as exc:
              print(f"⚠️ Could not parse test results: {exc}")
          PY

          cat test_summary.md

          if [ "$overall" = "PASS" ] || [ "$overall" = "WARN" ]; then
            echo "Tests passed (overall: $overall)"
            exit 0
          fi

          echo "Tests failed (overall: $overall) - merge blocked"
          exit 1

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '⚠️ Test results could not be parsed. Check workflow logs.';
            try {
              body = fs.readFileSync('test_summary.md', 'utf8');
            } catch (error) {
              core.info(`Unable to read test summary: ${error.message}`);
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const botComment = comments.data.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes('TBM Test Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Notify pipeline relay on failed tests
        if: always() && github.event_name == 'pull_request'
        shell: bash
        env:
          RELAY_URL: ${{ secrets.PIPELINE_RELAY_URL }}
          RELAY_SECRET: ${{ secrets.PIPELINE_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ -z "$RELAY_URL" ] || [ -z "$RELAY_SECRET" ]; then
            echo "Pipeline relay secrets not configured; skipping."
            exit 0
          fi

          if [ "${{ steps.run_tests.outputs.overall }}" = "PASS" ]; then
            echo "Tests passed; review watcher will notify later."
            exit 0
          fi

          python3 - <<'PY' > relay_payload.json
          import json
          import os

          with open('test_summary.md', 'r', encoding='utf-8') as fh:
              summary = fh.read().strip()

          payload = {
              "fn": "pipelineRelaySafe",
              "args": [{
                  "secret": os.environ["RELAY_SECRET"],
                  "repo": os.environ["GITHUB_REPOSITORY"],
                  "type": "tests_failed",
                  "summary": summary[:500],
                  "prNumber": os.environ.get("PR_NUMBER"),
                  "prUrl": os.environ.get("PR_URL"),
                  "sha": os.environ.get("GITHUB_SHA"),
                  "runUrl": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
                  "cycle": 0
              }]
          }
          print(json.dumps(payload))
          PY

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            --data @relay_payload.json \
            "$RELAY_URL"

      - name: Refresh pipeline review summary after CI completes
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'review-watcher.yml',
              ref: context.payload.pull_request.base.ref,
              inputs: {
                pr: String(context.payload.pull_request.number),
              },
            });
