<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kids Hub v36</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Barlow+Condensed:wght@400;600;700;800&family=Fredoka+One&family=Nunito:wght@700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   SHARED BASE
   ════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; }
body { min-height: 100vh; }
#loading {
  position: fixed; top:0;left:0;right:0;bottom:0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
.load-ring { width: 52px; height: 52px; border-radius: 50%; border: 4px solid transparent; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
/* v27: Shared micro-feedback */
@keyframes tb-check-pop { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
.tb-check-mark { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:28px;z-index:10;pointer-events:none;animation:tb-check-pop 0.3s ease forwards; }
/* v27: Wolf Kid / character reactions */
@keyframes char-bounce { 0%{transform:translateY(0)} 40%{transform:translateY(-5px)} 100%{transform:translateY(0)} }
@keyframes char-glow { 0%{filter:drop-shadow(0 0 0 transparent)} 50%{filter:drop-shadow(0 0 8px rgba(255,215,0,0.6))} 100%{filter:drop-shadow(0 0 0 transparent)} }
.char-bounce { animation:char-bounce 0.3s ease; }
.char-glow { animation:char-glow 0.5s ease; }
.load-text { font-size: 14px; }

/* ════════════════════════════════════════
   BUGGSY THEME
   ════════════════════════════════════════ */

@keyframes b-float-drift { 0%{opacity:0;transform:translateY(100vh) rotate(0deg) scale(0.4)} 15%{opacity:0.45} 50%{opacity:0.3} 85%{opacity:0.2} 100%{opacity:0;transform:translateY(-15vh) rotate(540deg) scale(0.9)} }

.b-claim { font-family: 'Press Start 2P', monospace; font-size: 9px; background: linear-gradient(135deg,#14532d,#166534); border: 1px solid #22c55e; color: #22c55e; padding: 8px 10px; cursor: pointer; border-radius: 5px; transition: all 0.1s; white-space: nowrap; min-height: 44px; min-width: 44px; }
.b-claim:hover { box-shadow: 0 0 8px rgba(34,197,94,0.3); }

.b-done-stamp { font-family: 'Press Start 2P', monospace; font-size: 7.5px; color: #22c55e; border: 1px solid rgba(34,197,94,0.3); padding: 4px 5px; border-radius: 3px; text-align: center; }
.b-pending { font-family: 'Press Start 2P', monospace; font-size: 7.5px; color: #f59e0b; border: 1px solid rgba(245,158,11,0.35); padding: 4px 5px; border-radius: 3px; text-align: center; animation: pulse-g 2s ease infinite; }
.b-approve { font-family: 'Press Start 2P', monospace; font-size: 9px; background: linear-gradient(135deg,#1a1000,#2a1900); border: 1px solid #f59e0b; color: #f59e0b; padding: 8px 10px; cursor: pointer; border-radius: 5px; transition: all 0.1s; white-space: nowrap; min-height: 44px; min-width: 44px; }
@keyframes pulse-g { 0%,100%{border-color:rgba(245,158,11,0.3)}50%{border-color:rgba(245,158,11,0.85)} }

.b-reward-icon { font-size: 30px; margin-bottom: 7px; }
.b-reward-name { font-size: 14px; font-weight: 700; color: #e2e8f0; margin-bottom: 4px; line-height: 1.2; }

.b-parent-panel { margin: 0 14px; max-width: 720px; margin-left: auto; margin-right: auto; }
.b-pp-inner { background: linear-gradient(135deg,#0a1520,#0d1c2e); border: 1px solid rgba(245,158,11,0.2); border-radius: 8px; padding: 16px; }

.b-pp-btn.blue { color: #38bdf8; border-color: #38bdf8; }

.xp-pop { position: fixed; font-family: 'Press Start 2P', monospace; font-size: 11px; color: #f59e0b; text-shadow: 1px 1px 0 #000; pointer-events: none; z-index: 500; animation: xp-float 1.2s ease forwards; }
@keyframes xp-float { 0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-38px) scale(1.15)}100%{opacity:0;transform:translateY(-65px) scale(0.8)} }

/* ════════════════════════════════════════
   JJ THEME
   ════════════════════════════════════════ */
.jj-body { font-family: 'Nunito', sans-serif; min-height: 100vh; background: #1f0e35; background-image: radial-gradient(ellipse 80% 50% at 25% 15%, rgba(255,182,225,0.25) 0%, transparent 55%), radial-gradient(ellipse 60% 45% at 75% 65%, rgba(167,139,250,0.2) 0%, transparent 50%), radial-gradient(ellipse 50% 40% at 50% 40%, rgba(253,224,71,0.06) 0%, transparent 60%), radial-gradient(ellipse 90% 30% at 50% 90%, rgba(236,72,153,0.15) 0%, transparent 50%), linear-gradient(180deg, #1f0e35 0%, #251240 50%, #1f0e35 100%); color: #fff; padding-bottom: 80px; overflow-x: hidden; }
@keyframes jj-rainbow-shimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

.jj-sparkle-bg { position: fixed; top:0;left:0;right:0;bottom:0; pointer-events: none; z-index: 0; overflow: hidden; }
.jj-sparkle-bg span { position: absolute; font-size: 14px; opacity: 0; animation: sparkle-drift var(--d, 8s) var(--delay, 0s) infinite ease-in-out; }
@keyframes sparkle-drift { 0%{opacity:0;transform:translateY(100vh) rotate(0deg) scale(0.5)} 20%{opacity:0.7} 80%{opacity:0.5} 100%{opacity:0;transform:translateY(-20vh) rotate(360deg) scale(1.2)} }

.jj-body .load-ring { border-top-color: #ec4899; border-right-color: #a855f7; }

.p-link-btn.jj { border-color: rgba(236,72,153,0.4); color: #ec4899; }
.p-body { max-width: 800px; margin: 0 auto; padding: 20px 16px 0; position: relative; z-index: 1; }

}

/* v25: Story Factory */
.sf-panel { background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(236,72,153,0.15)); border: 1px solid rgba(124,58,237,0.25); border-radius: 14px; padding: 18px; margin-bottom: 20px; }

.sf-select, .sf-input { flex: 1; padding: 10px 12px; border: 1px solid rgba(124,58,237,0.3); border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; background: rgba(20,20,40,0.4); color: #e2e8f0; }

.sf-result { text-align: center; padding: 16px 0; }
.sf-result-title { font-size: 18px; font-weight: 800; color: #fde68a; margin-bottom: 8px; }
.sf-result-book { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 12px; }
.sf-result-link { display: inline-block; padding: 10px 20px; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; border-radius: 10px; font-size: 14px; font-weight: 700; text-decoration: none; transition: all 0.15s; }
.sf-result-link:hover { filter: brightness(1.15); transform: translateY(-1px); }
.sf-error { font-size: 12px; color: #fca5a5; background: rgba(220,38,38,0.15); padding: 8px 12px; border-radius: 8px; margin-top: 10px; text-align: center; }
.p-spinner { display: flex; align-items: center; justify-content: center; padding: 40px; }
.p-spin-ring { width: 36px; height: 36px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.1); border-top-color: #d4a843; animation: spin 0.8s linear infinite; }
#p-emboss { position: fixed; top:0;left:0;right:0;bottom:0; z-index: 0; pointer-events: none; overflow: hidden; display: none; }
.parent-body #p-emboss { display: block; }
@media (max-width: 480px) { .p-summary { grid-template-columns: 1fr 1fr; } .p-kids { grid-template-columns: 1fr; } .p-reset-grid { grid-template-columns: 1fr 1fr; } }
.gold-ring { display:inline-block;width:1em;height:1em;border:3px solid #fbbf24;border-radius:50%;vertical-align:middle;box-sizing:border-box; }

   V2 — PARENT ONE-TAP UX + WEEKLY GRID
   ════════════════════════════════════════ */
.p-v2-tabs { display: flex; gap: 8px; margin-bottom: 16px; }

.p-weekly {

.p-weekly-day-name { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.45); text-align: center; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }

.p-weekly-entry { font-size: 10px; color: #cbd5e1; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; justify-content: space-between; align-items: center; }

.p-toast {

.b-streak { display: inline-flex; align-items: center; gap: 3px; font-family: 'Press Start 2P', monospace; font-size: 7px; color: #f59e0b; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); padding: 2px 6px; border-radius: 4px; }

/* v22: Qty picker overlay */

/* v26: Track 5 — responsive fixes */
@media (max-width: 480px) { .sf-row { flex-wrap: wrap; } .sf-select { flex-basis: 100%; } .p-onetap { flex-wrap: wrap; gap: 4px; } .p-onetap-btn { padding: 5px 8px; font-size: 11px; } }

.sync-strip { position: fixed; bottom: 12px; left: 24px; display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 14px; z-index: 200; font-size: 11px; font-weight: 700; transition: opacity 0.3s; }
.buggsy-body .sync-strip { background: rgba(13,21,32,0.85); border: 1px solid #1e3347; font-family: 'Press Start 2P', monospace; font-size: 7px; color: #4a6080; }

.sync-dot.amber { background: #f59e0b; }
.sync-dot.red { background: #ef4444; }
.sync-dot.pulse { animation: sync-pulse 1s infinite; }
@keyframes sync-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.jj-sync-star { font-size: 14px; display: inline-block; }
.jj-sync-star.spinning { animation: jj-spin 1s linear infinite; }

@keyframes jj-shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

// ── KID DATA LOAD — v1 TBM: uses getKidsHubData() ────────────
function loadKidData() {
  _dataLoading = true;  // v5: lock actions during fetch (#57)
  window._allClearCelebrated = false; // v19: reset celebration flag on data reload
  setSyncState('saving', 'Loading...');
  google.script.run
    .withSuccessHandler(onKidData)
    .withFailureHandler(function(e){ _dataLoading = false; setSyncState('failed'); console.log('KH_FAIL', e);
      if (_khLastGoodRaw) { var rail = document.getElementById('confidenceRail'); if (rail) { rail.textContent = 'Retrying\u2026 showing cached data'; rail.style.color = '#f59e0b'; } setTimeout(loadKidData, 30000); return; }
      onErr(e); })
    .getKidsHubDataSafe(IS_PARENT ? 'all' : INIT_CHILD);
}

function onKidData(raw) {
  _khLastGoodRaw = raw;
  _khMarkFresh();
  var data = safeParse(raw);
  console.log('KH_RAW', JSON.stringify(data && data.balances));
  console.log('KH_INIT_CHILD', INIT_CHILD);
  try {
    if (!data) { showErr('No data received'); return; }
    if (data && data.error) { showErr(data.error); return; }
    // v1 TBM: Rich response — tasks, rewards, balances, streaks
    tasks      = (data.tasks    || []).map(mapTask);
    rewards    = (data.rewards  || []).map(mapReward);
    balances   = (data.balances && data.balances[INIT_CHILD]) || { earned:0, spent:0, deducted:0, balance:0 };
    streakData = data.streaks   || {};
    requiredStatus = data.requiredStatus || null;
    requests = data.requests || [];
    // Meta-Progression
    window._metaProgression = data.metaProgression || {};
    pendingRequestCount = data.pendingRequestCount || {};
    // v22: Screen Time Bank from server
    screenTimeBank = (data.screenTime && data.screenTime[INIT_CHILD]) || {};
    // v17: LEVELS from payload
    if (data.levels && data.levels.length) { serverLevels = data.levels; }
    if (data.levelsJJ && data.levelsJJ.length) { serverLevelsJJ = data.levelsJJ; }
    console.log('KH_BALANCES', JSON.stringify(balances));
    console.log('KH_TASKS', tasks.length, 'completed:', tasks.filter(function(t){return t.completed;}).length);
  } catch(e) { console.log('KH_CATCH', e.message, e.stack); }

  // v26: Track 10 — detect newly approved tasks for celebration
  var newlyApproved = [];
  tasks.forEach(function(t) {
    var prev = _prevTaskStates[t.taskID];
    if (prev && prev.completed && !prev.parentApproved && t.parentApproved) {
      newlyApproved.push(t);
    }
  });
  _prevTaskStates = {};
  tasks.forEach(function(t) {
    _prevTaskStates[t.taskID] = { completed: t.completed, parentApproved: t.parentApproved };
  });

  setSyncState('synced', 'Synced');
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  var _savedTab = currentTab;
  var _pinWasOpen = parentMode || (IS_JJ ? (document.getElementById('jjPinOverlay') && document.getElementById('jjPinOverlay').style.display === 'flex') : (document.getElementById('bPinOverlay') && document.getElementById('bPinOverlay').style.display === 'flex'));
  if (IS_JJ) renderJJ(); else renderBuggsy();
  if (_savedTab && _savedTab !== 'quests') {
    if (IS_JJ) jjTab(_savedTab); else bTab(_savedTab);
  }
  if (_pinWasOpen) {
    var _pinEl = document.getElementById(IS_JJ ? 'jjPinOverlay' : 'bPinOverlay');
    if (_pinEl) { _pinEl.style.display = 'flex'; setTimeout(function() { var _inp = document.getElementById(IS_JJ ? 'jjPinInput' : 'bPinInput'); if (_inp) _inp.focus(); }, 80); }
  }

  // v26: Track 10 — celebrate newly approved tasks
  if (newlyApproved.length > 0 && !IS_PARENT) {
    setTimeout(function() {
      newlyApproved.forEach(function(t) {
        if (IS_JJ) {
          jjConfetti(15);
          jjPointsBanner('Mom/Dad said YES! +' + t.points + ' ⭐');
        } else {
          showBXP({clientX: window.innerWidth/2, clientY: window.innerHeight/3}, '✓ APPROVED! +' + t.points + ' RINGS!');
        }
      });
    }, 300);
  }

  // v28: Grade celebration — check for today's grade entries (first load only)
  if (!IS_PARENT && !window._gradeCelebrated) {
    window._gradeCelebrated = true;
    google.script.run.withSuccessHandler(function(grades) {
      if (!grades || !grades.length) return;
      var today = new Date().toISOString().substring(0, 10);
      var childName = IS_JJ ? 'JJ' : 'Buggsy';
      var todayGrades = grades.filter(function(g) {
        return g.kid === childName && g.timestamp && g.timestamp.substring(0, 10) === today && g.rings > 0;
      });
      todayGrades.forEach(function(g) {
        var msg = 'You got ' + g.grade + ' in ' + g.subject + '! +' + g.rings + ' ' + (IS_JJ ? 'stars' : 'rings');
        if (g.cash > 0) msg += ' +$' + Number(g.cash).toFixed(2);
        setTimeout(function() {
          if (IS_JJ) { jjConfetti(20); jjPointsBanner(msg + ' ⭐'); }
          else { showBXP({clientX: window.innerWidth/2, clientY: window.innerHeight/4}, msg + '!'); }
        }, 500);
      });
    }).withFailureHandler(function() { }).khGetGradeHistorySafe(IS_JJ ? 'JJ' : 'Buggsy');
  }

  // v24: Capture heartbeat on load so smart poll can compare
  google.script.run.withSuccessHandler(function(ts) { if (ts) _lastHeartbeat = ts; }).withFailureHandler(function(e){ console.log('Heartbeat check failed: ' + (e && e.message ? e.message : 'unknown')); }).getKHLastModifiedSafe();

  // v23 Fix 5: Win animation — celebrate when balance increases after refresh
  var newBal = Number(balances.balance) || 0;
  if (_prevBalance !== null && newBal > _prevBalance && !IS_PARENT) {
    var gained = newBal - _prevBalance;
    if (IS_JJ) {
      jjConfetti(12);
      jjStarPop({clientX: window.innerWidth/2, clientY: 100}, '+' + gained + ' \u2B50!');
    } else {
      showBXP({clientX: window.innerWidth/2, clientY: 100}, '+' + gained + ' RINGS!');
    }
  }
  _prevBalance = newBal;

  // v23: Restore quest list opacity (cleared during refresh loading flash)
  var ql = document.getElementById(IS_JJ ? 'jjQuestList' : 'bQuestList');
  if (ql) ql.style.opacity = '1';

  // v5: post-render cooldown — ghost-tap guard stays active through card animation (#57)
  setTimeout(function(){ _dataLoading = false; }, 350);
}

function updateBuggsy() {
  var done  = tasks.filter(function(t){return t.completed;});
  var approved = tasks.filter(function(t){return t.completed && t.parentApproved;});
  // v1 TBM: Use server-computed balance for ring count
  // v10 FIX 5: || treats 0 as falsy — Buggsy showed client-computed points at zero balance
  var rings = Number(balances.balance);
  if (isNaN(rings)) rings = done.reduce(function(s,t){return s+t.points;},0);
  // v8: TV + money only count APPROVED tasks — not just claimed
  // v22: TV reads from Screen Time Bank (deposits - withdrawals), not task tvMinutes
  var tvBank = (screenTimeBank.TV && typeof screenTimeBank.TV.balance === 'number') ? screenTimeBank.TV.balance : 0;
  var gamingBank = (screenTimeBank.Gaming && typeof screenTimeBank.Gaming.balance === 'number') ? screenTimeBank.Gaming.balance : 0;
  var money = approved.reduce(function(s,t){return s+t.money;},0);

  var bRingsEl = document.getElementById('bRings');
  var bTVEl = document.getElementById('bTV');
  var bGameEl = document.getElementById('bGame');
  var prevRings = parseInt(bRingsEl.textContent) || 0;
  var prevTV = parseInt(bTVEl.textContent) || 0;
  animateNumber(bRingsEl, prevRings, rings);
  animateNumber(bTVEl, prevTV, tvBank);
  if (bGameEl) { var prevGame = parseInt(bGameEl.textContent) || 0; animateNumber(bGameEl, prevGame, gamingBank); }
  document.getElementById('bMoney').textContent  = '$' + money.toFixed(2);
  document.getElementById('bRBadge').textContent = rings + ' RINGS';

  // Level
  var levelInfo = getLevel(rings, 'buggsy');
  var lvl = levelInfo.level;
  var idx  = levelInfo.index - 1;
  var next = (serverLevels || LEVELS_BUGGSY)[idx + 1];
  var prog = next ? (rings - lvl.min) / (next.min - lvl.min) : 1;
  var badge = document.getElementById('bLvlBadge');
  if (badge) {
    badge.textContent = idx + 1;
    badge.style.background = lvl.color + '22'; badge.style.color = lvl.color;
    badge.style.boxShadow = '0 0 10px ' + lvl.color + '44';
    document.getElementById('bLvlName').textContent = lvl.name;
    document.getElementById('bLvlName').style.color = lvl.color;
    document.getElementById('bLvlXP').textContent   = rings + ' rings earned';
    document.getElementById('bLvlNext').textContent = next ? (next.min - rings) + ' to ' + next.name : '★ MAX';
    var bar = document.getElementById('bLvlBar');
    bar.style.width = (Math.min(prog,1) * 100) + '%';
    bar.style.background = 'linear-gradient(90deg,' + lvl.color + '99,' + lvl.color + ')';
    bar.style.boxShadow  = '0 0 8px ' + lvl.color + '66';
  }

  // Streak + Mastery Rank
  var _bMeta = (window._metaProgression || {}).buggsy || {};
  var _bStreakEl = document.getElementById('bStreakDisplay');
  if (_bStreakEl) {
    if (_bMeta.streakDays && _bMeta.streakDays >= 2) {
      var _flames = '';
      for (var _fi = 0; _fi < Math.min(_bMeta.streakDays, 7); _fi++) _flames += '\ud83d\udd25';
      _bStreakEl.textContent = _flames + ' ' + _bMeta.streakDays + '-day streak!';
      _bStreakEl.style.display = 'block';
    } else { _bStreakEl.style.display = 'none'; }
  }
  var _bRankEl = document.getElementById('bMasteryRank');
  if (_bRankEl && _bMeta.masteryRank) {
    _bRankEl.textContent = '\u2b50 ' + _bMeta.masteryRank;
    _bRankEl.style.display = 'inline-block';
  }

  // Quests
  var ql = document.getElementById('bQuestList');
  if (ql) {
    var qlHtml = '';
    var available = tasks.filter(function(t){return !t.completed;}).sort(function(a,b){
      if (!!a.required !== !!b.required) return a.required ? -1 : 1;
      var ta = TIME_ORDER[a.timeOfDay] || 99;
      var tb = TIME_ORDER[b.timeOfDay] || 99;
      if (ta !== tb) return ta - tb;
      return (b.points || 0) - (a.points || 0);
    });
    var mustDoAvailable = available.filter(function(t){ return t.required; });
    var bonusAvailable = available.filter(function(t){ return !t.required; });
    var pendingTasks = tasks.filter(function(t){return t.completed && !t.parentApproved;});
    var approvedTasks = tasks.filter(function(t){return t.completed && t.parentApproved;});
    var req = requiredStatus || { done:0, total:0, allClear:false, currentPeriod:'morning' };
    var periodLabel = req.currentPeriod === 'morning' ? 'Morning must-dos' : (req.currentPeriod === 'afternoon' ? 'Morning + Afternoon' : 'All must-dos');
    var leftCount = Math.max((req.total || 0) - (req.done || 0), 0);
    if (document.getElementById('bQLabel')) {
      document.getElementById('bQLabel').textContent = periodLabel;
      document.getElementById('bQBadge').textContent = (req.done || 0) + ' / ' + (req.total || 0) + ' clear';
    }
    if (tasks.length === 0) {
      qlHtml = '<div class="b-empty">NO TASKS FOUND<br>CHECK KH_CHORES TAB</div>';
    } else {
      var gateMsg = '';
      if (req.allClear) {
        gateMsg = '✅ All must-dos done! Bonus quests available!';
      } else if (leftCount === 1 && mustDoAvailable.length > 0) {
        var lastTask = mustDoAvailable[0].task || 'task';
        var todHint = mustDoAvailable[0].timeOfDay ? mustDoAvailable[0].timeOfDay.replace(/^\d+-/,'') : '';
        gateMsg = '⚡ Last one! ' + (todHint ? todHint + ': ' : '') + lastTask;
      } else {
        var periodHint = req.currentPeriod === 'morning' ? 'morning ' : (req.currentPeriod === 'afternoon' ? 'morning + afternoon ' : '');
        gateMsg = '🔒 Clear ' + leftCount + ' of ' + (req.total || 0) + ' ' + periodHint + 'must-do' + ((req.total || 0) === 1 ? '' : 's') + ' to unlock rewards!';
      }
      qlHtml += '<div style="margin-bottom:10px;padding:10px 12px;border-radius:8px;border:1px solid ' + (req.allClear ? 'rgba(34,197,94,0.35);background:rgba(34,197,94,0.08);color:#86efac' : 'rgba(245,158,11,0.35);background:rgba(245,158,11,0.08);color:#fbbf24') + ';font-family:\'Press Start 2P\', monospace;font-size:7px;line-height:1.8">' + gateMsg + '</div>';
      qlHtml += '<div class="b-sec" style="padding:0 0 8px;max-width:none;margin:0"><span class="b-sec-title" style="color:#22c55e">✅ MUST DO</span><span class="b-sec-badge">' + mustDoAvailable.length + '</span></div>';
      if (mustDoAvailable.length === 0) {
        qlHtml += '<div class="b-empty">All must-dos clear ✅</div>';
      } else {
        // v22: Group must-dos by time-of-day with sub-headers
        var todGroups = [
          { key:'1-Morning', label:'🌅 MORNING', cls:'morning' },
          { key:'2-Afternoon', label:'☀️ AFTERNOON', cls:'afternoon' },
          { key:'3-Evening', label:'🌙 EVENING', cls:'evening' }
        ];
        var cardIdx = 0;
        var ungrouped = [];
        todGroups.forEach(function(grp) {
          var grpTasks = mustDoAvailable.filter(function(t){ return t.timeOfDay === grp.key; });
          var grpApproved = approvedTasks.filter(function(t){ return t.required && t.timeOfDay === grp.key; });
          if (grpTasks.length > 0 || grpApproved.length > 0) {
            var doneCount = grpApproved.length;
            var totalCount = grpTasks.length + doneCount;
            qlHtml += '<div class="b-tod-header"><span class="b-tod-label ' + grp.cls + '">' + grp.label + '</span>' + (doneCount > 0 ? '<span class="b-tod-done">' + doneCount + '/' + totalCount + ' ✓</span>' : '') + '</div>';
            for (var gi = 0; gi < grpTasks.length; gi++) { qlHtml += buildBCardHTML(grpTasks[gi], cardIdx++); }
            for (var ga = 0; ga < grpApproved.length; ga++) { qlHtml += buildBCardHTML(grpApproved[ga], cardIdx++); }
          }
        });
        // Tasks with no timeOfDay
        ungrouped = mustDoAvailable.filter(function(t){ return !t.timeOfDay || !TIME_ORDER[t.timeOfDay]; });
        var ungroupedApproved = approvedTasks.filter(function(t){ return t.required && (!t.timeOfDay || !TIME_ORDER[t.timeOfDay]); });
        if (ungrouped.length > 0 || ungroupedApproved.length > 0) {
          if (mustDoAvailable.length !== ungrouped.length || ungroupedApproved.length > 0) {
            qlHtml += '<div class="b-tod-header"><span class="b-tod-label">📋 OTHER</span></div>';
          }
          for (var ui = 0; ui < ungrouped.length; ui++) { qlHtml += buildBCardHTML(ungrouped[ui], cardIdx++); }
          for (var ua = 0; ua < ungroupedApproved.length; ua++) { qlHtml += buildBCardHTML(ungroupedApproved[ua], cardIdx++); }
        }
      }
      qlHtml += '<div class="b-sec" style="padding:14px 0 8px;max-width:none;margin:0"><span class="b-sec-title" style="color:#fbbf24">⭐ BONUS QUESTS</span><span class="b-sec-badge">' + bonusAvailable.length + '</span></div>';
      if (bonusAvailable.length === 0) {
        qlHtml += '<div class="b-empty">No bonus quests right now</div>';
      } else {
        for (var bi = 0; bi < bonusAvailable.length; bi++) { qlHtml += buildBCardHTML(bonusAvailable[bi], bi + mustDoAvailable.length); }
      }
      var approvedBonus = approvedTasks.filter(function(t){ return !t.required; });
      for (var ab = 0; ab < approvedBonus.length; ab++) { qlHtml += buildBCardHTML(approvedBonus[ab], ab + mustDoAvailable.length + bonusAvailable.length); }
    }
    ql.innerHTML = qlHtml;
    // v19: Post-render stagger animation
    var bCards = ql.querySelectorAll('.b-card');
    for (var ci = 0; ci < bCards.length; ci++) {
      (function(el, idx) {
        el.style.opacity = '0'; el.style.transform = 'translateY(7px)';
        setTimeout(function() {
          el.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
          el.style.opacity = '1'; el.style.transform = 'translateY(0)';
        }, idx * 32);
      })(bCards[ci], ci);
    }
    // v19 Fix 3: Only pending tasks in pending column (no approved)
    // v19 Fix 5A: Celebration image when pending is empty
    var pl = document.getElementById('bPendList');
    if (pl) {
      var pendBadge = document.getElementById('bPendBadge');
      if (pendBadge) pendBadge.textContent = pendingTasks.length;
      if (pendingTasks.length === 0) {
        pl.innerHTML = '<div style="text-align:center;padding:16px 8px;position:relative"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;height:280px;background:url(https://i.ibb.co/FLDTT6QH/1774020751171.png) center/contain no-repeat;opacity:0.06;pointer-events:none"></div><img src="https://i.ibb.co/8L0ccf6p/1773982420674.png" alt="Wolfkid celebrating" style="width:180px;height:180px;object-fit:contain;margin-bottom:8px;filter:drop-shadow(0 6px 16px rgba(255,215,0,0.3))" onerror="this.style.display=\'none\'"><div style="font-family:\'Press Start 2P\',monospace;font-size:14px;color:#fbbf24;line-height:1.6;text-shadow:0 0 12px rgba(255,215,0,0.4)">ALL CLEAR!<br>NO QUESTS WAITING!</div></div>';
      } else {
        var pendRings = pendingTasks.reduce(function(s,t){return s+t.points;},0);
        var pendHtml = '<div class="b-pending-chest" id="bChest"><span class="chest-icon">\uD83D\uDC8E</span><span class="chest-label">TREASURE CHEST</span><span class="chest-badge" id="bChestBadge">' + pendingTasks.length + ' \u00B7 ' + pendRings + ' rings</span></div>';
        pendingTasks.forEach(function(task, i) { pendHtml += buildBCardHTML(task, i); });
        pl.innerHTML = pendHtml;
      }
    }
    // v19 Fix 5B: One-time allClear celebration
    if (req.allClear && !window._allClearCelebrated) {
      window._allClearCelebrated = true;
      showBXP({clientX: window.innerWidth/2, clientY: window.innerHeight/3}, 'ALL CLEAR!');
    }
  }

  // v1 TBM: Rewards from server
  var rg = document.getElementById('bRewardGrid');
  if (rg) {
    rg.innerHTML = '';
    rewards.forEach(function(r) {
      var u = rings >= r.cost;
      var d = document.createElement('div');
      d.className = 'b-reward ' + (u ? 'unlocked' : '');
      d.innerHTML = '<div class="b-reward-icon">' + r.icon + '</div><div class="b-reward-name">' + r.name + '</div><div class="b-reward-cost">' + r.cost + ' RINGS</div><div class="b-reward-status ' + (u?'unlocked':'locked') + '">' + (u?'✓ UNLOCKED':rings+'/'+r.cost) + '</div>' + (u ? '<button class="b-redeem-btn" onclick="bRedeem(\'' + r.id + '\',event)">🎁 REDEEM</button>' : '');
      rg.appendChild(d);
    });
  }
  // v17: Update Ask tab
  updateAskTab('buggsy', 'b');
}

// v19 Fix 1: Returns HTML string instead of DOM element
function buildBCardHTML(task, i) {
  var cat   = CAT[task.category] || CAT.General;
  var freqC = FREQ_C[task.frequency] || '#94a3b8';
  var cls = 'b-card' + (task.completed ? ' done' : '');
  var hasBonus = task.multiplier && task.multiplier > 1;
  var bonusBadge = hasBonus ? '<div class="b-bonus-badge">⚡ '+task.multiplier+'x BONUS</div>' : '';
  var ptsDisplay = hasBonus ? '<div class="b-pts">'+task.points+'</div><div class="b-pts-base">'+task.basePoints+'</div>' : '<div class="b-pts">'+task.points+'</div>';
  var action = '';
  if (task.completed && task.parentApproved) { action = '<div class="b-done-stamp">✓ DONE<br>APPROVED</div>'; }
  else if (task.completed && !task.parentApproved) {
    action = parentMode
      ? '<button class="b-approve" onclick="bApprove(\''+task.taskID+'\',event)" style="margin-bottom:4px">✓ APPROVE</button><button class="b-approve-bonus" onclick="bGrantBonus(\''+task.taskID+'\',2,event)">⚡ 2x BONUS</button><button class="b-approve-bonus" onclick="bGrantBonus(\''+task.taskID+'\',1.5,event)" style="margin-top:3px">⚡ 1.5x</button>'
      : '<div class="b-pending">📦 CLAIMED<br>PENDING</div>';
  } else {
    action = parentMode
      ? (task.required
        ? '<button class="b-approve" onclick="bOverride(\''+task.taskID+'\',event)">↪ CLEAR</button>'
        : '<div class="b-pending">⏳ NOT CLAIMED<br>YET</div>')
      : '<button class="b-claim" onclick="bClaim(\''+task.taskID+'\',event)">CLAIM<br>RINGS</button>';
  }
  return '<div class="'+cls+'"><div class="b-icon">'+task.icon+'</div><div class="b-info"><div class="b-name">'+task.task+'</div><div class="b-tags"><span class="b-tag" style="color:'+cat.c+';border-color:'+cat.c+';background:'+cat.bg+'">'+task.category+'</span><span class="b-tag" style="color:'+freqC+';border-color:'+freqC+'40">'+task.frequency+'</span>' + (task.timeOfDay ? '<span class="b-tag" style="color:#818cf8;border-color:rgba(129,140,248,0.35);background:rgba(129,140,248,0.08)">' + task.timeOfDay.replace(/^\d+-/,'') + '</span>' : '') + (task.required ? '<span class="b-tag" style="color:#22c55e;border-color:rgba(34,197,94,0.35);background:rgba(34,197,94,0.08)">MUST DO</span>' : '') + '</div>'+bonusBadge+'</div><div class="b-right">'+ptsDisplay+'<div class="b-pts-lbl">RINGS</div>'+action+'</div></div>';
}

// v1 TBM: All write operations use kh* prefixed functions
function bClaim(taskID, e) {
  e.stopPropagation();
  if (_actionInFlight) return;
  var t = _findByKey(tasks, 'taskID', taskID);
  if (!t || t.completed) return;
  _actionInFlight = true;
  var btn = e.target; if (btn) { btn.disabled = true; btn.textContent = '...'; }
  var card = btn ? btn.closest('.b-card') : null;
  if (card) { card.classList.add('claiming'); setTimeout(function(){ card.classList.remove('claiming'); }, 420); }
  charReact('bounce');
  // Float coin toward pending column (chest), not balance counter

function updateJJ() {
  var approved = tasks.filter(function(t){return t.completed && t.parentApproved;});
  var stars = Number(balances && balances.balance);
  if (isNaN(stars)) stars = approved.reduce(function(s,t){return s+t.points;},0);
  var earnedTV = approved.reduce(function(s,t){return s + (t.tvMinutes || 0);},0);
  // v22: TV reads from Screen Time Bank, not task tvMinutes
  var jjTvBank = (screenTimeBank.TV && typeof screenTimeBank.TV.balance === 'number') ? screenTimeBank.TV.balance : 0;
  var jjGamingBank = (screenTimeBank.Gaming && typeof screenTimeBank.Gaming.balance === 'number') ? screenTimeBank.Gaming.balance : 0;
  var earnedSnack = approved.reduce(function(s,t){return s + (t.snacks || 0);},0);
  var jjStarsEl = document.getElementById('jjStars');
  var jjTVEl = document.getElementById('jjTV');
  var jjSnackEl = document.getElementById('jjSnack');
  var prevStars = parseInt(jjStarsEl.textContent) || 0;
  var prevJJTV = parseInt(jjTVEl.textContent) || 0;
  var prevSnack = parseInt(jjSnackEl.textContent) || 0;
  animateNumber(jjStarsEl, prevStars, stars);
  animateNumber(jjTVEl, prevJJTV, jjTvBank, function(v) { return v + 'm'; });
  animateNumber(jjSnackEl, prevSnack, earnedSnack);
  var jjEarnedEl = document.getElementById('jjEarned');
  if (jjEarnedEl) {
    var jjMoney = Number(balances && balances.earnedMoney) || 0;
    jjEarnedEl.textContent = '$' + jjMoney.toFixed(0);
  }
  var jjLevelInfo = getLevel(stars, 'jj');
  var jjLevel = jjLevelInfo.level;
  var jjChip = document.getElementById('jjLevelChip');
  if (jjChip) {
    jjChip.textContent = 'LEVEL ' + jjLevelInfo.index + ' · ' + jjLevel.name.toUpperCase();
    jjChip.style.color = jjLevel.color;
    jjChip.style.borderColor = jjLevel.color + '66';
    jjChip.style.boxShadow = '0 0 18px ' + jjLevel.color + '33';
    jjChip.style.background = 'linear-gradient(135deg, rgba(255,255,255,0.12), ' + jjLevel.color + '22)';
  }
  // Streak + Mastery Rank for JJ
  var _jMeta = (window._metaProgression || {}).jj || {};
  var _jStreakEl = document.getElementById('jjStreakDisplay');
  if (_jStreakEl) {
    if (_jMeta.streakDays && _jMeta.streakDays >= 2) {
      var _jFlames = '';

          }
          for (var jui = 0; jui < jjUngrouped.length; jui++) { tlHtml += buildJJCardHTML(jjUngrouped[jui], jjCardIdx++); }
          for (var jua = 0; jua < jjUngroupedApproved.length; jua++) { tlHtml += buildJJCardHTML(jjUngroupedApproved[jua], jjCardIdx++); }
        }
      }
      tlHtml += '<div class="jj-sec-title" style="color:#fde68a">⭐ Bonus Jobs</div>';
      if (bonusAvailable.length === 0) {
        tlHtml += '<div style="text-align:center;padding:16px;font-size:14px;color:rgba(255,255,255,0.45);font-weight:800;">No bonus jobs right now 💕</div>';
      } else {

      }
      var jjApprovedBonus = approvedTasks.filter(function(t){ return !t.required; });
      for (var jab = 0; jab < jjApprovedBonus.length; jab++) { tlHtml += buildJJCardHTML(jjApprovedBonus[jab], jab + mustDoAvailable.length + bonusAvailable.length); }

    tl.innerHTML = tlHtml;
    // v19: Post-render stagger animation
    var jCards = tl.querySelectorAll('.jj-card');
    for (var ci = 0; ci < jCards.length; ci++) {
      (function(el, idx) {
        el.style.opacity = '0'; el.style.transform = 'translateY(8px)';
        setTimeout(function() {

          el.style.opacity = '1'; el.style.transform = 'translateY(0)';

    // v19 Fix 3: Only pending tasks in pending column (no approved)

      } else {
        var jPendStars = pendingTasks.reduce(function(s,t){return s+t.points;},0);
        var jPendHtml = '<div class="jj-pending-jar" id="jjJar"><span class="jar-icon">\u2728</span><span class="jar-label">Sparkle Jar</span><span class="jar-badge" id="jjJarBadge">' + pendingTasks.length + ' \u00B7 ' + jPendStars + ' stars</span></div>';
        pendingTasks.forEach(function(t,i){ jPendHtml += buildJJCardHTML(t, i); });
        jpl.innerHTML = jPendHtml;
      }
      // v19 Fix 5B: One-time allClear celebration
      if (req.allClear && !window._allClearCelebrated) {

        jjPointsBanner('ALL CLEAR! ✨');

  }
  // v1 TBM: Rewards from server
  var rg = document.getElementById('jjRewards');
  if (rg) {
    rg.innerHTML = '';
    var unlockedNow = [];

// v19 Fix 1: Returns HTML string instead of DOM element
function buildJJCardHTML(task, i) {
  var cls = 'jj-card' + (task.completed ? ' done' : '');
  var hasBonus = task.multiplier && task.multiplier > 1;
  var bonusBadge = hasBonus ? '<div class="jj-bonus-badge">⚡ '+task.multiplier+'x Bonus!</div>' : '';
  var action = '';
  if (task.completed && task.parentApproved) { action = '<div class="jj-done-badge">🌟 Done!<br>Approved ✓</div>'; }
  else if (task.completed && !task.parentApproved) {
    action = parentMode
      ? '<button class="jj-approve-btn" onclick="jjApprove(\''+task.taskID+'\',event)">✓ Approve!</button><button class="jj-approve-bonus-btn" onclick="jjGrantBonus(\''+task.taskID+'\',2,event)">⚡ 2x Bonus!</button><button class="jj-approve-bonus-btn" onclick="jjGrantBonus(\''+task.taskID+'\',1.5,event)" style="font-size:11px">⚡ 1.5x</button>'
      : '<div class="jj-pending-badge">✨ LOOK AT ME! ✨</div>';
  } else {
    action = parentMode
      ? (task.required
        ? '<button class="jj-approve-btn" onclick="jjOverride(\''+task.taskID+'\',event)">↪ Clear</button>'
        : '<div class="jj-pending-badge">⏳ Waiting on claim</div>')
      : '<button class="jj-do-it-btn" onclick="jjClaim(\''+task.taskID+'\',event)">I Did It! ✨</button>';
  }
  var todLabel = task.timeOfDay ? task.timeOfDay.replace(/^\d+-/,'') : '';
  return '<div class="'+cls+'"><div class="jj-card-icon">'+task.icon+'</div><div class="jj-card-body"><div class="jj-card-name">'+task.task+'</div><div class="jj-card-cat">'+task.category + (todLabel ? ' · ' + todLabel : '') + (task.required ? ' · MUST DO' : '') + '</div>'+bonusBadge+'</div><div class="jj-card-right"><div class="jj-pts-badge"><div class="jj-pts-num">'+task.points+'</div><div class="jj-pts-star">⭐ stars</div></div>'+action+'</div></div>';
}

function jjClaim(taskID, e) {
  e.stopPropagation(); if (_actionInFlight) return;
  var t = _findByKey(tasks, 'taskID', taskID);
  if (!t||t.completed) return;
  _actionInFlight = true;
  var btn = e.target; if (btn) { btn.disabled = true; btn.innerHTML = '\u2B50'; btn.classList.add('spinning'); }
  var card = btn ? btn.closest('.jj-card') : null;
  if (card) { card.classList.add('claiming'); setTimeout(function(){ card.classList.remove('claiming'); }, 420); }
  charReact('bounce');
  // Float stars toward pending jar, not balance counter
  var jar = document.getElementById('jjPendList');
  if (jar) { jjSendStarsToPending(e, Math.max(3, Math.min(6, t.points || 3))); }
  t.completed=true; updateJJ(); jjConfetti(8); jjStarPop(e,'\u2728 I did it!');
  setSyncState('saving', 'Claiming...');
  google.script.run
    .withSuccessHandler(function(){ _actionInFlight = false; setSyncState('synced', 'Done!'); if (card) { card.classList.add('claim-success'); setTimeout(function(){ card.classList.remove('claim-success'); }, 600); } })
    .withFailureHandler(function(err){ _actionInFlight = false; setSyncState('failed'); if (card) { card.classList.add('claim-error'); setTimeout(function(){ card.classList.remove('claim-error'); }, 900); } jjStarPop({clientX:window.innerWidth/2,clientY:window.innerHeight/2}, 'Oops! Try again \u{1F495}'); t.completed=false; updateJJ(); })
    .khCompleteTaskSafe(t.rowIndex, t.taskID);
}
// ── v10 FIX 3: jjApprove — added return value check for duplicate guard ──
function jjApprove(taskID, e) {

    .withFailureHandler(function(err){ _actionInFlight = false; jjStarPop({clientX:window.innerWidth/2,clientY:window.innerHeight/2}, 'Oops! Try again 💕'); t.parentApproved=false; updateJJ(); })
    .khApproveTaskSafe(t.rowIndex, t.taskID);

function jjGrantBonus(taskID, multiplier, e) {
  e.stopPropagation(); if (_actionInFlight) return;
  var t = _findByKey(tasks, 'taskID', taskID);
  if(!t||!t.completed||t.parentApproved)return;

    .withFailureHandler(function(err){ _actionInFlight = false; jjStarPop({clientX:window.innerWidth/2,clientY:window.innerHeight/2}, 'Oops! Try again 💕'); t.parentApproved=snap.parentApproved; t.multiplier=snap.multiplier; t.points=snap.points; updateJJ(); })
    .khApproveWithBonusSafe(t.rowIndex, multiplier, t.taskID);
}

var _askType = { buggsy: 'Money', jj: 'Money' };

function escHtml(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function pickAskType(prefix, type, el) {
  _askType[prefix === 'b' ? 'buggsy' : prefix] = type;
  var row = el.parentElement;
  var btns = row.querySelectorAll('.ask-type-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  el.classList.add('active');
  var amountWrap = document.getElementById((prefix === 'b' ? 'b' : prefix) + 'AskAmountWrap');
  if (amountWrap) {
    amountWrap.style.display = (type === 'Money' || type === 'Purchase') ? 'block' : 'none';
  }
}

function submitAsk(child) {
  var prefix = child === 'buggsy' ? 'b' : 'jj';
  var type = _askType[child] || 'Other';
  var titleEl = document.getElementById(prefix + 'AskTitle');
  var amountEl = document.getElementById(prefix + 'AskAmount');
  var notesEl = document.getElementById(prefix + 'AskNotes');
  var statusEl = document.getElementById(prefix + 'AskStatus');
  var title = (titleEl.value || '').trim();
  var amount = parseFloat(amountEl.value) || 0;
  var notes = (notesEl.value || '').trim();
  if (!title) {
    statusEl.style.display = 'block'; statusEl.className = 'ev-status error';
    statusEl.textContent = '❌ Need to say what you want!';
    return;
  }
  if ((type === 'Money' || type === 'Purchase') && amount <= 0) {
    statusEl.style.display = 'block'; statusEl.className = 'ev-status error';
    statusEl.textContent = '❌ How much do you need?';
    return;
  }
  statusEl.style.display = 'block'; statusEl.className = 'ev-status';
  statusEl.textContent = '⏳ Sending ask...';
  google.script.run
    .withSuccessHandler(function(raw) {
      var r = safeParse(raw);
      if (r && r.status === 'ok') {
        statusEl.className = 'ev-status';
        statusEl.textContent = '✅ Ask sent! Your parents will see it.';
        titleEl.value = ''; amountEl.value = ''; notesEl.value = '';
        setTimeout(function() { loadKidData(); }, 500);
      } else {
        statusEl.className = 'ev-status error';
        statusEl.textContent = '❌ ' + ((r && r.error) || 'Something went wrong');
      }
    })
    .withFailureHandler(function(e) {
      statusEl.className = 'ev-status error';
      statusEl.textContent = '❌ ' + (e.message || 'Connection error');
    })
    .khSubmitRequestSafe(child, type, title, amount, notes);
}

function askFromReward(child, rewardName, rewardCost) {
  var prefix = child === 'buggsy' ? 'b' : child;
  if (child === 'buggsy') bTab('ask'); else jjTab('ask');
  _askType[child] = 'Purchase';
  var row = document.getElementById(prefix + 'AskTypes');
  if (row) {
    var btns = row.querySelectorAll('.ask-type-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle('active', btns[i].getAttribute('data-type') === 'Purchase');
    }
  }
  var amountWrap = document.getElementById(prefix + 'AskAmountWrap');
  if (amountWrap) amountWrap.style.display = 'block';
  var titleEl = document.getElementById(prefix + 'AskTitle');
  if (titleEl) titleEl.value = 'I want: ' + rewardName;
  var amountEl = document.getElementById(prefix + 'AskAmount');
  if (amountEl) amountEl.value = rewardCost;
}

function renderRecentAsks(child, containerId) {
  var el = document.getElementById(containerId);
  if (!el) return;
  var childRequests = requests.filter(function(r) {
    return (r.child || '').toLowerCase() === child;
  }).slice(0, 10);
  if (!childRequests.length) {
    el.innerHTML = '<div style="text-align:center;padding:12px;font-size:12px;color:rgba(255,255,255,0.35)">No asks yet!</div>';
    return;
  }
  var TYPE_ICONS = { Money: '💰', Purchase: '🛒', Activity: '🎯', Other: '💬' };
  var h = '';
  childRequests.forEach(function(req) {
    var statusCls = (req.status || '').toLowerCase() === 'approved' ? 'approved' : ((req.status || '').toLowerCase() === 'denied' ? 'denied' : 'pending');
    var statusIcon = statusCls === 'approved' ? '✅' : (statusCls === 'denied' ? '❌' : '🟡');
    var amountStr = (req.type === 'Money' || req.type === 'Purchase') && req.amount ? ' · $' + Number(req.amount).toFixed(2) : '';
    h += '<div class="ask-row">';
h += '<div class="ask-row-icon">' + (TYPE_ICONS[req.type] || '💬') + '</div>';
h += '<div class="ask-row-info"><div class="ask-row-title">' + escHtml(req.title) + amountStr + '</div>';
h += '<div class="ask-row-amount">' + escHtml(req.type) + '</div></div>';
    h += '<div class="ask-status-badge ' + statusCls + '">' + statusIcon + ' ' + escHtml(req.status || 'Pending') + '</div>';
    h += '</div>';
    if (statusCls === 'denied' && req.parentNote) {
      h += '<div class="ask-parent-note">💬 ' + escHtml(req.parentNote) + '</div>';
    }
  });
  el.innerHTML = h;
}

function renderAskRewards(child, containerId) {
  var el = document.getElementById(containerId);
  if (!el) return;
  var childRewards = rewards.filter(function(r) { return true; });
  if (!childRewards.length) {
    el.innerHTML = '<div style="text-align:center;padding:12px;font-size:12px;color:rgba(255,255,255,0.35)">No rewards set up yet!</div>';
    return;
  }
  var h = '';
  childRewards.forEach(function(r) {
    h += '<div class="ask-reward-row" onclick="askFromReward(\'' + child + '\',\'' + escHtml(r.name) + '\',' + r.cost + ')">';
    h += '<div class="ask-reward-icon">' + r.icon + '</div>';
    h += '<div class="ask-reward-info"><div class="ask-reward-name">' + escHtml(r.name) + '</div>';
    h += '<div class="ask-reward-cost">' + r.cost + ' ' + (child === 'jj' ? '⭐' : GOLD_RING) + '</div></div>';
    h += '<div class="ask-want-btn">I want this!</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function updateAskTab(child, prefix) {
  var bankEl = document.getElementById(prefix + 'AskBank');
  if (bankEl) {
    var bankBal = Number((balances && balances.bankBalance) || 0);
    bankEl.textContent = (child === 'buggsy' ? 'BANK: ' : 'Bank: ') + '$' + bankBal.toFixed(2);
  }
  renderRecentAsks(child, prefix + 'RecentAsks');
  renderAskRewards(child, prefix + 'AskRewards');
}

function submitGrade() {
  var kid = document.getElementById('gradeKid').value;
  var subject = document.getElementById('gradeSubject').value;
  var grade = document.getElementById('gradeGrade').value;
  var quarter = document.getElementById('gradeQuarter').value;
  var schoolYear = document.getElementById('gradeYear').value;
  var notes = document.getElementById('gradeNotes').value;
  var statusEl = document.getElementById('gradeStatus');
  statusEl.style.display = 'block';
  statusEl.style.background = 'rgba(99,102,241,0.15)';
  statusEl.style.color = '#a5b4fc';
  statusEl.textContent = 'Submitting...';
  google.script.run
    .withSuccessHandler(function(r) {
      if (r && r.status === 'ok') {
        var msg = kid + ' earned ' + r.ringsAwarded + ' rings';
        if (r.cashAwarded > 0) msg += ' + $' + Number(r.cashAwarded).toFixed(2);
        msg += ' for ' + grade + ' in ' + subject + '!';
        statusEl.style.background = 'rgba(22,163,106,0.15)';
        statusEl.style.color = '#86efac';
        statusEl.textContent = msg;
        document.getElementById('gradeNotes').value = '';
      } else {
        statusEl.style.background = 'rgba(220,38,38,0.15)';
        statusEl.style.color = '#fca5a5';
        statusEl.textContent = (r && r.message) || 'Error submitting grade';
      }
    })
    .withFailureHandler(function(e) {
      statusEl.style.background = 'rgba(220,38,38,0.15)';
      statusEl.style.color = '#fca5a5';
      statusEl.textContent = 'Error: ' + (e.message || 'Unknown');
    })
    .khSubmitGradeSafe({ kid: kid, subject: subject, grade: grade, quarter: quarter, schoolYear: schoolYear, enteredBy: 'Parent', notes: notes });
}

function submitEvent(prefix) {
  var title = document.getElementById(prefix + 'EvTitle').value.trim();
  var date  = document.getElementById(prefix + 'EvDate').value;
  var time  = document.getElementById(prefix + 'EvTime').value || '';
  var child = document.getElementById(prefix + 'EvChild').value;
  var repeat= document.getElementById(prefix + 'EvRepeat').value;
  var cal   = document.getElementById(prefix + 'EvCal').value;
  var statusEl = document.getElementById(prefix + 'EvStatus');
  if (!title || !date) {
    statusEl.style.display = 'block'; statusEl.className = 'ev-status error';
    statusEl.textContent = '❌ Need a title and date!';
    return;
  }
  statusEl.style.display = 'block'; statusEl.className = 'ev-status';
  statusEl.textContent = '⏳ Adding to calendar...';
  google.script.run
    .withSuccessHandler(function(result) {
      try {
        var r = typeof result === 'string' ? JSON.parse(result) : result;
        if (r && r.error) { statusEl.className = 'ev-status error'; statusEl.textContent = '❌ ' + r.error; return; }
        statusEl.className = 'ev-status';
        statusEl.textContent = '✅ Added! ' + title + (repeat !== 'none' ? ' (' + repeat + ')' : '');
        document.getElementById(prefix + 'EvTitle').value = '';
        document.getElementById(prefix + 'EvTime').value = '';
      } catch(e) {
        statusEl.className = 'ev-status'; statusEl.textContent = '✅ Event added!';
        document.getElementById(prefix + 'EvTitle').value = '';
      }
    })
    .withFailureHandler(function(e) {
      statusEl.className = 'ev-status error';
      statusEl.textContent = '❌ ' + (e.message || 'Something went wrong');
    })
    .addKidsEventSafe(title, date, time, cal, repeat, child);
}

function pToggleSection(id) {
  var el = document.getElementById(id);
  if (!el) return;
  var chevronId = id.replace('Section', 'Chevron');
  var chevron = document.getElementById(chevronId);
  if (el.style.display === 'none') {
    el.style.display = 'block';
    if (chevron) chevron.style.transform = 'rotate(0deg)';
  } else {
    el.style.display = 'none';
    if (chevron) chevron.style.transform = 'rotate(-90deg)';
  }
}
function pToggleSelectAll(el, child) {
  var boxes = document.querySelectorAll('.task-select-' + child);
  for (var i = 0; i < boxes.length; i++) { boxes[i].checked = el.checked; }
  pUpdateBatchBtn(child);
}
function pUpdateBatchBtn(child) {
  var boxes = document.querySelectorAll('.task-select-' + child + ':checked');
  var btn = document.getElementById('batchBtn_' + child);
  if (!btn) return;
  btn.disabled = (boxes.length === 0);
  btn.style.opacity = boxes.length > 0 ? '1' : '0.5';
  btn.textContent = boxes.length > 0 ? 'Approve ' + boxes.length + ' tasks' : 'Approve Selected';
}
function pBatchApprove(child) {
  var boxes = document.querySelectorAll('.task-select-' + child + ':checked');
  var rowIds = [];
  for (var i = 0; i < boxes.length; i++) { rowIds.push(parseInt(boxes[i].getAttribute('data-row'), 10)); }
  if (rowIds.length === 0) return;
  var btn = document.getElementById('batchBtn_' + child);
  if (btn) { btn.disabled = true; btn.textContent = 'Approving...'; }
  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.error) {
        if (btn) { btn.textContent = 'Error \u2014 try again'; btn.disabled = false; btn.style.opacity = '1'; }
        return;
      }
      if (btn) { btn.textContent = 'Approved ' + (result.approved || rowIds.length) + ' \u2713'; btn.style.background = '#16a34a'; }
      setTimeout(function() { loadParentData(); }, 1500);
    })
    .withFailureHandler(function() {
      if (btn) { btn.textContent = 'Error \u2014 try again'; btn.disabled = false; btn.style.opacity = '1'; }
    })
    .khBatchApproveSafe({ rowIndices: rowIds, approver: 'JT' });
}

<!-- ═══ V2 PARENT UX — ONE-TAP + WEEKLY GRID ═══ -->
<script>
(function() {
  if (typeof INIT_VIEW === 'undefined' || INIT_VIEW !== 'parent') return;
  var currentTab = 'pending', currentWeeklyKid = 'all', parentData = null;
  window._storyInProgress = false;
  window.renderParent = function() {
    if (window._storyInProgress) return;
    parentData = null;
    document.getElementById('app').innerHTML = buildParentUI();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('pSpinner').style.display = 'flex';
    document.getElementById('pContent').style.display = 'none';
    google.script.run
      .withSuccessHandler(function(raw) {
        var data = safeParse(raw);
        parentData = data;
        renderV2(data);
      })
      .withFailureHandler(function(err) {
        var b = document.querySelector('.p-body');
        if (b) b.innerHTML = '<div class="p-empty-state">Error: ' + err.message + '</div>';
      })
      .getKidsHubDataSafe('all');
  };
  function renderV2(data) {
    var tasks = data.tasks || [], bal = data.balances || {}, wg = data.weeklyGrid || {};
    var pending = tasks.filter(function(t) { return t.completed && !t.parentApproved; });
    var completed = tasks.filter(function(t) { return t.completed && t.parentApproved; });
    var bBal = (bal.buggsy || {}).balance || 0, jBal = (bal.jj || {}).balance || 0;
    var bBank = Number((bal.buggsy || {}).bankBalance || 0);
    var jBank = Number((bal.jj || {}).bankBalance || 0);
    var body = document.querySelector('.p-body');
    if (!body) { body = document.createElement('div'); body.className = 'p-body'; document.body.appendChild(body); }
    var h = '';
    h += '<div class="p-summary">';
    h += sc(GOLD_RING, bBal, 'BUGGSY PTS', '#f59e0b');
    h += sc('⭐', jBal, 'JJ STARS', '#ec4899');
    h += sc('💰', '$' + bBank.toFixed(2), 'BUGGSY BANK', '#22c55e');
    h += sc('💰', '$' + jBank.toFixed(2), 'JJ BANK', '#22c55e');
    h += '</div>';
    h += '<div style="display:flex;justify-content:center;gap:16px;margin-bottom:12px;font-size:11px;color:#94a3b8">';
    h += '<span>⏳ ' + pending.length + ' pending</span><span>✅ ' + completed.length + ' approved</span>';
    h += '</div>';
    // v32: Education section — shows today's homework status + module links
    h += '<div class="p-triage-hdr" onclick="pToggleSection(\'eduSection\')" style="display:flex;align-items:center;gap:8px;padding:14px 16px;background:rgba(34,197,94,0.1);border-radius:8px;margin:0 0 8px;cursor:pointer;font-weight:700;font-size:13px;color:#86efac"><span id="eduChevron" style="transition:transform 0.2s">&#x25BC;</span> EDUCATION</div>';
    h += '<div id="eduSection">';
    h += '<div class="p-reset-panel" style="margin-bottom:12px"><div class="p-reset-title">&#x1f4da; TODAY\'S HOMEWORK</div>';
    h += '<div id="eduStatus" style="padding:8px 12px;font-size:13px;color:#94a3b8;text-align:center">Loading education data...</div>';
    h += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center">';
    h += '<a onclick="eduGo(\'homework\')" style="padding:8px 14px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:8px;color:#86efac;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none">Math/Science</a>';
    h += '<a onclick="eduGo(\'wolfkid\')" style="padding:8px 14px;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);border-radius:8px;color:#fbbf24;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none">Wolfkid CER</a>';
    h += '<a onclick="eduGo(\'reading\')" style="padding:8px 14px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.3);border-radius:8px;color:#a5b4fc;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none">Reading</a>';
    h += '<a onclick="eduGo(\'sparkle\')" style="padding:8px 14px;background:rgba(196,132,252,0.12);border:1px solid rgba(196,132,252,0.3);border-radius:8px;color:#d8b4fe;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none">Sparkle (JJ)</a>';
    h += '<a onclick="eduGo(\'progress\')" style="padding:8px 14px;background:rgba(236,72,153,0.12);border:1px solid rgba(236,72,153,0.3);border-radius:8px;color:#f9a8d4;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none">Progress Report</a>';
    h += '<a onclick="eduGo(\'daily-missions\')" style="padding:8px 14px;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.3);border-radius:8px;color:#7dd3fc;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none">Daily Missions</a>';
    h += '<a onclick="eduGo(\'investigation\')" style="padding:8px 14px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:8px;color:#86efac;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none">Investigation</a>';
    h += '<a onclick="eduGo(\'baseline\')" style="padding:8px 14px;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);border-radius:8px;color:#fde68a;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none">Baseline</a>';
    h += '</div></div></div>';
    h += '<div id="v2-education"></div>';
    h += '<div class="p-v2-tabs">';
    h += tb('pending', '⏳ Pending (' + pending.length + ')');
    h += tb('completed', '✅ Completed (' + completed.length + ')');
    h += tb('weekly', '📅 Weekly');
    h += '</div>';
    if (currentTab === 'pending') h += rPending(pending, data.requiredStatus || {});
    else if (currentTab === 'completed') h += rCompleted(completed);
    else h += rWeekly(wg);
    h += rAskQueue(data.requests || []);
    h += rStoryFactory();
    h += rDeduction();
    h += rAddTask();
    h += rScreenTime(data.screenTime || {});
    h += rDinner();
    h += rReset();
    h += rGuide();
    body.innerHTML = h;
    // Fetch API stats asynchronously (guarded for CF proxy)
    try {
      var _sfRunner = google.script.run
        .withSuccessHandler(function(stats) {
          var el = document.getElementById('sfApiStats');
          if (el && stats) el.textContent = 'Stories: ' + (stats.storyCount || 0) + ' | API calls: ' + (stats.apiCalls || 0);
        })
        .withFailureHandler(function() {
          var el = document.getElementById('sfApiStats');
          if (el) el.textContent = '';
        });
      if (typeof _sfRunner.getStoryApiStatsSafe === 'function') {
        _sfRunner.getStoryApiStatsSafe();
      }
    } catch(e) {
      // Function doesn't exist — ignore, stats are cosmetic
    }
    // v32: Fetch education status for parent dashboard
    try {
      var kids = ['buggsy', 'jj'];
      var eduResults = {};
      var eduDone = 0;
      for (var ki = 0; ki < kids.length; ki++) {
        (function(kid) {
          google.script.run
            .withSuccessHandler(function(content) {
              eduResults[kid] = content;
              eduDone++;
              if (eduDone === kids.length) renderEduStatus(eduResults);
            })
            .withFailureHandler(function() {
              eduResults[kid] = null;
              eduDone++;
              if (eduDone === kids.length) renderEduStatus(eduResults);
            })
            .getTodayContentSafe(kid);
        })(kids[ki]);
      }
    } catch(e) {
      var eduEl = document.getElementById('eduStatus');
      if (eduEl) eduEl.textContent = 'Education data unavailable';
    }
    // Load education queue
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function(eduData) {
          _v2RenderEducation(eduData);
        })
        .withFailureHandler(function() {})
        .getEducationQueueSafe();
    }
  }
  function renderEduStatus(results) {
    var el = document.getElementById('eduStatus');
    if (!el) return;
    var h = '';
    var kids = ['buggsy', 'jj'];
    for (var i = 0; i < kids.length; i++) {
      var kid = kids[i];
      var data = results[kid];
      var label = kid === 'buggsy' ? GOLD_RING + ' Buggsy' : '⭐ JJ';
      if (!data || data.error) {
        h += '<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06)"><strong style="color:#e2e8f0">' + label + '</strong> — <span style="color:#94a3b8">No content loaded today</span></div>';
      } else {
        var subject = data.subject || 'Homework';
        var title = data.title || '';
        var completed = data.completed ? '&#x2705;' : '&#x23F3;';
        h += '<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06)"><strong style="color:#e2e8f0">' + label + '</strong> — ' + completed + ' <span style="color:#c4b5fd;font-weight:700">' + subject + '</span>';
        if (title) h += ' <span style="color:#94a3b8;font-size:12px">(' + title + ')</span>';
        h += '</div>';
      }
    }
    el.innerHTML = h || '<span style="color:#94a3b8">No homework scheduled today</span>';
  }
  function sc(icon, val, lbl, color) {
    return '<div class="p-sum-card"><div class="p-sum-icon">' + icon + '</div><div class="p-sum-val" style="color:' + color + '">' + val + '</div><div class="p-sum-lbl">' + lbl + '</div></div>';
  }
  function tb(id, label) {
    return '<div class="p-v2-tab' + (currentTab === id ? ' active' : '') + '" onclick="window._v2Tab(\'' + id + '\')">' + label + '</div>';
  }
  function rPending(items, reqStatus) {
    var grouped = {};
    items.forEach(function(t) {
      var c = (t.child || '').toLowerCase();
      if (c === 'both') { add('buggsy', t); add('jj', t); } else add(c, t);
    });
    function add(k, t) { if (!grouped[k]) grouped[k] = []; grouped[k].push(t); }
    var h = '<div class="p-kids" style="grid-template-columns:1fr">';
    var rendered = false;
    ['buggsy', 'jj'].forEach(function(kid) {
      var list = grouped[kid] || [];
      var req = (reqStatus && reqStatus[kid]) || { remaining: [], done: 0, total: 0, allClear: true };
      var remaining = req.remaining || [];
      if (!list.length && !remaining.length) return;
      rendered = true;
      h += '<div class="p-kid-col"><div class="p-kid-hdr ' + kid + '"><span class="p-kid-name">' + (kid === 'buggsy' ? GOLD_RING + ' BUGGSY' : '⭐ JJ') + '</span><span class="p-kid-score ' + kid + '">' + (req.allClear ? 'All clear' : (Math.max((req.total || 0) - (req.done || 0), 0) + ' must-do left')) + '</span></div><div class="p-kid-body">';
      if (list.length) {
        h += '<div class="p-kid-section-title" style="background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:8px 12px;margin-bottom:8px">⏳ Pending approvals (' + list.length + ')</div>';
        list.forEach(function(t) {
          h += '<div class="p-task-item"><div class="p-task-icon">' + (t.icon || '⭐') + '</div>';
          h += '<div class="p-task-info"><div class="p-task-name">' + t.task + '</div><div class="p-task-meta">' + t.points + ' pts · ' + t.category + '</div></div>';
          h += '<div class="p-onetap">';
          h += '<button class="p-onetap-btn approve" onclick="window._v2Approve(' + t.rowIndex + ',\'' + t.taskID + '\', event)">✓</button>';
          h += '<button class="p-onetap-btn bonus15" onclick="window._v2Bonus(' + t.rowIndex + ',1.5,\'' + t.taskID + '\')">⚡️1.5x</button>';
          h += '<button class="p-onetap-btn bonus2" onclick="window._v2Bonus(' + t.rowIndex + ',2,\'' + t.taskID + '\')">⚡2x</button>';
          h += '<button class="p-onetap-btn reject" onclick="window._v2Reject(' + t.rowIndex + ',\'' + t.taskID + '\')">✕</button>';
          h += '</div></div>';
        });
      }
      if (remaining.length) {
        var _colId = 'mustdo-' + kid;
        h += '<div class="p-kid-section-title" style="margin-top:' + (list.length ? '14px' : '0') + ';cursor:pointer;user-select:none" onclick="window._v2Toggle(\'' + _colId + '\',this)"><span class="p-collapse-arrow" style="display:inline-block;transition:transform 0.2s;transform:rotate(0deg);margin-right:6px">▸</span>↪ Must-do (' + remaining.length + ')</div>';
        h += '<div id="' + _colId + '" style="max-height:0;overflow:hidden;transition:max-height 0.3s ease">';
        remaining.forEach(function(t) {
          h += '<div class="p-task-item"><div class="p-task-icon">' + (t.icon || '🔒') + '</div>';
          h += '<div class="p-task-info"><div class="p-task-name">' + t.task + '</div><div class="p-task-meta">Must-do · clear only · 0 pts</div></div>';
          h += '<div class="p-onetap">';
          h += '<button class="p-onetap-btn approve" onclick="window._v2Override(' + t.rowIndex + ',\'' + t.taskID + '\')">↩ Clear</button>';
          h += '</div></div>';
        });
        h += '</div>';
      }
      h += '</div></div>';
    });
    h += '</div>';
    if (!rendered) return '<div class="p-empty-state">🎉 No pending approvals!</div>';
    return h;
  }
  function rCompleted(items) {
    if (!items.length) return '<div class="p-empty-state">No approved tasks yet today</div>';
    var h = '<div class="p-kid-col" style="margin-bottom:20px"><div class="p-kid-body">';
    items.forEach(function(t) {
      h += '<div class="p-done-item"><div class="p-done-icon">' + (t.icon || '✅') + '</div>';
      h += '<div class="p-done-name">' + t.task + ' <span style="color:#94a3b8">(' + t.child + ')</span></div>';
      h += '<div class="p-done-pts">+' + t.points + '</div><div class="p-done-ck">✓</div></div>';
    });
    h += '</div></div>';
    return h;
  }
  function rWeekly(wg) {
    if (!wg || !wg.days) return '<div class="p-empty-state">No weekly data</div>';
    var h = '<div class="p-weekly"><div class="p-weekly-title">📅 WEEKLY VIEW</div>';
    h += '<div class="p-weekly-range">' + (wg.weekStart || '') + ' — ' + (wg.weekEnd || '') + '</div>';
    h += '<div class="p-weekly-kid-filter">';
    ['all','buggsy','jj'].forEach(function(k) {
      var lbl = k === 'all' ? '👨‍👩‍👧‍👦 All' : (k === 'buggsy' ? GOLD_RING + ' Buggsy' : '⭐ JJ');
      h += '<div class="p-weekly-kid-btn' + (currentWeeklyKid === k ? ' active' : '') + '" onclick="window._v2WeekKid(\'' + k + '\')">' + lbl + '</div>';
    });
    h += '</div><div class="p-weekly-grid">';
    var today = new Date().toISOString().slice(0, 10), grid = wg.grid || {};
    for (var d = 0; d < 7; d++) {
      var isT = (wg.dates || [])[d] === today;
      h += '<div class="p-weekly-day' + (isT ? ' today' : '') + '"><div class="p-weekly-day-name">' + ((wg.days || [])[d] || '') + '</div>';
      var ent = gEnt(grid, d);
      if (!ent.length) { h += '<div class="p-weekly-empty">—</div>'; }
      else ent.forEach(function(e) {
        var neg = e.points < 0;
        h += '<div class="p-weekly-entry"><span>' + (e.eventType === 'rejection' ? '✕ ' : '✓ ') + e.task + '</span>';
        h += '<span class="p-weekly-entry-pts' + (neg ? ' neg' : '') + '">' + (neg ? '' : '+') + e.points + '</span></div>';
      });
      h += '</div>';
    }
    h += '</div></div>';
    return h;
  }
  function gEnt(grid, di) {
    var out = [], kids = currentWeeklyKid === 'all' ? Object.keys(grid) : [currentWeeklyKid];
    kids.forEach(function(k) { if (grid[k] && grid[k][di]) grid[k][di].entries.forEach(function(e) { out.push(e); }); });
    return out;
  }
  // v25: Story Factory section
  function rStoryFactory() {
    return '<div class="sf-panel"><div class="sf-title">📚 STORY FACTORY</div>' +
      '<div id="sfForm">' +
      '<div class="sf-row">' +
      '<select id="sfChar" class="sf-select"><option value="JJ">⭐ JJ</option><option value="Buggsy">⭕ Buggsy</option><option value="Both">👫 Both Kids</option><option value="Whole Family">👨‍👩‍👧‍👦 Whole Family</option></select>' +
      '<select id="sfTone" class="sf-select"><option value="Funny">😂 Funny</option><option value="Adventurous">⚔️ Adventure</option><option value="Cozy">🌙 Cozy</option><option value="Spooky">👻 Spooky</option></select>' +
      '</div>' +
      '<input type="text" id="sfTopic" class="sf-input" placeholder="Story topic... (e.g. JJ opens a lemonade stand)" style="margin-bottom:10px">' +
      '<button class="sf-btn" id="sfBtn" onclick="window._v2CreateStory()">📖 Create Bedtime Story</button>' +
      '</div>' +
      '<div id="sfLoading" style="display:none" class="sf-loading">' +
      '<div class="sf-loading-ring"></div>' +
      '<div class="sf-loading-msg" id="sfMsg">Writing the story...</div>' +
      '</div>' +
      '<div id="sfResult" style="display:none" class="sf-result"></div>' +
      '<div id="sfApiStats" style="font-size:11px;color:#64748b;text-align:center;margin-top:8px">Loading usage...</div>' +
      '</div>';
  }
  function rDeduction() {
    return '<div class="p-reset-panel" style="margin-bottom:20px"><div class="p-reset-title">⚡ DEDUCTION</div>' +
      '<div style="display:flex;flex-direction:column;gap:10px">' +
      '<div style="display:flex;gap:10px">' +
      '<select id="dedChild" style="flex:1;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit">' +
      '<option value="Buggsy">⭕ Buggsy</option><option value="JJ">⭐ JJ</option></select>' +
      '<input type="number" id="dedAmount" placeholder="Points" min="1" max="100" style="flex:1;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;outline:none">' +
      '</div>' +
      '<input type="text" id="dedReason" placeholder="Reason (e.g. Didn\'t listen, Fought with sibling)" style="padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;outline:none">' +
      '<button id="dedBtn" onclick="window._v2Deduct()" style="padding:12px;background:#ef4444;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">⚡ Apply Deduction</button>' +
      '<div id="dedStatus" style="display:none;font-size:12px;padding:6px 10px;border-radius:6px;text-align:center"></div>' +
      '</div></div>';
  }
  function rAddTask() {
    return '<div class="p-reset-panel" style="margin-bottom:20px"><div class="p-reset-title">➕ ADD TASK</div>' +
      '<div style="display:flex;flex-direction:column;gap:10px">' +
      '<div style="display:flex;gap:10px">' +
      '<select id="atChild" style="flex:1;padding:10px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:14px;font-family:inherit;background:rgba(20,20,40,0.4);color:#e2e8f0">' +
      '<option value="Buggsy">' + GOLD_RING + ' Buggsy</option><option value="JJ">⭐ JJ</option></select>' +
      '<select id="atTime" style="flex:1;padding:10px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:14px;font-family:inherit;background:rgba(20,20,40,0.4);color:#e2e8f0">' +
      '<option value="1-Morning">Morning</option><option value="2-Afternoon" selected>Afternoon</option><option value="3-Evening">Evening</option></select>' +
      '</div>' +
      '<div style="display:flex;gap:10px">' +
      '<input type="text" id="atName" placeholder="Task name" style="flex:3;padding:10px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:14px;font-family:inherit;background:rgba(20,20,40,0.4);color:#e2e8f0;outline:none">' +
      '<input type="number" id="atPoints" placeholder="Pts" value="25" min="1" max="500" style="flex:1;padding:10px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:14px;font-family:inherit;background:rgba(20,20,40,0.4);color:#e2e8f0;outline:none">' +
      '</div>' +
      '<button id="atBtn" onclick="window._v2AddTask()" style="padding:12px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">➕ Add Task</button>' +
      '<div id="atStatus" style="display:none;font-size:12px;padding:6px 10px;border-radius:6px;text-align:center"></div>' +
      '</div></div>';
  }
  function rDinner() {
    return '<div class="p-reset-panel" style="margin-bottom:20px"><div class="p-reset-title">🍽 DINNER LOG</div>' +
      '<div style="display:flex;flex-direction:column;gap:10px">' +

          res.innerHTML =
            '<div class="sf-result-title">📖 ' + (result.title || 'Story Created!') + '</div>' +
            '<div class="sf-result-book">Book #' + (result.bookNumber || '?') + '</div>' +
            '<a class="sf-result-link" href="' + result.pdfUrl + '" target="_blank">📚 Open Story PDF</a>' +
            '<div style="margin-top:12px"><button class="sf-btn" style="background:rgba(255,255,255,0.1);max-width:200px;margin:0 auto" onclick="document.getElementById(\'sfForm\').style.display=\'block\';document.getElementById(\'sfResult\').style.display=\'none\';document.getElementById(\'sfTopic\').value=\'\'">+ New Story</button></div>';
          res.style.display = 'block';
          toast('📖 Story ready!');
        } else {
          document.getElementById('sfForm').style.display = 'block';
          res.innerHTML = '<div class="sf-error">Story creation failed: ' + ((result && result.error) || 'unknown error') + '</div>';
          res.style.display = 'block';
          toast('Story failed — try again');
        }
      })
      .withFailureHandler(function(err) {
        clearTimeout(window._storyTimeout);
        window._storyInProgress = false;
        clearInterval(_sfMsgTimer);
        document.getElementById('sfLoading').style.display = 'none';
        document.getElementById('sfForm').style.display = 'block';
        var res = document.getElementById('sfResult');
        res.innerHTML = '<div class="sf-error">Connection error: ' + (err.message || 'unknown') + '</div>';
        res.style.display = 'block';
        toast('Story failed — try again');
      })
      .runStoryFactorySafe(topic, character, tone);
  };
  function _v2RenderEducation(data) {
    var container = document.getElementById('v2-education');
    if (!container) return;
    if (!data) { container.innerHTML = ''; return; }
    var h = '';

    if (data.pending && data.pending.length > 0) {
      h += '<div class="p-reset-panel" style="margin-bottom:12px"><div class="p-reset-title" style="color:#fbbf24">NEEDS YOUR REVIEW (' + data.pending.length + ')</div>';
      for (var i = 0; i < data.pending.length; i++) {
        var p = data.pending[i];
        var childLabel = p.child === 'jj' ? 'JJ' : 'Buggsy';
        h += '<div style="background:rgba(0,0,0,0.15);border-radius:8px;padding:10px;margin-bottom:6px">';
        h += '<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700;font-size:13px;color:#e2e8f0">' + escHtml(childLabel + ' — ' + p.subject) + '</span>';
        h += '<span style="font-size:11px;color:#94a3b8">' + escHtml(p.module) + '</span></div>';
        if (p.score > 0) {
          h += '<div style="font-size:11px;color:#94a3b8;margin-top:4px">Auto-graded: ' + p.score + '%</div>';
        }
        if (p.responseText) {
          h += '<div style="background:rgba(255,255,255,0.05);border-radius:6px;padding:8px;margin-top:8px;font-size:12px;color:#cbd5e1;max-height:120px;overflow-y:auto;white-space:pre-wrap">' + escHtml(p.responseText) + '</div>';
        }
        if (p.geminiFeedback) {
          try {
            var gf = JSON.parse(p.geminiFeedback);
            if (gf && gf.feedback) {
              h += '<div style="background:rgba(99,102,241,0.08);border-radius:6px;padding:8px;margin-top:6px;font-size:11px;color:#a5b4fc"><span style="font-weight:700">AI Review:</span> ' + escHtml(gf.feedback) + '</div>';
            }
          } catch(e) {}
        }
        h += '<div style="display:flex;gap:8px;margin-top:8px">';
        h += '<button onclick="window._v2ApproveEdu(' + p.rowIndex + ')" style="flex:1;padding:8px;border-radius:6px;border:none;background:#065f46;color:#6ee7b7;font-weight:700;font-size:12px;cursor:pointer">Approve (+10 rings)</button>';
        h += '<button onclick="window._v2ReturnEdu(' + p.rowIndex + ')" style="flex:1;padding:8px;border-radius:6px;border:none;background:#7f1d1d;color:#fca5a5;font-weight:700;font-size:12px;cursor:pointer">Return</button>';
        h += '</div></div>';
      }
      h += '</div>';
    }

    if (data.today && data.today.length > 0) {
      h += '<div class="p-reset-panel"><div class="p-reset-title" style="color:#a5b4fc">EDUCATION TODAY</div>';
      for (var j = 0; j < data.today.length; j++) {
        var t = data.today[j];
        var sIcon = t.status === 'auto_approved' || t.status === 'approved' ? '✅' : t.status === 'returned' ? '↩️' : '⏳';
        var cIcon = t.child === 'jj' ? '✨' : '🐺';
        h += '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px">';
        h += '<span>' + sIcon + '</span><span>' + cIcon + '</span>';
        h += '<span style="font-weight:600;color:#e2e8f0">' + escHtml(t.subject) + '</span>';
        h += '<span style="color:#64748b"> — ' + escHtml(t.module) + '</span>';
        if (t.ringsAwarded > 0) { h += '<span style="color:#fbbf24;font-weight:700;margin-left:auto">+' + t.ringsAwarded + '</span>'; }
        h += '</div>';
      }
      h += '</div>';
    }

    container.innerHTML = h;
  }
  window._v2ApproveEdu = function(rowIndex) {
    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.status === 'ok') {
          toast('Approved! Rings awarded.');
          google.script.run.withSuccessHandler(function(d) { _v2RenderEducation(d); }).withFailureHandler(function(){}).getEducationQueueSafe();
        }
      })
      .withFailureHandler(function() { toast('Failed to approve.'); })
      .approveHomeworkSafe(rowIndex, 'approve', '');
  };
  window._v2ReturnEdu = function(rowIndex) {
    var notes = prompt('Feedback for the kid (optional):');
    if (notes === null) return;
    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.status === 'ok') {
          toast('Returned with feedback.');
          google.script.run.withSuccessHandler(function(d) { _v2RenderEducation(d); }).withFailureHandler(function(){}).getEducationQueueSafe();
        }
      })
      .withFailureHandler(function() { toast('Failed to return.'); })
      .approveHomeworkSafe(rowIndex, 'return', notes || 'Please try again');
  };
})();
</script>
